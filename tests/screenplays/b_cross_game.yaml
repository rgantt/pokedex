# Screenplays are CHEAP regression tests produced by exploratory test agents.
# If a step fails, investigate: is it a real bug (fix the code) or a stale
# assertion (update or delete this file)? The INTENT matters, not the exact
# implementation. Don't contort the CLI to make a stale screenplay pass.
name: "Cross-Game Collection"
persona: cross_game_tester
description: >
  Add pikachu to 6 different games (red, gold, ruby, sword, scarlet, legends-za),
  verify per-game filtering, traded_away/owned_elsewhere semantics, HOME transfers,
  game reassignment, stats with and without game filter, home transferable for
  many-game vs few-game species, and duplicate entries in the same game.
needs_seed: true
mutates_collection: true

steps:
  # ── Phase 1: Add pikachu to 6 different games ─────────────────────

  - name: "add pikachu to red"
    command: "pokedex collection add --pokemon=pikachu --game=red --method=catch"
    capture:
      pika_red_id: "data.id"
    assert:
      exit_code: 0
      equals: { "data.species_name": "pikachu", "data.game": "red", "data.method": "catch", "data.in_home": false }
      has_fields: ["data.id", "data.created_at", "data.updated_at"]

  - name: "add pikachu to gold"
    command: "pokedex collection add --pokemon=pikachu --game=gold --method=catch"
    capture:
      pika_gold_id: "data.id"
    assert:
      exit_code: 0
      equals: { "data.species_name": "pikachu", "data.game": "gold", "data.method": "catch" }
      has_fields: ["data.id"]

  - name: "add pikachu to ruby"
    command: "pokedex collection add --pokemon=pikachu --game=ruby --method=catch"
    capture:
      pika_ruby_id: "data.id"
    assert:
      exit_code: 0
      equals: { "data.species_name": "pikachu", "data.game": "ruby" }

  - name: "add pikachu to sword"
    command: "pokedex collection add --pokemon=pikachu --game=sword --method=catch"
    capture:
      pika_sword_id: "data.id"
    assert:
      exit_code: 0
      equals: { "data.species_name": "pikachu", "data.game": "sword", "data.in_home": false }

  - name: "add pikachu to scarlet"
    command: "pokedex collection add --pokemon=pikachu --game=scarlet --method=catch"
    capture:
      pika_scarlet_id: "data.id"
    assert:
      exit_code: 0
      equals: { "data.species_name": "pikachu", "data.game": "scarlet" }

  - name: "add pikachu to legends-za"
    command: "pokedex collection add --pokemon=pikachu --game=legends-za --method=catch"
    capture:
      pika_lza_id: "data.id"
    assert:
      exit_code: 0
      equals: { "data.species_name": "pikachu", "data.game": "legends-za" }

  # ── Phase 2: Verify all 6 appear in collection list ────────────────

  - name: "trade away pikachu from red"
    command: "pokedex collection update $pika_red_id --status=traded_away"
    assert:
      exit_code: 0
      equals: { "data.status": "traded_away", "data.game": "red" }

  - name: "pikachu still has owned_elsewhere=false in home missing (5 non-traded copies exist, not in HOME)"
    command: "pokedex home missing --limit=200"
    assert:
      exit_code: 0
      has_fields: ["meta.total"]

  - name: "list traded_away shows the red pikachu"
    command: "pokedex collection list --status=traded_away"
    assert:
      exit_code: 0
      type_of: { "data": "array" }
      array_len: { "data": { "min": 1 } }

  # ── Phase 4: Transfer 3 to HOME ───────────────────────────────────

  - name: "transfer sword pikachu to HOME"
    command: "pokedex collection update $pika_sword_id --in-home=true"
    assert:
      exit_code: 0
      equals: { "data.in_home": true, "data.game": "sword" }

  - name: "transfer scarlet pikachu to HOME"
    command: "pokedex collection update $pika_scarlet_id --in-home=true"
    assert:
      exit_code: 0
      equals: { "data.in_home": true, "data.game": "scarlet" }

  - name: "transfer legends-za pikachu to HOME"
    command: "pokedex collection update $pika_lza_id --in-home=true"
    assert:
      exit_code: 0
      equals: { "data.in_home": true, "data.game": "legends-za" }

  - name: "home status shows 3 in HOME"
    command: "pokedex home status"
    assert:
      exit_code: 0
      has_fields: ["data.total_in_home", "data.unique_species_in_home"]
      type_of: { "data.total_in_home": "number" }

  - name: "home coverage shows pikachu as caught"
    command: "pokedex home coverage"
    assert:
      exit_code: 0
      has_fields: ["data.total", "data.caught", "data.percentage"]
      type_of: { "data.percentage": "number" }

  - name: "update pikachu game from red to blue"
    command: "pokedex collection update $pika_red_id --game=blue"
    assert:
      exit_code: 0
      equals: { "data.game": "blue", "data.status": "traded_away" }

  - name: "verify show reflects the game change"
    command: "pokedex collection show $pika_red_id"
    assert:
      exit_code: 0
      equals: { "data.game": "blue", "data.species_name": "pikachu" }

  # ── Phase 6: Collection stats with and without game filter ─────────

  - name: "global stats shows all entries"
    command: "pokedex collection stats"
    assert:
      exit_code: 0
      has_fields: ["data.total_entries", "data.unique_species", "data.in_home_count", "data.by_game", "data.by_status"]
      type_of: { "data.total_entries": "number", "data.in_home_count": "number" }

  - name: "stats filtered by sword"
    command: "pokedex collection stats --game=sword"
    assert:
      exit_code: 0
      has_fields: ["data.total_entries", "data.unique_species", "data.in_home_count"]
      type_of: { "data.total_entries": "number" }

  - name: "stats filtered by gold"
    command: "pokedex collection stats --game=gold"
    assert:
      exit_code: 0
      has_fields: ["data.total_entries", "data.unique_species"]
      type_of: { "data.total_entries": "number" }

  - name: "stats filtered by nonexistent game errors"
    command: "pokedex collection stats --game=fakegame"
    assert:
      exit_code: 1

  # ── Phase 7: home transferable — many-game vs few-game species ─────

  - name: "home transferable pikachu shows many games"
    command: "pokedex home transferable pikachu"
    assert:
      exit_code: 0
      type_of: { "data": "array" }
      array_len: { "data": { "min": 5 } }
      has_fields: ["actions"]

  - name: "home transferable meltan shows very few games"
    command: "pokedex home transferable meltan"
    assert:
      exit_code: 0
      type_of: { "data": "array" }
      array_len: { "data": { "min": 1, "max": 3 } }

  # ── Phase 8: Duplicate entries — same species, same game ───────────

  - name: "add pikachu to sword again (duplicate in same game)"
    command: "pokedex collection add --pokemon=pikachu --game=sword --method=breed"
    capture:
      pika_sword_dup_id: "data.id"
    assert:
      exit_code: 0
      equals: { "data.species_name": "pikachu", "data.game": "sword", "data.method": "breed" }

  - name: "add pikachu to sword a third time"
    command: "pokedex collection add --pokemon=pikachu --game=sword --method=trade"
    assert:
      exit_code: 0
      equals: { "data.species_name": "pikachu", "data.game": "sword", "data.method": "trade" }

  - name: "each duplicate has a unique id"
    command: "pokedex collection show $pika_sword_dup_id"
    assert:
      exit_code: 0
      equals: { "data.species_name": "pikachu", "data.game": "sword", "data.method": "breed" }
      has_fields: ["data.id"]

  # ── Phase 9: Verify status counts after all mutations ──────────────

  - name: "global stats reflects full picture"
    command: "pokedex collection stats"
    assert:
      exit_code: 0
      has_fields: ["data.total_entries", "data.unique_species", "data.by_status", "data.by_game"]
      type_of: { "data.total_entries": "number" }

  - name: "list sorted by dex still works"
    command: "pokedex collection list --sort=dex"
    assert:
      exit_code: 0
      type_of: { "data": "array" }
      has_fields: ["meta.total"]
