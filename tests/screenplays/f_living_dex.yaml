name: "Living Dex Tracker"
persona: "F"
description: >
  Final living dex stress test across two games (sword + scarlet).
  Covers: 25-pokemon living dex, cross-game dex progress (national counts species
  from both games), same species caught in two games counted once, full lifecycle
  for 3 pokemon (caught -> living_dex -> evolved -> traded_away -> transferred),
  HOME workflow (--in-home, transfer, coverage, status, missing), dex show for
  every regional dex, pagination on dex progress, missing filter accuracy after
  catching 5 kanto pokemon, remove cascade verification, sort validation.
  Round 15: final comprehensive round.
needs_seed: true
mutates_collection: true

steps:
  # ============================================================
  # PHASE 1: Verify every regional dex returns data
  # ============================================================
  - name: "Kanto dex has 151 species"
    command: "pokedex dex show kanto --limit=1"
    assert:
      exit_code: 0
      equals: {"meta.total": 151}
      has_fields: ["data.0.pokedex_number"]

  - name: "Johto dex returns data"
    command: "pokedex dex show original-johto --limit=1"
    assert:
      exit_code: 0
      equals: {"meta.total": 251}
      has_fields: ["data.0.pokedex_number"]

  - name: "Hoenn dex returns data"
    command: "pokedex dex show hoenn --limit=1"
    assert:
      exit_code: 0
      equals: {"meta.total": 202}
      has_fields: ["data.0.pokedex_number"]

  - name: "Sinnoh dex returns data"
    command: "pokedex dex show original-sinnoh --limit=1"
    assert:
      exit_code: 0
      equals: {"meta.total": 151}
      has_fields: ["data.0.pokedex_number"]

  - name: "Unova dex returns data"
    command: "pokedex dex show original-unova --limit=1"
    assert:
      exit_code: 0
      equals: {"meta.total": 156}
      has_fields: ["data.0.pokedex_number"]

  - name: "Kalos dex returns data"
    command: "pokedex dex show kalos-central --limit=1"
    assert:
      exit_code: 0
      equals: {"meta.total": 150}
      has_fields: ["data.0.pokedex_number"]

  - name: "Alola dex returns data"
    command: "pokedex dex show original-alola --limit=1"
    assert:
      exit_code: 0
      equals: {"meta.total": 302}
      has_fields: ["data.0.pokedex_number"]

  - name: "Galar dex has 400 species"
    command: "pokedex dex show galar --limit=1"
    assert:
      exit_code: 0
      equals: {"meta.total": 400}
      has_fields: ["data.0.pokedex_number"]

  - name: "Paldea dex has 400 species"
    command: "pokedex dex show paldea --limit=1"
    assert:
      exit_code: 0
      equals: {"meta.total": 400}
      has_fields: ["data.0.pokedex_number"]

  # ============================================================
  # PHASE 2: Build 25-pokemon living dex across sword + scarlet
  # ============================================================

  # --- Sword: 15 pokemon ---
  - name: "Add grookey to sword"
    command: "pokedex collection add --pokemon=grookey --game=sword --status=living_dex"
    assert:
      exit_code: 0
      equals: {"data.species_name": "grookey", "data.status": "living_dex"}
      has_fields: ["data.id", "data.created_at"]

  - name: "Add thwackey to sword"
    command: "pokedex collection add --pokemon=thwackey --game=sword --status=living_dex"
    assert:
      exit_code: 0
      equals: {"data.species_name": "thwackey", "data.status": "living_dex"}

  - name: "Add rillaboom to sword"
    command: "pokedex collection add --pokemon=rillaboom --game=sword --status=living_dex"
    assert:
      exit_code: 0
      equals: {"data.species_name": "rillaboom", "data.status": "living_dex"}

  - name: "Add scorbunny to sword"
    command: "pokedex collection add --pokemon=scorbunny --game=sword --status=living_dex"
    capture: {"scorbunny_id": "data.id"}
    assert:
      exit_code: 0
      equals: {"data.species_name": "scorbunny", "data.status": "living_dex"}

  - name: "Add raboot to sword"
    command: "pokedex collection add --pokemon=raboot --game=sword --status=living_dex"
    assert:
      exit_code: 0
      equals: {"data.species_name": "raboot", "data.status": "living_dex"}

  - name: "Add cinderace to sword"
    command: "pokedex collection add --pokemon=cinderace --game=sword --status=living_dex"
    assert:
      exit_code: 0
      equals: {"data.species_name": "cinderace", "data.status": "living_dex"}

  - name: "Add wooloo to sword"
    command: "pokedex collection add --pokemon=wooloo --game=sword --status=living_dex"
    assert:
      exit_code: 0
      equals: {"data.species_name": "wooloo", "data.status": "living_dex"}

  - name: "Add dubwool to sword"
    command: "pokedex collection add --pokemon=dubwool --game=sword --status=living_dex"
    assert:
      exit_code: 0
      equals: {"data.species_name": "dubwool", "data.status": "living_dex"}

  - name: "Add corviknight to sword"
    command: "pokedex collection add --pokemon=corviknight --game=sword --status=living_dex"
    assert:
      exit_code: 0
      equals: {"data.species_name": "corviknight", "data.status": "living_dex"}

  - name: "Add yamper to sword"
    command: "pokedex collection add --pokemon=yamper --game=sword --status=living_dex"
    assert:
      exit_code: 0
      equals: {"data.species_name": "yamper", "data.status": "living_dex"}

  - name: "Add boltund to sword"
    command: "pokedex collection add --pokemon=boltund --game=sword --status=living_dex"
    assert:
      exit_code: 0
      equals: {"data.species_name": "boltund", "data.status": "living_dex"}

  - name: "Add eevee to sword"
    command: "pokedex collection add --pokemon=eevee --game=sword --status=living_dex"
    capture: {"eevee_sword_id": "data.id"}
    assert:
      exit_code: 0
      equals: {"data.species_name": "eevee", "data.status": "living_dex"}

  - name: "Add pikachu to sword as caught"
    command: "pokedex collection add --pokemon=pikachu --game=sword --status=caught"
    capture: {"pikachu_sword_id": "data.id"}
    assert:
      exit_code: 0
      equals: {"data.species_name": "pikachu", "data.status": "caught"}
      has_fields: ["data.id"]

  - name: "Add magikarp to sword"
    command: "pokedex collection add --pokemon=magikarp --game=sword --status=living_dex"
    capture: {"magikarp_id": "data.id"}
    assert:
      exit_code: 0
      equals: {"data.species_name": "magikarp", "data.status": "living_dex"}

  - name: "Add gyarados to sword"
    command: "pokedex collection add --pokemon=gyarados --game=sword --status=living_dex"
    assert:
      exit_code: 0
      equals: {"data.species_name": "gyarados", "data.status": "living_dex"}

  # --- Scarlet: 10 pokemon ---
  - name: "Add sprigatito to scarlet"
    command: "pokedex collection add --pokemon=sprigatito --game=scarlet --status=living_dex"
    assert:
      exit_code: 0
      equals: {"data.species_name": "sprigatito", "data.game": "scarlet"}

  - name: "Add floragato to scarlet"
    command: "pokedex collection add --pokemon=floragato --game=scarlet --status=living_dex"
    assert:
      exit_code: 0
      equals: {"data.species_name": "floragato", "data.game": "scarlet"}

  - name: "Add meowscarada to scarlet"
    command: "pokedex collection add --pokemon=meowscarada --game=scarlet --status=living_dex"
    assert:
      exit_code: 0
      equals: {"data.species_name": "meowscarada", "data.game": "scarlet"}

  - name: "Add lechonk to scarlet"
    command: "pokedex collection add --pokemon=lechonk --game=scarlet --status=living_dex"
    capture: {"lechonk_id": "data.id"}
    assert:
      exit_code: 0
      equals: {"data.species_name": "lechonk", "data.status": "living_dex"}

  - name: "Add pawmi to scarlet"
    command: "pokedex collection add --pokemon=pawmi --game=scarlet --status=living_dex"
    assert:
      exit_code: 0
      equals: {"data.species_name": "pawmi", "data.game": "scarlet"}

  - name: "Add fidough to scarlet"
    command: "pokedex collection add --pokemon=fidough --game=scarlet --status=living_dex"
    assert:
      exit_code: 0
      equals: {"data.species_name": "fidough", "data.game": "scarlet"}

  - name: "Add smoliv to scarlet"
    command: "pokedex collection add --pokemon=smoliv --game=scarlet --status=living_dex"
    assert:
      exit_code: 0
      equals: {"data.species_name": "smoliv", "data.game": "scarlet"}

  - name: "Add koraidon to scarlet"
    command: "pokedex collection add --pokemon=koraidon --game=scarlet --status=living_dex"
    assert:
      exit_code: 0
      equals: {"data.species_name": "koraidon", "data.game": "scarlet"}

  - name: "Add pikachu to scarlet (cross-game duplicate)"
    command: "pokedex collection add --pokemon=pikachu --game=scarlet --status=living_dex"
    capture: {"pikachu_scarlet_id": "data.id"}
    assert:
      exit_code: 0
      equals: {"data.species_name": "pikachu", "data.game": "scarlet"}

  - name: "Add eevee to scarlet (cross-game duplicate)"
    command: "pokedex collection add --pokemon=eevee --game=scarlet --status=living_dex"
    assert:
      exit_code: 0
      equals: {"data.species_name": "eevee", "data.game": "scarlet"}

  # ============================================================
  # PHASE 3: Cross-game dex progress - species counted once
  # ============================================================
  - name: "National dex progress counts species from both games"
    command: "pokedex dex progress national --caught --limit=50"
    assert:
      exit_code: 0
      has_fields: ["data.caught", "data.total", "data.entries"]
      equals: {"data.total": 1025}

  - name: "Pikachu in both games still counted once in national"
    command: "pokedex collection list --pokemon=pikachu"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 2}}
      type_of: {"data": "array"}

  # ============================================================
  # PHASE 4: Full lifecycle for 3 pokemon
  # ============================================================

  # Lifecycle 1: pikachu (sword) caught -> living_dex -> evolved -> traded_away
  - name: "Update pikachu sword to living_dex"
    command: "pokedex collection update $pikachu_sword_id --status=living_dex"
    assert:
      exit_code: 0
      equals: {"data.status": "living_dex", "data.species_name": "pikachu"}
      has_fields: ["data.updated_at"]

  - name: "Update pikachu sword to evolved"
    command: "pokedex collection update $pikachu_sword_id --status=evolved"
    assert:
      exit_code: 0
      equals: {"data.status": "evolved", "data.species_name": "pikachu"}

  - name: "Update pikachu sword to traded_away"
    command: "pokedex collection update $pikachu_sword_id --status=traded_away"
    assert:
      exit_code: 0
      equals: {"data.status": "traded_away", "data.species_name": "pikachu"}

  # Lifecycle 2: magikarp living_dex -> evolved -> transferred
  - name: "Update magikarp to evolved"
    command: "pokedex collection update $magikarp_id --status=evolved"
    assert:
      exit_code: 0
      equals: {"data.status": "evolved", "data.species_name": "magikarp"}

  - name: "Update magikarp to transferred"
    command: "pokedex collection update $magikarp_id --status=transferred"
    assert:
      exit_code: 0
      equals: {"data.status": "transferred", "data.species_name": "magikarp"}

  # Lifecycle 3: lechonk living_dex -> evolved -> traded_away -> transferred
  - name: "Update lechonk to evolved"
    command: "pokedex collection update $lechonk_id --status=evolved"
    assert:
      exit_code: 0
      equals: {"data.status": "evolved", "data.species_name": "lechonk"}

  - name: "Update lechonk to traded_away"
    command: "pokedex collection update $lechonk_id --status=traded_away"
    assert:
      exit_code: 0
      equals: {"data.status": "traded_away", "data.species_name": "lechonk"}

  - name: "Update lechonk to transferred"
    command: "pokedex collection update $lechonk_id --status=transferred"
    assert:
      exit_code: 0
      equals: {"data.status": "transferred", "data.species_name": "lechonk"}

  # ============================================================
  # PHASE 5: HOME workflow
  # ============================================================
  - name: "Add tandemaus to scarlet with --in-home"
    command: "pokedex collection add --pokemon=tandemaus --game=scarlet --status=living_dex --in-home"
    capture: {"tandemaus_id": "data.id"}
    assert:
      exit_code: 0
      equals: {"data.in_home": true, "data.species_name": "tandemaus"}
      has_fields: ["data.id"]

  - name: "Transfer eevee sword to HOME"
    command: "pokedex collection update $eevee_sword_id --in-home=true"
    assert:
      exit_code: 0
      equals: {"data.in_home": true, "data.species_name": "eevee"}
      has_fields: ["data.updated_at"]

  - name: "Transfer scorbunny to HOME"
    command: "pokedex collection update $scorbunny_id --in-home=true"
    assert:
      exit_code: 0
      equals: {"data.in_home": true, "data.species_name": "scorbunny"}

  - name: "HOME coverage shows caught species in home"
    command: "pokedex home coverage"
    assert:
      exit_code: 0
      has_fields: ["data.caught", "data.total", "data.percentage"]
      equals: {"data.dex_name": "national"}

  - name: "HOME status shows total and by-game breakdown"
    command: "pokedex home status"
    assert:
      exit_code: 0
      has_fields: ["data.total_in_home", "data.unique_species_in_home", "data.by_game_origin"]
      type_of: {"data.by_game_origin": "array"}

  - name: "HOME missing excludes in-home species"
    command: "pokedex home missing --limit=5"
    assert:
      exit_code: 0
      type_of: {"data": "array"}
      array_len: {"data": {"min": 5, "max": 5}}
      has_fields: ["meta.total"]

  - name: "HOME missing shows owned_elsewhere for non-home collection entries"
    command: "pokedex home missing --limit=1000"
    assert:
      exit_code: 0
      type_of: {"data": "array"}
      has_fields: ["data.0.owned_elsewhere"]

  - name: "Collection list with in-home filter"
    command: "pokedex collection list --in-home"
    assert:
      exit_code: 0
      type_of: {"data": "array"}
      array_len: {"data": {"min": 3}}

  # ============================================================
  # PHASE 6: Dex progress pagination
  # ============================================================
  - name: "Dex progress limit=1 offset=0 returns exactly 1 entry"
    command: "pokedex dex progress galar --limit=1 --offset=0"
    assert:
      exit_code: 0
      array_len: {"data.entries": {"min": 1, "max": 1}}
      equals: {"data.total": 400}

  - name: "Dex progress limit=1 offset=1 returns next entry"
    command: "pokedex dex progress galar --limit=1 --offset=1"
    assert:
      exit_code: 0
      array_len: {"data.entries": {"min": 1, "max": 1}}
      has_fields: ["data.caught", "data.percentage"]

  # ============================================================
  # PHASE 7: Missing filter accuracy - catch 5 kanto, 146 missing
  # ============================================================
  - name: "Add bulbasaur to sword for kanto"
    command: "pokedex collection add --pokemon=bulbasaur --game=sword --status=caught"
    assert:
      exit_code: 0
      equals: {"data.species_name": "bulbasaur"}

  - name: "Add charmander to sword for kanto"
    command: "pokedex collection add --pokemon=charmander --game=sword --status=caught"
    assert:
      exit_code: 0
      equals: {"data.species_name": "charmander"}

  - name: "Add squirtle to sword for kanto"
    command: "pokedex collection add --pokemon=squirtle --game=sword --status=caught"
    assert:
      exit_code: 0
      equals: {"data.species_name": "squirtle"}

  - name: "Add jigglypuff to sword for kanto"
    command: "pokedex collection add --pokemon=jigglypuff --game=sword --status=caught"
    assert:
      exit_code: 0
      equals: {"data.species_name": "jigglypuff"}

  - name: "Kanto missing count is 146 after 5 kanto pokemon"
    command: "pokedex dex progress kanto --missing --limit=1"
    assert:
      exit_code: 0
      equals: {"data.total": 151}
      has_fields: ["data.caught", "data.entries"]

  # pikachu (in sword) is 5th kanto pokemon -> caught=5, missing entries total in meta
  - name: "Kanto caught count is 5"
    command: "pokedex dex progress kanto --caught --limit=50"
    assert:
      exit_code: 0
      equals: {"data.caught": 5}
      array_len: {"data.entries": {"min": 5, "max": 5}}

  # ============================================================
  # PHASE 8: Sort validation
  # ============================================================
  - name: "Sort by dex is valid"
    command: "pokedex collection list --sort=dex --limit=5"
    assert:
      exit_code: 0
      type_of: {"data": "array"}
      array_len: {"data": {"min": 5, "max": 5}}

  - name: "Sort by id is valid"
    command: "pokedex collection list --sort=id --limit=5"
    assert:
      exit_code: 0
      type_of: {"data": "array"}
      array_len: {"data": {"min": 5, "max": 5}}

  - name: "Sort by recent is invalid"
    command: "pokedex collection list --sort=recent"
    assert:
      exit_code: 1
      equals: {"error.code": "INVALID_PARAMETER"}
      contains: {"error.message": "recent"}

  # ============================================================
  # PHASE 9: Remove cascade verification
  # ============================================================
  - name: "Capture stats before removal"
    command: "pokedex collection stats --game=scarlet"
    capture: {"pre_remove_total": "data.total_entries"}
    assert:
      exit_code: 0
      has_fields: ["data.total_entries", "data.unique_species"]
      type_of: {"data.total_entries": "number"}

  - name: "Remove tandemaus entry"
    command: "pokedex collection remove $tandemaus_id"
    assert:
      exit_code: 0
      equals: {"data.removed": true}
      has_fields: ["data.id"]

  - name: "Stats update after removal"
    command: "pokedex collection stats --game=scarlet"
    assert:
      exit_code: 0
      has_fields: ["data.total_entries", "data.unique_species"]
      type_of: {"data.total_entries": "number"}

  - name: "HOME coverage updates after removal of in-home entry"
    command: "pokedex home coverage"
    assert:
      exit_code: 0
      has_fields: ["data.caught", "data.total", "data.percentage"]
      type_of: {"data.percentage": "number"}

  - name: "Removed entry returns NOT_FOUND on show"
    command: "pokedex collection show $tandemaus_id"
    assert:
      exit_code: 1
      equals: {"error.code": "NOT_FOUND"}
      has_fields: ["actions"]

  # ============================================================
  # PHASE 10: Collection stats cross-game
  # ============================================================
  - name: "Overall stats includes both games"
    command: "pokedex collection stats"
    assert:
      exit_code: 0
      has_fields: ["data.total_entries", "data.unique_species", "data.by_game"]
      type_of: {"data.by_game": "array"}

  - name: "Sword stats filtered"
    command: "pokedex collection stats --game=sword"
    assert:
      exit_code: 0
      has_fields: ["data.total_entries", "data.by_status"]
      type_of: {"data.by_status": "array"}

  # ============================================================
  # PHASE 11: Error handling
  # ============================================================
  - name: "Invalid status on add returns error"
    command: "pokedex collection add --pokemon=pikachu --game=sword --status=bogus"
    assert:
      exit_code: 1
      has_fields: ["error.code", "error.message"]
      contains: {"error.message": "Invalid status"}

  - name: "Invalid dex name returns NOT_FOUND"
    command: "pokedex dex progress nonexistent-dex"
    assert:
      exit_code: 1
      equals: {"error.code": "NOT_FOUND"}
      has_fields: ["actions"]

  - name: "Dry-run add previews without saving"
    command: "pokedex collection add --pokemon=gengar --game=sword --status=living_dex --dry-run"
    assert:
      exit_code: 0
      equals: {"data.dry_run": true}
      has_fields: ["data.species_name", "actions"]
