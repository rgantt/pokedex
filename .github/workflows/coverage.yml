name: Coverage

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build instrumented binary
        run: |
          cargo llvm-cov clean --workspace
          cargo llvm-cov test --no-report --test validate_encounters --no-run

      - name: Install instrumented binary and seed database
        run: |
          cp target/llvm-cov-target/debug/pokedex /usr/local/bin/pokedex
          chmod +x /usr/local/bin/pokedex
          pokedex db seed

      - name: Run validate_encounters tests
        run: cargo llvm-cov test --no-report --test validate_encounters

      - name: Run screenplay tests
        run: cargo llvm-cov test --no-report --test run_screenplays

      - name: Generate coverage report
        run: |
          cargo llvm-cov report --summary-only
          cargo llvm-cov report --lcov --output-path coverage.lcov

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.lcov
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Generate coverage badge
        run: |
          COVERAGE=$(cargo llvm-cov report --summary-only 2>&1 | grep TOTAL | awk '{print $NF}' | sed 's/%//')
          echo "COVERAGE=$COVERAGE" >> $GITHUB_ENV
          echo "Coverage: $COVERAGE%"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.lcov
          retention-days: 30
