# Screenplays are CHEAP regression tests produced by exploratory test agents.
# If a step fails, investigate: is it a real bug (fix the code) or a stale
# assertion (update or delete this file)? The INTENT matters, not the exact
# implementation. Don't contort the CLI to make a stale screenplay pass.
name: "S - Brilliant Diamond Sinnoh Completionist"
persona: s_bdsp_playthrough
description: >
  BDSP playthrough testing discover-inspect-catch-evolve-verify loop across
  route-201-sinnoh through route-217-sinnoh, oreburgh-mine, eterna-forest,
  iron-island, and victory-road-sinnoh. Compares BDSP (gen 8) encounter data
  with Diamond (gen 4) for the same Sinnoh region. Tests 40+ species collection,
  HATEOAS navigation, and cross-era data differences.
needs_seed: true
mutates_collection: true

steps:
  # ============================================================
  # GAME VERIFICATION: confirm BDSP metadata
  # ============================================================
  - name: "Game info -- BDSP is gen 8 Sinnoh"
    command: "pokedex game show brilliant-diamond"
    assert:
      exit_code: 0
      equals: { "data.name": "brilliant-diamond", "data.generation": 8, "data.region": "Sinnoh" }
      has_fields: ["data.connects_to_home", "actions"]

  # ============================================================
  # CROSS-ERA COMPARISON: Diamond vs BDSP use different location slugs
  # ============================================================
  - name: "Diamond uses sinnoh-route-201 slug"
    command: "pokedex location encounters sinnoh-route-201 --game=diamond"
    assert:
      exit_code: 0
      equals: { "meta.total": 8 }
      contains: { "data.0.location": "Route 201" }

  - name: "BDSP uses route-201-sinnoh slug instead"
    command: "pokedex location encounters sinnoh-route-201 --game=brilliant-diamond"
    assert:
      exit_code: 1
      equals: { "error.code": "NOT_FOUND" }
      has_fields: ["actions"]

  - name: "BDSP route-201-sinnoh has encounters with time-based details"
    command: "pokedex location encounters route-201-sinnoh --game=brilliant-diamond"
    assert:
      exit_code: 0
      equals: { "meta.total": 5 }
      has_fields: ["data.0.details"]

  # ============================================================
  # LOCATION 1: route-201-sinnoh
  # ============================================================
  - name: "Route 201 -- inspect Bidoof"
    command: "pokedex pokemon show bidoof"
    assert:
      exit_code: 0
      equals: { "data.name": "bidoof", "data.generation": 4 }
      has_fields: ["data.types", "data.stats"]

  - name: "Route 201 -- catch Bidoof"
    command: "pokedex collection add --pokemon=bidoof --game=brilliant-diamond --method=catch"
    capture: { "bidoof_id": "data.id" }
    assert:
      exit_code: 0
      equals: { "data.species_name": "bidoof", "data.game": "brilliant-diamond" }
      has_fields: ["data.id", "data.created_at"]

  - name: "Route 201 -- catch Starly"
    command: "pokedex collection add --pokemon=starly --game=brilliant-diamond --method=catch"
    capture: { "starly_id": "data.id" }
    assert:
      exit_code: 0
      equals: { "data.species_name": "starly", "data.status": "caught", "data.method": "catch" }

  # ============================================================
  # LOCATION 2: route-202-sinnoh
  # ============================================================
