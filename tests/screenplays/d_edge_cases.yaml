# Screenplays are CHEAP regression tests produced by exploratory test agents.
# If a step fails, investigate: is it a real bug (fix the code) or a stale
# assertion (update or delete this file)? The INTENT matters, not the exact
# implementation. Don't contort the CLI to make a stale screenplay pass.
name: "Edge Cases & Error Handling"
persona: "D"
description: "Validate error handling, boundary values, invalid inputs, special names, form resolution, empty collections, SQL injection safety, recovery action validity, and HATEOAS completeness"
needs_seed: true
mutates_collection: true

steps:
  # ══════════════════════════════════════════════════════════════════
  # BOUNDARY: First and last pokemon
  # ══════════════════════════════════════════════════════════════════

  - name: "pokemon show 1 returns Bulbasaur"
    command: "pokedex pokemon show 1"
    assert:
      exit_code: 0
      equals: { "data.id": 1, "data.name": "bulbasaur" }
      has_fields: ["data.types", "data.stats", "data.abilities", "actions"]

  - name: "pokemon show 1025 returns Pecharunt (last pokemon)"
    command: "pokedex pokemon show 1025"
    assert:
      exit_code: 0
      equals: { "data.id": 1025, "data.name": "pecharunt", "data.is_mythical": true }
      has_fields: ["data.types", "data.stats", "actions"]

  # ══════════════════════════════════════════════════════════════════
  # NOT_FOUND errors: misspelled, ID 0, very high ID, negative ID
  # ══════════════════════════════════════════════════════════════════

  - name: "misspelled pokemon name returns NOT_FOUND with did_you_mean"
    command: "pokedex pokemon show pikachoo"
    assert:
      exit_code: 1
      equals: { "error.code": "NOT_FOUND" }
      contains: { "error.message": "pikachoo" }
      has_fields: ["actions"]

  - name: "pokemon ID 0 returns NOT_FOUND"
    command: "pokedex pokemon show 0"
    assert:
      exit_code: 1
      equals: { "error.code": "NOT_FOUND" }
      has_fields: ["actions"]

  - name: "very high pokemon ID returns NOT_FOUND"
    command: "pokedex pokemon show 999999"
    assert:
      exit_code: 1
      equals: { "error.code": "NOT_FOUND" }
      has_fields: ["actions"]

  - name: "negative ID with -- separator returns NOT_FOUND"
    command: "pokedex pokemon show -- -1"
    assert:
      exit_code: 1
      equals: { "error.code": "NOT_FOUND" }
      contains: { "error.message": "-1" }

  # ══════════════════════════════════════════════════════════════════
  # CLAP-LEVEL errors: missing args, bad subcommands
  # ══════════════════════════════════════════════════════════════════

  - name: "pokemon show with no argument returns INVALID_PARAMETER"
    command: "pokedex pokemon show"
    assert:
      exit_code: 1
      equals: { "error.code": "INVALID_PARAMETER" }
      has_fields: ["actions"]

  - name: "nonexistent subcommand returns INVALID_PARAMETER"
    command: "pokedex nonexistent"
    assert:
      exit_code: 1
      equals: { "error.code": "INVALID_PARAMETER" }
      contains: { "error.message": "nonexistent" }

  - name: "pokemon with no subcommand returns error JSON"
    command: "pokedex pokemon"
    assert:
      exit_code: 1
      equals: { "error.code": "INVALID_PARAMETER" }
      has_fields: ["actions"]

  - name: "negative limit is rejected"
    command: "pokedex pokemon list --limit=-1"
    assert:
      exit_code: 1
      equals: { "error.code": "INVALID_PARAMETER" }
      contains: { "error.message": "invalid" }

  # ══════════════════════════════════════════════════════════════════
  # INVALID_PARAMETER: limit=0, bad type, bad generation, bad category
  # ══════════════════════════════════════════════════════════════════

  - name: "limit=0 returns INVALID_PARAMETER"
    command: "pokedex pokemon list --limit=0"
    assert:
      exit_code: 1
      equals: { "error.code": "INVALID_PARAMETER" }
      contains: { "error.message": "Limit must be at least 1" }

  - name: "invalid type filter returns INVALID_PARAMETER"
    command: "pokedex pokemon list --type-filter=nonexistent"
    assert:
      exit_code: 1
      equals: { "error.code": "INVALID_PARAMETER" }
      has_fields: ["actions"]

  - name: "generation 0 returns INVALID_PARAMETER"
    command: "pokedex pokemon list --generation=0"
    assert:
      exit_code: 1
      equals: { "error.code": "INVALID_PARAMETER" }
      contains: { "error.message": "Valid values: 1-9" }

  - name: "generation 10 returns INVALID_PARAMETER"
    command: "pokedex pokemon list --generation=10"
    assert:
      exit_code: 1
      equals: { "error.code": "INVALID_PARAMETER" }
      contains: { "error.message": "Valid values: 1-9" }

  - name: "invalid category returns INVALID_PARAMETER with valid values"
    command: "pokedex pokemon list --category=nonexistent"
    assert:
      exit_code: 1
      equals: { "error.code": "INVALID_PARAMETER" }
      contains: { "error.message": "legendary, mythical, baby" }

  # ══════════════════════════════════════════════════════════════════
  # INVALID_PARAMETER: bad status, bad method, bad game
  # ══════════════════════════════════════════════════════════════════

  - name: "invalid collection status returns INVALID_PARAMETER with all valid values"
    command: "pokedex collection add --pokemon=1 --game=red --status=nonexistent"
    assert:
      exit_code: 1
      equals: { "error.code": "INVALID_PARAMETER" }
      contains: { "error.message": "caught, living_dex, evolved, traded_away, transferred" }

  - name: "invalid move method returns INVALID_PARAMETER with valid methods"
    command: "pokedex pokemon moves pikachu --method=nonexistent"
    assert:
      exit_code: 1
      equals: { "error.code": "INVALID_PARAMETER" }
      contains: { "error.message": "level-up" }
      has_fields: ["actions"]

  - name: "non-existent game in encounters returns NOT_FOUND"
    command: "pokedex pokemon encounters pikachu --game=nonexistent"
    assert:
      exit_code: 1
      equals: { "error.code": "NOT_FOUND" }
      has_fields: ["actions"]

  - name: "non-existent game in collection add returns NOT_FOUND"
    command: "pokedex collection add --pokemon=1 --game=nonexistent-game"
    assert:
      exit_code: 1
      equals: { "error.code": "NOT_FOUND" }
      has_fields: ["actions"]

  # ══════════════════════════════════════════════════════════════════
  # FORM VALIDATION: non-existent forms
  # ══════════════════════════════════════════════════════════════════

  - name: "non-existent form in collection add returns NOT_FOUND with available forms"
    command: "pokedex collection add --pokemon=pikachu --game=red --form=nonexistent-form"
    assert:
      exit_code: 1
      equals: { "error.code": "NOT_FOUND" }
      contains: { "error.message": "Available forms:" }

  # ══════════════════════════════════════════════════════════════════
  # PAGINATION BOUNDARIES
  # ══════════════════════════════════════════════════════════════════

  - name: "offset beyond total returns empty data with prev_page action"
    command: "pokedex pokemon list --offset=999999"
    assert:
      exit_code: 0
      array_len: { "data": { "min": 0, "max": 0 } }
      has_fields: ["actions", "meta.total"]

  - name: "limit=1 returns exactly one result"
    command: "pokedex pokemon list --limit=1"
    assert:
      exit_code: 0
      array_len: { "data": { "min": 1, "max": 1 } }
      equals: { "meta.limit": 1, "meta.offset": 0 }

  - name: "very large limit returns all pokemon"
    command: "pokedex pokemon list --limit=999999"
    assert:
      exit_code: 0
      equals: { "meta.total": 1025 }
      array_len: { "data": { "min": 1025, "max": 1025 } }

  - name: "location encounters offset beyond total returns empty data"
    command: "pokedex location encounters kanto-route-1 --game=red --limit=1 --offset=999"
    assert:
      exit_code: 0
      array_len: { "data": { "min": 0, "max": 0 } }
      has_fields: ["meta.total"]

  # ══════════════════════════════════════════════════════════════════
  # SPECIAL NAMES: hyphens, apostrophes, unicode
  # ══════════════════════════════════════════════════════════════════

  - name: "mr-mime (hyphenated name) resolves correctly"
    command: "pokedex pokemon show mr-mime"
    assert:
      exit_code: 0
      equals: { "data.id": 122, "data.name": "mr-mime" }
      contains: { "data.display_name": "Mr. Mime" }

  - name: "ho-oh (multi-hyphen name) resolves correctly"
    command: "pokedex pokemon show ho-oh"
    assert:
      exit_code: 0
      equals: { "data.id": 250, "data.is_legendary": true }
      contains: { "data.display_name": "Ho-Oh" }

  - name: "porygon-z resolves correctly"
    command: "pokedex pokemon show porygon-z"
    assert:
      exit_code: 0
      equals: { "data.id": 474, "data.name": "porygon-z" }
      has_fields: ["data.types", "actions"]

  - name: "jangmo-o resolves correctly"
    command: "pokedex pokemon show jangmo-o"
    assert:
      exit_code: 0
      equals: { "data.id": 782, "data.name": "jangmo-o" }
      has_fields: ["data.types"]

  - name: "farfetchd (no apostrophe) resolves correctly"
    command: "pokedex pokemon show farfetchd"
    assert:
      exit_code: 0
      equals: { "data.id": 83 }
      contains: { "data.display_name": "Farfetch" }

  - name: "flabebe displays accented name"
    command: "pokedex pokemon show flabebe"
    assert:
      exit_code: 0
      equals: { "data.id": 669, "data.name": "flabebe" }
      has_fields: ["data.display_name"]

  - name: "nidoran-f resolves to Nidoran female"
    command: "pokedex pokemon show nidoran-f"
    assert:
      exit_code: 0
      equals: { "data.id": 29, "data.name": "nidoran-f" }
      has_fields: ["data.types"]

  - name: "type-null resolves correctly"
    command: "pokedex pokemon show type-null"
    assert:
      exit_code: 0
      equals: { "data.id": 772, "data.is_legendary": true }
      contains: { "data.display_name": "Type: Null" }

  # ══════════════════════════════════════════════════════════════════
  # CASE INSENSITIVITY
  # ══════════════════════════════════════════════════════════════════

  - name: "uppercase PIKACHU resolves correctly"
    command: "pokedex pokemon show PIKACHU"
    assert:
      exit_code: 0
      equals: { "data.id": 25, "data.name": "pikachu" }
      has_fields: ["data.types", "actions"]

  # ══════════════════════════════════════════════════════════════════
  # FORM RESOLUTION
  # ══════════════════════════════════════════════════════════════════

  - name: "pikachu-cosplay resolves to cosplay form with correct display name"
    command: "pokedex pokemon show pikachu-cosplay"
    assert:
      exit_code: 0
      equals: { "data.id": 25 }
      contains: { "data.display_name": "Cosplay" }

  - name: "deoxys-attack resolves to attack form with correct stats"
    command: "pokedex pokemon show deoxys-attack"
    assert:
      exit_code: 0
      equals: { "data.stats.attack": 180, "data.stats.defense": 20 }
      contains: { "data.display_name": "Attack" }

  - name: "growlithe-hisui resolves with correct Hisuian types"
    command: "pokedex pokemon show growlithe-hisui"
    assert:
      exit_code: 0
      contains: { "data.display_name": "Hisuian" }
      array_len: { "data.types": { "min": 2, "max": 2 } }

  - name: "vivillon-polar resolves as cosmetic form"
    command: "pokedex pokemon show vivillon-polar"
    assert:
      exit_code: 0
      equals: { "data.id": 666, "data.name": "vivillon" }
      contains: { "data.display_name": "Polar" }

  # ══════════════════════════════════════════════════════════════════
  # SEARCH EDGE CASES
  # ══════════════════════════════════════════════════════════════════

  - name: "empty search query returns INVALID_PARAMETER"
    command: "pokedex pokemon search \"\""
    assert:
      exit_code: 1
      equals: { "error.code": "INVALID_PARAMETER" }
      contains: { "error.message": "required" }

  - name: "SQL injection attempt is safely handled"
    command: "pokedex pokemon search \"'; DROP TABLE pokemon;--\""
    assert:
      exit_code: 0
      has_fields: ["data", "actions", "meta"]
      type_of: { "data": "array" }

  - name: "single character search with limit=1 works"
    command: "pokedex pokemon search a --limit=1"
    assert:
      exit_code: 0
      array_len: { "data": { "min": 1, "max": 1 } }
      has_fields: ["actions"]

  # ══════════════════════════════════════════════════════════════════
  # EMPTY COLLECTION HANDLING
  # ══════════════════════════════════════════════════════════════════

  - name: "show non-existent collection entry returns NOT_FOUND"
    command: "pokedex collection show 99999999"
    assert:
      exit_code: 1
      equals: { "error.code": "NOT_FOUND" }
      has_fields: ["actions"]

  - name: "remove non-existent collection entry returns NOT_FOUND"
    command: "pokedex collection remove 99999999"
    assert:
      exit_code: 1
      equals: { "error.code": "NOT_FOUND" }
      has_fields: ["actions"]

  # ══════════════════════════════════════════════════════════════════
  # INVALID COLLECTION FILTERS
  # ══════════════════════════════════════════════════════════════════

  - name: "collection list with invalid status returns INVALID_PARAMETER"
    command: "pokedex collection list --status=nonexistent"
    assert:
      exit_code: 1
      equals: { "error.code": "INVALID_PARAMETER" }
      contains: { "error.message": "caught, living_dex" }

  - name: "collection list with invalid game returns NOT_FOUND"
    command: "pokedex collection list --game=nonexistent"
    assert:
      exit_code: 1
      equals: { "error.code": "NOT_FOUND" }
      has_fields: ["actions"]

  # ══════════════════════════════════════════════════════════════════
  # NON-EXISTENT RESOURCES
  # ══════════════════════════════════════════════════════════════════

  - name: "non-existent dex returns NOT_FOUND"
    command: "pokedex dex show nonexistent-dex"
    assert:
      exit_code: 1
      equals: { "error.code": "NOT_FOUND" }
      has_fields: ["actions"]

  - name: "dex progress for non-existent dex returns NOT_FOUND"
    command: "pokedex dex progress nonexistent"
    assert:
      exit_code: 1
      equals: { "error.code": "NOT_FOUND" }
      has_fields: ["actions"]

  - name: "non-existent type in matchups returns NOT_FOUND"
    command: "pokedex type matchups nonexistent"
    assert:
      exit_code: 1
      equals: { "error.code": "NOT_FOUND" }
      has_fields: ["actions"]

  - name: "non-existent type in type pokemon returns NOT_FOUND"
    command: "pokedex type pokemon nonexistent"
    assert:
      exit_code: 1
      equals: { "error.code": "NOT_FOUND" }
      has_fields: ["actions"]

  - name: "non-existent location returns NOT_FOUND"
    command: "pokedex location encounters nonexistent-location"
    assert:
      exit_code: 1
      equals: { "error.code": "NOT_FOUND" }
      has_fields: ["actions"]

  - name: "HOME transferable for non-existent pokemon returns NOT_FOUND"
    command: "pokedex home transferable nonexistent-pokemon"
    assert:
      exit_code: 1
      equals: { "error.code": "NOT_FOUND" }
      has_fields: ["actions"]

  - name: "HOME missing with invalid dex returns NOT_FOUND"
    command: "pokedex home missing --dex=nonexistent"
    assert:
      exit_code: 1
      equals: { "error.code": "NOT_FOUND" }
      has_fields: ["actions"]

  # ══════════════════════════════════════════════════════════════════
  # CONFLICTING/DUPLICATE FLAGS
  # ══════════════════════════════════════════════════════════════════

  - name: "duplicate --type-filter flag is rejected"
    command: "pokedex pokemon list --type-filter=fire --type-filter=water"
    assert:
      exit_code: 1
      equals: { "error.code": "INVALID_PARAMETER" }
      has_fields: ["actions"]

  - name: "duplicate --game flag is rejected"
    command: "pokedex collection add --pokemon=pikachu --game=red --game=blue"
    assert:
      exit_code: 1
      equals: { "error.code": "INVALID_PARAMETER" }
      has_fields: ["actions"]

  # ══════════════════════════════════════════════════════════════════
  # COMBINED FILTERS
  # ══════════════════════════════════════════════════════════════════

  - name: "triple filter (fire + gen1 + legendary) returns only Moltres"
    command: "pokedex pokemon list --type-filter=fire --generation=1 --category=legendary"
    assert:
      exit_code: 0
      array_len: { "data": { "min": 1, "max": 1 } }
      equals: { "data.0.name": "moltres", "meta.total": 1 }

  - name: "gen 1 full list has exactly 151 pokemon"
    command: "pokedex pokemon list --generation=1 --limit=999999"
    assert:
      exit_code: 0
      equals: { "meta.total": 151 }
      array_len: { "data": { "min": 151, "max": 151 } }

  # ══════════════════════════════════════════════════════════════════
  # EVOLUTION EDGE CASES
  # ══════════════════════════════════════════════════════════════════

  - name: "mew has no evolutions (empty children)"
    command: "pokedex pokemon evolutions mew"
    assert:
      exit_code: 0
      equals: { "data.species_name": "mew" }
      array_len: { "data.children": { "min": 0, "max": 0 } }

  - name: "eevee has 8 evolution branches"
    command: "pokedex pokemon evolutions eevee"
    assert:
      exit_code: 0
      equals: { "data.species_name": "eevee" }
      array_len: { "data.children": { "min": 8, "max": 8 } }

  - name: "magikarp evolves into gyarados"
    command: "pokedex pokemon evolutions magikarp"
    assert:
      exit_code: 0
      array_len: { "data.children": { "min": 1, "max": 1 } }
      equals: { "data.children.0.species_name": "gyarados" }

  # ══════════════════════════════════════════════════════════════════
  # PIKACHU FORMS LIST
  # ══════════════════════════════════════════════════════════════════

  - name: "pikachu has many forms"
    command: "pokedex pokemon forms pikachu"
    assert:
      exit_code: 0
      array_len: { "data": { "min": 15, "max": 20 } }
      has_fields: ["actions"]

  # ══════════════════════════════════════════════════════════════════
  # MOVES WITH VALID FILTERS
  # ══════════════════════════════════════════════════════════════════

  - name: "pikachu level-up moves in red returns data"
    command: "pokedex pokemon moves pikachu --game=red --method=level-up"
    assert:
      exit_code: 0
      equals: { "meta.total": 7 }
      array_len: { "data": { "min": 1, "max": 50 } }

  # ══════════════════════════════════════════════════════════════════
  # HOME AND DEX COMMANDS
  # ══════════════════════════════════════════════════════════════════

  - name: "home coverage works"
    command: "pokedex home coverage"
    assert:
      exit_code: 0
      has_fields: ["data", "actions", "meta"]

  - name: "home status works"
    command: "pokedex home status"
    assert:
      exit_code: 0
      has_fields: ["data", "actions"]

  # ══════════════════════════════════════════════════════════════════
  # ADD POKEMON WITH NON-EXISTENT ID TO COLLECTION
  # ══════════════════════════════════════════════════════════════════

  - name: "collection add with non-existent pokemon ID returns NOT_FOUND"
    command: "pokedex collection add --pokemon=999999 --game=red"
    assert:
      exit_code: 1
      equals: { "error.code": "NOT_FOUND" }
      has_fields: ["actions"]

  # ══════════════════════════════════════════════════════════════════
  # DISCOVERY AND HELP
  # ══════════════════════════════════════════════════════════════════

  - name: "discover returns full command tree"
    command: "pokedex --discover"
    assert:
      exit_code: 0
      has_fields: ["data.name", "data.resources", "data.entry_points", "actions"]
      contains: { "data.name": "pokedex" }

  # ══════════════════════════════════════════════════════════════════
  # ROUND 13: ADDITIONAL UNICODE & SPECIAL NAMES
  # ══════════════════════════════════════════════════════════════════

  - name: "mime-jr (baby with hyphen) resolves correctly"
    command: "pokedex pokemon show mime-jr"
    assert:
      exit_code: 0
      equals: { "data.id": 439, "data.name": "mime-jr" }
      contains: { "data.display_name": "Mime Jr." }

  - name: "nidoran-m resolves to Nidoran male"
    command: "pokedex pokemon show nidoran-m"
    assert:
      exit_code: 0
      equals: { "data.id": 32, "data.name": "nidoran-m" }
      contains: { "data.display_name": "Nidoran" }

  - name: "flabebe display name has unicode accent"
    command: "pokedex pokemon show flabebe"
    assert:
      exit_code: 0
      equals: { "data.id": 669 }
      contains: { "data.display_name": "Flab" }

  # ══════════════════════════════════════════════════════════════════
  # ROUND 13: PAGINATION MATH WITH LIMIT=1
  # ══════════════════════════════════════════════════════════════════

  - name: "limit=1 offset=0 next_page points to offset=1"
    command: "pokedex pokemon list --limit=1 --offset=0"
    assert:
      exit_code: 0
      array_len: { "data": { "min": 1, "max": 1 } }
      equals: { "meta.total": 1025, "meta.offset": 0 }

  - name: "limit=1 at last item (offset=1024) has no next_page"
    command: "pokedex pokemon list --limit=1 --offset=1024"
    assert:
      exit_code: 0
      array_len: { "data": { "min": 1, "max": 1 } }
      equals: { "meta.offset": 1024 }

  - name: "limit=1 beyond end (offset=1025) returns empty data"
    command: "pokedex pokemon list --limit=1 --offset=1025"
    assert:
      exit_code: 0
      array_len: { "data": { "min": 0, "max": 0 } }
      equals: { "meta.total": 1025 }

  - name: "offset=1000 returns wo-chien at position 1001"
    command: "pokedex pokemon list --limit=1 --offset=1000"
    assert:
      exit_code: 0
      equals: { "data.0.name": "wo-chien", "meta.offset": 1000 }
      array_len: { "data": { "min": 1, "max": 1 } }

  # ══════════════════════════════════════════════════════════════════
  # ROUND 13: WHITESPACE AND EMPTY STRING INPUTS
  # ══════════════════════════════════════════════════════════════════

  - name: "whitespace-only pokemon name returns NOT_FOUND"
    command: "pokedex pokemon show \"   \""
    assert:
      exit_code: 1
      equals: { "error.code": "NOT_FOUND" }
      has_fields: ["actions"]

  - name: "whitespace-only search query returns INVALID_PARAMETER"
    command: "pokedex pokemon search \"   \""
    assert:
      exit_code: 1
      equals: { "error.code": "INVALID_PARAMETER" }
      contains: { "error.message": "required" }

  - name: "empty location name returns INVALID_PARAMETER"
    command: "pokedex location encounters \"\""
    assert:
      exit_code: 1
      equals: { "error.code": "INVALID_PARAMETER" }
      contains: { "error.message": "required" }

  - name: "whitespace-only location returns INVALID_PARAMETER"
    command: "pokedex location encounters \"   \""
    assert:
      exit_code: 1
      equals: { "error.code": "INVALID_PARAMETER" }
      contains: { "error.message": "required" }

  - name: "empty game string in collection add returns NOT_FOUND"
    command: "pokedex collection add --pokemon=pikachu --game=\"\""
    assert:
