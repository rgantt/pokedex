      exit_code: 0
      equals: { "data.species_name": "nidoran-f" }
      contains: { "data.children.0.species_name": "nidorina" }

  # ============================================================
  # LOCATION 8: kanto-route-10 (with surfing encounters)
  # ============================================================
  - name: "Route 10 -- discover encounters (includes surfing)"
    command: "pokedex location encounters kanto-route-10 --game=lets-go-pikachu"
    assert:
      exit_code: 0
      has_fields: ["data", "meta"]
      equals: { "meta.total": 22 }
      array_len: { "data": { "min": 22, "max": 22 } }

  - name: "Route 10 -- catch Krabby"
    command: "pokedex collection add --pokemon=krabby --game=lets-go-pikachu --method=catch"
    assert:
      exit_code: 0
      equals: { "data.species_name": "krabby", "data.status": "caught" }

  # ============================================================
