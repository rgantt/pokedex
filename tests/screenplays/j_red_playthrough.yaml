    assert:
      exit_code: 0
      contains: { "data.children.0.species_name": "dewgong" }
  - name: "Seafoam Islands -- evolve Seel to Dewgong"
    command: "pokedex collection add --pokemon=dewgong --game=red --method=evolve"
    assert:
      exit_code: 0
      equals: { "data.species_name": "dewgong", "data.method": "evolve" }
  - name: "Seafoam Islands -- update Seel status to evolved"
    command: "pokedex collection update 30 --status=evolved"
    assert:
      exit_code: 0
      equals: { "data.status": "evolved", "data.species_name": "seel" }
  - name: "Seafoam Islands -- check Shellder evolution chain"
    command: "pokedex pokemon evolutions shellder"
    assert:
      exit_code: 0
      contains: { "data.children.0.species_name": "cloyster" }
  - name: "Seafoam Islands -- evolve Shellder to Cloyster"
    command: "pokedex collection add --pokemon=cloyster --game=red --method=evolve"
    assert:
      exit_code: 0
      equals: { "data.species_name": "cloyster", "data.method": "evolve" }
  - name: "Seafoam Islands -- update Shellder status to evolved"
    command: "pokedex collection update 31 --status=evolved"
    assert:
      exit_code: 0
      equals: { "data.status": "evolved", "data.species_name": "shellder" }
  - name: "Seafoam Islands -- verify stats"
    command: "pokedex collection stats --game=red"
    assert:
      exit_code: 0
      equals: { "data.unique_species": 36 }
      has_fields: ["data.total_entries", "data.by_status"]
  - name: "Victory Road -- bare slug has no Red data"
    command: "pokedex location encounters victory-road --game=red"
    assert:
      exit_code: 1
      equals: { "error.code": "NOT_FOUND" }
      contains: { "error.message": "victory-road" }
  - name: "Victory Road -- discover encounters with correct slug"
    command: "pokedex location encounters kanto-victory-road-2 --game=red"
    assert:
      exit_code: 0
      has_fields: ["data", "actions", "meta"]
      equals: { "meta.total": 31 }
      array_len: { "data": { "min": 10 } }
  - name: "Victory Road -- verify species present"
    command: "pokedex location encounters kanto-victory-road-2 --game=red"
    assert:
      exit_code: 0
      json_path_any: { "data[*].pokemon_name": ["Moltres", "Venomoth", "Machoke", "Geodude", "Onix"] }
  - name: "Victory Road -- inspect Moltres (legendary)"
    command: "pokedex pokemon show moltres"
    assert:
      exit_code: 0
      equals: { "data.name": "moltres", "data.is_legendary": true, "data.generation": 1 }
      json_path_any: { "data.types": ["Fire", "Flying"] }
  - name: "Victory Road -- inspect Venomoth"
    command: "pokedex pokemon show venomoth"
    assert:
      exit_code: 0
      equals: { "data.name": "venomoth", "data.generation": 1 }
      json_path_any: { "data.types": ["Bug", "Poison"] }
  - name: "Victory Road -- catch Moltres"
    command: "pokedex collection add --pokemon=moltres --game=red --method=catch"
    assert:
      exit_code: 0
      equals: { "data.species_name": "moltres", "data.status": "caught", "data.method": "catch" }
  - name: "Victory Road -- catch Venomoth"
    command: "pokedex collection add --pokemon=venomoth --game=red --method=catch"
    assert:
      exit_code: 0
      equals: { "data.species_name": "venomoth", "data.status": "caught" }
  - name: "Victory Road -- final stats"
    command: "pokedex collection stats --game=red"
    assert:
      exit_code: 0
      equals: { "data.unique_species": 38 }
      has_fields: ["data.total_entries", "data.by_status", "data.shiny_count"]