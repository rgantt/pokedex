# Screenplays are CHEAP regression tests produced by exploratory test agents.
# If a step fails, investigate: is it a real bug (fix the code) or a stale
# assertion (update or delete this file)? The INTENT matters, not the exact
# implementation. Don't contort the CLI to make a stale screenplay pass.
name: "Forms & Alpha Specialist"
persona: "G"
description: "Test alpha collection for PLA/Z-A, alpha_levels in encounter details, form is_default correctness, form-specific stats/types, mega/gmax is_default=false, Z-A Wild Zone locations, and form display_name consistency"
needs_seed: true
mutates_collection: true

steps:
  # ===== Hisuian Growlithe: form-specific types and stats =====

  - name: "Hisuian Growlithe is Fire/Rock with form-specific stats"
    command: "pokedex pokemon show growlithe-hisui"
    assert:
      exit_code: 0
      equals: {"data.display_name": "Hisuian Growlithe", "data.types": ["Fire", "Rock"]}
      has_fields: ["data.stats", "data.abilities"]

  - name: "Base Growlithe is Fire-only with different stats"
    command: "pokedex pokemon show growlithe"
    assert:
      exit_code: 0
      equals: {"data.display_name": "Growlithe", "data.types": ["Fire"]}
      has_fields: ["data.stats.hp", "data.stats.attack"]

  - name: "Hisuian Growlithe stats differ from base (HP=60, Atk=75, Spd=55)"
    command: "pokedex pokemon stats growlithe-hisui"
    assert:
      exit_code: 0
      equals: {"data.pokemon_name": "Hisuian Growlithe", "data.hp": 60, "data.attack": 75, "data.speed": 55}
      has_fields: ["data.total", "actions"]

  - name: "Base Growlithe stats (HP=55, Atk=70, Spd=60)"
    command: "pokedex pokemon stats growlithe"
    assert:
      exit_code: 0
      equals: {"data.pokemon_name": "Growlithe", "data.hp": 55, "data.attack": 70, "data.speed": 60}
      has_fields: ["data.total", "actions"]

  # ===== Growlithe forms: is_default correctness =====

  - name: "Growlithe base form is_default=true, Hisuian is_default=false"
    command: "pokedex pokemon forms growlithe"
    assert:
      exit_code: 0
      equals: {"data.0.is_default": true, "data.0.display_name": "Growlithe"}
      array_len: {"data": {"min": 2, "max": 2}}

  - name: "Hisuian Growlithe form has is_default false and form_name hisui"
    command: "pokedex pokemon forms growlithe"
    assert:
      exit_code: 0
      equals: {"data.1.is_default": false, "data.1.form_name": "hisui"}
      contains: {"data": "Hisuian Growlithe"}

  # ===== Rotom alternate forms NOT is_default =====

  - name: "Rotom base form is_default=true, Electric/Ghost"
    command: "pokedex pokemon forms rotom"
    assert:
      exit_code: 0
      equals: {"data.0.is_default": true, "data.0.display_name": "Rotom", "data.0.types": ["Electric", "Ghost"]}
      array_len: {"data": {"min": 6, "max": 6}}

  - name: "Rotom Heat form is_default=false with Electric/Fire"
    command: "pokedex pokemon forms rotom"
    assert:
      exit_code: 0
      equals: {"data.1.is_default": false, "data.1.form_name": "heat"}
      contains: {"data": "Heat Rotom"}

  # ===== Deoxys alternate forms NOT is_default =====

  - name: "Deoxys has 4 forms, default is Normal"
    command: "pokedex pokemon forms deoxys"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 4, "max": 4}}
      equals: {"data.0.is_default": true, "data.0.form_name": "normal"}

  - name: "Deoxys Attack form is not default"
    command: "pokedex pokemon forms deoxys"
    assert:
      exit_code: 0
      equals: {"data.1.is_default": false, "data.1.form_name": "attack"}
      contains: {"data": "Attack Deoxys"}

  # ===== Castform alternate forms NOT is_default =====

  - name: "Castform base is_default=true, alternates are battle-only"
    command: "pokedex pokemon forms castform"
    assert:
      exit_code: 0
      equals: {"data.0.is_default": true, "data.0.display_name": "Castform"}
      array_len: {"data": {"min": 4, "max": 4}}

  - name: "Castform Sunny is battle-only and not default"
    command: "pokedex pokemon forms castform"
    assert:
      exit_code: 0
      equals: {"data.1.is_default": false, "data.1.is_battle_only": true}
      contains: {"data": "Sunny Castform"}

  # ===== Mega forms: is_default=false, is_mega=true =====

  - name: "Charizard Mega X is_default=false, is_mega=true, Fire/Dragon"
    command: "pokedex pokemon forms charizard"
    assert:
      exit_code: 0
      contains: {"data": "Mega Charizard X"}
      array_len: {"data": {"min": 4, "max": 4}}

  - name: "Mega Charizard X show returns correct types"
    command: "pokedex pokemon show charizard-mega-x"
    assert:
      exit_code: 0
      equals: {"data.display_name": "Mega Charizard X", "data.types": ["Fire", "Dragon"]}
      has_fields: ["data.stats", "data.abilities"]

  # ===== Gmax forms: is_default=false =====

  - name: "Charizard Gmax is_default=false, is_battle_only=true"
    command: "pokedex pokemon forms charizard"
    assert:
      exit_code: 0
      contains: {"data": "Gigantamax Charizard"}
      equals: {"data.0.is_default": true, "data.0.display_name": "Charizard"}

  - name: "Gengar Mega and Gmax both not default"
    command: "pokedex pokemon forms gengar"
    assert:
      exit_code: 0
      equals: {"data.0.is_default": true, "data.0.display_name": "Gengar"}
      array_len: {"data": {"min": 3, "max": 3}}

  # ===== Default form display_name is species name =====

  - name: "Growlithe default form display_name is species name not Base"
    command: "pokedex pokemon show growlithe"
    assert:
      exit_code: 0
      equals: {"data.display_name": "Growlithe"}
      has_fields: ["data.types", "data.stats"]

  - name: "Castform default form display_name is species name"
    command: "pokedex pokemon show castform"
    assert:
      exit_code: 0
      equals: {"data.display_name": "Castform"}
      has_fields: ["data.types"]

  - name: "Rotom default form display_name is species name"
    command: "pokedex pokemon show rotom"
    assert:
      exit_code: 0
      equals: {"data.display_name": "Rotom"}
      has_fields: ["data.types"]

  # NOTE: Deoxys show returns "Deoxys" but forms endpoint shows "Normal Deoxys"
  # for the default form. This is because the default form has form_name="normal"
  # in upstream data. The show command uses species name, forms uses form-qualified name.
  - name: "Deoxys show display_name is species name (not Normal Deoxys)"
    command: "pokedex pokemon show deoxys"
    assert:
      exit_code: 0
      equals: {"data.display_name": "Deoxys"}
      has_fields: ["data.types", "data.stats"]

  # ===== PLA encounters: alpha_levels in details =====

  - name: "Growlithe PLA encounters have alpha_levels in details"
    command: "pokedex pokemon encounters growlithe --game=legends-arceus"
    assert:
      exit_code: 0
      contains: {"data": "alpha_levels"}
      has_fields: ["data.0.details"]

  - name: "Growlithe PLA encounters show Hisuian form name"
    command: "pokedex pokemon encounters growlithe --game=legends-arceus"
    assert:
      exit_code: 0
      equals: {"data.0.pokemon_name": "Hisuian Growlithe"}
      array_len: {"data": {"min": 1}}

  - name: "Snorlax PLA encounters have alpha_levels"
    command: "pokedex pokemon encounters snorlax --game=legends-arceus"
    assert:
      exit_code: 0
      contains: {"data": "alpha_levels"}
      array_len: {"data": {"min": 1}}

  # ===== Z-A encounters: Wild Zone locations and alpha_levels =====

  - name: "Pikachu Z-A encounters use Wild Zone locations"
    command: "pokedex pokemon encounters pikachu --game=legends-za"
    assert:
      exit_code: 0
      contains: {"data.0.location": "Wild Zone"}
      array_len: {"data": {"min": 1}}

  - name: "Z-A encounters have alpha details (alpha_levels or alpha note)"
    command: "pokedex pokemon encounters pikachu --game=legends-za"
    assert:
      exit_code: 0
      has_fields: ["data.0.details"]
      equals: {"data.0.game_slug": "legends-za"}

  - name: "Wild Zone 1 encounters exist for Z-A"
    command: "pokedex location encounters wild-zone-1 --game=legends-za"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 1}}
      equals: {"data.0.game_slug": "legends-za"}

  - name: "Wild Zone 20 encounters exist for Z-A"
    command: "pokedex location encounters wild-zone-20 --game=legends-za"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 1}}
      contains: {"data.0.location": "Wild Zone 20"}

  - name: "Wild Zone 21 does not exist"
    command: "pokedex location encounters wild-zone-21 --game=legends-za"
    assert:
      exit_code: 1
      has_fields: ["error.code", "actions"]
      equals: {"error.code": "NOT_FOUND"}

  - name: "Lumiose City not used as Z-A location"
    command: "pokedex location encounters lumiose-city --game=legends-za"
    assert:
      exit_code: 1
      equals: {"error.code": "NOT_FOUND"}
      has_fields: ["actions"]

  # ===== Alpha collection: add 10 pokemon with --alpha =====

  - name: "Add alpha Growlithe to PLA collection"
    command: "pokedex collection add --pokemon=growlithe --game=legends-arceus --alpha"
    assert:
      exit_code: 0
      equals: {"data.is_alpha": true, "data.species_name": "growlithe", "data.game": "legends-arceus"}
      has_fields: ["data.id", "data.created_at"]

  - name: "Add alpha Snorlax to PLA collection"
    command: "pokedex collection add --pokemon=snorlax --game=legends-arceus --alpha"
    assert:
      exit_code: 0
      equals: {"data.is_alpha": true, "data.species_name": "snorlax"}
      has_fields: ["data.id", "actions"]

  - name: "Add alpha Luxray to PLA collection"
    command: "pokedex collection add --pokemon=luxray --game=legends-arceus --alpha"
    assert:
      exit_code: 0
      equals: {"data.is_alpha": true, "data.species_name": "luxray"}
      has_fields: ["data.id"]

  - name: "Add alpha Starly to PLA collection"
    command: "pokedex collection add --pokemon=starly --game=legends-arceus --alpha"
    assert:
      exit_code: 0
      equals: {"data.is_alpha": true, "data.species_name": "starly"}
      has_fields: ["data.id"]

  - name: "Add alpha Shinx to PLA collection"
    command: "pokedex collection add --pokemon=shinx --game=legends-arceus --alpha"
    assert:
      exit_code: 0
      equals: {"data.is_alpha": true, "data.species_name": "shinx"}
      has_fields: ["data.id"]

  - name: "Add alpha Ponyta to PLA collection"
    command: "pokedex collection add --pokemon=ponyta --game=legends-arceus --alpha"
    assert:
      exit_code: 0
      equals: {"data.is_alpha": true, "data.species_name": "ponyta"}
      has_fields: ["data.id"]

  - name: "Add alpha Machop to PLA collection"
    command: "pokedex collection add --pokemon=machop --game=legends-arceus --alpha"
    assert:
      exit_code: 0
      equals: {"data.is_alpha": true, "data.species_name": "machop"}
      has_fields: ["data.id"]

  - name: "Add alpha Geodude to PLA collection"
    command: "pokedex collection add --pokemon=geodude --game=legends-arceus --alpha"
    assert:
      exit_code: 0
      equals: {"data.is_alpha": true, "data.species_name": "geodude"}
      has_fields: ["data.id"]

  - name: "Add alpha Bidoof to PLA collection"
    command: "pokedex collection add --pokemon=bidoof --game=legends-arceus --alpha"
    assert:
      exit_code: 0
      equals: {"data.is_alpha": true, "data.species_name": "bidoof"}
      has_fields: ["data.id"]

  - name: "Add alpha Pikachu to PLA collection"
    command: "pokedex collection add --pokemon=pikachu --game=legends-arceus --alpha"
    assert:
      exit_code: 0
      equals: {"data.is_alpha": true, "data.species_name": "pikachu"}
      has_fields: ["data.id"]

  # ===== Alpha validation: non-alpha and wrong-game alphas =====

  - name: "Non-alpha PLA entry has is_alpha=false"
    command: "pokedex collection add --pokemon=eevee --game=legends-arceus"
    assert:
      exit_code: 0
      equals: {"data.is_alpha": false, "data.species_name": "eevee"}
      has_fields: ["data.id", "data.status"]

  - name: "Alpha in non-PLA game gives warning but succeeds"
    command: "pokedex collection add --pokemon=pikachu --game=red --alpha"
    assert:
      exit_code: 0
      equals: {"data.is_alpha": true}
      contains: {"data.warning": "Alpha"}

  - name: "Alpha in Z-A is valid (no warning)"
    command: "pokedex collection add --pokemon=pikachu --game=legends-za --alpha"
    assert:
      exit_code: 0
      equals: {"data.is_alpha": true, "data.game": "legends-za"}
      has_fields: ["data.id", "data.status"]

  - name: "Shiny alpha in Z-A works"
    command: "pokedex collection add --pokemon=eevee --game=legends-za --alpha --shiny"
    assert:
      exit_code: 0
      equals: {"data.is_alpha": true, "data.shiny": true, "data.game": "legends-za"}
      has_fields: ["data.id", "data.created_at"]

  # ===== Collection show verifies alpha persisted =====

  - name: "Collection show for alpha entry has is_alpha=true"
    command: "pokedex collection show 1"
    assert:
      exit_code: 0
      equals: {"data.is_alpha": true}
      has_fields: ["actions", "data.status", "data.game"]

  - name: "Collection list for PLA shows all alpha entries"
    command: "pokedex collection list --game=legends-arceus"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 10}}
      has_fields: ["actions", "meta"]

  # ===== Meowth regional forms =====

  - name: "Meowth has 4 forms including Alolan and Galarian"
    command: "pokedex pokemon forms meowth"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 4, "max": 4}}
      equals: {"data.0.is_default": true, "data.0.display_name": "Meowth"}

  - name: "Alolan Meowth is Dark type"
    command: "pokedex pokemon show meowth-alola"
    assert:
      exit_code: 0
      equals: {"data.display_name": "Alolan Meowth", "data.types": ["Dark"]}
      has_fields: ["data.stats", "data.abilities"]

  - name: "Galarian Meowth is Steel type"
    command: "pokedex pokemon show meowth-galar"
    assert:
      exit_code: 0
      equals: {"data.display_name": "Galarian Meowth", "data.types": ["Steel"]}
      has_fields: ["data.stats", "data.abilities"]

  # ===== Arcanine Hisuian form =====

  - name: "Arcanine Hisuian form is_default=false"
    command: "pokedex pokemon forms arcanine"
    assert:
      exit_code: 0
      equals: {"data.0.is_default": true, "data.0.display_name": "Arcanine"}
      contains: {"data": "Hisuian Arcanine"}

  # ===== Game details for PLA and Z-A =====

  - name: "PLA game is gen 8, Hisui region"
    command: "pokedex game show legends-arceus"
    assert:
      exit_code: 0
      equals: {"data.name": "legends-arceus", "data.generation": 8, "data.region": "Hisui"}
      has_fields: ["data.display_name"]

  - name: "Z-A game is gen 9, Kalos region"
    command: "pokedex game show legends-za"
    assert:
      exit_code: 0
      equals: {"data.name": "legends-za", "data.generation": 9, "data.region": "Kalos"}
      has_fields: ["data.display_name"]

  # ===== Error handling =====

  - name: "Nonexistent pokemon returns NOT_FOUND with exit 1"
    command: "pokedex pokemon encounters nonexistent --game=legends-arceus"
    assert:
      exit_code: 1
      equals: {"error.code": "NOT_FOUND"}
      has_fields: ["actions"]

  - name: "Growlithe not in Z-A returns empty data (not error)"
    command: "pokedex pokemon encounters growlithe --game=legends-za"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 0, "max": 0}}
      has_fields: ["actions", "meta"]
