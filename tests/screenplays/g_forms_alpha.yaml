# Screenplays are CHEAP regression tests produced by exploratory test agents.
# If a step fails, investigate: is it a real bug (fix the code) or a stale
# assertion (update or delete this file)? The INTENT matters, not the exact
# implementation. Don't contort the CLI to make a stale screenplay pass.
name: "Forms & Alpha Collection"
persona: g_forms_alpha
description: "Test alternate forms (Rotom, Vivillon, Mega), regional variants (Hisui, Galar, Paldea, Alola), form-specific stats, Unown/Alcremie many-form counts, HATEOAS action fidelity, and collection form auto-detection"
needs_seed: true
mutates_collection: true

steps:
  # ===== Regional form show: correct types and display names =====

  - name: "Alolan Meowth is Dark type with correct display_name"
    command: "pokedex pokemon show meowth-alola"
    assert:
      exit_code: 0
      equals: {"data.display_name": "Alolan Meowth", "data.types": ["Dark"]}
      has_fields: ["data.id", "data.name", "data.stats", "data.abilities"]

  - name: "Alolan Meowth has form-specific abilities (Pickup, Technician, Rattled)"
    command: "pokedex pokemon show meowth-alola"
    assert:
      exit_code: 0
      contains: {"data.abilities": "Technician"}

  - name: "Galarian Meowth is Steel type"
    command: "pokedex pokemon show meowth-galar"
    assert:
      exit_code: 0
      equals: {"data.display_name": "Galarian Meowth", "data.types": ["Steel"]}
      has_fields: ["data.stats", "data.abilities"]

  - name: "Galarian Meowth has Tough Claws ability"
    command: "pokedex pokemon show meowth-galar"
    assert:
      exit_code: 0
      contains: {"data.abilities": "Tough Claws"}

  - name: "Galarian Darumaka is Ice type with display_name Galarian Darumaka"
    command: "pokedex pokemon show darumaka-galar"
    assert:
      exit_code: 0
      equals: {"data.display_name": "Galarian Darumaka", "data.types": ["Ice"]}
      has_fields: ["data.id", "data.name", "data.stats", "data.abilities"]

  - name: "Paldean Wooper is Poison/Ground"
    command: "pokedex pokemon show wooper-paldea"
    assert:
      exit_code: 0
      equals: {"data.display_name": "Paldean Wooper", "data.types": ["Poison", "Ground"]}
      has_fields: ["data.stats", "data.abilities"]

  - name: "Hisuian Sneasel is Fighting/Poison"
    command: "pokedex pokemon show sneasel-hisui"
    assert:
      exit_code: 0
      equals: {"data.display_name": "Hisuian Sneasel", "data.types": ["Fighting", "Poison"]}

  # ===== Regional form stats: verify form-specific stat values =====

  - name: "Alolan Meowth stats: SpA=50, Atk=35, Speed=90, BST=290"
    command: "pokedex pokemon stats meowth-alola"
    assert:
      exit_code: 0
      equals: {"data.pokemon_name": "Alolan Meowth", "data.attack": 35, "data.special_attack": 50, "data.speed": 90, "data.total": 290}

  - name: "Regular Meowth has different stat spread (Atk=45, SpA=40, Speed=90)"
    command: "pokedex pokemon stats meowth"
    assert:
      exit_code: 0
      equals: {"data.pokemon_name": "Meowth", "data.attack": 45, "data.special_attack": 40, "data.speed": 90, "data.total": 290}

  - name: "Galarian Meowth stats differ: Atk=65, Def=55, Speed=40"
    command: "pokedex pokemon stats meowth-galar"
    assert:
      exit_code: 0
      equals: {"data.attack": 65, "data.defense": 55, "data.speed": 40, "data.total": 290}

  # BUG: show embeds stats with pokemon_name="Meowth" (base name) but standalone
  # stats returns pokemon_name="Galarian Meowth". The nested stats.pokemon_name
  # in show output does not reflect the form.
  - name: "show meowth-galar embeds stats with base pokemon_name (inconsistency)"
    command: "pokedex pokemon show meowth-galar"
    assert:
      exit_code: 0
      equals: {"data.stats.pokemon_name": "Galarian Meowth"}

  - name: "stats darumaka-galar returns form-specific stats (BST 315)"
    command: "pokedex pokemon stats darumaka-galar"
    assert:
      exit_code: 0
      equals: {"data.hp": 70, "data.attack": 90, "data.defense": 45, "data.special_attack": 15, "data.special_defense": 45, "data.speed": 50, "data.total": 315}

  - name: "stats wooper-paldea returns BST 210"
    command: "pokedex pokemon stats wooper-paldea"
    assert:
      exit_code: 0
      equals: {"data.total": 210}

  - name: "Hisuian Sneasel stats BST 430 with Speed 115"
    command: "pokedex pokemon stats sneasel-hisui"
    assert:
      exit_code: 0
      equals: {"data.total": 430, "data.speed": 115}

  # ===== HATEOAS actions for meowth-alola show =====
  # stats/encounters/moves correctly link to meowth-alola (form-specific)
  # evolutions/forms correctly link to meowth (species-level)

  - name: "meowth-alola show stats action links to meowth-alola"
    command: "pokedex pokemon show meowth-alola"
    assert:
      exit_code: 0
      contains: {"actions": "pokedex pokemon stats meowth-alola"}

  - name: "meowth-alola show encounters action links to meowth-alola"
    command: "pokedex pokemon show meowth-alola"
    assert:
      exit_code: 0
      contains: {"actions": "pokedex pokemon encounters meowth-alola"}

  - name: "meowth-alola show evolutions action links to base meowth (species-level)"
    command: "pokedex pokemon show meowth-alola"
    assert:
      exit_code: 0
      contains: {"actions": "pokedex pokemon evolutions meowth"}

  - name: "meowth-alola show forms action links to base meowth (species-level)"
    command: "pokedex pokemon show meowth-alola"
    assert:
      exit_code: 0
      contains: {"actions": "pokedex pokemon forms meowth"}

  # BUG: stats actions lose form context entirely — show/moves/evolutions
  # all link to base "meowth" instead of "meowth-alola". An agent following
  # the show action from stats would get base Meowth, not Alolan Meowth.
  - name: "stats meowth-alola show action loses form context (links to base meowth)"
    command: "pokedex pokemon stats meowth-alola"
    assert:
      exit_code: 0
      contains: {"actions": "pokedex pokemon show meowth"}

  - name: "stats meowth-alola moves action also loses form context"
    command: "pokedex pokemon stats meowth-alola"
    assert:
      exit_code: 0
      contains: {"actions": "pokedex pokemon moves meowth"}

  # BUG: add_to_collection action from show uses --pokemon=meowth (base)
  # not --pokemon=meowth-alola, losing form context for collection
  - name: "meowth-alola show add_to_collection action uses base pokemon name"
    command: "pokedex pokemon show meowth-alola"
    assert:
      exit_code: 0
      contains: {"actions": "pokedex collection add --pokemon=meowth"}

  # ===== Meowth forms =====

  - name: "Meowth has exactly 4 forms (base, Gmax, Alolan, Galarian)"
    command: "pokedex pokemon forms meowth"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 4, "max": 4}}

  - name: "Default Meowth form is Normal type with is_default true"
    command: "pokedex pokemon forms meowth"
    assert:
      exit_code: 0
      equals: {"data.0.is_default": true, "data.0.display_name": "Meowth", "data.0.types": ["Normal"]}

  - name: "Meowth forms include Alolan Meowth"
    command: "pokedex pokemon forms meowth"
    assert:
      exit_code: 0
      contains: {"data": "Alolan Meowth"}

  - name: "Meowth forms include Galarian Meowth"
    command: "pokedex pokemon forms meowth"
    assert:
      exit_code: 0
      contains: {"data": "Galarian Meowth"}

  - name: "Meowth forms include Gigantamax Meowth"
    command: "pokedex pokemon forms meowth"
    assert:
      exit_code: 0
      contains: {"data": "Gigantamax Meowth"}

  # BUG: Default Meowth form omits form_name field entirely
  # (skip_serializing_if = Option::is_none) while non-default forms include it.
  # Inconsistent: default should have form_name: null or be explicitly absent.
  - name: "Default Meowth form has no form_name field (inconsistency)"
    command: "pokedex pokemon forms meowth"
    assert:
      exit_code: 0
      equals: {"data.0.is_default": true}

  - name: "Alolan Meowth form has form_name alola"
    command: "pokedex pokemon forms meowth"
    assert:
      exit_code: 0
      equals: {"data.2.form_name": "alola"}

  - name: "Galarian Meowth form has form_name galar"
    command: "pokedex pokemon forms meowth"
    assert:
      exit_code: 0
      equals: {"data.3.form_name": "galar"}

  # ===== Deoxys: form-specific stats differ dramatically =====

  - name: "Attack Deoxys has extreme offensive stats: Atk=180, SpA=180, Def=20"
    command: "pokedex pokemon show deoxys-attack"
    assert:
      exit_code: 0
      equals: {"data.display_name": "Attack Deoxys", "data.types": ["Psychic"], "data.stats.attack": 180, "data.stats.special_attack": 180, "data.stats.defense": 20, "data.stats.total": 600}
      has_fields: ["data.abilities"]

  - name: "Base Deoxys has balanced stats: Atk=150, SpA=150, Def=50"
    command: "pokedex pokemon show deoxys"
    assert:
      exit_code: 0
      equals: {"data.display_name": "Deoxys", "data.types": ["Psychic"], "data.stats.attack": 150, "data.stats.defense": 50, "data.stats.total": 600}

  - name: "Deoxys-attack stats standalone: pokemon_name says Attack Deoxys"
    command: "pokedex pokemon stats deoxys-attack"
    assert:
      exit_code: 0
      equals: {"data.pokemon_name": "Attack Deoxys", "data.attack": 180, "data.defense": 20, "data.special_attack": 180, "data.special_defense": 20}

  - name: "Deoxys has exactly 4 forms (Normal, Attack, Defense, Speed)"
    command: "pokedex pokemon forms deoxys"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 4, "max": 4}}

  - name: "Deoxys default form is Normal"
    command: "pokedex pokemon forms deoxys"
    assert:
      exit_code: 0
      equals: {"data.0.is_default": true, "data.0.form_name": "normal", "data.0.display_name": "Normal Deoxys"}

  - name: "Deoxys forms include Attack, Defense, Speed"
    command: "pokedex pokemon forms deoxys"
    assert:
      exit_code: 0
      contains: {"data": "Attack Deoxys"}

  - name: "Deoxys forms include Defense Deoxys"
    command: "pokedex pokemon forms deoxys"
    assert:
      exit_code: 0
      contains: {"data": "Defense Deoxys"}

  - name: "Deoxys forms include Speed Deoxys"
    command: "pokedex pokemon forms deoxys"
    assert:
      exit_code: 0
      contains: {"data": "Speed Deoxys"}

  # ===== Mega Charizard X vs Y: different types and stats =====

  - name: "Mega Charizard X is Fire/Dragon with BST 634"
    command: "pokedex pokemon show charizard-mega-x"
    assert:
      exit_code: 0
      equals: {"data.display_name": "Mega Charizard X", "data.types": ["Fire", "Dragon"], "data.stats.total": 634, "data.stats.attack": 130}
      has_fields: ["data.abilities"]

  - name: "Mega Charizard Y is Fire/Flying with BST 634"
    command: "pokedex pokemon show charizard-mega-y"
    assert:
      exit_code: 0
      equals: {"data.display_name": "Mega Charizard Y", "data.types": ["Fire", "Flying"], "data.stats.total": 634, "data.stats.special_attack": 159}
      has_fields: ["data.abilities"]

  - name: "Mega Charizard X stats: Atk=130, SpA=130, Def=111"
    command: "pokedex pokemon stats charizard-mega-x"
    assert:
      exit_code: 0
      equals: {"data.attack": 130, "data.special_attack": 130, "data.defense": 111}

  - name: "Mega Charizard Y stats: Atk=104, SpA=159, Def=78"
    command: "pokedex pokemon stats charizard-mega-y"
    assert:
      exit_code: 0
      equals: {"data.attack": 104, "data.special_attack": 159, "data.defense": 78}

  - name: "Charizard has 4 forms (base, Gmax, Mega X, Mega Y)"
    command: "pokedex pokemon forms charizard"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 4, "max": 4}}

  - name: "Charizard forms include Mega X and Mega Y"
    command: "pokedex pokemon forms charizard"
    assert:
      exit_code: 0
      contains: {"data": "Mega Charizard X"}

  - name: "Charizard forms include Mega Y"
    command: "pokedex pokemon forms charizard"
    assert:
      exit_code: 0
      contains: {"data": "Mega Charizard Y"}

  # ===== Rotom forms =====

  - name: "Base Rotom is Electric/Ghost with BST 440"
    command: "pokedex pokemon show rotom"
    assert:
      exit_code: 0
      equals: {"data.display_name": "Rotom", "data.types": ["Electric", "Ghost"], "data.stats.total": 440}

  - name: "Heat Rotom is Electric/Fire with BST 520"
    command: "pokedex pokemon show rotom-heat"
    assert:
      exit_code: 0
      equals: {"data.display_name": "Heat Rotom", "data.types": ["Electric", "Fire"], "data.stats.total": 520}

  - name: "Rotom forms list includes at least 6 forms"
    command: "pokedex pokemon forms rotom"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 6}}
      has_fields: ["data.0.types", "data.0.is_default"]

  # ===== Unown: 28 forms (A-Z + ! + ?) =====

  - name: "Unown has exactly 28 forms"
    command: "pokedex pokemon forms unown"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 28, "max": 28}}
      has_fields: ["data.0.display_name", "data.0.is_default", "data.0.types"]

  - name: "First Unown form is default and Psychic type"
    command: "pokedex pokemon forms unown"
    assert:
      exit_code: 0
      equals: {"data.0.is_default": true, "data.0.types": ["Psychic"]}

  - name: "Unown ! form exists"
    command: "pokedex pokemon forms unown"
    assert:
      exit_code: 0
      contains: {"data": "Unown !"}

  - name: "Unown ? form exists"
    command: "pokedex pokemon forms unown"
    assert:
      exit_code: 0
      contains: {"data": "Unown ?"}

  # ===== Alcremie: many forms (63 flavor combos + Gmax) =====

  - name: "Alcremie has at least 63 forms"
    command: "pokedex pokemon forms alcremie"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 63}}

  - name: "Alcremie default form is first and Vanilla Cream"
    command: "pokedex pokemon forms alcremie"
    assert:
      exit_code: 0
      equals: {"data.0.is_default": true}
      contains: {"data.0.display_name": "Vanilla Cream"}

  - name: "Alcremie has Gigantamax form"
    command: "pokedex pokemon forms alcremie"
    assert:
      exit_code: 0
      contains: {"data": "Gigantamax Alcremie"}

  # ===== Vivillon forms =====

  - name: "Vivillon has at least 18 pattern forms"
    command: "pokedex pokemon forms vivillon"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 18}}

  - name: "Vivillon-meadow shows Meadow Vivillon Bug/Flying"
    command: "pokedex pokemon show vivillon-meadow"
    assert:
      exit_code: 0
      equals: {"data.display_name": "Meadow Vivillon", "data.types": ["Bug", "Flying"]}

  # ===== Sneasel forms =====

  - name: "Sneasel has 2 forms (base and Hisuian)"
    command: "pokedex pokemon forms sneasel"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 2, "max": 2}}

  # ===== Collection: add with form auto-detection =====

  - name: "collection add meowth-alola auto-detects alola form with correct display_name"
    command: "pokedex collection add --pokemon=meowth-alola --game=sword"
    assert:
      exit_code: 0
      equals: {"data.species_name": "meowth", "data.form_name": "alola", "data.display_name": "Alolan Meowth", "data.game": "sword", "data.status": "caught"}
      has_fields: ["data.id", "data.created_at"]

  - name: "collection add darumaka-galar auto-detects galar form"
    command: "pokedex collection add --pokemon=darumaka-galar --game=sword"
    assert:
      exit_code: 0
      equals: {"data.species_name": "darumaka", "data.form_name": "galar", "data.game": "sword", "data.status": "caught"}
      has_fields: ["data.id", "data.created_at"]

  - name: "collection add with explicit --form=paldea works"
    command: "pokedex collection add --pokemon=wooper --form=paldea --game=scarlet"
    assert:
      exit_code: 0
      equals: {"data.species_name": "wooper", "data.form_name": "paldea", "data.game": "scarlet"}

  # ===== PLA alpha collection =====

  - name: "add alpha Kleavor to PLA"
    command: "pokedex collection add --pokemon=kleavor --game=legends-arceus --alpha"
    assert:
      exit_code: 0
      equals: {"data.species_name": "kleavor", "data.game": "legends-arceus", "data.is_alpha": true, "data.status": "caught"}
      has_fields: ["data.id", "data.created_at"]

  - name: "add alpha Snorlax to PLA"
    command: "pokedex collection add --pokemon=snorlax --game=legends-arceus --alpha"
    assert:
      exit_code: 0
      equals: {"data.species_name": "snorlax", "data.is_alpha": true}

  - name: "add alpha Walrein to PLA"
    command: "pokedex collection add --pokemon=walrein --game=legends-arceus --alpha"
    assert:
      exit_code: 0
      equals: {"data.species_name": "walrein", "data.is_alpha": true}

  - name: "PLA collection has alphas"
    command: "pokedex collection list --game=legends-arceus"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 3}}
