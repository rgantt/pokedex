    capture: { "nidoranm_id": "data.id" }
    assert:
      exit_code: 0
      equals: { "data.status": "caught", "data.method": "catch" }
      has_fields: ["data.id", "data.species_id"]

  - name: "Route 22 -- catch Spearow"
    command: "pokedex collection add --pokemon=spearow --game=red --method=catch"
