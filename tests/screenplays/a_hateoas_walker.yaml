# Screenplays are CHEAP regression tests produced by exploratory test agents.
# If a step fails, investigate: is it a real bug (fix the code) or a stale
# assertion (update or delete this file)? The INTENT matters, not the exact
# implementation. Don't contort the CLI to make a stale screenplay pass.
name: "HATEOAS Walker"
persona: hateoas_walker
description: >
  Navigate the CLI purely via action links starting from discovery.
  Tests deep HATEOAS chains: dex progress -> missing pokemon -> encounters ->
  collection add -> verify dex changed. Pagination edge cases (last page has
  no next_page). Template substitution ({species_slug}, {name}, {id}).
  Special-character names (type-null, nidoran-f). Location encounters across
  3 game eras (Gen 1 Red, Gen 4 Diamond, Gen 9 Scarlet). PLA encounter details.
  Sword-era Max Raid encounters. --discover validation. Typo recovery chains.
  Form-specific data (rotom-heat, growlithe-hisui). 40+ steps.
needs_seed: true
mutates_collection: true

steps:
  # ========================================================================
  # Chain 1: Discovery -> validate structure matches actual CLI
  # ========================================================================

  - name: "--discover returns command tree with resources and entry_points"
    command: "pokedex --discover"
    assert:
      exit_code: 0
      has_fields: ["data.resources", "data.entry_points", "actions", "meta.command"]
      type_of: {"data.resources": "array"}
      array_len: {"data.resources": {"min": 5}}
      contains: {"meta.command": "--discover"}
  - name: "pokemon list with limit=3 shows first page"
    command: "pokedex pokemon list --limit=3"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 3, "max": 3}}
      equals: {"meta.limit": 3, "meta.offset": 0, "data.0.name": "bulbasaur"}
  - name: "follow next_page action to page 2"
    command: "pokedex pokemon list --limit=3 --offset=3"
    assert:
      exit_code: 0
      equals: {"meta.offset": 3, "data.0.name": "charmander"}
      has_fields: ["actions"]
  - name: "gen 1 last page (offset=150) has only 1 result and no next_page"
    command: "pokedex pokemon list --generation=1 --limit=3 --offset=150"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 1, "max": 1}}
      equals: {"data.0.name": "mew", "meta.offset": 150}
  - name: "type-null resolves correctly (colon in display name)"
    command: "pokedex pokemon show type-null"
    assert:
      exit_code: 0
      equals: {"data.name": "type-null", "data.display_name": "Type: Null", "data.is_legendary": true, "data.types": ["Normal"], "data.generation": 7}
      has_fields: ["data.types", "data.stats", "data.abilities", "actions"]
  - name: "follow evolutions action from type-null -> silvally"
    command: "pokedex pokemon evolutions type-null"
    assert:
      exit_code: 0
      equals: {"data.species_name": "type-null"}
      array_len: {"data.children": {"min": 1, "max": 1}}
      has_fields: ["data.children.0.species_name", "data.children.0.methods"]
  - name: "follow stats action from type-null (all 95 except speed)"
    command: "pokedex pokemon stats type-null"
    assert:
      exit_code: 0
      equals: {"data.hp": 95, "data.attack": 95, "data.defense": 95, "data.speed": 59, "data.total": 534}
  - name: "nidoran-f resolves correctly (unicode female symbol in display)"
    command: "pokedex pokemon show nidoran-f"
    assert:
      exit_code: 0
      equals: {"data.name": "nidoran-f", "data.id": 29, "data.generation": 1, "data.types": ["Poison"]}
      has_fields: ["data.display_name", "data.abilities", "actions"]
  - name: "follow evolutions action from nidoran-f -> nidorina -> nidoqueen"
    command: "pokedex pokemon evolutions nidoran-f"
    assert:
      exit_code: 0
      equals: {"data.species_name": "nidoran-f"}
      array_len: {"data.children": {"min": 1}}
      has_fields: ["data.children.0.children"]
  - name: "follow show_missing action - first missing is bulbasaur"
    command: "pokedex dex progress national --missing --limit=3"
    assert:
      exit_code: 0
      equals: {"data.entries.0.name": "bulbasaur", "data.entries.0.caught": false}
      array_len: {"data.entries": {"min": 3}}
  - name: "check encounters for missing bulbasaur"
    command: "pokedex pokemon encounters bulbasaur"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 1}}
      has_fields: ["data.0.location", "data.0.game", "data.0.method"]
  - name: "add bulbasaur to collection via red game"
    command: "pokedex collection add --pokemon=bulbasaur --game=red --method=catch"
    capture: { "bulba_id": "data.id" }
    assert:
      exit_code: 0
      equals: {"data.species_name": "bulbasaur", "data.game": "red", "data.status": "caught"}
      has_fields: ["actions"]
  - name: "follow show_caught action confirms bulbasaur"
    command: "pokedex dex progress national --caught --limit=3"
    assert:
      exit_code: 0
      array_len: {"data.entries": {"min": 1}}
      equals: {"data.entries.0.name": "bulbasaur", "data.entries.0.caught": true}
  - name: "follow collection show action from add"
    command: "pokedex collection show $bulba_id"
    assert:
      exit_code: 0
      equals: {"data.species_name": "bulbasaur"}
      has_fields: ["actions"]
  - name: "clean up: remove bulbasaur from collection"
    command: "pokedex collection remove $bulba_id"
    assert:
      exit_code: 0
      equals: {"data.removed": true}
      has_fields: ["actions"]
  - name: "dex progress last page (offset=1020 of 1025) has no next_page"
    command: "pokedex dex progress national --limit=5 --offset=1020"
    assert:
      exit_code: 0
      array_len: {"data.entries": {"min": 5, "max": 5}}
      equals: {"data.entries.4.name": "pecharunt", "meta.offset": 1020}
  - name: "Gen 1 location: viridian-forest in Red"
    command: "pokedex location encounters viridian-forest --game=red --limit=5"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 1, "max": 5}}
      equals: {"data.0.game": "Red"}
      has_fields: ["data.0.species_slug", "data.0.method", "data.0.rarity", "meta.total"]
  - name: "Gen 1 location pagination: last page has prev_page but no next_page"
    command: "pokedex location encounters viridian-forest --game=red --limit=5 --offset=5"
    assert:
      exit_code: 0
      has_fields: ["data", "meta.total"]
      equals: {"meta.offset": 5}
  - name: "Gen 4 location: eterna-forest in Diamond has conditions"
    command: "pokedex location encounters eterna-forest --game=diamond --limit=5"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 1, "max": 5}}
      equals: {"data.0.game": "Diamond"}
      has_fields: ["data.0.species_slug", "data.0.method", "meta.total"]
  - name: "Gen 9 location: south-province-area-one in Scarlet has SV details"
    command: "pokedex location encounters south-province-area-one --game=scarlet --limit=3"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 1, "max": 3}}
      equals: {"data.0.game": "Scarlet"}
      has_fields: ["data.0.species_slug", "data.0.details"]
  - name: "PLA location: horseshoe-plains has alpha_levels in details"
    command: "pokedex location encounters horseshoe-plains --game=legends-arceus --limit=3"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 1, "max": 3}}
      equals: {"data.0.game": "Legends: Arceus"}
      has_fields: ["data.0.species_slug", "data.0.details"]
  - name: "Sword location: rolling-fields has Max Raid encounters"
    command: "pokedex location encounters rolling-fields --game=sword --limit=3"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 1, "max": 3}}
      equals: {"data.0.game": "Sword"}
      has_fields: ["data.0.species_slug", "data.0.details"]
  - name: "follow species_slug template: show pokemon from location results"
    command: "pokedex pokemon show caterpie"
    assert:
      exit_code: 0
      equals: {"data.name": "caterpie", "data.types": ["Bug"], "data.generation": 1}
  - name: "type list returns all 18+ types"
    command: "pokedex type list"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 18}}
      has_fields: ["actions"]
  - name: "follow matchups action for dragon type"
    command: "pokedex type matchups dragon"
    assert:
      exit_code: 0
      has_fields: ["data.attacking.super_effective", "data.defending.super_effective"]
      array_len: {"data.attacking.no_effect": {"min": 1}}
  - name: "follow pokemon_of_type action"
    command: "pokedex type pokemon dragon --limit=3"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 3}}
      has_fields: ["meta.total", "actions"]
  - name: "game list returns all games with show actions"
    command: "pokedex game list"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 20}}
      has_fields: ["actions"]
  - name: "follow game show action for sword"
    command: "pokedex game show sword"
    assert:
      exit_code: 0
      equals: {"data.name": "sword", "data.generation": 8, "data.region": "Galar", "data.connects_to_home": true}
      has_fields: ["actions"]
  - name: "follow collection_for_game action (empty for sword)"
    command: "pokedex collection list --game=sword"
    assert:
      exit_code: 0
      has_fields: ["data", "actions", "meta"]
      type_of: {"data": "array"}
  - name: "home status returns counts"
    command: "pokedex home status"
    assert:
      exit_code: 0
      has_fields: ["data.total_in_home", "data.unique_species_in_home", "data.shiny_in_home", "actions"]
      type_of: {"data.total_in_home": "number"}
  - name: "follow coverage action from home status"
    command: "pokedex home coverage"
    assert:
      exit_code: 0
      has_fields: ["data.total", "data.caught", "data.percentage"]
      type_of: {"data.percentage": "number"}
  - name: "follow missing action from home status"
    command: "pokedex home missing --limit=3"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 3, "max": 3}}
      has_fields: ["data.0.name", "meta.total"]
  - name: "home transferable for pikachu shows HOME-compatible games"
    command: "pokedex home transferable pikachu"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 1}}
      has_fields: ["data.0.name", "data.0.connects_to_home"]
  - name: "dex list returns available pokedexes"
    command: "pokedex dex list"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 10}}
      has_fields: ["actions"]
  - name: "follow dex show action for national dex"
    command: "pokedex dex show national --limit=3"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 3, "max": 3}}
      equals: {"data.0.name": "bulbasaur"}
      has_fields: ["actions"]
  - name: "rotom-heat shows Electric/Fire with BST 520"
    command: "pokedex pokemon show rotom-heat"
    assert:
      exit_code: 0
      equals: {"data.display_name": "Heat Rotom", "data.types": ["Electric", "Fire"], "data.stats.total": 520}
      has_fields: ["data.stats", "data.abilities", "actions"]
  - name: "growlithe-hisui has Fire/Rock types"
    command: "pokedex pokemon show growlithe-hisui"
    assert:
      exit_code: 0
      contains: {"data.display_name": "Hisuian"}
      equals: {"data.types": ["Fire", "Rock"]}
  - name: "growlithe-hisui stats differ from base growlithe"
    command: "pokedex pokemon stats growlithe-hisui"
    assert:
      exit_code: 0
      equals: {"data.hp": 60, "data.attack": 75, "data.speed": 55}
  - name: "base growlithe stats are different"
    command: "pokedex pokemon stats growlithe"
    assert:
      exit_code: 0
      equals: {"data.hp": 55, "data.attack": 70, "data.speed": 60}
  - name: "typo pikchu gets NOT_FOUND with recovery actions"
    command: "pokedex pokemon show pikchu"
    assert:
      exit_code: 1
      equals: {"error.code": "NOT_FOUND"}
      contains: {"error.message": "pikchu"}
      array_len: {"actions": {"min": 1}}
  - name: "typo charizar gets NOT_FOUND with recovery actions"
    command: "pokedex pokemon show charizar"
    assert:
      exit_code: 1
      equals: {"error.code": "NOT_FOUND"}
      array_len: {"actions": {"min": 1}}
  - name: "typo evee gets NOT_FOUND with recovery actions"
    command: "pokedex pokemon show evee"
    assert:
      exit_code: 1
      equals: {"error.code": "NOT_FOUND"}
      contains: {"error.message": "evee"}
      array_len: {"actions": {"min": 1}}
  - name: "follow did_you_mean action recovers to eevee"
    command: "pokedex pokemon show eevee"
    assert:
      exit_code: 0
      equals: {"data.name": "eevee", "data.display_name": "Eevee"}
      has_fields: ["data.stats", "actions"]
  - name: "follow evolutions action from eevee shows 8+ eeveelutions"
    command: "pokedex pokemon evolutions eevee"
    assert:
      exit_code: 0
      array_len: {"data.children": {"min": 8}}
      has_fields: ["actions"]
  - name: "--limit=0 returns INVALID_PARAMETER error"
    command: "pokedex pokemon list --limit=0"
    assert:
      exit_code: 1
      equals: {"error.code": "INVALID_PARAMETER"}
      contains: {"error.message": "limit"}
  - name: "bad location returns NOT_FOUND with recovery actions"
    command: "pokedex location encounters not-a-place"
    assert:
      exit_code: 1
      equals: {"error.code": "NOT_FOUND"}
      array_len: {"actions": {"min": 1}}
  - name: "not-found collection entry returns error"
    command: "pokedex collection show 9999"
    assert:
      exit_code: 1
      equals: {"error.code": "NOT_FOUND"}
      has_fields: ["actions"]
  - name: "wild-area without valid game returns NOT_FOUND with try actions"
    command: "pokedex location encounters wild-area --game=sword"
    assert:
      exit_code: 1
      equals: {"error.code": "NOT_FOUND"}
      array_len: {"actions": {"min": 1}}
  - name: "add pikachu to collection in red"
    command: "pokedex collection add --pokemon=pikachu --game=red --method=catch"
    capture: { "pika_id": "data.id" }
    assert:
      exit_code: 0
      equals: {"data.species_name": "pikachu", "data.game": "red", "data.status": "caught"}
      has_fields: ["actions"]
  - name: "follow show action from collection add"
    command: "pokedex collection show $pika_id"
    assert:
      exit_code: 0
      equals: {"data.species_name": "pikachu"}
      has_fields: ["actions"]
  - name: "follow update action to living_dex status"
    command: "pokedex collection update $pika_id --status=living_dex"
    assert:
      exit_code: 0
      equals: {"data.status": "living_dex"}
  - name: "follow remove action to clean up"
    command: "pokedex collection remove $pika_id"
    assert:
      exit_code: 0
      equals: {"data.removed": true}
      has_fields: ["actions"]
  - name: "collection list is empty after cleanup"
    command: "pokedex collection list"
    assert:
      exit_code: 0
      has_fields: ["data", "actions", "meta"]
      type_of: {"data": "array"}