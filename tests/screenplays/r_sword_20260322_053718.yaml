      has_fields: ["data.total_entries", "data.unique_species"]
      array_len: { "data.by_status": { "min": 1 } }

  - name: "Collection list -- verify sword entries"
    command: "pokedex collection list --game=sword"
    assert:
      exit_code: 0
      array_len: { "data": { "min": 30 } }
      has_fields: ["meta.total"]

  # ============================================================
  # ZONE COMPARISON -- encounter count differences
  # ============================================================
  - name: "Zone comparison -- Hammerlocke Hills is smallest"
    command: "pokedex location encounters hammerlocke-hills --game=sword --limit=1"
    assert:
      exit_code: 0
      equals: { "meta.total": 56 }
      type_of: { "meta.total": "number" }

