# Screenplays are CHEAP regression tests produced by exploratory test agents.
# If a step fails, investigate: is it a real bug (fix the code) or a stale
# assertion (update or delete this file)? The INTENT matters, not the exact
# implementation. Don't contort the CLI to make a stale screenplay pass.
name: "Legends Z-A Playthrough - All 20 Wild Zones + Alpha Completionist"
persona: za_playthrough
description: >
  Comprehensive Z-A Lumiose completionist covering all 20 Wild Zones,
  alpha catches across zone progression 1-4, 5-8, 9-12, 13-16, 17-20.
  Verifies alpha details, Symbol Encounter method, Mega Z forms,
  PLA cross-reference, evolution chains, and collection tracking.
  Target: 40+ species. Region confirmed as Kalos (gen 9).
needs_seed: true
mutates_collection: true

steps:
  # ============================================================
  # GAME SETUP: Verify Z-A game metadata
  # ============================================================
  - name: "Game setup -- legends-za exists with Kalos region"
    command: "pokedex game show legends-za"
    assert:
      exit_code: 0
      equals: { "data.name": "legends-za", "data.generation": 9, "data.region": "Kalos" }
      contains: { "data.display_name": "Z-A" }

  - name: "Game setup -- legends-za connects to HOME"
    command: "pokedex game show legends-za"
    assert:
      exit_code: 0
      equals: { "data.connects_to_home": true }
      has_fields: ["data.transfer_direction", "actions"]

  # ============================================================
  # WILD ZONES 1-4: Early game progression
  # ============================================================
  - name: "Zone 1 -- discover 8 encounters"
    command: "pokedex location encounters wild-zone-1 --game=legends-za"
    assert:
      exit_code: 0
      equals: { "meta.total": 8, "data.0.location": "Wild Zone 1" }
      array_len: { "data": { "min": 8, "max": 8 } }

  - name: "Zone 1 -- alpha details and method"
    command: "pokedex location encounters wild-zone-1 --game=legends-za"
    assert:
      exit_code: 0
      has_fields: ["data.0.details.alpha_levels", "data.0.details.during_any_time"]
      equals: { "data.0.method": "Symbol Encounter", "data.0.game_slug": "legends-za" }

  - name: "Zone 1 -- alpha note present"
    command: "pokedex location encounters wild-zone-1 --game=legends-za"
    assert:
      exit_code: 0
      contains: { "data.0.details.note": "Alpha" }
      equals: { "data.0.area": "wild-zone-1" }

  - name: "Zone 1 -- catch Fletchling alpha"
    command: "pokedex collection add --pokemon=fletchling --game=legends-za --method=catch --alpha"
    capture: { "fletchling_id": "data.id" }
    assert:
      exit_code: 0
      equals: { "data.species_name": "fletchling", "data.is_alpha": true, "data.status": "caught" }

  - name: "Zone 1 -- catch Mareep alpha"
    command: "pokedex collection add --pokemon=mareep --game=legends-za --method=catch --alpha"
    assert:
      exit_code: 0
      equals: { "data.species_name": "mareep", "data.is_alpha": true }
      has_fields: ["data.id", "data.created_at"]

  - name: "Zone 1 -- catch Pidgey"
