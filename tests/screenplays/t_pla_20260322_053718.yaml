    assert:
      exit_code: 0
      has_fields: ["data.total_entries", "data.unique_species"]
      type_of: { "data.unique_species": "number" }

  - name: "Hisui dex progress -- verify caught count"
    command: "pokedex dex progress hisui --game=legends-arceus --limit=5"
    assert:
      exit_code: 0
      equals: { "data.dex_name": "hisui", "data.total": 242 }
      has_fields: ["data.caught", "data.percentage"]

  - name: "Collection list -- PLA filter works"
    command: "pokedex collection list --game=legends-arceus --limit=5"
    assert:
      exit_code: 0
      has_fields: ["data", "meta"]
      array_len: { "data": { "min": 5 } }
