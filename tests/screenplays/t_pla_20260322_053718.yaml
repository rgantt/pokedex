      exit_code: 0
      equals: { "data.species_name": "graveler", "data.is_alpha": true }
      has_fields: ["data.id"]

  # ============================================================
  # LINKING CORD — trade evolution without trading (Graveler → Golem)
  # ============================================================
  - name: "Graveler evolution -- trade trigger for Golem"
    command: "pokedex pokemon evolutions graveler"
    assert:
      exit_code: 0
      equals: { "data.children.0.children.0.species_name": "golem" }
      contains: { "data.children.0.children.0.methods.0.trigger": "trade" }

  - name: "Evolve Graveler to Golem via Linking Cord"
    command: "pokedex collection add --pokemon=golem --game=legends-arceus --method=evolve"
    assert:
      exit_code: 0
      equals: { "data.species_name": "golem", "data.method": "evolve" }
      has_fields: ["data.id"]

  - name: "Update Graveler status to evolved"
    command: "pokedex collection update $graveler_id --status=evolved"
    assert:
      exit_code: 0
      equals: { "data.status": "evolved", "data.species_name": "graveler" }

  # ============================================================
  # CLOUDPOOL RIDGE — Murkrow, Roselia, Combee
