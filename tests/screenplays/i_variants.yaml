# Screenplays are CHEAP regression tests produced by exploratory test agents.
# If a step fails, investigate: is it a real bug (fix the code) or a stale
# assertion (update or delete this file)? The INTENT matters, not the exact
# implementation. Don't contort the CLI to make a stale screenplay pass.
name: "Variant Collector: Final Form Audit"
persona: "I"
description: "Round 15: Silvally 18 memory forms, Arceus 19 plate forms, Genesect 5 drive forms, Rotom appliance types, Vivillon 20 patterns with meadow default, Flabebe/Floette/Florges color forms, Minior meteor vs core, Magearna original, Sinistea/Polteageist phony vs antique, Alcremie 64 forms, Dudunsparce segments, form-specific Rotom collection workflow"
needs_seed: true
mutates_collection: true

steps:
  # ===== Silvally: 18 memory forms, all different types, same BST =====

  - name: "Silvally has exactly 18 memory forms"
    command: "pokedex pokemon forms silvally"
    assert:
      exit_code: 0
      array_len: { "data": { "min": 18, "max": 18 } }
      equals: { "data.0.is_default": true, "data.0.form_name": "normal" }

  - name: "Silvally forms have single-type matching their memory"
    command: "pokedex pokemon forms silvally"
    assert:
      exit_code: 0
      equals: { "data.0.types": ["Normal"], "data.1.types": ["Fighting"] }
      contains: { "data.1.form_name": "fighting" }

  - name: "Silvally base BST is 570 with uniform stats"
    command: "pokedex pokemon stats silvally"
    assert:
      exit_code: 0
      equals: { "data.total": 570, "data.attack": 95, "data.speed": 95 }

  - name: "Silvally-Fighting keeps same 570 BST"
    command: "pokedex pokemon stats silvally-fighting"
    assert:
      exit_code: 0
      equals: { "data.total": 570 }
      has_fields: ["data.hp"]

  # ===== Arceus: 19 plate forms (18 types + unknown), same BST =====

  - name: "Arceus has 19 forms including unknown type"
    command: "pokedex pokemon forms arceus"
    assert:
      exit_code: 0
      array_len: { "data": { "min": 19, "max": 19 } }
      equals: { "data.0.form_name": "normal", "data.0.is_default": true }

  - name: "Arceus forms include fairy and unknown types"
    command: "pokedex pokemon forms arceus"
    assert:
      exit_code: 0
      equals: { "data.17.types": ["Fairy"], "data.18.form_name": "unknown" }

  - name: "Arceus base BST is 720 with uniform 120 stats"
    command: "pokedex pokemon stats arceus"
    assert:
      exit_code: 0
      equals: { "data.total": 720, "data.hp": 120, "data.attack": 120 }

  - name: "Arceus-Fairy preserves 720 BST"
    command: "pokedex pokemon stats arceus-fairy"
    assert:
      exit_code: 0
      equals: { "data.total": 720 }
      has_fields: ["data.speed"]

  # ===== Genesect: 5 drive forms, all Bug/Steel, same BST =====

  - name: "Genesect has exactly 5 drive forms"
    command: "pokedex pokemon forms genesect"
    assert:
      exit_code: 0
      array_len: { "data": { "min": 5, "max": 5 } }
      equals: { "data.0.is_default": true }

  - name: "All Genesect drive forms are Bug/Steel"
    command: "pokedex pokemon forms genesect"
    assert:
      exit_code: 0
      equals: { "data.0.types": ["Bug", "Steel"], "data.1.types": ["Bug", "Steel"] }
      contains: { "data.1.form_name": "douse" }

  - name: "Genesect BST is 600"
    command: "pokedex pokemon stats genesect"
    assert:
      exit_code: 0
      equals: { "data.total": 600, "data.attack": 120 }
      has_fields: ["data.speed"]

  # ===== Rotom: 6 forms with specific appliance types =====

  - name: "Rotom has 6 forms total"
    command: "pokedex pokemon forms rotom"
    assert:
      exit_code: 0
      array_len: { "data": { "min": 6, "max": 6 } }
      equals: { "data.0.types": ["Electric", "Ghost"], "data.0.is_default": true }

  - name: "Rotom Heat is Electric/Fire and Wash is Electric/Water"
    command: "pokedex pokemon forms rotom"
    assert:
      exit_code: 0
      equals: { "data.1.types": ["Electric", "Fire"], "data.1.form_name": "heat" }
      contains: { "data.2.form_name": "wash" }

  - name: "Rotom Frost is Electric/Ice and Fan is Electric/Flying"
    command: "pokedex pokemon forms rotom"
    assert:
      exit_code: 0
      equals: { "data.3.types": ["Electric", "Ice"], "data.4.types": ["Electric", "Flying"] }

  - name: "Rotom Mow is Electric/Grass"
    command: "pokedex pokemon forms rotom"
    assert:
      exit_code: 0
      equals: { "data.5.types": ["Electric", "Grass"], "data.5.form_name": "mow" }
      has_fields: ["actions"]

  # ===== Vivillon: 20 patterns, meadow is default =====

  - name: "Vivillon has exactly 20 pattern forms"
    command: "pokedex pokemon forms vivillon"
    assert:
      exit_code: 0
      array_len: { "data": { "min": 20, "max": 20 } }
      type_of: { "data": "array" }

  - name: "Vivillon meadow is the default pattern"
    command: "pokedex pokemon forms vivillon"
    assert:
      exit_code: 0
      equals: { "data.6.form_name": "meadow", "data.6.is_default": true }
      contains: { "data.6.name": "vivillon-meadow" }

  - name: "All Vivillon patterns share Bug/Flying typing"
    command: "pokedex pokemon forms vivillon"
    assert:
      exit_code: 0
      equals: { "data.0.types": ["Bug", "Flying"], "data.19.types": ["Bug", "Flying"] }

  # ===== Flabebe/Floette/Florges: color forms, same Fairy type =====

  - name: "Flabebe has 5 color forms all Fairy type"
    command: "pokedex pokemon forms flabebe"
    assert:
      exit_code: 0
      array_len: { "data": { "min": 5, "max": 5 } }
      equals: { "data.0.types": ["Fairy"], "data.0.form_name": "red" }

  - name: "Florges also has 5 color forms all Fairy type"
    command: "pokedex pokemon forms florges"
    assert:
      exit_code: 0
      array_len: { "data": { "min": 5, "max": 5 } }
      equals: { "data.0.types": ["Fairy"] }

  # ===== Minior: meteor vs core forms =====

  - name: "Minior has 14 forms (7 meteor + 7 core)"
    command: "pokedex pokemon forms minior"
    assert:
      exit_code: 0
      array_len: { "data": { "min": 14, "max": 14 } }
      equals: { "data.0.form_name": "red-meteor", "data.0.is_default": true }

  - name: "Non-default meteor forms are battle-only, core forms are not"
    command: "pokedex pokemon forms minior"
    assert:
      exit_code: 0
      equals: { "data.1.is_battle_only": true, "data.7.is_battle_only": false }
      contains: { "data.7.name": "minior-red" }

  # ===== Magearna: base and original color =====

  - name: "Magearna has base and original forms"
    command: "pokedex pokemon forms magearna"
    assert:
      exit_code: 0
      array_len: { "data": { "min": 2 } }
      equals: { "data.1.form_name": "original" }

  - name: "Both Magearna forms are Steel/Fairy"
    command: "pokedex pokemon forms magearna"
    assert:
      exit_code: 0
      equals: { "data.0.types": ["Steel", "Fairy"], "data.1.types": ["Steel", "Fairy"] }
      has_fields: ["actions"]

  # ===== Sinistea/Polteageist: phony vs antique =====

  - name: "Sinistea has phony (default) and antique forms"
    command: "pokedex pokemon forms sinistea"
    assert:
      exit_code: 0
      array_len: { "data": { "min": 2, "max": 2 } }
      equals: { "data.0.form_name": "phony", "data.0.is_default": true }

  - name: "Polteageist also has phony and antique, both Ghost type"
    command: "pokedex pokemon forms polteageist"
    assert:
      exit_code: 0
      equals: { "data.0.types": ["Ghost"], "data.1.form_name": "antique" }
      array_len: { "data": { "min": 2, "max": 2 } }

  # ===== Alcremie: 63 flavors + gmax = 64 forms =====

  - name: "Alcremie has 64 forms (63 flavors + gmax)"
    command: "pokedex pokemon forms alcremie"
    assert:
      exit_code: 0
      array_len: { "data": { "min": 64, "max": 64 } }
      type_of: { "data": "array" }

  - name: "Alcremie gmax form exists and is battle-only"
    command: "pokedex pokemon forms alcremie"
    assert:
      exit_code: 0
      equals: { "data.1.form_name": "gmax", "data.1.is_battle_only": true }
      contains: { "data.1.name": "alcremie-gmax" }

  # ===== Dudunsparce: two-segment vs three-segment =====

  - name: "Dudunsparce has two segment forms"
    command: "pokedex pokemon forms dudunsparce"
    assert:
      exit_code: 0
      array_len: { "data": { "min": 2, "max": 2 } }
      equals: { "data.0.form_name": "two-segment", "data.0.is_default": true }

  - name: "Dudunsparce three-segment is Normal type like two-segment"
    command: "pokedex pokemon forms dudunsparce"
    assert:
      exit_code: 0
      equals: { "data.1.form_name": "three-segment", "data.1.types": ["Normal"] }
      contains: { "data.1.name": "dudunsparce-three-segment" }

  # ===== Form-specific collection: 3 different Rotom forms in same game =====

  - name: "Add Rotom-Heat to Sword collection"
    command: "pokedex collection add --pokemon=rotom --form=heat --game=sword"
    assert:
      exit_code: 0
      equals: { "data.form_name": "heat", "data.species_name": "rotom" }
      has_fields: ["data.id"]

  - name: "Add Rotom-Wash to Sword collection"
    command: "pokedex collection add --pokemon=rotom --form=wash --game=sword"
    assert:
      exit_code: 0
      equals: { "data.form_name": "wash", "data.species_name": "rotom" }
      contains: { "data.display_name": "Wash" }

  - name: "Add Rotom-Mow to Sword collection"
    command: "pokedex collection add --pokemon=rotom --form=mow --game=sword"
    assert:
      exit_code: 0
      equals: { "data.form_name": "mow", "data.species_name": "rotom" }
      contains: { "data.display_name": "Mow" }

  - name: "All 3 Rotom forms appear in collection with distinct form_name"
    command: "pokedex collection list --pokemon=rotom"
    assert:
      exit_code: 0
      array_len: { "data": { "min": 3 } }
      contains: { "data.0.species_name": "rotom" }

  - name: "Rotom collection entries have correct HATEOAS pokemon_info links"
    command: "pokedex collection list --pokemon=rotom"
    assert:
      exit_code: 0
      contains: { "data.0.form_name": "mow" }
      type_of: { "data": "array" }

  # ===== Cleanup =====

  - name: "Clean up Rotom collection entries"
    command: "pokedex collection list --pokemon=rotom"
    assert:
      exit_code: 0
      has_fields: ["data", "meta"]
      type_of: { "data": "array" }
