  - name: "Route 22 -- check Nidoran-M evolution chain"
    command: "pokedex pokemon evolutions nidoran-m"
    assert:
      exit_code: 0
      contains: { "data.children.0.species_name": "nidorino" }
      has_fields: ["data.children"]

  - name: "Route 22 -- evolve Nidoran-M to Nidorino"
    command: "pokedex collection add --pokemon=nidorino --game=red --method=evolve"
