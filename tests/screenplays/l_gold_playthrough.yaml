# Screenplays are CHEAP regression tests produced by exploratory test agents.
# If a step fails, investigate: is it a real bug (fix the code) or a stale
# assertion (update or delete this file)? The INTENT matters, not the exact
# implementation. Don't contort the CLI to make a stale screenplay pass.
name: "Gold Playthrough - Route 29 to Ice Path"
persona: gold_playthrough
description: >
  End-to-end Gold playthrough testing the discover-inspect-catch-evolve-verify
  loop across johto-route-29, sprout-tower, johto-route-32, union-cave,
  ilex-forest, national-park, lake-of-rage, and ice-path.
  Targets 20+ unique species.
needs_seed: true
mutates_collection: true

steps:
  # ============================================================
  # LOCATION 1: johto-route-29
  # ============================================================
  - name: "Route 29 -- discover encounters"
    command: "pokedex location encounters johto-route-29 --game=gold"
    assert:
      exit_code: 0
      has_fields: ["data", "actions", "meta"]
      equals: { "meta.total": 13 }
      array_len: { "data": { "min": 5 } }
  - name: "Route 29 -- inspect Pidgey"
    command: "pokedex pokemon show pidgey"
    assert:
      exit_code: 0
      equals: { "data.name": "pidgey", "data.generation": 1 }
      has_fields: ["data.types", "data.stats", "data.abilities"]
  - name: "Route 29 -- inspect Sentret"
    command: "pokedex pokemon show sentret"
    assert:
      exit_code: 0
      equals: { "data.name": "sentret", "data.generation": 2 }
      has_fields: ["data.types", "data.stats"]
  - name: "Route 29 -- inspect Hoothoot"
    command: "pokedex pokemon show hoothoot"
    assert:
      exit_code: 0
      equals: { "data.name": "hoothoot", "data.generation": 2 }
  - name: "Route 29 -- inspect Rattata"
    command: "pokedex pokemon show rattata"
    assert:
      exit_code: 0
      equals: { "data.name": "rattata", "data.generation": 1 }
  - name: "Route 29 -- catch Pidgey"
    command: "pokedex collection add --pokemon=pidgey --game=gold --method=catch"
    capture: { "pidgey_id": "data.id" }
    assert:
      exit_code: 0
      equals: { "data.species_name": "pidgey", "data.status": "caught", "data.method": "catch", "data.game": "gold" }
      has_fields: ["data.id", "data.created_at"]
  - name: "Route 29 -- catch Sentret"
    command: "pokedex collection add --pokemon=sentret --game=gold --method=catch"
    capture: { "sentret_id": "data.id" }
    assert:
      exit_code: 0
      equals: { "data.species_name": "sentret", "data.status": "caught", "data.method": "catch" }
  - name: "Route 29 -- catch Hoothoot"
    command: "pokedex collection add --pokemon=hoothoot --game=gold --method=catch"
    capture: { "hoothoot_id": "data.id" }
    assert:
      exit_code: 0
      equals: { "data.species_name": "hoothoot", "data.status": "caught", "data.method": "catch" }
  - name: "Route 29 -- catch Rattata"
    command: "pokedex collection add --pokemon=rattata --game=gold --method=catch"
    capture: { "rattata_id": "data.id" }
    assert:
      exit_code: 0
      equals: { "data.species_name": "rattata", "data.status": "caught", "data.method": "catch" }
  - name: "Route 29 -- evolve Pidgey to Pidgeotto"
    command: "pokedex collection add --pokemon=pidgeotto --game=gold --method=evolve"
    capture: { "pidgeotto_id": "data.id" }
    assert:
      exit_code: 0
      equals: { "data.species_name": "pidgeotto", "data.method": "evolve" }
  - name: "Route 29 -- update Pidgey status to evolved"
    command: "pokedex collection update $pidgey_id --status=evolved"
    assert:
      exit_code: 0
      equals: { "data.status": "evolved", "data.species_name": "pidgey" }
  - name: "Route 29 -- evolve Hoothoot to Noctowl"
    command: "pokedex collection add --pokemon=noctowl --game=gold --method=evolve"
