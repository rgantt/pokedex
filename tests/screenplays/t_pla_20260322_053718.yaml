# Screenplays are CHEAP regression tests produced by exploratory test agents.
# If a step fails, investigate: is it a real bug (fix the code) or a stale
# assertion (update or delete this file)? The INTENT matters, not the exact
# implementation. Don't contort the CLI to make a stale screenplay pass.
name: "Legends Arceus Hisui Completionist — Alternate Path"
persona: pla_completionist_alt
description: >
  Alternate PLA playthrough covering areas NOT in the original: Windswept Run,
  Nature's Pantry, Bolderoll Slope, Cloudpool Ridge, Diamond Heath, Lonely Spring,
  Icebound Falls, Whiteout Valley, and Ursa's Ring. Tests Hisuian Lilligant,
  Hisuian Braviary, Hisuian Goodra, Hisuian Avalugg. Verifies PLA-exclusive
  evolution items (Linking Cord trade evos, Peat Block, Black Augurite). Tests
  time-of-day encounter fields (during_morning, during_day, during_night) and
  mixes alpha/non-alpha catches.
needs_seed: true
mutates_collection: true

steps:
  # ============================================================
  # VERIFY GAME METADATA
  # ============================================================
  - name: "Game metadata -- PLA is gen 8 Hisui"
    command: "pokedex game show legends-arceus"
    assert:
      exit_code: 0
      equals: { "data.name": "legends-arceus", "data.generation": 8, "data.region": "Hisui" }

  # ============================================================
  # WINDSWEPT RUN — time-of-day encounters
  # ============================================================
  - name: "Windswept Run -- discover encounters"
    command: "pokedex location encounters windswept-run --game=legends-arceus"
    assert:
      exit_code: 0
      equals: { "meta.total": 30 }
      has_fields: ["data", "actions"]

  - name: "Windswept Run -- Starly Flying has during_morning/day/evening"
    command: "pokedex pokemon encounters starly --game=legends-arceus"
    assert:
      exit_code: 0
      has_fields: ["data"]
      array_len: { "data": { "min": 1 } }

  - name: "Windswept Run -- Drifloon is night-only"
    command: "pokedex pokemon encounters drifloon --game=legends-arceus"
    assert:
      exit_code: 0
      array_len: { "data": { "min": 5 } }
      has_fields: ["data.0.details"]

  - name: "Catch Abra at Windswept Run"
    command: "pokedex collection add --pokemon=abra --game=legends-arceus --method=catch"
    assert:
      exit_code: 0
      equals: { "data.species_name": "abra", "data.status": "caught" }
      has_fields: ["data.id"]

  - name: "Catch alpha Kricketune at Windswept Run"
    command: "pokedex collection add --pokemon=kricketune --game=legends-arceus --method=catch --alpha"
    assert:
      exit_code: 0
      equals: { "data.species_name": "kricketune", "data.is_alpha": true }
      has_fields: ["data.created_at"]

  - name: "Catch Burmy at Windswept Run"
    command: "pokedex collection add --pokemon=burmy --game=legends-arceus --method=catch"
    assert:
      exit_code: 0
      equals: { "data.species_name": "burmy", "data.status": "caught" }

  - name: "Catch Toxicroak at Windswept Run"
    command: "pokedex collection add --pokemon=toxicroak --game=legends-arceus --method=catch"
    assert:
      exit_code: 0
      equals: { "data.species_name": "toxicroak", "data.status": "caught" }
      has_fields: ["data.id"]

  # ============================================================
  # NATURE'S PANTRY — Space Time Distortion encounters
  # ============================================================
  - name: "Nature's Pantry -- discover encounters"
    command: "pokedex location encounters natures-pantry --game=legends-arceus"
    assert:
      exit_code: 0
      equals: { "meta.total": 31 }
      array_len: { "data": { "min": 20 } }

  - name: "Catch Pikachu from Nature's Pantry"
    command: "pokedex collection add --pokemon=pikachu --game=legends-arceus --method=catch"
    assert:
      exit_code: 0
      equals: { "data.species_name": "pikachu", "data.status": "caught" }

  - name: "Catch alpha Parasect from Nature's Pantry"
    command: "pokedex collection add --pokemon=parasect --game=legends-arceus --method=catch --alpha"
    assert:
      exit_code: 0
      equals: { "data.species_name": "parasect", "data.is_alpha": true }
      has_fields: ["data.id"]

  - name: "Catch Staraptor from Nature's Pantry"
