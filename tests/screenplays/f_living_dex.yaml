name: "Living Dex Edge Cases"
persona: living_dex
description: >
  Build a living dex testing edge cases: add 5 pokemon as living_dex, evolve 2,
  mark 1 traded_away. Verify dex progress --status=living_dex excludes evolved
  AND traded_away. Transfer 1 to HOME, verify coverage increases. Update that
  entry's status to transferred — verify it still shows in HOME (in_home is
  independent of status). Add same species twice with different statuses — verify
  collection list --status=living_dex only shows the living_dex one. Verify
  --method=evolve does NOT trigger encounter warning.
needs_seed: true
mutates_collection: true

steps:
  # ============================================================
  # PHASE 1: Add 5 pokemon as living_dex
  # ============================================================
  - name: "Add bulbasaur as living_dex"
    command: "pokedex collection add --pokemon=bulbasaur --game=sword --method=catch --status=living_dex"
    capture: { "bulbasaur_id": "data.id" }
    assert:
      exit_code: 0
      equals: {"data.species_name": "bulbasaur", "data.status": "living_dex", "data.method": "catch"}
      has_fields: ["data.id", "data.created_at"]

  - name: "Add charmander as living_dex"
    command: "pokedex collection add --pokemon=charmander --game=sword --method=catch --status=living_dex"
    capture: { "charmander_id": "data.id" }
    assert:
      exit_code: 0
      equals: {"data.species_name": "charmander", "data.status": "living_dex"}

  - name: "Add squirtle as living_dex"
    command: "pokedex collection add --pokemon=squirtle --game=sword --method=catch --status=living_dex"
    capture: { "squirtle_id": "data.id" }
    assert:
      exit_code: 0
      equals: {"data.species_name": "squirtle", "data.status": "living_dex"}

  - name: "Add pikachu as living_dex"
    command: "pokedex collection add --pokemon=pikachu --game=sword --method=catch --status=living_dex"
    capture: { "pikachu_id": "data.id" }
    assert:
      exit_code: 0
      equals: {"data.species_name": "pikachu", "data.status": "living_dex"}

  - name: "Add eevee as living_dex"
    command: "pokedex collection add --pokemon=eevee --game=sword --method=catch --status=living_dex"
    capture: { "eevee_id": "data.id" }
    assert:
      exit_code: 0
      equals: {"data.species_name": "eevee", "data.status": "living_dex"}

  # ============================================================
  # PHASE 2: Evolve 2 — method=evolve must NOT warn
  # ============================================================
  - name: "Evolve bulbasaur to ivysaur (no encounter warning)"
    command: "pokedex collection add --pokemon=ivysaur --game=sword --method=evolve --status=living_dex"
    assert:
      exit_code: 0
      equals: {"data.species_name": "ivysaur", "data.method": "evolve", "data.status": "living_dex"}
      has_fields: ["data.id"]

  - name: "Mark bulbasaur as evolved"
    command: "pokedex collection update $bulbasaur_id --status=evolved"
    assert:
      exit_code: 0
      equals: {"data.status": "evolved", "data.species_name": "bulbasaur"}

  - name: "Evolve charmander to charmeleon (no encounter warning)"
    command: "pokedex collection add --pokemon=charmeleon --game=sword --method=evolve --status=living_dex"
    assert:
      exit_code: 0
      equals: {"data.species_name": "charmeleon", "data.method": "evolve", "data.status": "living_dex"}
      has_fields: ["data.id"]

  - name: "Mark charmander as evolved"
    command: "pokedex collection update $charmander_id --status=evolved"
    assert:
      exit_code: 0
      equals: {"data.status": "evolved", "data.species_name": "charmander"}

  # ============================================================
  # PHASE 3: Mark 1 as traded_away
  # ============================================================
  - name: "Mark squirtle as traded_away"
    command: "pokedex collection update $squirtle_id --status=traded_away"
    assert:
      exit_code: 0
      equals: {"data.status": "traded_away", "data.species_name": "squirtle"}

  # ============================================================
  # PHASE 4: Verify dex progress excludes evolved AND traded_away
  # ============================================================
  # 5 original + 2 evolutions = 7 entries total
  # living_dex status: ivysaur, pikachu, eevee, charmeleon = 4
  # evolved: bulbasaur, charmander = excluded
  # traded_away: squirtle = excluded
  - name: "Dex progress --status=living_dex excludes evolved and traded_away"
    command: "pokedex dex progress national --status=living_dex --caught --game=sword"
    assert:
      exit_code: 0
      has_fields: ["data.caught", "data.total", "data.percentage", "data.entries"]
      array_len: {"data.entries": {"min": 4, "max": 4}}

  - name: "Verify excluded species not in living_dex progress"
    command: "pokedex dex progress national --status=living_dex --caught --game=sword"
    assert:
      exit_code: 0
      equals: {"data.caught": 4}

  # ============================================================
  # PHASE 5: Transfer to HOME — verify coverage increases
  # ============================================================
  - name: "Capture HOME coverage baseline before transfer"
    command: "pokedex home coverage"
    capture: { "home_before": "data.caught" }
    assert:
      exit_code: 0
      has_fields: ["data.caught", "data.total", "data.percentage"]

  - name: "Transfer pikachu to HOME"
    command: "pokedex collection update $pikachu_id --in-home=true"
    assert:
      exit_code: 0
      equals: {"data.in_home": true, "data.species_name": "pikachu"}

  - name: "HOME status shows pikachu after transfer"
    command: "pokedex home status"
    assert:
      exit_code: 0
      has_fields: ["data.total_in_home", "data.unique_species_in_home"]

  # ============================================================
  # PHASE 6: Change status to transferred — in_home stays true
  # ============================================================
  - name: "Update pikachu status to transferred"
    command: "pokedex collection update $pikachu_id --status=transferred"
    assert:
      exit_code: 0
      equals: {"data.status": "transferred", "data.in_home": true, "data.species_name": "pikachu"}

  - name: "HOME coverage unchanged after status change (in_home independent of status)"
    command: "pokedex home coverage"
    assert:
      exit_code: 0
      has_fields: ["data.caught", "data.total", "data.percentage"]

  - name: "Verify pikachu still marked in_home via collection show"
    command: "pokedex collection show $pikachu_id"
    assert:
      exit_code: 0
      equals: {"data.in_home": true, "data.status": "transferred"}

  # ============================================================
  # PHASE 7: Same species twice — different statuses
  # ============================================================
  - name: "Add eevee again with status=caught (duplicate species)"
    command: "pokedex collection add --pokemon=eevee --game=sword --method=catch --status=caught"
    capture: { "eevee_caught_id": "data.id" }
    assert:
      exit_code: 0
      equals: {"data.species_name": "eevee", "data.status": "caught"}

  - name: "Collection list --status=living_dex for eevee returns only living_dex entry"
    command: "pokedex collection list --status=living_dex --pokemon=eevee"
    assert:
      exit_code: 0
      type_of: {"data": "array"}
      array_len: {"data": {"min": 1}}
      equals: {"data.0.status": "living_dex", "data.0.species_name": "eevee"}

  - name: "Collection list --status=caught for eevee returns only caught entry"
    command: "pokedex collection list --status=caught --pokemon=eevee"
    assert:
      exit_code: 0
      type_of: {"data": "array"}
      array_len: {"data": {"min": 1}}
      equals: {"data.0.status": "caught", "data.0.species_name": "eevee"}

  # ============================================================
  # PHASE 8: Final dex progress after all mutations
  # ============================================================
  # living_dex remaining: ivysaur, eevee, charmeleon = 3
  # (pikachu was changed to transferred)
  - name: "Final living_dex progress reflects all status changes"
    command: "pokedex dex progress national --status=living_dex --caught --game=sword"
    assert:
      exit_code: 0
      equals: {"data.caught": 3}
      array_len: {"data.entries": {"min": 3, "max": 3}}

  - name: "Collection stats reflect mixed statuses"
    command: "pokedex collection stats --game=sword"
    assert:
      exit_code: 0
      has_fields: ["data.total_entries", "data.unique_species", "data.in_home_count", "data.by_status"]
      contains: {"data.by_status": "living_dex", "data.by_status": "evolved"}
