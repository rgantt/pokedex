      exit_code: 0
      equals: { "data.species_name": "grubbin", "data.status": "caught" }
  - name: "Route 1 -- check Blipbug evolution chain"
    command: "pokedex pokemon evolutions blipbug"
    assert:
      exit_code: 0
      equals: { "data.species_name": "blipbug" }
      has_fields: ["data.children"]
      contains: { "data.children.0.species_name": "dottler" }
  - name: "Route 1 -- evolve Blipbug to Dottler"
    command: "pokedex collection add --pokemon=dottler --game=sword --method=evolve"
    assert:
      exit_code: 0
      equals: { "data.species_name": "dottler", "data.method": "evolve" }
  - name: "Route 1 -- update Blipbug status to evolved"
    command: "pokedex collection update $blipbug_id --status=evolved"
    assert:
      exit_code: 0
      equals: { "data.status": "evolved", "data.species_name": "blipbug" }
  - name: "Route 1 -- check Rookidee evolution chain"
