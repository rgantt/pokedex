# Screenplays are CHEAP regression tests produced by exploratory test agents.
# If a step fails, investigate: is it a real bug (fix the code) or a stale
# assertion (update or delete this file)? The INTENT matters, not the exact
# implementation. Don't contort the CLI to make a stale screenplay pass.
name: "Red Playthrough - Route 1 to Victory Road"
persona: red_playthrough
description: >
  End-to-end Red playthrough testing the discover-inspect-catch-evolve-verify
  loop across Route 1, Route 22, Viridian Forest, Route 3, Mt. Moon,
  Routes 24-25, Routes 5-6, Routes 9-10, Rock Tunnel, Pokemon Tower,
  Routes 12-15, Safari Zone, Seafoam Islands, Pokemon Mansion, and
  Victory Road. Targets 40+ unique species caught/evolved.
needs_seed: true
mutates_collection: true

steps:
  # ============================================================
  # LOCATION 1: kanto-route-1
  # ============================================================
  - name: "Route 1 -- discover encounters"
    command: "pokedex location encounters kanto-route-1 --game=red"
    assert:
      exit_code: 0
      has_fields: ["data", "actions", "meta"]
      equals: { "meta.total": 7 }

  - name: "Route 1 -- inspect Pidgey"
    command: "pokedex pokemon show pidgey"
    assert:
      exit_code: 0
      equals: { "data.name": "pidgey", "data.generation": 1 }
      has_fields: ["data.types", "data.stats"]

  - name: "Route 1 -- catch Pidgey"
    command: "pokedex collection add --pokemon=pidgey --game=red --method=catch"
    capture: { "pidgey_id": "data.id" }
    assert:
      exit_code: 0
      equals: { "data.species_name": "pidgey", "data.status": "caught", "data.method": "catch" }
      has_fields: ["data.id", "data.created_at"]

  - name: "Route 1 -- catch Rattata"
    command: "pokedex collection add --pokemon=rattata --game=red --method=catch"
    capture: { "rattata_id": "data.id" }
    assert:
      exit_code: 0
      equals: { "data.species_name": "rattata", "data.status": "caught" }
      has_fields: ["data.id"]

  # ============================================================
  # LOCATION 2: kanto-route-22
