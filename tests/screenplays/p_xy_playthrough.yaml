# Screenplays are CHEAP regression tests produced by exploratory test agents.
# If a step fails, investigate: is it a real bug (fix the code) or a stale
# assertion (update or delete this file)? The INTENT matters, not the exact
# implementation. Don't contort the CLI to make a stale screenplay pass.
name: "X/Y Kalos Completionist Playthrough"
persona: p_xy_completionist
description: >
  End-to-end Pokemon X playthrough testing the discover-inspect-catch-evolve-verify
  loop across kalos-route-2, santalune-forest, kalos-route-3 through kalos-route-5,
  kalos-route-7, kalos-route-8, glittering-cave, kalos-route-10 through kalos-route-12,
  kalos-route-14, kalos-route-15, frost-cavern, kalos-route-18 through kalos-route-20,
  and kalos-victory-road. Covers Gen 6 features: Fairy type, fossil pokemon,
  version exclusives, trade evolutions, and Kalos regional dex progress.
needs_seed: true
mutates_collection: true

steps:
  # ============================================================
  # LOCATION 1: kalos-route-2
  # ============================================================
  - name: "Route 2 -- discover encounters"
    command: "pokedex location encounters kalos-route-2 --game=x"
    assert:
      exit_code: 0
      has_fields: ["data", "actions", "meta"]
      equals: { "meta.total": 12 }
      array_len: { "data": { "min": 6 } }

  - name: "Route 2 -- wrong slug returns error"
    command: "pokedex location encounters route-2 --game=x"
    assert:
      exit_code: 1
      has_fields: ["error.code", "error.message", "actions"]
      equals: { "error.code": "NOT_FOUND" }

  - name: "Route 2 -- inspect Bunnelby"
    command: "pokedex pokemon show bunnelby"
    assert:
      exit_code: 0
      equals: { "data.name": "bunnelby", "data.generation": 6 }
      has_fields: ["data.types", "data.stats", "data.abilities"]

  - name: "Route 2 -- catch Bunnelby"
    command: "pokedex collection add --pokemon=bunnelby --game=x --method=catch"
    capture: { "bunnelby_id": "data.id" }
    assert:
      exit_code: 0
      equals: { "data.species_name": "bunnelby", "data.status": "caught", "data.method": "catch" }
      has_fields: ["data.id", "data.created_at"]

  - name: "Route 2 -- catch Fletchling"
    command: "pokedex collection add --pokemon=fletchling --game=x --method=catch"
    capture: { "fletchling_id": "data.id" }
