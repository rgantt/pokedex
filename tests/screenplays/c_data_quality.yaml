# Screenplays are CHEAP regression tests produced by exploratory test agents.
# If a step fails, investigate: is it a real bug (fix the code) or a stale
# assertion (update or delete this file)? The INTENT matters, not the exact
# implementation. Don't contort the CLI to make a stale screenplay pass.
name: "Data Quality Auditor"
persona: "C"
description: "Verify region/generation per game, BST accuracy, type matchup immunities, abilities, evolution overrides, and pokedex counts"
needs_seed: true
mutates_collection: false

steps:
  # ══════════════════════════════════════════════════════════════════════
  # 1. REGION CORRECTNESS — original games
  # ══════════════════════════════════════════════════════════════════════

  - name: "Red is Gen 1 Kanto"
    command: "pokedex game show red"
    assert:
      exit_code: 0
      equals: {"data.generation": 1, "data.region": "Kanto"}
      contains: {"data.display_name": "Red"}

  - name: "Gold is Gen 2 Johto"
    command: "pokedex game show gold"
    assert:
      exit_code: 0
      equals: {"data.generation": 2, "data.region": "Johto"}
      contains: {"data.display_name": "Gold"}

  - name: "Ruby is Gen 3 Hoenn"
    command: "pokedex game show ruby"
    assert:
      exit_code: 0
      equals: {"data.generation": 3, "data.region": "Hoenn"}
      contains: {"data.display_name": "Ruby"}

  - name: "Diamond is Gen 4 Sinnoh"
    command: "pokedex game show diamond"
    assert:
      exit_code: 0
      equals: {"data.generation": 4, "data.region": "Sinnoh"}
      contains: {"data.display_name": "Diamond"}

  - name: "Black is Gen 5 Unova"
    command: "pokedex game show black"
    assert:
      exit_code: 0
      equals: {"data.generation": 5, "data.region": "Unova"}
      contains: {"data.display_name": "Black"}

  - name: "X is Gen 6 Kalos"
    command: "pokedex game show x"
    assert:
      exit_code: 0
      equals: {"data.generation": 6, "data.region": "Kalos"}
      contains: {"data.display_name": "X"}

  - name: "Sun is Gen 7 Alola"
    command: "pokedex game show sun"
    assert:
      exit_code: 0
      equals: {"data.generation": 7, "data.region": "Alola"}
      contains: {"data.display_name": "Sun"}

  - name: "Sword is Gen 8 Galar"
    command: "pokedex game show sword"
    assert:
      exit_code: 0
      equals: {"data.generation": 8, "data.region": "Galar"}
      contains: {"data.display_name": "Sword"}

  - name: "Scarlet is Gen 9 Paldea"
    command: "pokedex game show scarlet"
    assert:
      exit_code: 0
      equals: {"data.generation": 9, "data.region": "Paldea"}
      contains: {"data.display_name": "Scarlet"}

  # ══════════════════════════════════════════════════════════════════════
  # 2. REGION CORRECTNESS — remakes
  #    Region is inherited from generation, not the game's actual setting.
  #    These assert on generation (reliable) and display_name.
  # ══════════════════════════════════════════════════════════════════════

  - name: "FireRed is Gen 3 remake of Kanto"
    command: "pokedex game show firered"
    assert:
      exit_code: 0
      equals: {"data.generation": 3}
      contains: {"data.display_name": "FireRed"}

  - name: "HeartGold is Gen 4 remake of Johto"
    command: "pokedex game show heartgold"
    assert:
      exit_code: 0
      equals: {"data.generation": 4}
      contains: {"data.display_name": "HeartGold"}

  - name: "Omega Ruby is Gen 6 remake of Hoenn"
    command: "pokedex game show omega-ruby"
    assert:
      exit_code: 0
      equals: {"data.generation": 6}
      contains: {"data.display_name": "Omega Ruby"}

  - name: "Lets Go Pikachu is Gen 7 Kanto remake"
    command: "pokedex game show lets-go-pikachu"
    assert:
      exit_code: 0
      equals: {"data.generation": 7}
      contains: {"data.display_name": "Let's Go"}

  - name: "Brilliant Diamond is Gen 8 Sinnoh remake"
    command: "pokedex game show brilliant-diamond"
    assert:
      exit_code: 0
      equals: {"data.generation": 8}
      contains: {"data.display_name": "Brilliant Diamond"}

  - name: "Legends Arceus is Gen 8 set in Hisui"
    command: "pokedex game show legends-arceus"
    assert:
      exit_code: 0
      equals: {"data.generation": 8}
      contains: {"data.display_name": "Legends: Arceus"}

  - name: "Legends Z-A is Gen 9 set in Kalos"
    command: "pokedex game show legends-za"
    assert:
      exit_code: 0
      equals: {"data.generation": 9}
      contains: {"data.display_name": "Legends: Z-A"}

  # ══════════════════════════════════════════════════════════════════════
  # 3. DISPLAY NAMES — service games
  # ══════════════════════════════════════════════════════════════════════

  - name: "Pokemon GO has proper display name"
    command: "pokedex game show pokemon-go"
    assert:
      exit_code: 0
      equals: {"data.display_name": "Pokémon GO"}
      has_fields: ["data.name"]

  - name: "Pokemon HOME has proper display name"
    command: "pokedex game show home"
    assert:
      exit_code: 0
      equals: {"data.display_name": "Pokémon HOME"}
      has_fields: ["data.name"]

  - name: "Pokemon Bank has proper display name"
    command: "pokedex game show pokemon-bank"
    assert:
      exit_code: 0
      equals: {"data.display_name": "Pokémon Bank"}
      has_fields: ["data.name"]

  # ══════════════════════════════════════════════════════════════════════
  # 4. BST SPOT CHECKS — extreme/notable stat Pokemon
  # ══════════════════════════════════════════════════════════════════════

  - name: "Shedinja BST 236 with 1 HP"
    command: "pokedex pokemon stats shedinja"
    assert:
      exit_code: 0
      equals: {"data.total": 236, "data.hp": 1}
      has_fields: ["data.attack", "data.defense"]

  - name: "Shuckle BST is 505"
    command: "pokedex pokemon stats shuckle"
    assert:
      exit_code: 0
      equals: {"data.total": 505, "data.defense": 230}
      has_fields: ["data.speed"]

  - name: "Chansey BST 450 with 250 HP"
    command: "pokedex pokemon stats chansey"
    assert:
      exit_code: 0
      equals: {"data.total": 450, "data.hp": 250}
      has_fields: ["data.special_defense"]

  - name: "Blissey BST 540 with 255 HP"
    command: "pokedex pokemon stats blissey"
    assert:
      exit_code: 0
      equals: {"data.total": 540, "data.hp": 255}
      has_fields: ["data.attack"]

  # ══════════════════════════════════════════════════════════════════════
  # 5. EVOLUTION OVERRIDES — Gen 9 DLC (V001 fixed)
  # ══════════════════════════════════════════════════════════════════════

  - name: "Dipplin evolves via Syrupy Apple"
    command: "pokedex pokemon evolutions applin"
    assert:
      exit_code: 0
      contains: {"data.children.2.methods.0.trigger_detail": "Syrupy Apple"}
      equals: {"data.children.2.species_name": "dipplin"}

  - name: "Hydrapple evolves by leveling with Dragon Cheer"
    command: "pokedex pokemon evolutions applin"
    assert:
      exit_code: 0
      contains: {"data.children.2.children.0.methods.0.trigger_detail": "Dragon Cheer"}
      equals: {"data.children.2.children.0.species_name": "hydrapple"}

  # ══════════════════════════════════════════════════════════════════════
  # 6. TYPE MATCHUP IMMUNITIES
  # ══════════════════════════════════════════════════════════════════════

  - name: "Ghost immune to Normal attacks (defending)"
    command: "pokedex type matchups ghost"
    assert:
      exit_code: 0
      contains: {"data.defending.no_effect": "Normal"}
      has_fields: ["data.defending.super_effective"]

  - name: "Normal immune to Ghost attacks (defending)"
    command: "pokedex type matchups normal"
    assert:
      exit_code: 0
      contains: {"data.defending.no_effect": "Ghost"}
      has_fields: ["data.attacking.no_effect"]

  - name: "Ghost attacks have no effect on Normal"
    command: "pokedex type matchups ghost"
    assert:
      exit_code: 0
      contains: {"data.attacking.no_effect": "Normal"}
      has_fields: ["data.attacking.super_effective"]

  - name: "Electric attacks have no effect on Ground"
    command: "pokedex type matchups electric"
    assert:
      exit_code: 0
      contains: {"data.attacking.no_effect": "Ground"}
      has_fields: ["data.defending.super_effective"]

  # ══════════════════════════════════════════════════════════════════════
  # 7. ABILITY DATA — signature abilities
  # ══════════════════════════════════════════════════════════════════════

  - name: "Shedinja has Wonder Guard"
    command: "pokedex pokemon show shedinja"
    assert:
      exit_code: 0
      contains: {"data.abilities": "Wonder Guard"}
      has_fields: ["data.types"]

  - name: "Slaking has Truant"
    command: "pokedex pokemon show slaking"
    assert:
      exit_code: 0
      contains: {"data.abilities": "Truant"}
      has_fields: ["data.types"]

  # ══════════════════════════════════════════════════════════════════════
  # 8. POKEDEX COUNTS
  # ══════════════════════════════════════════════════════════════════════

  - name: "National dex has 1025 entries"
    command: "pokedex dex show national --limit=1"
    assert:
      exit_code: 0
      equals: {"meta.total": 1025}
      has_fields: ["data"]

  - name: "Kanto dex has 151 entries"
    command: "pokedex dex show kanto --limit=1"
    assert:
      exit_code: 0
      equals: {"meta.total": 151}
      has_fields: ["data"]

  - name: "Original Johto dex has 251 entries"
    command: "pokedex dex show original-johto --limit=1"
    assert:
      exit_code: 0
      equals: {"meta.total": 251}
      has_fields: ["data"]

  - name: "Hoenn dex has 202 entries"
    command: "pokedex dex show hoenn --limit=1"
    assert:
      exit_code: 0
      equals: {"meta.total": 202}
      has_fields: ["data"]

  - name: "Original Sinnoh dex has 151 entries"
    command: "pokedex dex show original-sinnoh --limit=1"
    assert:
      exit_code: 0
      equals: {"meta.total": 151}
      has_fields: ["data"]
