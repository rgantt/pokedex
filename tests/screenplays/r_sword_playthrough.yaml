# Screenplays are CHEAP regression tests produced by exploratory test agents.
# If a step fails, investigate: is it a real bug (fix the code) or a stale
# assertion (update or delete this file)? The INTENT matters, not the exact
# implementation. Don't contort the CLI to make a stale screenplay pass.
name: "Sword Playthrough - Galar Completionist"
persona: r_sword_playthrough
description: >
  End-to-end Sword playthrough covering Route 1-7, Galar Mine, and Wild Area
  zones (Rolling Fields, Dappled Grove, Giant's Seat, Lake of Outrage, Dusty
  Bowl). Verifies Galar region/gen 8 metadata, Galarian form annotations,
  weather-based encounter rates, HATEOAS navigation, and 40+ species collection.
needs_seed: true
mutates_collection: true

steps:
  # ============================================================
  # VERIFY GAME METADATA
  # ============================================================
  - name: "Sword game -- verify region and generation"
    command: "pokedex game show sword"
    assert:
      exit_code: 0
      equals: { "data.region": "Galar", "data.generation": 8 }
      has_fields: ["data.name", "data.display_name"]

  # ============================================================
  # ROUTE 1: galar-route-01
  # ============================================================
  - name: "Route 1 -- discover encounters"
    command: "pokedex location encounters galar-route-01 --game=sword"
    assert:
      exit_code: 0
      has_fields: ["data", "actions", "meta"]
      equals: { "meta.total": 14 }
      array_len: { "data": { "min": 10 } }

  - name: "Route 1 -- inspect Blipbug gen 8"
    command: "pokedex pokemon show blipbug"
    assert:
      exit_code: 0
      equals: { "data.name": "blipbug", "data.generation": 8 }
      has_fields: ["data.types", "data.stats"]

  - name: "Route 1 -- catch Blipbug"
    command: "pokedex collection add --pokemon=blipbug --game=sword --method=catch"
    capture: { "blipbug_id": "data.id" }
    assert:
      exit_code: 0
      equals: { "data.species_name": "blipbug", "data.status": "caught" }
      has_fields: ["data.id", "data.created_at"]

  - name: "Route 1 -- catch Rookidee"
    command: "pokedex collection add --pokemon=rookidee --game=sword --method=catch"
    capture: { "rookidee_id": "data.id" }
    assert:
      exit_code: 0
      equals: { "data.species_name": "rookidee", "data.status": "caught" }

  - name: "Route 1 -- catch Wooloo"
    command: "pokedex collection add --pokemon=wooloo --game=sword --method=catch"
    assert:
      exit_code: 0
      equals: { "data.species_name": "wooloo", "data.status": "caught" }

  - name: "Route 1 -- catch Skwovet"
    command: "pokedex collection add --pokemon=skwovet --game=sword --method=catch"
    assert:
      exit_code: 0
      equals: { "data.species_name": "skwovet", "data.status": "caught" }

  - name: "Route 1 -- catch Nickit"
    command: "pokedex collection add --pokemon=nickit --game=sword --method=catch"
