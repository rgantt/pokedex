# Screenplays are CHEAP regression tests produced by exploratory test agents.
# If a step fails, investigate: is it a real bug (fix the code) or a stale
# assertion (update or delete this file)? The INTENT matters, not the exact
# implementation. Don't contort the CLI to make a stale screenplay pass.
name: "Edge Cases & Validation"
persona: edge-tester
description: "Validate error handling for invalid flags, boundary values, empty inputs, form resolution, encounter warnings, HOME compatibility, double-add, update cycling, remove-then-show, all-flags-at-once, unusual names, non-standard types, dex progress, and huge offsets"
needs_seed: true
mutates_collection: true

steps:
  # ── Invalid --type-filter ──────────────────────────────────────────
  - name: "invalid type-filter returns JSON error"
    command: "pokedex pokemon list --type-filter=bogus"
    assert:
      exit_code: 1
      equals: { "error.code": "INVALID_PARAMETER" }
      contains: { "error.message": "No type named 'bogus'" }
      has_fields: ["actions"]

  # ── Invalid --generation ───────────────────────────────────────────
  - name: "generation 0 rejected"
    command: "pokedex pokemon list --generation=0"
    assert:
      exit_code: 1
      equals: { "error.code": "INVALID_PARAMETER" }
      contains: { "error.message": "Invalid generation '0'" }
  - name: "generation 99 rejected"
    command: "pokedex pokemon list --generation=99"
    assert:
      exit_code: 1
      equals: { "error.code": "INVALID_PARAMETER" }
      contains: { "error.message": "Invalid generation '99'" }
  - name: "generation 10 rejected"
    command: "pokedex pokemon list --generation=10"
    assert:
      exit_code: 1
      equals: { "error.code": "INVALID_PARAMETER" }
      contains: { "error.message": "Invalid generation '10'" }
  - name: "negative generation rejected"
    command: "pokedex pokemon list --generation=-1"
    assert:
      exit_code: 1
      equals: { "error.code": "INVALID_PARAMETER" }
      contains: { "error.message": "-1" }

  # ── Invalid --category ─────────────────────────────────────────────
  - name: "invalid category rejected"
    command: "pokedex pokemon list --category=fakecategory"
    assert:
      exit_code: 1
      equals: { "error.code": "INVALID_PARAMETER" }
      contains: { "error.message": "Invalid category 'fakecategory'" }

  # ── Limit boundary values ──────────────────────────────────────────
  - name: "limit 0 returns JSON error"
    command: "pokedex pokemon list --limit=0"
    assert:
      exit_code: 1
      equals: { "error.code": "INVALID_PARAMETER" }
      contains: { "error.message": "limit" }
  - name: "limit -1 returns JSON error"
    command: "pokedex pokemon list --limit=-1"
    assert:
      exit_code: 1
      equals: { "error.code": "INVALID_PARAMETER" }
      contains: { "error.message": "-1" }
  - name: "limit 1 works and returns exactly 1 result"
    command: "pokedex pokemon list --limit=1"
    assert:
      exit_code: 0
      array_len: { "data": { "min": 1, "max": 1 } }
      has_fields: ["meta.total", "meta.limit"]
      equals: { "meta.limit": 1 }
  - name: "collection list limit 0 rejected"
    command: "pokedex collection list --limit=0"
    assert:
      exit_code: 1
      equals: { "error.code": "INVALID_PARAMETER" }
  - name: "huge offset returns empty data array"
    command: "pokedex pokemon list --offset=99999"
    assert:
      exit_code: 0
      array_len: { "data": { "min": 0, "max": 0 } }
      has_fields: ["meta.total"]

  # ── Invalid --status ───────────────────────────────────────────────
  - name: "invalid status on collection list"
    command: "pokedex collection list --status=bogus"
    assert:
      exit_code: 1
      equals: { "error.code": "INVALID_PARAMETER" }
      contains: { "error.message": "Invalid status 'bogus'" }
      array_len: { "actions": { "min": 5 } }
  - name: "invalid status on collection add"
    command: "pokedex collection add --pokemon=pikachu --game=red --status=bogus --dry-run"
    assert:
      exit_code: 1
      equals: { "error.code": "INVALID_PARAMETER" }
      contains: { "error.message": "Invalid status 'bogus'" }
      array_len: { "actions": { "min": 5 } }
  - name: "invalid status on dex progress"
    command: "pokedex dex progress national --status=bogus"
    assert:
      exit_code: 1
      equals: { "error.code": "INVALID_PARAMETER" }
      contains: { "error.message": "Invalid status 'bogus'" }

  # ── Invalid --method ───────────────────────────────────────────────
  - name: "invalid method on pokemon moves"
    command: "pokedex pokemon moves pikachu --method=bogus"
    assert:
      exit_code: 1
      equals: { "error.code": "INVALID_PARAMETER" }
      contains: { "error.message": "Invalid method 'bogus'" }
      array_len: { "actions": { "min": 4 } }
  - name: "invalid method on collection add"
    command: "pokedex collection add --pokemon=pikachu --game=red --method=bogus --dry-run"
    assert:
      exit_code: 1
      equals: { "error.code": "INVALID_PARAMETER" }
      contains: { "error.message": "Invalid method 'bogus'" }

  # ── Invalid --sort ─────────────────────────────────────────────────
  - name: "invalid sort on collection list"
    command: "pokedex collection list --sort=bogus"
    assert:
      exit_code: 1
      equals: { "error.code": "INVALID_PARAMETER" }
      contains: { "error.message": "Invalid sort 'bogus'" }

  # ── Invalid --form ─────────────────────────────────────────────────
  - name: "invalid form on collection add"
    command: "pokedex collection add --pokemon=pikachu --game=red --form=megaevolution --dry-run"
    assert:
      exit_code: 1
      equals: { "error.code": "NOT_FOUND" }
      contains: { "error.message": "No form 'megaevolution' for pikachu" }

  # ── Empty / missing inputs ─────────────────────────────────────────
  - name: "collection add missing --pokemon flag"
    command: "pokedex collection add --game=red"
    assert:
      exit_code: 1
      equals: { "error.code": "INVALID_PARAMETER" }
      contains: { "error.message": "required arguments" }
  - name: "collection add missing --game flag"
    command: "pokedex collection add --pokemon=pikachu"
    assert:
      exit_code: 1
      equals: { "error.code": "INVALID_PARAMETER" }
      contains: { "error.message": "required arguments" }

  # ── NOT_FOUND errors ──────────────────────────────────────────────
  - name: "pokemon show nonexistent returns NOT_FOUND with suggestions"
    command: "pokedex pokemon show nonexistent123"
    assert:
      exit_code: 1
      equals: { "error.code": "NOT_FOUND" }
      contains: { "error.message": "nonexistent123" }
      array_len: { "actions": { "min": 1 } }
  - name: "pokemon show id 0 returns NOT_FOUND"
    command: "pokedex pokemon show 0"
    assert:
      exit_code: 1
      equals: { "error.code": "NOT_FOUND" }
  - name: "pokemon show very large id returns NOT_FOUND"
    command: "pokedex pokemon show 999999"
    assert:
      exit_code: 1
      equals: { "error.code": "NOT_FOUND" }
  - name: "pokemon forms nonexistent returns NOT_FOUND with suggestions"
    command: "pokedex pokemon forms fakemon"
    assert:
      exit_code: 1
      equals: { "error.code": "NOT_FOUND" }
      array_len: { "actions": { "min": 1 } }
  - name: "pokemon evolutions nonexistent returns NOT_FOUND"
    command: "pokedex pokemon evolutions fakemon"
    assert:
      exit_code: 1
      equals: { "error.code": "NOT_FOUND" }
  - name: "pokemon stats nonexistent returns NOT_FOUND"
    command: "pokedex pokemon stats fakemon"
    assert:
      exit_code: 1
      equals: { "error.code": "NOT_FOUND" }
  - name: "pokemon encounters with invalid game"
    command: "pokedex pokemon encounters pikachu --game=fakegame"
    assert:
      exit_code: 1
      equals: { "error.code": "NOT_FOUND" }
      contains: { "error.message": "No game named 'fakegame'" }
  - name: "pokemon moves with invalid game"
    command: "pokedex pokemon moves pikachu --game=fakegame"
    assert:
      exit_code: 1
      equals: { "error.code": "NOT_FOUND" }
      contains: { "error.message": "No game named 'fakegame'" }
  - name: "collection add invalid game"
    command: "pokedex collection add --pokemon=pikachu --game=fakegame --dry-run"
    assert:
      exit_code: 1
      equals: { "error.code": "NOT_FOUND" }
      contains: { "error.message": "No game named 'fakegame'" }
  - name: "collection list invalid game"
    command: "pokedex collection list --game=fakegame"
    assert:
      exit_code: 1
      equals: { "error.code": "NOT_FOUND" }
  - name: "game show invalid"
    command: "pokedex game show fakegame"
    assert:
      exit_code: 1
      equals: { "error.code": "NOT_FOUND" }
      contains: { "error.message": "No game named 'fakegame'" }
  - name: "home missing --dex=fakemon returns NOT_FOUND"
    command: "pokedex home missing --dex=fakemon"
    assert:
      exit_code: 1
      equals: { "error.code": "NOT_FOUND" }
      contains: { "error.message": "No pokédex named 'fakemon'" }
  - name: "dex show invalid dex"
    command: "pokedex dex show fakemon"
    assert:
      exit_code: 1
      equals: { "error.code": "NOT_FOUND" }
  - name: "dex progress invalid dex"
    command: "pokedex dex progress fakemon"
    assert:
      exit_code: 1
      equals: { "error.code": "NOT_FOUND" }
  - name: "type matchups invalid type"
    command: "pokedex type matchups bogustype"
    assert:
      exit_code: 1
      equals: { "error.code": "NOT_FOUND" }
      array_len: { "actions": { "min": 1 } }
  - name: "type pokemon invalid type"
    command: "pokedex type pokemon bogustype"
    assert:
      exit_code: 1
      equals: { "error.code": "NOT_FOUND" }
  - name: "collection show nonexistent id"
    command: "pokedex collection show 99999"
    assert:
      exit_code: 1
      equals: { "error.code": "NOT_FOUND" }
      contains: { "error.message": "No collection entry with id 99999" }
  - name: "collection remove nonexistent id"
    command: "pokedex collection remove 99999 --dry-run"
    assert:
      exit_code: 1
      equals: { "error.code": "NOT_FOUND" }
  - name: "collection update nonexistent id"
    command: "pokedex collection update 99999 --status=caught"
    assert:
      exit_code: 1
      equals: { "error.code": "NOT_FOUND" }
  - name: "collection show id 0"
    command: "pokedex collection show 0"
    assert:
      exit_code: 1
      equals: { "error.code": "NOT_FOUND" }
  - name: "collection add nonexistent pokemon"
    command: "pokedex collection add --pokemon=fakemon --game=red --dry-run"
    assert:
      exit_code: 1
      equals: { "error.code": "NOT_FOUND" }
      array_len: { "actions": { "min": 1 } }
  - name: "location encounters nonexistent location"
    command: "pokedex location encounters planet-mars"
    assert:
      exit_code: 1
      equals: { "error.code": "NOT_FOUND" }
      contains: { "error.message": "planet-mars" }
  - name: "home transferable nonexistent pokemon"
    command: "pokedex home transferable fakemon"
    assert:
      exit_code: 1
      equals: { "error.code": "NOT_FOUND" }

  # ── Valid game slugs (--game=red, --game=gold) ─────────────────────
  - name: "pokemon encounters --game=red works"
    command: "pokedex pokemon encounters pikachu --game=red"
    assert:
      exit_code: 0
      array_len: { "data": { "min": 1 } }
      equals: { "data.0.game_slug": "red" }
  - name: "location encounters --game=red works"
    command: "pokedex location encounters viridian-forest --game=red"
    assert:
      exit_code: 0
      array_len: { "data": { "min": 1 } }
  - name: "collection add --game=gold works"
    command: "pokedex collection add --pokemon=cyndaquil --game=gold --dry-run"
    assert:
      exit_code: 0
      equals: { "data.game": "gold", "data.pokemon": "cyndaquil", "data.dry_run": true }

  # ── Form resolution: vivillon-polar ────────────────────────────────
  - name: "vivillon-polar resolves to Polar Vivillon"
    command: "pokedex pokemon show vivillon-polar"
    assert:
      exit_code: 0
      equals: { "data.id": 666, "data.name": "vivillon" }
      contains: { "data.display_name": "Polar" }
      has_fields: ["data.types", "data.stats"]

  # ── Form auto-detection: growlithe-hisui ───────────────────────────
  - name: "growlithe-hisui auto-detects form in legends-arceus"
    command: "pokedex collection add --pokemon=growlithe-hisui --game=legends-arceus --dry-run"
    assert:
      exit_code: 0
      equals: { "data.pokemon": "growlithe", "data.form": "hisui", "data.game": "legends-arceus" }
      has_fields: ["data.dry_run"]

  # ── --method=evolve suppresses encounter warning ───────────────────
  - name: "unobtainable pokemon warns about no encounters"
    command: "pokedex collection add --pokemon=mew --game=red --dry-run"
    assert:
      exit_code: 0
      has_fields: ["data.warning"]
      contains: { "data.warning": "No encounter data found" }
  - name: "--method=evolve suppresses encounter warning"
    command: "pokedex collection add --pokemon=mew --game=red --method=evolve --dry-run"
    assert:
      exit_code: 0
      equals: { "data.method": "evolve", "data.dry_run": true }
      type_of: { "data.pokemon": "string" }

  # ── --in-home on pre-HOME game warns ───────────────────────────────
  - name: "--in-home on pre-HOME game warns"
    command: "pokedex collection add --pokemon=pikachu --game=red --in-home --dry-run"
    assert:
      exit_code: 0
      equals: { "data.in_home": true }
      contains: { "data.warning": "does not connect to Pokémon HOME" }
      has_fields: ["actions"]

  # ── Unusual pokemon names ──────────────────────────────────────────
  - name: "mr-mime resolves correctly (hyphenated name)"
    command: "pokedex pokemon show mr-mime"
    assert:
      exit_code: 0
      equals: { "data.id": 122, "data.name": "mr-mime", "data.generation": 1 }
      contains: { "data.display_name": "Mr. Mime" }
      has_fields: ["data.types", "data.stats", "data.abilities"]
      array_len: { "data.types": { "min": 2, "max": 2 } }
      type_of: { "data.id": "number" }

  - name: "farfetchd resolves correctly (apostrophe dropped)"
    command: "pokedex pokemon show farfetchd"
    assert:
      exit_code: 0
      equals: { "data.id": 83, "data.name": "farfetchd", "data.generation": 1, "data.types": ["Normal", "Flying"] }
      contains: { "data.display_name": "Farfetch" }
      has_fields: ["data.stats", "data.abilities"]

  # ── Last pokemon in the dex ────────────────────────────────────────
  - name: "pokemon show 1025 returns pecharunt (last pokemon)"
    command: "pokedex pokemon show 1025"
    assert:
      exit_code: 0
      equals: { "data.id": 1025, "data.name": "pecharunt", "data.generation": 9, "data.is_mythical": true, "data.types": ["Poison", "Ghost"] }
      contains: { "data.display_name": "Pecharunt" }
      has_fields: ["data.types", "data.stats", "data.abilities", "actions"]

  # ── Non-standard types: stellar & shadow ───────────────────────────
  - name: "type matchups stellar succeeds with empty matchup lists"
    command: "pokedex type matchups stellar"
    assert:
      exit_code: 0
      equals: { "data.type_name": "stellar" }
      contains: { "data.display_name": "Stellar" }
      array_len: { "data.attacking.super_effective": { "min": 0, "max": 0 }, "data.defending.super_effective": { "min": 0, "max": 0 } }
      has_fields: ["actions"]

  - name: "type matchups shadow succeeds with empty matchup lists"
    command: "pokedex type matchups shadow"
    assert:
      exit_code: 0
      equals: { "data.type_name": "shadow" }
      contains: { "data.display_name": "Shadow" }
      array_len: { "data.attacking.no_effect": { "min": 0, "max": 0 }, "data.defending.no_effect": { "min": 0, "max": 0 } }
      has_fields: ["actions"]

  - name: "type pokemon stellar returns empty (no pokemon have stellar type)"
    command: "pokedex type pokemon stellar"
    assert:
      exit_code: 0
      array_len: { "data": { "min": 0, "max": 0 } }
      equals: { "meta.total": 0 }

  - name: "type pokemon shadow returns empty (no pokemon have shadow type)"
    command: "pokedex type pokemon shadow"
    assert:
      exit_code: 0
      array_len: { "data": { "min": 0, "max": 0 } }
      equals: { "meta.total": 0 }

  # ── Dex show + progress ────────────────────────────────────────────
  - name: "dex show kanto returns 151 pokemon"
    command: "pokedex dex show kanto"
    assert:
      exit_code: 0
      equals: { "meta.total": 151 }
      array_len: { "data": { "min": 1 } }
      has_fields: ["data.0.pokedex_number", "data.0.name", "data.0.display_name", "actions"]

  - name: "dex progress kanto --missing --limit=3 returns uncaught pokemon"
    command: "pokedex dex progress kanto --missing --limit=3"
    assert:
      exit_code: 0
      has_fields: ["data.total", "data.caught", "data.percentage"]
      array_len: { "data.entries": { "min": 1, "max": 3 } }
      equals: { "data.dex_name": "kanto", "data.entries.0.caught": false, "meta.limit": 3 }
      type_of: { "data.percentage": "number" }

  # ── Pokemon moves with huge offset ─────────────────────────────────
  - name: "pokemon moves pikachu --limit=1 --offset=9999 returns empty data"
    command: "pokedex pokemon moves pikachu --limit=1 --offset=9999"
    assert:
      exit_code: 0
      array_len: { "data": { "min": 0, "max": 0 } }
      equals: { "meta.limit": 1, "meta.offset": 9999 }
      has_fields: ["meta.total", "actions"]

  # ── Double-add same pokemon same game (allowed — multiple entries) ──
  - name: "add pikachu to sword (first entry)"
    command: "pokedex collection add --pokemon=pikachu --game=sword --method=catch"
    capture: { "first_id": "data.id" }
    assert:
      exit_code: 0
      equals: { "data.species_name": "pikachu", "data.game": "sword", "data.status": "caught" }
      has_fields: ["data.id"]

  - name: "add pikachu to sword again (second entry — allowed)"
    command: "pokedex collection add --pokemon=pikachu --game=sword --method=catch"
    capture: { "second_id": "data.id" }
    assert:
      exit_code: 0
      equals: { "data.species_name": "pikachu", "data.game": "sword", "data.status": "caught" }
      has_fields: ["data.id"]

  - name: "both entries exist and have different IDs"
    command: "pokedex collection show $first_id"
    assert:
      exit_code: 0
      equals: { "data.species_name": "pikachu", "data.game": "sword" }
      has_fields: ["data.id"]

  - name: "second entry also exists"
    command: "pokedex collection show $second_id"
    assert:
      exit_code: 0
      equals: { "data.species_name": "pikachu", "data.game": "sword" }
      has_fields: ["data.id"]

  # ── All flags at once on collection add ─────────────────────────────
  - name: "collection add with all flags at once"
    command: "pokedex collection add --pokemon=pikachu --game=sword --shiny --in-home --alpha --method=catch --status=living_dex --nickname=Sparky"
    capture: { "all_flags_id": "data.id" }
    assert:
      exit_code: 0
      equals: { "data.species_name": "pikachu", "data.game": "sword", "data.shiny": true, "data.in_home": true, "data.is_alpha": true, "data.status": "living_dex", "data.method": "catch", "data.nickname": "Sparky" }
      has_fields: ["data.id", "data.warning", "actions"]
      contains: { "data.warning": "Alpha" }

  # ── Update then re-update back ──────────────────────────────────────
  - name: "update all-flags entry to traded_away"
    command: "pokedex collection update $all_flags_id --status=traded_away"
    assert:
      exit_code: 0
      equals: { "data.status": "traded_away" }
      has_fields: ["data.id"]

  - name: "re-update back to living_dex"
    command: "pokedex collection update $all_flags_id --status=living_dex"
    assert:
      exit_code: 0
      equals: { "data.status": "living_dex" }
      has_fields: ["data.id"]

  # ── Remove then try to show ─────────────────────────────────────────
  - name: "add charmander for remove test"
    command: "pokedex collection add --pokemon=charmander --game=red"
    capture: { "remove_id": "data.id" }
    assert:
      exit_code: 0
      equals: { "data.species_name": "charmander", "data.game": "red" }

  - name: "remove charmander entry"
    command: "pokedex collection remove $remove_id"
    assert:
      exit_code: 0
      equals: { "data.removed": true }
      has_fields: ["data.id", "actions"]

  - name: "show removed entry returns NOT_FOUND"
    command: "pokedex collection show $remove_id"
    assert:
      exit_code: 1
      equals: { "error.code": "NOT_FOUND" }
      contains: { "error.message": "No collection entry with id" }
      has_fields: ["actions"]

  # ── Mutation + cleanup for update validation ───────────────────────
  - name: "add entry for update validation tests"
    command: "pokedex collection add --pokemon=bulbasaur --game=red"
    capture: { "update_id": "data.id" }
    assert:
      exit_code: 0
      equals: { "data.species_name": "bulbasaur", "data.game": "red" }
  - name: "collection update invalid status on real entry"
    command: "pokedex collection update $update_id --status=bogus"
    assert:
      exit_code: 1
      equals: { "error.code": "INVALID_PARAMETER" }
      contains: { "error.message": "Invalid status 'bogus'" }
  - name: "collection update invalid method on real entry"
    command: "pokedex collection update $update_id --method=bogus"
    assert:
      exit_code: 1
      equals: { "error.code": "INVALID_PARAMETER" }
      contains: { "error.message": "Invalid method 'bogus'" }
  - name: "collection update invalid game on real entry"
    command: "pokedex collection update $update_id --game=fakegame"
    assert:
      exit_code: 1
      equals: { "error.code": "NOT_FOUND" }
      contains: { "error.message": "No game named 'fakegame'" }
  - name: "clean up update validation entry"
    command: "pokedex collection remove $update_id"
    assert:
      exit_code: 0
      has_fields: ["data", "meta"]

  # ── Clean up double-add entries ─────────────────────────────────────
  - name: "clean up first pikachu entry"
    command: "pokedex collection remove $first_id"
    assert:
      exit_code: 0
      equals: { "data.removed": true }
  - name: "clean up second pikachu entry"
    command: "pokedex collection remove $second_id"
    assert:
      exit_code: 0
      equals: { "data.removed": true }
  - name: "clean up all-flags entry"
    command: "pokedex collection remove $all_flags_id"
    assert:
      exit_code: 0
      equals: { "data.removed": true }

  # ── Valid sort values ──────────────────────────────────────────────
  - name: "collection list --sort=id works"
    command: "pokedex collection list --sort=id"
    assert:
      exit_code: 0
      has_fields: ["data", "meta"]
  - name: "collection list --sort=dex works"
    command: "pokedex collection list --sort=dex"
    assert:
      exit_code: 0
      has_fields: ["data", "meta"]

  # ── Collection list filter edge cases ──────────────────────────────
  - name: "collection list --pokemon=fakemon returns empty not error"
    command: "pokedex collection list --pokemon=fakemon"
    assert:
      exit_code: 0
      array_len: { "data": { "min": 0, "max": 0 } }
      equals: { "meta.total": 0 }
