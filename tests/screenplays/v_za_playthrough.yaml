# Screenplays are CHEAP regression tests produced by exploratory test agents.
# If a step fails, investigate: is it a real bug (fix the code) or a stale
# assertion (update or delete this file)? The INTENT matters, not the exact
# implementation. Don't contort the CLI to make a stale screenplay pass.
name: "Legends Z-A Playthrough - All 20 Wild Zones + Data Quality"
persona: za_playthrough
description: >
  Comprehensive Z-A playthrough verifying all 20 wild zones exist with correct
  encounter data, no zone bleed, alpha data present, correct location naming,
  catches from 5 different zones, evolution chains, and pokemon show for Z-A
  species. Targets 20+ species coverage.
needs_seed: true
mutates_collection: true

steps:
  # ============================================================
  # GAME SETUP: Verify Z-A game exists
  # ============================================================
  - name: "Game setup -- verify legends-za exists"
    command: "pokedex game show legends-za"
    assert:
      exit_code: 0
      has_fields: ["data", "actions", "meta"]
      equals: { "data.name": "legends-za", "data.generation": 9, "data.region": "Kalos" }
      contains: { "data.display_name": "Z-A" }

  # ============================================================
  # WILD ZONE 1: Discover + verify data quality
  # ============================================================
  - name: "Zone 1 -- discover encounters"
    command: "pokedex location encounters wild-zone-1 --game=legends-za"
    assert:
      exit_code: 0
      has_fields: ["data", "actions", "meta"]
      equals: { "meta.total": 8 }
      array_len: { "data": { "min": 7 } }
  - name: "Zone 1 -- location is Wild Zone 1 not Lumiose City"
    command: "pokedex location encounters wild-zone-1 --game=legends-za"
    assert:
      exit_code: 0
      equals: { "data.0.location": "Wild Zone 1", "data.0.area": "wild-zone-1" }
  - name: "Zone 1 -- alpha data present"
    command: "pokedex location encounters wild-zone-1 --game=legends-za"
    assert:
      exit_code: 0
      has_fields: ["data.0.details.alpha_levels"]
      contains: { "data.0.details.alpha_levels": "15" }
  - name: "Zone 1 -- no encounter bleed (game slug matches)"
    command: "pokedex location encounters wild-zone-1 --game=legends-za"
    assert:
      exit_code: 0
      equals: { "data.0.game_slug": "legends-za" }

  # ============================================================
  # WILD ZONE 2: Verify exists + data quality
  # ============================================================
  - name: "Zone 2 -- discover encounters"
    command: "pokedex location encounters wild-zone-2 --game=legends-za"
    assert:
      exit_code: 0
      equals: { "meta.total": 9, "data.0.location": "Wild Zone 2", "data.0.area": "wild-zone-2" }
      array_len: { "data": { "min": 6 } }

  # ============================================================
  # WILD ZONE 3: Discover + catch espurr
  # ============================================================
  - name: "Zone 3 -- discover encounters"
    command: "pokedex location encounters wild-zone-3 --game=legends-za"
    assert:
      exit_code: 0
      equals: { "meta.total": 8, "data.0.location": "Wild Zone 3", "data.0.area": "wild-zone-3" }
      array_len: { "data": { "min": 7 } }
  - name: "Zone 3 -- alpha data present"
    command: "pokedex location encounters wild-zone-3 --game=legends-za"
    assert:
      exit_code: 0
      has_fields: ["data.0.details"]
      contains: { "data.0.details.alpha_levels": "19" }
  - name: "Zone 3 -- inspect Espurr"
    command: "pokedex pokemon show espurr"
    assert:
      exit_code: 0
      equals: { "data.name": "espurr", "data.generation": 6, "data.types": ["Psychic"] }
      has_fields: ["data.stats", "data.abilities"]
  - name: "Zone 3 -- espurr evolution chain"
    command: "pokedex pokemon evolutions espurr"
    assert:
      exit_code: 0
      equals: { "data.species_name": "espurr" }
      has_fields: ["data.children"]
      contains: { "data.children": "meowstic" }
  - name: "Zone 3 -- catch Espurr"
    command: "pokedex collection add --pokemon=espurr --game=legends-za --method=catch"
    capture: { "espurr_id": "data.id" }
    assert:
      exit_code: 0
      equals: { "data.species_name": "espurr", "data.status": "caught", "data.method": "catch" }
      has_fields: ["data.id", "data.created_at"]
  - name: "Zone 3 -- catch Litleo"
