# Screenplays are CHEAP regression tests produced by exploratory test agents.
# If a step fails, investigate: is it a real bug (fix the code) or a stale
# assertion (update or delete this file)? The INTENT matters, not the exact
# implementation. Don't contort the CLI to make a stale screenplay pass.
name: "Red Playthrough - Water Routes, Fishing, Power Plant, Cerulean Cave"
persona: red_alternate
description: >
  Alternate Red playthrough focusing on water routes 19-21 (Seafoam to
  Cinnabar), fishing encounters in Cerulean City and Fuchsia City, Safari
  Zone fishing deep dive, Power Plant electric paradise, Cerulean Cave
  post-game, and Red version exclusives (Ekans, Growlithe, Scyther,
  Electabuzz). Targets 30+ species from areas NOT covered in previous
  Red playthroughs.
needs_seed: true
mutates_collection: true

steps:
  # ============================================================
  # AREA 1: Sea Route 19 — surfing & fishing south of Fuchsia
  # ============================================================
  - name: "Sea Route 19 -- discover encounters"
    command: "pokedex location encounters kanto-sea-route-19 --game=red"
    assert:
      exit_code: 0
      has_fields: ["data", "actions", "meta"]
      equals: { "meta.total": 14 }

  - name: "Sea Route 19 -- inspect Tentacool (surf encounter)"
    command: "pokedex pokemon show tentacool"
    assert:
      exit_code: 0
      equals: { "data.name": "tentacool", "data.generation": 1, "data.types": ["Water", "Poison"] }

  - name: "Sea Route 19 -- catch Tentacool"
    command: "pokedex collection add --pokemon=tentacool --game=red --method=catch"
    capture: { "tentacool_id": "data.id" }
    assert:
      exit_code: 0
      equals: { "data.species_name": "tentacool", "data.status": "caught" }
      has_fields: ["data.id", "data.created_at"]

  - name: "Sea Route 19 -- catch Staryu via Super Rod"
    command: "pokedex collection add --pokemon=staryu --game=red --method=catch"
    capture: { "staryu_id": "data.id" }
    assert:
      exit_code: 0
      equals: { "data.species_name": "staryu", "data.game": "red" }

  # ============================================================
  # AREA 2: Sea Route 20 — Seafoam to Cinnabar
  # ============================================================
