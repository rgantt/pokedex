      exit_code: 0
      equals: { "data.species_name": "scatterbug", "data.status": "caught" }

  - name: "Route 2 -- catch Pidgey"
    command: "pokedex collection add --pokemon=pidgey --game=x --method=catch"
    assert:
      exit_code: 0
      equals: { "data.species_name": "pidgey", "data.status": "caught" }

  - name: "Route 2 -- catch Weedle"
    command: "pokedex collection add --pokemon=weedle --game=x --method=catch"
