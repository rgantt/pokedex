      exit_code: 1
      equals: { "error.code": "NOT_FOUND" }
      has_fields: ["actions"]

  - name: "Error -- fuzzy match suggests pikachu for typo"
    command: "pokedex pokemon show pikchu"
    assert:
      exit_code: 1
      equals: { "error.code": "NOT_FOUND" }
      has_fields: ["actions"]
      array_len: { "actions": { "min": 1 } }

  # ============================================================
  # EDGE CASES
  # ============================================================
  - name: "Edge -- pokemon lookup by ID"
    command: "pokedex pokemon show 25"
    assert:
      exit_code: 0
      equals: { "data.name": "pikachu" }
      has_fields: ["data.types"]

  - name: "Edge -- case insensitive lookup"
    command: "pokedex pokemon show PIKACHU"
    assert:
      exit_code: 0
      equals: { "data.name": "pikachu" }

  - name: "Edge -- Fairy type matchups (introduced Gen 6)"
    command: "pokedex type matchups fairy"
    assert:
      exit_code: 0
      equals: { "data.type_name": "fairy" }
      has_fields: ["data.attacking.super_effective", "data.defending.no_effect"]

  - name: "Edge -- encounter pagination"
    command: "pokedex location encounters kalos-route-2 --game=x --limit=2 --offset=0"
    assert:
      exit_code: 0
      equals: { "meta.total": 12, "meta.limit": 2 }
      array_len: { "data": { "min": 2, "max": 2 } }

  - name: "Edge -- collection list pagination"
    command: "pokedex collection list --game=x --limit=5 --offset=0"
    assert:
      exit_code: 0
      has_fields: ["meta.total", "meta.limit", "meta.offset"]
      array_len: { "data": { "min": 5, "max": 5 } }

  - name: "Edge -- Flabebe forms list"
    command: "pokedex pokemon forms flabebe"
    assert:
      exit_code: 0
      has_fields: ["data"]
      array_len: { "data": { "min": 5 } }

  - name: "Edge -- HATEOAS actions on pokemon show"
    command: "pokedex pokemon show klefki"
    assert:
      exit_code: 0
      has_fields: ["data", "actions", "meta"]
      array_len: { "actions": { "min": 5 } }

  # ============================================================
  # FINAL VERIFY
  # ============================================================
  - name: "Final -- national dex progress"
    command: "pokedex dex progress national"
    assert:
      exit_code: 0
      equals: { "data.dex_name": "national", "data.total": 1025 }
      has_fields: ["data.caught", "data.percentage"]
      type_of: { "data.percentage": "number" }

  - name: "Final -- collection stats summary"
    command: "pokedex collection stats"
    assert:
      exit_code: 0
      has_fields: ["data.total_entries", "data.unique_species", "data.by_status", "data.by_game"]
      type_of: { "data.total_entries": "number" }
