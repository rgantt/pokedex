# Screenplays are CHEAP regression tests produced by exploratory test agents.
# If a step fails, investigate: is it a real bug (fix the code) or a stale
# assertion (update or delete this file)? The INTENT matters, not the exact
# implementation. Don't contort the CLI to make a stale screenplay pass.
name: "Data Quality Auditor"
persona: "C"
description: "Final audit: regions, BST edge cases, evolution overrides, type matchups, abilities, dex counts, HOME transfers, encounter spot checks"
needs_seed: true
mutates_collection: false

steps:
  # ══════════════════════════════════════════════════════════════════════
  # 1. REGION CORRECTNESS — all 9 original games
  # ══════════════════════════════════════════════════════════════════════

  - name: "Red is Gen 1 Kanto"
    command: "pokedex game show red"
    assert:
      exit_code: 0
      equals: {"data.generation": 1, "data.region": "Kanto"}
      contains: {"data.display_name": "Red"}

  - name: "Gold is Gen 2 Johto"
    command: "pokedex game show gold"
    assert:
      exit_code: 0
      equals: {"data.generation": 2, "data.region": "Johto"}
      contains: {"data.display_name": "Gold"}

  - name: "Ruby is Gen 3 Hoenn"
    command: "pokedex game show ruby"
    assert:
      exit_code: 0
      equals: {"data.generation": 3, "data.region": "Hoenn"}
      contains: {"data.display_name": "Ruby"}

  - name: "Diamond is Gen 4 Sinnoh"
    command: "pokedex game show diamond"
    assert:
      exit_code: 0
      equals: {"data.generation": 4, "data.region": "Sinnoh"}
      contains: {"data.display_name": "Diamond"}

  - name: "Black is Gen 5 Unova"
    command: "pokedex game show black"
    assert:
      exit_code: 0
      equals: {"data.generation": 5, "data.region": "Unova"}
      contains: {"data.display_name": "Black"}

  - name: "X is Gen 6 Kalos"
    command: "pokedex game show x"
    assert:
      exit_code: 0
      equals: {"data.generation": 6, "data.region": "Kalos"}
      contains: {"data.display_name": "X"}

  - name: "Sun is Gen 7 Alola"
    command: "pokedex game show sun"
    assert:
      exit_code: 0
      equals: {"data.generation": 7, "data.region": "Alola"}
      contains: {"data.display_name": "Sun"}

  - name: "Sword is Gen 8 Galar"
    command: "pokedex game show sword"
    assert:
      exit_code: 0
      equals: {"data.generation": 8, "data.region": "Galar"}
      contains: {"data.display_name": "Sword"}

  - name: "Scarlet is Gen 9 Paldea"
    command: "pokedex game show scarlet"
    assert:
      exit_code: 0
      equals: {"data.generation": 9, "data.region": "Paldea"}
      contains: {"data.display_name": "Scarlet"}

  # ══════════════════════════════════════════════════════════════════════
  # 2. REGION CORRECTNESS — all 7 remakes
  # ══════════════════════════════════════════════════════════════════════

  - name: "FireRed is Gen 3 remake of Kanto"
    command: "pokedex game show firered"
    assert:
      exit_code: 0
      equals: {"data.generation": 3}
      contains: {"data.display_name": "FireRed"}

  - name: "HeartGold is Gen 4 remake of Johto"
    command: "pokedex game show heartgold"
    assert:
      exit_code: 0
      equals: {"data.generation": 4}
      contains: {"data.display_name": "HeartGold"}

  - name: "Omega Ruby is Gen 6 remake of Hoenn"
    command: "pokedex game show omega-ruby"
    assert:
      exit_code: 0
      equals: {"data.generation": 6}
      contains: {"data.display_name": "Omega Ruby"}

  - name: "Lets Go Pikachu is Gen 7 Kanto remake"
    command: "pokedex game show lets-go-pikachu"
    assert:
      exit_code: 0
      equals: {"data.generation": 7}
      contains: {"data.display_name": "Pikachu"}

  - name: "Brilliant Diamond is Gen 8 Sinnoh remake"
    command: "pokedex game show brilliant-diamond"
    assert:
      exit_code: 0
      equals: {"data.generation": 8}
      contains: {"data.display_name": "Brilliant Diamond"}

  - name: "Legends Arceus is Gen 8 set in Hisui"
    command: "pokedex game show legends-arceus"
    assert:
      exit_code: 0
      equals: {"data.generation": 8}
      contains: {"data.display_name": "Legends: Arceus"}

  - name: "Legends Z-A is Gen 9 set in Kalos"
    command: "pokedex game show legends-za"
    assert:
      exit_code: 0
      equals: {"data.generation": 9}
      contains: {"data.display_name": "Legends: Z-A"}

  # ══════════════════════════════════════════════════════════════════════
  # 3. SERVICE GAMES — display names
  # ══════════════════════════════════════════════════════════════════════

  - name: "Pokemon GO display name"
    command: "pokedex game show pokemon-go"
    assert:
      exit_code: 0
      equals: {"data.display_name": "Pokémon GO"}
      has_fields: ["data.name"]

  - name: "Pokemon HOME display name"
    command: "pokedex game show home"
    assert:
      exit_code: 0
      equals: {"data.display_name": "Pokémon HOME"}
      has_fields: ["data.name"]

  - name: "Pokemon Bank display name"
    command: "pokedex game show pokemon-bank"
    assert:
      exit_code: 0
      equals: {"data.display_name": "Pokémon Bank"}
      has_fields: ["data.name"]

  # ══════════════════════════════════════════════════════════════════════
  # 4. BST EDGE CASES — extreme stat Pokemon
  # ══════════════════════════════════════════════════════════════════════

  - name: "Shedinja BST 236 with 1 HP"
    command: "pokedex pokemon stats shedinja"
    assert:
      exit_code: 0
      equals: {"data.total": 236, "data.hp": 1}
      has_fields: ["data.attack", "data.defense"]

  - name: "Wishiwashi-School BST 620"
    command: "pokedex pokemon stats wishiwashi-school"
    assert:
      exit_code: 0
      equals: {"data.total": 620, "data.hp": 45}
      contains: {"data.pokemon_name": "School"}

  - name: "Eternatus-Eternamax BST 1125"
    command: "pokedex pokemon stats eternatus-eternamax"
    assert:
      exit_code: 0
      equals: {"data.total": 1125, "data.hp": 255}
      contains: {"data.pokemon_name": "Eternamax"}

  - name: "Zygarde-Complete BST 708"
    command: "pokedex pokemon stats zygarde-complete"
    assert:
      exit_code: 0
      equals: {"data.total": 708, "data.hp": 216}
      contains: {"data.pokemon_name": "Complete"}

  # ══════════════════════════════════════════════════════════════════════
  # 5. EVOLUTION OVERRIDES — Dipplin, Hydrapple (V001 fixed)
  # ══════════════════════════════════════════════════════════════════════

  - name: "Dipplin evolves via Syrupy Apple"
    command: "pokedex pokemon evolutions applin"
    assert:
      exit_code: 0
      equals: {"data.children.2.species_name": "dipplin"}
      contains: {"data.children.2.methods.0.trigger_detail": "Syrupy Apple"}

  - name: "Hydrapple evolves by leveling with Dragon Cheer"
    command: "pokedex pokemon evolutions applin"
    assert:
      exit_code: 0
      equals: {"data.children.2.children.0.species_name": "hydrapple"}
      contains: {"data.children.2.children.0.methods.0.trigger_detail": "Dragon Cheer"}

  # ══════════════════════════════════════════════════════════════════════
  # 6. EVOLUTION OVERRIDES — Melmetal (V002 fixed)
  # ══════════════════════════════════════════════════════════════════════

  - name: "Melmetal evolution shows GO candy requirement"
    command: "pokedex pokemon evolutions meltan"
    assert:
      exit_code: 0
      equals: {"data.children.0.species_name": "melmetal"}
      contains: {"data.children.0.methods.0.trigger_detail": "400 Meltan Candy"}

  # ══════════════════════════════════════════════════════════════════════
  # 7. EVOLUTION — Leafeon and Glaceon dual methods
  # ══════════════════════════════════════════════════════════════════════

  - name: "Leafeon has both item and level-up methods"
    command: "pokedex pokemon evolutions eevee"
    assert:
      exit_code: 0
      equals: {"data.children.5.species_name": "leafeon"}
      array_len: {"data.children.5.methods": {"min": 2}}
      contains: {"data.children.5.methods.0.trigger_detail": "Leaf Stone"}

  - name: "Glaceon has both item and level-up methods"
    command: "pokedex pokemon evolutions eevee"
    assert:
      exit_code: 0
      equals: {"data.children.6.species_name": "glaceon"}
      array_len: {"data.children.6.methods": {"min": 2}}
      contains: {"data.children.6.methods.0.trigger_detail": "Ice Stone"}

  # ══════════════════════════════════════════════════════════════════════
  # 8. TYPE MATCHUP COMPLETENESS — all 18 standard types return data
  # ══════════════════════════════════════════════════════════════════════

  - name: "Type list returns at least 18 types"
    command: "pokedex type list"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 18}}
      type_of: {"data": "array"}

  - name: "Ghost immune to Normal and vice versa"
    command: "pokedex type matchups ghost"
    assert:
      exit_code: 0
      contains: {"data.defending.no_effect": "Normal"}
      has_fields: ["data.attacking.no_effect", "data.defending.super_effective"]

  - name: "Normal immune to Ghost attacks"
    command: "pokedex type matchups normal"
    assert:
      exit_code: 0
      contains: {"data.defending.no_effect": "Ghost"}
      has_fields: ["data.attacking"]

  - name: "Electric has no effect on Ground"
    command: "pokedex type matchups electric"
    assert:
      exit_code: 0
      contains: {"data.attacking.no_effect": "Ground"}
      has_fields: ["data.defending"]

  - name: "Fairy immune to Dragon attacks"
    command: "pokedex type matchups fairy"
    assert:
      exit_code: 0
      contains: {"data.defending.no_effect": "Dragon"}
      has_fields: ["data.attacking.super_effective"]

  - name: "Steel immune to Poison attacks"
    command: "pokedex type matchups steel"
    assert:
      exit_code: 0
      contains: {"data.defending.no_effect": "Poison"}
      has_fields: ["data.attacking"]

  - name: "Ground immune to Electric attacks"
    command: "pokedex type matchups ground"
    assert:
      exit_code: 0
      contains: {"data.defending.no_effect": "Electric"}
      has_fields: ["data.attacking.super_effective"]

  - name: "Dark immune to Psychic attacks"
    command: "pokedex type matchups dark"
    assert:
      exit_code: 0
      contains: {"data.defending.no_effect": "Psychic"}
      has_fields: ["data.attacking"]

  - name: "Flying type matchups exist"
    command: "pokedex type matchups flying"
    assert:
      exit_code: 0
      has_fields: ["data.attacking.super_effective", "data.defending.super_effective"]
      type_of: {"data.attacking.super_effective": "array"}

  - name: "Water type matchups exist"
    command: "pokedex type matchups water"
    assert:
      exit_code: 0
      has_fields: ["data.attacking.super_effective", "data.defending.not_very_effective"]
      type_of: {"data.attacking.super_effective": "array"}

  - name: "Fire type matchups exist"
    command: "pokedex type matchups fire"
    assert:
      exit_code: 0
      has_fields: ["data.attacking.super_effective", "data.defending.super_effective"]
      type_of: {"data.attacking.super_effective": "array"}

  - name: "Grass type matchups exist"
    command: "pokedex type matchups grass"
    assert:
      exit_code: 0
      has_fields: ["data.attacking.super_effective", "data.defending.super_effective"]
      type_of: {"data.attacking.super_effective": "array"}

  - name: "Ice type matchups exist"
    command: "pokedex type matchups ice"
    assert:
      exit_code: 0
      has_fields: ["data.attacking.super_effective", "data.defending.super_effective"]
      type_of: {"data.attacking.super_effective": "array"}

  - name: "Fighting type matchups exist"
    command: "pokedex type matchups fighting"
    assert:
      exit_code: 0
      has_fields: ["data.attacking.super_effective", "data.defending.super_effective"]
      type_of: {"data.attacking.super_effective": "array"}

  - name: "Poison type matchups exist"
    command: "pokedex type matchups poison"
    assert:
      exit_code: 0
      has_fields: ["data.attacking.super_effective", "data.defending.super_effective"]
      type_of: {"data.attacking.super_effective": "array"}

  - name: "Rock type matchups exist"
    command: "pokedex type matchups rock"
    assert:
      exit_code: 0
      has_fields: ["data.attacking.super_effective", "data.defending.super_effective"]
      type_of: {"data.attacking.super_effective": "array"}

  - name: "Bug type matchups exist"
    command: "pokedex type matchups bug"
    assert:
      exit_code: 0
      has_fields: ["data.attacking.super_effective", "data.defending.super_effective"]
      type_of: {"data.attacking.super_effective": "array"}

  - name: "Dragon type matchups exist"
    command: "pokedex type matchups dragon"
    assert:
      exit_code: 0
      has_fields: ["data.attacking.super_effective"]
      contains: {"data.attacking.no_effect": "Fairy"}

  - name: "Psychic type matchups exist"
    command: "pokedex type matchups psychic"
    assert:
      exit_code: 0
      has_fields: ["data.attacking.super_effective", "data.attacking.no_effect"]
      type_of: {"data.attacking.super_effective": "array"}

  # ══════════════════════════════════════════════════════════════════════
  # 9. ABILITY EDGE CASES
  # ══════════════════════════════════════════════════════════════════════

  - name: "Shedinja has Wonder Guard"
    command: "pokedex pokemon show shedinja"
    assert:
      exit_code: 0
      contains: {"data.abilities": "Wonder Guard"}
      has_fields: ["data.types"]

  - name: "Slaking has Truant"
    command: "pokedex pokemon show slaking"
    assert:
      exit_code: 0
      contains: {"data.abilities": "Truant"}
      has_fields: ["data.types"]

  - name: "Castform has Forecast"
    command: "pokedex pokemon show castform"
    assert:
      exit_code: 0
      contains: {"data.abilities": "Forecast"}
      has_fields: ["data.types"]

  # ══════════════════════════════════════════════════════════════════════
  # 10. DEX COUNTS — national and regional
  # ══════════════════════════════════════════════════════════════════════

  - name: "National dex has 1025 entries"
    command: "pokedex dex show national --limit=1"
    assert:
      exit_code: 0
      equals: {"meta.total": 1025}
      has_fields: ["data"]

  - name: "Kanto dex has 151 entries"
    command: "pokedex dex show kanto --limit=1"
    assert:
      exit_code: 0
      equals: {"meta.total": 151}
      has_fields: ["data"]

  - name: "Original Johto dex has 251 entries"
    command: "pokedex dex show original-johto --limit=1"
    assert:
      exit_code: 0
      equals: {"meta.total": 251}
      has_fields: ["data"]

  - name: "Hoenn dex has 202 entries"
    command: "pokedex dex show hoenn --limit=1"
    assert:
      exit_code: 0
      equals: {"meta.total": 202}
      has_fields: ["data"]

  - name: "Original Sinnoh dex has 151 entries"
    command: "pokedex dex show original-sinnoh --limit=1"
    assert:
      exit_code: 0
      equals: {"meta.total": 151}
      has_fields: ["data"]

  - name: "Dex list has all regional dexes"
    command: "pokedex dex list"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 30}}
      type_of: {"data": "array"}

  - name: "Galar dex has 400 entries"
    command: "pokedex dex show galar --limit=1"
    assert:
      exit_code: 0
      equals: {"meta.total": 400}
      has_fields: ["data"]

  - name: "Paldea dex has 400 entries"
    command: "pokedex dex show paldea --limit=1"
    assert:
      exit_code: 0
      equals: {"meta.total": 400}
      has_fields: ["data"]

  - name: "Hisui dex has 242 entries"
    command: "pokedex dex show hisui --limit=1"
    assert:
      exit_code: 0
      equals: {"meta.total": 242}
      has_fields: ["data"]

  # ══════════════════════════════════════════════════════════════════════
  # 11. HOME TRANSFERABLE ACCURACY
  # ══════════════════════════════════════════════════════════════════════

  - name: "Terapagos transferable to exactly 2 games (scarlet, violet)"
    command: "pokedex home transferable terapagos"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 2, "max": 2}}
      contains: {"data.0.name": "scarlet"}

  - name: "Terapagos second game is violet"
    command: "pokedex home transferable terapagos"
    assert:
      exit_code: 0
      contains: {"data.1.name": "violet"}
      type_of: {"data": "array"}

  - name: "Pikachu transferable to 10+ games"
    command: "pokedex home transferable pikachu"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 10}}
      type_of: {"data": "array"}

  # ══════════════════════════════════════════════════════════════════════
  # 12. ENCOUNTER DATA SPOT CHECKS
  # ══════════════════════════════════════════════════════════════════════

  - name: "Pikachu found in Viridian Forest in Red"
    command: "pokedex pokemon encounters pikachu --game=red"
    assert:
      exit_code: 0
      contains: {"data": "Viridian Forest"}
      array_len: {"data": {"min": 2}}

  - name: "Shinx found on Route 202 in Diamond"
    command: "pokedex pokemon encounters shinx --game=diamond"
    assert:
      exit_code: 0
      contains: {"data": "Route 202"}
      array_len: {"data": {"min": 2}}

  - name: "Pikachu also at Power Plant in Red"
    command: "pokedex pokemon encounters pikachu --game=red"
    assert:
      exit_code: 0
      contains: {"data": "Power Plant"}
      has_fields: ["meta.command"]

  # ══════════════════════════════════════════════════════════════════════
  # 13. ADDITIONAL BST CHECKS — Shuckle, Chansey, Blissey
  # ══════════════════════════════════════════════════════════════════════

  - name: "Shuckle BST 505 with 230 defense"
    command: "pokedex pokemon stats shuckle"
    assert:
      exit_code: 0
      equals: {"data.total": 505, "data.defense": 230}
      has_fields: ["data.speed"]

  - name: "Chansey BST 450 with 250 HP"
    command: "pokedex pokemon stats chansey"
    assert:
      exit_code: 0
      equals: {"data.total": 450, "data.hp": 250}
      has_fields: ["data.special_defense"]

  - name: "Blissey BST 540 with 255 HP"
    command: "pokedex pokemon stats blissey"
    assert:
      exit_code: 0
      equals: {"data.total": 540, "data.hp": 255}
      has_fields: ["data.attack"]
