# Screenplays are CHEAP regression tests produced by exploratory test agents.
# If a step fails, investigate: is it a real bug (fix the code) or a stale
# assertion (update or delete this file)? The INTENT matters, not the exact
# implementation. Don't contort the CLI to make a stale screenplay pass.
name: "Variant Collector: Forms, Regional Variants, and Multi-Outcome Evolutions"
persona: "I"
description: "Test form-specific types/stats/abilities for regional variants (Meowth, Vulpix), appliance forms (Rotom), stat-different forms (Deoxys), type-different forms (Wormadam, Oricorio), named forms (Lycanroc), cosmetic forms (Vivillon), multi-outcome evolutions (Eevee, Tyrogue, Wurmple), HATEOAS form context preservation, error handling for invalid forms, and collection operations with forms"
needs_seed: true
mutates_collection: true

steps:
  # ===== Meowth: 3 regional variants with different types =====

  - name: "Base Meowth is Normal type"
    command: "pokedex pokemon show meowth"
    assert:
      exit_code: 0
      equals: { "data.types": ["Normal"], "data.display_name": "Meowth" }
      has_fields: ["data.stats", "data.abilities"]

  - name: "Alolan Meowth is Dark type"
    command: "pokedex pokemon show meowth-alola"
    assert:
      exit_code: 0
      equals: { "data.types": ["Dark"], "data.display_name": "Alolan Meowth" }
      has_fields: ["data.stats"]

  - name: "Galarian Meowth is Steel type"
    command: "pokedex pokemon show meowth-galar"
    assert:
      exit_code: 0
      equals: { "data.types": ["Steel"], "data.display_name": "Galarian Meowth" }

  - name: "Alolan Meowth has different stats from base"
    command: "pokedex pokemon show meowth-alola"
    assert:
      exit_code: 0
      equals: { "data.stats.attack": 35, "data.stats.special_attack": 50 }

  - name: "Galarian Meowth has different stats from base and Alolan"
    command: "pokedex pokemon show meowth-galar"
    assert:
      exit_code: 0
      equals: { "data.stats.attack": 65, "data.stats.speed": 40 }

  - name: "All Meowth forms share species id 52"
    command: "pokedex pokemon show meowth-galar"
    assert:
      exit_code: 0
      equals: { "data.id": 52, "data.name": "meowth" }

  - name: "Galarian Meowth HATEOAS stats action preserves form"
    command: "pokedex pokemon show meowth-galar"
    assert:
      exit_code: 0
      contains: { "actions": "pokedex pokemon stats meowth-galar" }

  - name: "Galarian Meowth HATEOAS moves action preserves form"
    command: "pokedex pokemon show meowth-galar"
    assert:
      exit_code: 0
      contains: { "actions": "pokedex pokemon moves meowth-galar" }

  # ===== Meowth evolution chain: branches to Persian and Perrserker =====

  - name: "Meowth evolves into Persian and Perrserker"
    command: "pokedex pokemon evolutions meowth"
    assert:
      exit_code: 0
      array_len: { "data.children": { "min": 2, "max": 2 } }
      contains: { "data": "persian" }

  - name: "Perrserker is in the Meowth evolution chain"
    command: "pokedex pokemon evolutions meowth"
    assert:
      exit_code: 0
      contains: { "data": "perrserker" }

  # ===== Vulpix: Fire base vs Ice Alolan =====

  - name: "Base Vulpix is Fire type"
    command: "pokedex pokemon show vulpix"
    assert:
      exit_code: 0
      equals: { "data.types": ["Fire"] }
      has_fields: ["data.stats", "data.abilities"]

  - name: "Alolan Vulpix is Ice type"
    command: "pokedex pokemon show vulpix-alola"
    assert:
      exit_code: 0
      equals: { "data.types": ["Ice"], "data.display_name": "Alolan Vulpix" }

  - name: "Alolan Vulpix has Snow Cloak ability instead of Flash Fire"
    command: "pokedex pokemon show vulpix-alola"
    assert:
      exit_code: 0
      contains: { "data": "Snow Cloak" }

  # ===== Rotom: base + 5 appliance forms =====

  - name: "Rotom has 6 total forms"
    command: "pokedex pokemon forms rotom"
    assert:
      exit_code: 0
      type_of: { "data": "array" }
      array_len: { "data": { "min": 6, "max": 6 } }

  - name: "Base Rotom is default and Electric/Ghost"
    command: "pokedex pokemon forms rotom"
    assert:
      exit_code: 0
      equals: { "data.0.is_default": true, "data.0.types": ["Electric", "Ghost"] }

  - name: "All alternate Rotom forms have is_default false"
    command: "pokedex pokemon forms rotom"
    assert:
      exit_code: 0
      equals: { "data.1.is_default": false, "data.2.is_default": false, "data.3.is_default": false }

  - name: "Rotom Heat form is Electric/Fire"
    command: "pokedex pokemon show rotom-heat"
    assert:
      exit_code: 0
      equals: { "data.types": ["Electric", "Fire"], "data.display_name": "Heat Rotom" }
      has_fields: ["data.stats"]

  - name: "Rotom Wash form is Electric/Water"
    command: "pokedex pokemon show rotom-wash"
    assert:
      exit_code: 0
      equals: { "data.types": ["Electric", "Water"], "data.stats.total": 520 }

  - name: "Rotom Mow form is Electric/Grass"
    command: "pokedex pokemon show rotom-mow"
    assert:
      exit_code: 0
      equals: { "data.types": ["Electric", "Grass"], "data.display_name": "Mow Rotom" }

  - name: "Rotom forms have add_form_to_collection actions"
    command: "pokedex pokemon forms rotom"
    assert:
      exit_code: 0
      contains: { "actions": "pokedex collection add --pokemon=rotom --form=heat" }

  # ===== Deoxys: 4 forms with drastically different stats =====

  - name: "Deoxys has 4 forms"
    command: "pokedex pokemon forms deoxys"
    assert:
      exit_code: 0
      array_len: { "data": { "min": 4, "max": 4 } }
      equals: { "data.0.is_default": true }

  - name: "Base Deoxys Normal form has balanced 150 offenses"
    command: "pokedex pokemon show deoxys"
    assert:
      exit_code: 0
      equals: { "data.stats.attack": 150, "data.stats.defense": 50, "data.stats.speed": 150 }
      has_fields: ["data.stats.total"]

  - name: "Deoxys Attack form has extreme 180 offenses and 20 defenses"
    command: "pokedex pokemon show deoxys-attack"
    assert:
      exit_code: 0
      equals: { "data.stats.attack": 180, "data.stats.defense": 20, "data.stats.total": 600 }

  - name: "Deoxys Defense form has extreme 160 defenses"
    command: "pokedex pokemon show deoxys-defense"
    assert:
      exit_code: 0
      equals: { "data.stats.defense": 160, "data.stats.special_defense": 160, "data.stats.total": 600 }

  - name: "Deoxys Speed form has 180 Speed"
    command: "pokedex pokemon show deoxys-speed"
    assert:
      exit_code: 0
      equals: { "data.stats.speed": 180, "data.stats.attack": 95, "data.stats.total": 600 }

  - name: "All Deoxys forms share species id 386 and Psychic type"
    command: "pokedex pokemon show deoxys-attack"
    assert:
      exit_code: 0
      equals: { "data.id": 386, "data.types": ["Psychic"], "data.is_mythical": true }

  # ===== Wormadam: 3 cloaks with different secondary types =====

  - name: "Wormadam has 3 forms"
    command: "pokedex pokemon forms wormadam"
    assert:
      exit_code: 0
      array_len: { "data": { "min": 3, "max": 3 } }

  - name: "Plant Wormadam is Bug/Grass"
    command: "pokedex pokemon forms wormadam"
    assert:
      exit_code: 0
      equals: { "data.0.types": ["Bug", "Grass"], "data.0.is_default": true }

  - name: "Sandy Wormadam is Bug/Ground"
    command: "pokedex pokemon forms wormadam"
    assert:
      exit_code: 0
      equals: { "data.1.types": ["Bug", "Ground"], "data.1.form_name": "sandy" }

  - name: "Trash Wormadam is Bug/Steel"
    command: "pokedex pokemon forms wormadam"
    assert:
      exit_code: 0
      equals: { "data.2.types": ["Bug", "Steel"], "data.2.form_name": "trash" }

  - name: "Trash Wormadam stats differ from Plant form"
    command: "pokedex pokemon stats wormadam-trash"
    assert:
      exit_code: 0
      equals: { "data.defense": 95, "data.special_defense": 95, "data.total": 424 }

  # ===== Lycanroc: 3 named forms =====

  - name: "Lycanroc has 3 forms: Midday, Midnight, Dusk"
    command: "pokedex pokemon forms lycanroc"
    assert:
      exit_code: 0
      array_len: { "data": { "min": 3, "max": 3 } }

  - name: "Midday Lycanroc is default"
    command: "pokedex pokemon forms lycanroc"
    assert:
      exit_code: 0
      equals: { "data.0.form_name": "midday", "data.0.is_default": true }

  - name: "Midnight and Dusk forms exist"
    command: "pokedex pokemon forms lycanroc"
    assert:
      exit_code: 0
      equals: { "data.1.form_name": "midnight", "data.2.form_name": "dusk" }

  - name: "Dusk Lycanroc has distinct stats"
    command: "pokedex pokemon show lycanroc-dusk"
    assert:
      exit_code: 0
      equals: { "data.display_name": "Dusk Lycanroc", "data.stats.attack": 117, "data.stats.speed": 110 }

  # ===== Oricorio: 4 dance forms with different primary types =====

  - name: "Oricorio has 4 forms"
    command: "pokedex pokemon forms oricorio"
    assert:
      exit_code: 0
      array_len: { "data": { "min": 4, "max": 4 } }

  - name: "Baile Oricorio is Fire/Flying"
    command: "pokedex pokemon forms oricorio"
    assert:
      exit_code: 0
      equals: { "data.0.types": ["Fire", "Flying"], "data.0.form_name": "baile" }

  - name: "Pom-Pom Oricorio is Electric/Flying"
    command: "pokedex pokemon forms oricorio"
    assert:
      exit_code: 0
      equals: { "data.1.types": ["Electric", "Flying"], "data.1.form_name": "pom-pom" }

  - name: "Pau Oricorio is Psychic/Flying"
    command: "pokedex pokemon forms oricorio"
    assert:
      exit_code: 0
      equals: { "data.2.types": ["Psychic", "Flying"], "data.2.form_name": "pau" }

  - name: "Sensu Oricorio is Ghost/Flying"
    command: "pokedex pokemon forms oricorio"
    assert:
      exit_code: 0
      equals: { "data.3.types": ["Ghost", "Flying"], "data.3.form_name": "sensu" }

  - name: "Sensu Oricorio show has correct types"
    command: "pokedex pokemon show oricorio-sensu"
    assert:
      exit_code: 0
      equals: { "data.types": ["Ghost", "Flying"], "data.display_name": "Sensu Oricorio" }
      has_fields: ["data.stats"]

  # ===== Multi-outcome evolutions =====

  - name: "Eevee has exactly 8 evolution branches"
    command: "pokedex pokemon evolutions eevee"
    assert:
      exit_code: 0
      equals: { "data.species_name": "eevee" }
      array_len: { "data.children": { "min": 8, "max": 8 } }

  - name: "Eevee Vaporeon evolves with water-stone"
    command: "pokedex pokemon evolutions eevee"
    assert:
      exit_code: 0
      contains: { "data": "water-stone" }

  - name: "Eevee Leafeon has both use-item and level-up methods"
    command: "pokedex pokemon evolutions eevee"
    assert:
      exit_code: 0
      contains: { "data": "Leaf Stone" }

  - name: "Eevee evolution tree includes Sylveon"
    command: "pokedex pokemon evolutions eevee"
    assert:
      exit_code: 0
      contains: { "data": "sylveon" }
      has_fields: ["actions", "meta.command"]

  - name: "Tyrogue has 3 stat-based evolution branches"
    command: "pokedex pokemon evolutions tyrogue"
    assert:
      exit_code: 0
      array_len: { "data.children": { "min": 3, "max": 3 } }
      contains: { "data": "Attack > Defense" }

  - name: "Tyrogue Hitmonchan requires Attack < Defense"
    command: "pokedex pokemon evolutions tyrogue"
    assert:
      exit_code: 0
      contains: { "data": "Attack < Defense" }

  - name: "Tyrogue Hitmontop requires Attack = Defense"
    command: "pokedex pokemon evolutions tyrogue"
    assert:
      exit_code: 0
      contains: { "data": "Attack = Defense" }

  - name: "Wurmple has 2 personality-based branches"
    command: "pokedex pokemon evolutions wurmple"
    assert:
      exit_code: 0
      array_len: { "data.children": { "min": 2, "max": 2 } }
      contains: { "data": "personality" }

  - name: "Wurmple branches nest: Silcoon->Beautifly, Cascoon->Dustox"
    command: "pokedex pokemon evolutions wurmple"
    assert:
      exit_code: 0
      contains: { "data": "beautifly" }
      array_len: { "data.children.0.children": { "min": 1, "max": 1 } }

  # ===== Vivillon: 20 cosmetic pattern forms =====

  - name: "Vivillon has 20 forms"
    command: "pokedex pokemon forms vivillon"
    assert:
      exit_code: 0
      type_of: { "data": "array" }
      array_len: { "data": { "min": 20, "max": 20 } }

  - name: "Vivillon meadow is default form"
    command: "pokedex pokemon forms vivillon"
    assert:
      exit_code: 0
      contains: { "data": "vivillon-meadow" }

  - name: "Vivillon includes event-only Fancy and Poke Ball patterns"
    command: "pokedex pokemon forms vivillon"
    assert:
      exit_code: 0
      contains: { "data": "vivillon-fancy" }

  # ===== Charizard: Mega X, Mega Y, and Gigantamax =====

  - name: "Charizard has 4 forms including megas and gmax"
    command: "pokedex pokemon forms charizard"
    assert:
      exit_code: 0
      array_len: { "data": { "min": 4, "max": 4 } }

  - name: "Mega Charizard X is Fire/Dragon"
    command: "pokedex pokemon forms charizard"
    assert:
      exit_code: 0
      contains: { "data": "charizard-mega-x" }
      equals: { "data.2.types": ["Fire", "Dragon"], "data.2.is_mega": true }

  - name: "Mega Charizard Y is Fire/Flying and battle-only"
    command: "pokedex pokemon forms charizard"
    assert:
      exit_code: 0
      equals: { "data.3.types": ["Fire", "Flying"], "data.3.is_mega": true, "data.3.is_battle_only": true }

  # ===== Darmanitan: Standard/Zen + Galarian Standard/Zen =====

  - name: "Darmanitan has 4 forms"
    command: "pokedex pokemon forms darmanitan"
    assert:
      exit_code: 0
      array_len: { "data": { "min": 4, "max": 4 } }

  - name: "Standard Darmanitan is Fire type and default"
    command: "pokedex pokemon forms darmanitan"
    assert:
      exit_code: 0
      equals: { "data.0.types": ["Fire"], "data.0.is_default": true }

  - name: "Galarian Standard Darmanitan is Ice type"
    command: "pokedex pokemon forms darmanitan"
    assert:
      exit_code: 0
      equals: { "data.2.types": ["Ice"], "data.2.form_name": "galar-standard" }

  - name: "Galarian Zen Darmanitan is Ice/Fire and battle-only"
    command: "pokedex pokemon forms darmanitan"
    assert:
      exit_code: 0
      equals: { "data.3.types": ["Ice", "Fire"], "data.3.is_battle_only": true }

  # ===== Rockruff -> Lycanroc evolution =====

  - name: "Rockruff evolves into Lycanroc with time-based methods"
    command: "pokedex pokemon evolutions rockruff"
    assert:
      exit_code: 0
      contains: { "data": "lycanroc" }
      array_len: { "data.children": { "min": 1, "max": 1 } }

  - name: "Lycanroc has day, night, and dusk evolution methods"
    command: "pokedex pokemon evolutions rockruff"
    assert:
      exit_code: 0
      contains: { "data": "day" }

  # ===== Invalid form name: error handling =====

  - name: "Invalid form name returns NOT_FOUND with suggestions"
    command: "pokedex pokemon show meowth-invalid"
    assert:
      exit_code: 1
      equals: { "error.code": "NOT_FOUND" }
      has_fields: ["actions"]

  - name: "NOT_FOUND includes did_you_mean for meowth"
    command: "pokedex pokemon show meowth-invalid"
    assert:
      exit_code: 1
      contains: { "actions": "pokedex pokemon show meowth" }

  # ===== Collection operations with forms =====

  - name: "Add Alolan Meowth to collection in Sun"
    command: "pokedex collection add --pokemon=meowth-alola --game=sun"
    assert:
      exit_code: 0
      equals: { "data.display_name": "Alolan Meowth", "data.form_name": "alola" }
      has_fields: ["data.id", "actions"]

  - name: "Collection entry preserves form data"
    command: "pokedex collection list"
    assert:
      exit_code: 0
      equals: { "data.0.form_name": "alola", "data.0.display_name": "Alolan Meowth" }
      has_fields: ["meta.total"]

  # ===== Unown: 28 letter/symbol forms =====

  - name: "Unown has 28 forms (26 letters + ! + ?)"
    command: "pokedex pokemon forms unown"
    assert:
      exit_code: 0
      array_len: { "data": { "min": 28, "max": 28 } }

  # ===== Castform: weather-based battle-only forms =====

  - name: "Castform has 4 forms with weather variants battle-only"
    command: "pokedex pokemon forms castform"
    assert:
      exit_code: 0
      array_len: { "data": { "min": 4, "max": 4 } }
      equals: { "data.1.is_battle_only": true }

  - name: "Castform weather forms have different types"
    command: "pokedex pokemon forms castform"
    assert:
      exit_code: 0
      equals: { "data.0.types": ["Normal"], "data.1.types": ["Fire"] }

  # ===== Zygarde: complex form set =====

  - name: "Zygarde has 6 forms including power construct variants"
    command: "pokedex pokemon forms zygarde"
    assert:
      exit_code: 0
      array_len: { "data": { "min": 6, "max": 6 } }

  - name: "Zygarde 50% is default form"
    command: "pokedex pokemon forms zygarde"
    assert:
      exit_code: 0
      equals: { "data.0.is_default": true, "data.0.form_name": "50" }

  - name: "Zygarde Complete form is battle-only"
    command: "pokedex pokemon forms zygarde"
    assert:
      exit_code: 0
      contains: { "data": "zygarde-complete" }

  # ===== Necrozma: base + fusions =====

  - name: "Necrozma has 4 forms"
    command: "pokedex pokemon forms necrozma"
    assert:
      exit_code: 0
      array_len: { "data": { "min": 4, "max": 4 } }

  - name: "Necrozma Dusk is Psychic/Steel"
    command: "pokedex pokemon forms necrozma"
    assert:
      exit_code: 0
      equals: { "data.1.types": ["Psychic", "Steel"], "data.1.form_name": "dusk" }

  - name: "Necrozma Ultra is Psychic/Dragon"
    command: "pokedex pokemon forms necrozma"
    assert:
      exit_code: 0
      equals: { "data.3.types": ["Psychic", "Dragon"], "data.3.form_name": "ultra" }

  # ===== Galarian Ponyta: genus is species-level =====

  - name: "Galarian Ponyta is Psychic type but shares Fire Horse genus"
    command: "pokedex pokemon show ponyta-galar"
    assert:
      exit_code: 0
      equals: { "data.types": ["Psychic"], "data.genus": "Fire Horse Pokémon" }
      has_fields: ["data.abilities"]

  # ===== Giratina: Altered vs Origin =====

  - name: "Giratina has Altered and Origin forms"
    command: "pokedex pokemon forms giratina"
    assert:
      exit_code: 0
      array_len: { "data": { "min": 2, "max": 2 } }
      equals: { "data.0.form_name": "altered", "data.1.form_name": "origin" }

  # ===== Shaymin: Land vs Sky with type difference =====

  - name: "Shaymin Sky form gains Flying type"
    command: "pokedex pokemon forms shaymin"
    assert:
      exit_code: 0
      equals: { "data.0.types": ["Grass"], "data.1.types": ["Grass", "Flying"] }
      array_len: { "data": { "min": 2, "max": 2 } }
