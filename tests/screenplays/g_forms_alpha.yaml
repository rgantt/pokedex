# Screenplays are CHEAP regression tests produced by exploratory test agents.
# If a step fails, investigate: is it a real bug (fix the code) or a stale
# assertion (update or delete this file)? The INTENT matters, not the exact
# implementation. Don't contort the CLI to make a stale screenplay pass.
name: "Forms & Alpha Specialist"
persona: "G"
description: "Round 14: Battle-form stat swaps (Aegislash, Wishiwashi, Eiscue), gendered form stat differences (Indeedee, Basculegion, Oinkologne, Meowstic), Zen Mode type gain (Darmanitan), Greninja/Battle Bond/Ash forms, Morpeko/Cramorant battle-only forms, Toxtricity Amped vs Low Key, form-specific collection entries, forms dedup"
needs_seed: true
mutates_collection: true

steps:
  # ===== Aegislash: Shield vs Blade — stat inversion, same BST =====

  - name: "Aegislash Shield form is defense-focused (Def=140, Atk=50)"
    command: "pokedex pokemon stats aegislash-shield"
    assert:
      exit_code: 0
      equals: {"data.pokemon_name": "Aegislash", "data.defense": 140, "data.attack": 50}
      has_fields: ["data.total"]

  - name: "Aegislash Blade form is attack-focused (Atk=140, Def=50)"
    command: "pokedex pokemon stats aegislash-blade"
    assert:
      exit_code: 0
      equals: {"data.pokemon_name": "Blade Aegislash", "data.attack": 140, "data.defense": 50}
      has_fields: ["data.total"]

  - name: "Aegislash Shield and Blade share BST 500"
    command: "pokedex pokemon stats aegislash-blade"
    assert:
      exit_code: 0
      equals: {"data.total": 500, "data.special_attack": 140}

  - name: "Aegislash forms: shield is default, blade is battle-only"
    command: "pokedex pokemon forms aegislash"
    assert:
      exit_code: 0
      equals: {"data.0.is_default": true, "data.0.form_name": "shield"}
      array_len: {"data": {"min": 2}}

  # ===== Wishiwashi: Solo (175 BST) vs School (620 BST) =====

  - name: "Wishiwashi Solo form has pitiful BST 175"
    command: "pokedex pokemon stats wishiwashi"
    assert:
      exit_code: 0
      equals: {"data.pokemon_name": "Wishiwashi", "data.total": 175}
      has_fields: ["data.attack"]

  - name: "Wishiwashi School form has massive BST 620"
    command: "pokedex pokemon stats wishiwashi-school"
    assert:
      exit_code: 0
      equals: {"data.pokemon_name": "School Wishiwashi", "data.total": 620, "data.attack": 140}

  - name: "Wishiwashi School is battle-only"
    command: "pokedex pokemon forms wishiwashi"
    assert:
      exit_code: 0
      equals: {"data.1.form_name": "school", "data.1.is_battle_only": true}
      array_len: {"data": {"min": 2, "max": 2}}

  # ===== Morpeko: Full Belly vs Hangry — same types, hangry is battle-only =====

  - name: "Morpeko Full Belly is Electric/Dark and default"
    command: "pokedex pokemon forms morpeko"
    assert:
      exit_code: 0
      equals: {"data.0.form_name": "full-belly", "data.0.is_default": true, "data.0.types": ["Electric", "Dark"]}

  - name: "Morpeko Hangry is battle-only with same Electric/Dark types"
    command: "pokedex pokemon forms morpeko"
    assert:
      exit_code: 0
      equals: {"data.1.form_name": "hangry", "data.1.is_battle_only": true, "data.1.types": ["Electric", "Dark"]}

  # ===== Cramorant: Gulping and Gorging are battle-only =====

  - name: "Cramorant has 3 forms: base, gulping, gorging"
    command: "pokedex pokemon forms cramorant"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 3, "max": 3}}
      equals: {"data.0.is_default": true}

  - name: "Cramorant Gulping and Gorging are both battle-only"
    command: "pokedex pokemon forms cramorant"
    assert:
      exit_code: 0
      equals: {"data.1.is_battle_only": true, "data.2.is_battle_only": true}

  # ===== Eiscue: Ice Face vs Noice Face — stat redistribution =====

  - name: "Eiscue Ice Face has high Def=110, low Speed=50"
    command: "pokedex pokemon stats eiscue"
    assert:
      exit_code: 0
      equals: {"data.pokemon_name": "Eiscue", "data.defense": 110, "data.speed": 50, "data.total": 470}

  - name: "Eiscue Noice Face swaps to high Speed=130, low Def=70"
    command: "pokedex pokemon stats eiscue-noice"
    assert:
      exit_code: 0
      equals: {"data.pokemon_name": "Noice Eiscue", "data.speed": 130, "data.defense": 70, "data.total": 470}

  - name: "Eiscue Noice form is battle-only"
    command: "pokedex pokemon forms eiscue"
    assert:
      exit_code: 0
      equals: {"data.0.form_name": "ice", "data.0.is_default": true, "data.1.form_name": "noice", "data.1.is_battle_only": true}

  # ===== Indeedee: Male vs Female — same types, different stat spreads =====

  - name: "Indeedee Male is SpAtk-focused (SpAtk=105, SpDef=95)"
    command: "pokedex pokemon stats indeedee"
    assert:
      exit_code: 0
      equals: {"data.pokemon_name": "Indeedee", "data.special_attack": 105, "data.special_defense": 95, "data.total": 475}

  - name: "Indeedee Female is SpDef-focused (SpAtk=95, SpDef=105)"
    command: "pokedex pokemon stats indeedee-female"
    assert:
      exit_code: 0
      equals: {"data.pokemon_name": "Female Indeedee", "data.special_attack": 95, "data.special_defense": 105, "data.total": 475}

  - name: "Indeedee both forms share Psychic/Normal typing"
    command: "pokedex pokemon forms indeedee"
    assert:
      exit_code: 0
      equals: {"data.0.types": ["Psychic", "Normal"], "data.1.types": ["Psychic", "Normal"]}
      array_len: {"data": {"min": 2, "max": 2}}

  # ===== Basculegion: Male vs Female — different stat spreads =====

  - name: "Basculegion Male is physically offensive (Atk=112, SpAtk=80)"
    command: "pokedex pokemon stats basculegion"
    assert:
      exit_code: 0
      equals: {"data.pokemon_name": "Basculegion", "data.attack": 112, "data.special_attack": 80, "data.total": 530}

  - name: "Basculegion Female is specially offensive (Atk=92, SpAtk=100)"
    command: "pokedex pokemon stats basculegion-female"
    assert:
      exit_code: 0
      equals: {"data.pokemon_name": "Female Basculegion", "data.attack": 92, "data.special_attack": 100, "data.total": 530}

  # ===== Oinkologne: Male vs Female — different stat spreads =====

  - name: "Oinkologne Male has HP=110, Atk=100"
    command: "pokedex pokemon stats oinkologne"
    assert:
      exit_code: 0
      equals: {"data.pokemon_name": "Oinkologne", "data.hp": 110, "data.attack": 100, "data.total": 489}

  - name: "Oinkologne Female has HP=115, Atk=90, SpDef=90"
    command: "pokedex pokemon stats oinkologne-female"
    assert:
      exit_code: 0
      equals: {"data.pokemon_name": "Female Oinkologne", "data.hp": 115, "data.attack": 90, "data.special_defense": 90}

  # ===== Toxtricity: Amped vs Low Key — same types, both non-battle-only =====

  - name: "Toxtricity Amped is default Electric/Poison form"
    command: "pokedex pokemon forms toxtricity"
    assert:
      exit_code: 0
      equals: {"data.0.form_name": "amped", "data.0.is_default": true, "data.0.types": ["Electric", "Poison"]}

  - name: "Toxtricity Low Key is not battle-only"
    command: "pokedex pokemon forms toxtricity"
    assert:
      exit_code: 0
      equals: {"data.3.form_name": "low-key", "data.3.is_battle_only": false, "data.3.types": ["Electric", "Poison"]}

  - name: "Toxtricity has 4 forms (amped, amped-gmax, low-key-gmax, low-key)"
    command: "pokedex pokemon forms toxtricity"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 4, "max": 4}}
      contains: {"data": "Gigantamax Amped Toxtricity"}

  # ===== Greninja: Base vs Battle Bond vs Ash — BST differences =====

  - name: "Greninja base has BST 530"
    command: "pokedex pokemon stats greninja"
    assert:
      exit_code: 0
      equals: {"data.pokemon_name": "Greninja", "data.total": 530, "data.speed": 122}

  - name: "Battle Bond Greninja has same BST 530 as base"
    command: "pokedex pokemon stats greninja-battle-bond"
    assert:
      exit_code: 0
      equals: {"data.pokemon_name": "Battle Bond Greninja", "data.total": 530}

  - name: "Ash-Greninja has boosted BST 640"
    command: "pokedex pokemon stats greninja-ash"
    assert:
      exit_code: 0
      equals: {"data.pokemon_name": "Ash's Greninja", "data.total": 640, "data.attack": 145}

  - name: "Ash-Greninja is battle-only, Battle Bond is not"
    command: "pokedex pokemon forms greninja"
    assert:
      exit_code: 0
      equals: {"data.1.form_name": "battle-bond", "data.1.is_battle_only": false, "data.2.form_name": "ash", "data.2.is_battle_only": true}

  - name: "Greninja has 4 forms including Mega"
    command: "pokedex pokemon forms greninja"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 4, "max": 4}}
      equals: {"data.3.form_name": "mega", "data.3.is_mega": true}

  # ===== Darmanitan: Standard vs Zen Mode — type gain =====

  - name: "Darmanitan Standard is Fire-only, BST 480"
    command: "pokedex pokemon show darmanitan"
    assert:
      exit_code: 0
      equals: {"data.display_name": "Darmanitan", "data.types": ["Fire"]}
      has_fields: ["data.stats"]

  - name: "Darmanitan Zen gains Psychic type, becomes Fire/Psychic"
    command: "pokedex pokemon show darmanitan-zen"
    assert:
      exit_code: 0
      equals: {"data.display_name": "Zen Darmanitan", "data.types": ["Fire", "Psychic"]}

  - name: "Darmanitan Zen has BST 540 (higher than base 480) with stat swap"
    command: "pokedex pokemon stats darmanitan-zen"
    assert:
      exit_code: 0
      equals: {"data.total": 540, "data.attack": 30, "data.special_attack": 140}

  - name: "Galarian Darmanitan Zen is Ice/Fire (dual regional+zen)"
    command: "pokedex pokemon forms darmanitan"
    assert:
      exit_code: 0
      equals: {"data.3.form_name": "galar-zen", "data.3.types": ["Ice", "Fire"]}
      array_len: {"data": {"min": 4, "max": 4}}

  # ===== Meowstic: Male vs Female — same stats, different movepools =====

  - name: "Meowstic Male and Female share BST 466 and Psychic type"
    command: "pokedex pokemon forms meowstic"
    assert:
      exit_code: 0
      equals: {"data.0.form_name": "male", "data.0.is_default": true, "data.0.types": ["Psychic"]}
      array_len: {"data": {"min": 3, "max": 3}}

  - name: "Meowstic Female is not battle-only (distinct catchable form)"
    command: "pokedex pokemon forms meowstic"
    assert:
      exit_code: 0
      equals: {"data.1.form_name": "female", "data.1.is_battle_only": false}

  # ===== Form-specific collection: add growlithe-hisui, verify actions =====

  - name: "Add Hisuian Growlithe to collection preserves form"
    command: "pokedex collection add --pokemon=growlithe-hisui --game=legends-arceus"
    assert:
      exit_code: 0
      equals: {"data.display_name": "Hisuian Growlithe", "data.form_name": "hisui"}
      has_fields: ["data.id"]

  - name: "Collection entry pokemon_info action preserves form identifier"
    command: "pokedex collection add --pokemon=growlithe-hisui --game=legends-arceus"
    assert:
      exit_code: 0
      contains: {"actions": "growlithe-hisui"}
      has_fields: ["data.species_name"]

  - name: "Collection show for form entry has correct display_name"
    command: "pokedex collection add --pokemon=darmanitan-zen --game=sword"
    assert:
      exit_code: 0
      equals: {"data.form_name": "zen"}
      contains: {"data.display_name": "Darmanitan"}

  # ===== Forms dedup: no duplicate actions =====

  - name: "Darmanitan forms actions have no duplicates (4 forms, 5 actions)"
    command: "pokedex pokemon forms darmanitan"
    assert:
      exit_code: 0
      array_len: {"actions": {"min": 5, "max": 5}}
      has_fields: ["actions.0.cmd"]

  - name: "Greninja forms actions are deduped (4 forms, 4 actions)"
    command: "pokedex pokemon forms greninja"
    assert:
      exit_code: 0
      array_len: {"actions": {"min": 4, "max": 4}}
      has_fields: ["actions.0.rel"]
