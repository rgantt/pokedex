# Screenplays are CHEAP regression tests produced by exploratory test agents.
# If a step fails, investigate: is it a real bug (fix the code) or a stale
# assertion (update or delete this file)? The INTENT matters, not the exact
# implementation. Don't contort the CLI to make a stale screenplay pass.
#
# ISSUES FOUND (Round 13):
#   BUG-R13-H1: (FIXED) game show region was derived from generation, not game.
#     All remakes now show correct regions.
#   BUG-R13-H2: service games (pokemon-go, pokemon-bank, home) have no
#     generation or region fields. This is arguably correct for services.
#   BUG-R13-H3: (FIXED) `home transferable terapagos` crashed with SQL error
#     "misuse of aggregate: MAX()". Now returns results without crashing.
#
# ISSUES FOUND (Round 14):
#   BUG-R14-H1: (FIXED) `collection update --dry-run` confirm action now
#     includes all flags (--in-home, --shiny, --status), not just --status.
#   BUG-R14-H2: `home transferable ogerpon` returns 0 games. Ogerpon's DLC
#     pokedex (kitakami) is not mapped to scarlet/violet version_group, so
#     the transferable logic finds no HOME-compatible games. Same for pecharunt.
#
# ISSUES FOUND (Round 15):
#   No new issues found. All prior fixes verified.
name: "HOME Transfers & Game Compatibility"
persona: "H"
description: >
  Final HOME/game metadata audit. Verifies all 13 HOME-compatible games,
  transferable edge cases (Terapagos, Melmetal, Meltan, starters),
  home missing pagination math, coverage percentage after transfers,
  owned_elsewhere lifecycle, game list counts, and dry-run flag propagation.
needs_seed: true
mutates_collection: true

steps:
  # ============================================================
  # PHASE 1: HOME-compatible game show — generation/region/display_name
  # ============================================================

  - name: "lets-go-pikachu is Gen 7 Kanto"
    command: "pokedex game show lets-go-pikachu"
    assert:
      exit_code: 0
      equals:
        "data.generation": 7
        "data.region": "Kanto"
      contains:
        "data.display_name": "Pikachu"

  - name: "lets-go-eevee is Gen 7 Kanto"
    command: "pokedex game show lets-go-eevee"
    assert:
      exit_code: 0
      equals:
        "data.generation": 7
        "data.region": "Kanto"
      contains:
        "data.display_name": "Eevee"

  - name: "sword is Gen 8 Galar"
    command: "pokedex game show sword"
    assert:
      exit_code: 0
      equals:
        "data.generation": 8
        "data.region": "Galar"
        "data.connects_to_home": true

  - name: "shield is Gen 8 Galar"
    command: "pokedex game show shield"
    assert:
      exit_code: 0
      equals:
        "data.generation": 8
        "data.region": "Galar"
      has_fields: ["data.transfer_direction"]

  - name: "brilliant-diamond is Gen 8 Sinnoh"
    command: "pokedex game show brilliant-diamond"
    assert:
      exit_code: 0
      equals:
        "data.generation": 8
        "data.region": "Sinnoh"
        "data.connects_to_home": true

  - name: "shining-pearl is Gen 8 Sinnoh"
    command: "pokedex game show shining-pearl"
    assert:
      exit_code: 0
      equals:
        "data.generation": 8
        "data.region": "Sinnoh"
      contains:
        "data.display_name": "Shining Pearl"

  - name: "legends-arceus is Gen 8 Hisui"
    command: "pokedex game show legends-arceus"
    assert:
      exit_code: 0
      equals:
        "data.generation": 8
        "data.region": "Hisui"
        "data.connects_to_home": true

  - name: "scarlet is Gen 9 Paldea"
    command: "pokedex game show scarlet"
    assert:
      exit_code: 0
      equals:
        "data.generation": 9
        "data.region": "Paldea"
      has_fields: ["data.display_name"]

  - name: "violet is Gen 9 Paldea"
    command: "pokedex game show violet"
    assert:
      exit_code: 0
      equals:
        "data.generation": 9
        "data.region": "Paldea"
        "data.transfer_direction": "both"

  - name: "legends-za is Gen 9 Kalos"
    command: "pokedex game show legends-za"
    assert:
      exit_code: 0
      equals:
        "data.generation": 9
        "data.region": "Kalos"
        "data.connects_to_home": true

  - name: "pokemon-go is to_home_only service"
    command: "pokedex game show pokemon-go"
    assert:
      exit_code: 0
      equals:
        "data.transfer_direction": "to_home_only"
        "data.connects_to_home": true
      contains:
        "data.display_name": "GO"

  - name: "pokemon-bank is to_home_only service"
    command: "pokedex game show pokemon-bank"
    assert:
      exit_code: 0
      equals:
        "data.transfer_direction": "to_home_only"
        "data.connects_to_home": true
      contains:
        "data.display_name": "Bank"

  - name: "home game has both transfer direction"
    command: "pokedex game show home"
    assert:
      exit_code: 0
      equals:
        "data.transfer_direction": "both"
        "data.connects_to_home": true
      contains:
        "data.display_name": "HOME"

  # ============================================================
  # PHASE 2: game list --home-compatible exact count
  # ============================================================

  - name: "home-compatible games count is 13"
    command: "pokedex game list --home-compatible"
    assert:
      exit_code: 0
      type_of:
        "data": "array"
      array_len:
        "data": { min: 13, max: 13 }

  - name: "all games list has more than 40 entries"
    command: "pokedex game list"
    assert:
      exit_code: 0
      type_of:
        "data": "array"
      array_len:
        "data": { min: 41 }

  # ============================================================
  # PHASE 3: HOME transferable edge cases
  # ============================================================

  - name: "terapagos transferable is scarlet and violet only"
    command: "pokedex home transferable terapagos"
    assert:
      exit_code: 0
      array_len:
        "data": { min: 2, max: 2 }
      equals:
        "data.0.name": "scarlet"

  - name: "pecharunt transferable is scarlet and violet"
    command: "pokedex home transferable pecharunt"
    assert:
      exit_code: 0
      array_len:
        "data": { min: 2, max: 2 }
      equals:
        "data.1.name": "violet"

  - name: "melmetal transferable is LGP and LGE"
    command: "pokedex home transferable melmetal"
    assert:
      exit_code: 0
      array_len:
        "data": { min: 2, max: 2 }
      equals:
        "data.0.name": "lets-go-pikachu"

  - name: "meltan transferable is LGP and LGE"
    command: "pokedex home transferable meltan"
    assert:
      exit_code: 0
      array_len:
        "data": { min: 2, max: 2 }
      equals:
        "data.1.name": "lets-go-eevee"

  - name: "bulbasaur transferable spans many games"
    command: "pokedex home transferable bulbasaur"
    assert:
      exit_code: 0
      type_of:
        "data": "array"
      array_len:
        "data": { min: 4 }

  - name: "charmander transferable spans many games"
    command: "pokedex home transferable charmander"
    assert:
      exit_code: 0
      array_len:
        "data": { min: 4 }
      has_fields: ["data.0.connects_to_home"]

  - name: "squirtle transferable spans many games"
    command: "pokedex home transferable squirtle"
    assert:
      exit_code: 0
      type_of:
        "data": "array"
      array_len:
        "data": { min: 4 }

  # ============================================================
  # PHASE 4: HOME missing pagination math
  # ============================================================

  - name: "home missing national returns results"
    command: "pokedex home missing --limit=2"
    assert:
      exit_code: 0
      has_fields: ["meta.total"]
      type_of: {"meta.total": "number"}
      array_len:
        "data": { min: 2, max: 2 }

  - name: "home missing kanto returns results"
    command: "pokedex home missing --dex=kanto --limit=1"
    assert:
      exit_code: 0
      has_fields: ["meta.total"]
      type_of: {"data.0.pokedex_number": "number"}

  - name: "home missing has owned_elsewhere field"
    command: "pokedex home missing --limit=1"
    assert:
      exit_code: 0
      has_fields: ["data.0.name", "data.0.owned_elsewhere"]
      type_of: {"data.0.owned_elsewhere": "boolean"}

  - name: "home missing pagination has prev_page action"
    command: "pokedex home missing --limit=50 --offset=100"
    assert:
      exit_code: 0
      has_fields: ["meta.offset", "meta.limit"]
      equals:
        "meta.offset": 100

  # ============================================================
  # PHASE 5: HOME status with empty collection
  # ============================================================

  - name: "home status returns valid structure"
    command: "pokedex home status"
    assert:
      exit_code: 0
      has_fields: ["data.total_in_home", "data.unique_species_in_home"]
      type_of: {"data.total_in_home": "number", "data.unique_species_in_home": "number"}

  - name: "home coverage returns valid structure"
    command: "pokedex home coverage"
    assert:
      exit_code: 0
      equals:
        "data.total": 1025
      has_fields: ["data.caught", "data.percentage"]

  # ============================================================
  # PHASE 6: owned_elsewhere lifecycle
  # ============================================================

  - name: "add bulbasaur to sword not in home"
    command: "pokedex collection add --pokemon=bulbasaur --game=sword"
    capture: {"bulb_id": "data.id"}
    assert:
      exit_code: 0
      equals:
        "data.in_home": false
        "data.species_name": "bulbasaur"

  - name: "bulbasaur shows owned_elsewhere true in home missing"
    command: "pokedex home missing --limit=1"
    assert:
      exit_code: 0
      equals:
        "data.0.name": "bulbasaur"
        "data.0.owned_elsewhere": true

  - name: "mark bulbasaur as traded_away"
    command: "pokedex collection update $bulb_id --status=traded_away"
    assert:
      exit_code: 0
      equals:
        "data.status": "traded_away"
      has_fields: ["data.updated_at"]

  - name: "traded_away status reflected in missing list"
    command: "pokedex home missing --limit=50"
    assert:
      exit_code: 0
      has_fields: ["data", "meta.total"]
      type_of: {"data": "array"}

  # ============================================================
  # PHASE 7: HOME coverage after transfers
  # ============================================================

  - name: "add charmander in-home"
    command: "pokedex collection add --pokemon=charmander --game=sword --in-home"
    assert:
      exit_code: 0
      equals:
        "data.in_home": true
      has_fields: ["data.id"]

  - name: "add squirtle in-home"
    command: "pokedex collection add --pokemon=squirtle --game=sword --in-home"
    assert:
      exit_code: 0
      equals:
        "data.in_home": true
        "data.species_name": "squirtle"

  - name: "add pikachu in-home"
    command: "pokedex collection add --pokemon=pikachu --game=sword --in-home"
    assert:
      exit_code: 0
      equals:
        "data.in_home": true
      has_fields: ["data.id"]

  - name: "add eevee in-home"
    command: "pokedex collection add --pokemon=eevee --game=sword --in-home"
    assert:
      exit_code: 0
      equals:
        "data.in_home": true
        "data.species_name": "eevee"

  - name: "add mewtwo in-home"
    command: "pokedex collection add --pokemon=mewtwo --game=sword --in-home"
    assert:
      exit_code: 0
      equals:
        "data.in_home": true
        "data.species_name": "mewtwo"

  - name: "coverage increases after adding in-home entries"
    command: "pokedex home coverage"
    assert:
      exit_code: 0
      equals:
        "data.total": 1025
      has_fields: ["data.caught", "data.percentage"]

  - name: "home missing total reflects in-home additions"
    command: "pokedex home missing --limit=1"
    assert:
      exit_code: 0
      has_fields: ["meta.total", "data.0.name"]
      type_of: {"meta.total": "number"}

  - name: "home status reflects in-home entries"
    command: "pokedex home status"
    assert:
      exit_code: 0
      has_fields: ["data.total_in_home", "data.unique_species_in_home"]
      type_of: {"data.unique_species_in_home": "number"}

  # ============================================================
  # PHASE 8: collection update --dry-run with multiple flags
  # ============================================================

  - name: "dry-run with status+in-home+shiny shows all changes"
    command: "pokedex collection update $bulb_id --status=evolved --in-home=true --shiny=true --dry-run"
    assert:
      exit_code: 0
      equals:
        "data.dry_run": true
        "data.new_status": "evolved"
        "data.new_in_home": true

  - name: "dry-run confirm action includes status flag"
    command: "pokedex collection update $bulb_id --status=evolved --in-home=true --shiny=true --dry-run"
    assert:
      exit_code: 0
      contains:
        "actions.0.cmd": "--status=evolved"
      equals:
        "actions.0.rel": "confirm"
        "data.new_shiny": true

  # ============================================================
  # PHASE 9: firered remake region verification
  # ============================================================

  - name: "firered is Gen 3 Kanto not Gen 1"
    command: "pokedex game show firered"
    assert:
      exit_code: 0
      equals:
        "data.generation": 3
        "data.region": "Kanto"
      contains:
        "data.display_name": "FireRed"

  - name: "omega-ruby is Gen 6 Hoenn"
    command: "pokedex game show omega-ruby"
    assert:
      exit_code: 0
      equals:
        "data.generation": 6
        "data.region": "Hoenn"
      contains:
        "data.display_name": "Omega Ruby"

  - name: "heartgold is Gen 4 Johto"
    command: "pokedex game show heartgold"
    assert:
      exit_code: 0
      equals:
        "data.generation": 4
        "data.region": "Johto"
      contains:
        "data.display_name": "HeartGold"
