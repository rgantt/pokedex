# Screenplays are CHEAP regression tests produced by exploratory test agents.
# If a step fails, investigate: is it a real bug (fix the code) or a stale
# assertion (update or delete this file)? The INTENT matters, not the exact
# implementation. Don't contort the CLI to make a stale screenplay pass.
name: "HATEOAS Walker"
persona: hateoas_walker
description: >
  Navigate the CLI purely via action links starting from discovery.
  Tests 5+ action chains, pagination, 3 typo recoveries, location encounters,
  game show, home missing, --limit=0 error, and growlithe-hisui form data.
needs_seed: true
mutates_collection: false

steps:
  # -- Chain 1: Discovery -> pokemon list -> pagination -> show ------

  - name: "discovery returns entry points and seed action"
    command: "pokedex"
    assert:
      exit_code: 0
      has_fields: ["data.resources", "data.entry_points", "actions", "meta"]
      type_of: { "data.resources": "array", "data.entry_points": "array" }
      array_len: { "data.entry_points": { "min": 5 } }
  - name: "pokemon list with limit=5 shows first page"
    command: "pokedex pokemon list --limit=5"
    assert:
      exit_code: 0
      array_len: { "data": { "min": 5, "max": 5 } }
      equals: { "meta.limit": 5, "meta.offset": 0, "data.0.name": "bulbasaur" }
  - name: "follow next_page action to page 2"
    command: "pokedex pokemon list --limit=5 --offset=5"
    assert:
      exit_code: 0
      equals: { "meta.offset": 5, "data.0.name": "charizard" }
  - name: "show Hisuian Growlithe with correct types, stats, abilities"
    command: "pokedex pokemon show growlithe-hisui"
    assert:
      exit_code: 0
      contains: { "data.display_name": "Hisuian" }
      equals: {"data.types": ["Fire", "Rock"], "data.stats.hp": 60, "data.stats.attack": 75, "data.stats.defense": 45}
      has_fields: ["data.stats", "data.abilities"]
  - name: "follow forms action from growlithe show"
    command: "pokedex pokemon forms growlithe"
    assert:
      exit_code: 0
      array_len: { "data": { "min": 2 } }
      equals: { "data.0.name": "growlithe", "data.1.name": "growlithe-hisui" }
  - name: "follow evolutions action from growlithe show"
    command: "pokedex pokemon evolutions growlithe"
    assert:
      exit_code: 0
      equals: {"data.species_name": "growlithe", "data.children.0.species_name": "arcanine"}
      has_fields: ["data.children"]
  - name: "follow show arcanine action from evolutions"
    command: "pokedex pokemon show arcanine"
    assert:
      exit_code: 0
      equals: { "data.display_name": "Arcanine", "data.types": ["Fire"] }
      has_fields: ["data.stats", "data.abilities", "actions"]
  - name: "follow type_matchups fire action from growlithe show"
    command: "pokedex type matchups fire"
    assert:
      exit_code: 0
      equals: { "data.type_name": "fire" }
      has_fields: ["data.attacking.super_effective", "data.defending.super_effective"]
  - name: "follow all_types action from type matchups"
    command: "pokedex type list"
    assert:
      exit_code: 0
      array_len: { "data": { "min": 18 } }
  - name: "game show red with correct generation and region"
    command: "pokedex game show red"
    assert:
      exit_code: 0
      equals: { "data.name": "red", "data.generation": 1, "data.region": "Kanto" }
  - name: "follow all_games action from game show"
    command: "pokedex game list"
    assert:
      exit_code: 0
      array_len: { "data": { "min": 20 } }
      has_fields: ["actions", "meta"]
  - name: "home missing returns paginated species list"
    command: "pokedex home missing"
    assert:
      exit_code: 0
      has_fields: ["data", "actions", "meta.total"]
      type_of: { "meta.total": "number" }
  - name: "follow coverage action from home missing"
    command: "pokedex home coverage"
    assert:
      exit_code: 0
      has_fields: ["data.total", "data.caught", "data.percentage"]
  - name: "follow dex_progress action from home coverage"
    command: "pokedex dex progress national --limit=5"
    assert:
      exit_code: 0
      has_fields: ["data", "actions", "meta"]
      equals: { "meta.limit": 5 }
  - name: "follow status action from home coverage"
    command: "pokedex home status"
    assert:
      exit_code: 0
      has_fields: ["data.total_in_home", "data.unique_species_in_home"]
  - name: "location encounters viridian-forest returns encounter data"
    command: "pokedex location encounters viridian-forest"
    assert:
      exit_code: 0
      array_len: { "data": { "min": 10 } }
      has_fields: ["data.0.pokemon_name", "data.0.game", "data.0.method", "data.0.rarity"]
  - name: "location encounters with game filter narrows results"
    command: "pokedex location encounters viridian-forest --game=red"
    assert:
      exit_code: 0
      array_len: { "data": { "min": 1 } }
      equals: { "data.0.game": "Red" }
  - name: "typo pikchu suggests pikachu"
    command: "pokedex pokemon show pikchu"
    assert:
      exit_code: 1
      equals: { "error.code": "NOT_FOUND" }
      contains: { "error.message": "pikchu" }
      array_len: { "actions": { "min": 1 } }
  - name: "typo charzard suggests charizard"
    command: "pokedex pokemon show charzard"
    assert:
      exit_code: 1
      equals: { "error.code": "NOT_FOUND" }
      array_len: { "actions": { "min": 1 } }
  - name: "typo eevvee suggests eevee"
    command: "pokedex pokemon show eevvee"
    assert:
      exit_code: 1
      equals: { "error.code": "NOT_FOUND" }
      array_len: { "actions": { "min": 1 } }
  - name: "follow did_you_mean action recovers to pikachu"
    command: "pokedex pokemon show pikachu"
    assert:
      exit_code: 0
      equals: { "data.name": "pikachu", "data.display_name": "Pikachu", "data.types": ["Electric"] }
      has_fields: ["data.stats", "data.abilities", "actions"]
  - name: "--limit=0 returns error with exit code 1"
    command: "pokedex pokemon list --limit=0"
    assert:
      exit_code: 1
      equals: { "error.code": "INVALID_PARAMETER" }
      contains: { "error.message": "limit" }
  - name: "bad location returns NOT_FOUND with recovery actions"
    command: "pokedex location encounters not-a-place"
    assert:
      exit_code: 1
      equals: { "error.code": "NOT_FOUND" }
  - name: "collection list returns HATEOAS actions"
    command: "pokedex collection list"
    assert:
      exit_code: 0
      has_fields: ["data", "actions", "meta"]
  - name: "pokemon stats growlithe returns base stats"
    command: "pokedex pokemon stats growlithe"
    assert:
      exit_code: 0
      equals: { "data.pokemon_name": "Growlithe", "data.total": 350 }
      has_fields: ["data.hp", "data.attack", "data.defense", "data.speed"]
