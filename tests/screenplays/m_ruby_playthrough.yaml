# Screenplays are CHEAP regression tests produced by exploratory test agents.
# If a step fails, investigate: is it a real bug (fix the code) or a stale
# assertion (update or delete this file)? The INTENT matters, not the exact
# implementation. Don't contort the CLI to make a stale screenplay pass.
name: "Ruby Playthrough - Route 101 to Victory Road"
persona: ruby_hoenn_completionist
description: >
  End-to-end Ruby playthrough testing the discover-inspect-catch-evolve-verify
  loop across hoenn-route-101, hoenn-route-102, petalburg-woods, hoenn-route-116,
  granite-cave, hoenn-route-110, hoenn-route-111, fiery-path, hoenn-route-113,
  hoenn-route-114, hoenn-route-119, hoenn-route-120, mt-pyre, and
  hoenn-victory-road.
needs_seed: true
mutates_collection: true

steps:
  # ============================================================
  # LOCATION 1: hoenn-route-101
  # ============================================================
  - name: "Route 101 -- discover encounters"
    command: "pokedex location encounters hoenn-route-101 --game=ruby"
    assert:
      exit_code: 0
      has_fields: ["data", "actions", "meta"]
      equals: { "meta.total": 9 }

  - name: "Route 101 -- inspect Mudkip"
    command: "pokedex pokemon show mudkip"
    assert:
      exit_code: 0
      equals: { "data.name": "mudkip", "data.generation": 3 }
      has_fields: ["data.types", "data.stats"]

  - name: "Route 101 -- inspect Poochyena"
    command: "pokedex pokemon show poochyena"
    assert:
      exit_code: 0
      equals: { "data.name": "poochyena", "data.generation": 3 }
      contains: { "data.types.0": "Dark" }

  - name: "Route 101 -- catch Mudkip"
    command: "pokedex collection add --pokemon=mudkip --game=ruby --method=catch"
    capture: { "mudkip_id": "data.id" }
    assert:
      exit_code: 0
      equals: { "data.species_name": "mudkip", "data.status": "caught" }
      has_fields: ["data.id", "data.created_at"]

  - name: "Route 101 -- catch Poochyena"
    command: "pokedex collection add --pokemon=poochyena --game=ruby --method=catch"
    capture: { "poochyena_id": "data.id" }
    assert:
      exit_code: 0
      equals: { "data.species_name": "poochyena", "data.method": "catch" }

  - name: "Route 101 -- catch Zigzagoon"
    command: "pokedex collection add --pokemon=zigzagoon --game=ruby --method=catch"
    capture: { "zigzagoon_id": "data.id" }
    assert:
      exit_code: 0
      equals: { "data.species_name": "zigzagoon", "data.status": "caught" }

  - name: "Route 101 -- catch Wurmple"
    command: "pokedex collection add --pokemon=wurmple --game=ruby --method=catch"
    capture: { "wurmple_id": "data.id" }
    assert:
      exit_code: 0
      equals: { "data.species_name": "wurmple", "data.method": "catch" }

  - name: "Route 101 -- check Poochyena evolution chain"
    command: "pokedex pokemon evolutions poochyena"
    assert:
      exit_code: 0
      equals: { "data.species_name": "poochyena" }
      contains: { "data.children.0.species_name": "mightyena" }

  - name: "Route 101 -- evolve Poochyena to Mightyena"
    command: "pokedex collection add --pokemon=mightyena --game=ruby --method=evolve"
    assert:
      exit_code: 0
      equals: { "data.species_name": "mightyena", "data.method": "evolve" }

  - name: "Route 101 -- update Poochyena status to evolved"
    command: "pokedex collection update $poochyena_id --status=evolved"
    assert:
      exit_code: 0
      equals: { "data.status": "evolved", "data.species_name": "poochyena" }

