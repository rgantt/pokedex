  # ============================================================
  # LGPE FEATURE: Alolan form trade (in-game NPC trades)
  # ============================================================
  - name: "Alolan trade -- check Geodude forms"
    command: "pokedex pokemon forms geodude"
    assert:
      exit_code: 0
      array_len: { "data": { "min": 2 } }
      contains: { "data.1.name": "geodude-alola" }

  - name: "Alolan trade -- add Alolan Geodude via NPC trade"
    command: "pokedex collection add --pokemon=geodude --form=alola --game=lets-go-pikachu --method=trade"
    capture: { "alolan_geodude_id": "data.id" }
    assert:
      exit_code: 0
      equals: { "data.species_name": "geodude", "data.form_name": "alola", "data.method": "trade" }
      contains: { "data.display_name": "Alolan" }

  - name: "Alolan trade -- mark original Geodude as traded away"
    command: "pokedex collection update $geodude_id --status=traded_away"
    assert:
      exit_code: 0
      equals: { "data.status": "traded_away", "data.species_name": "geodude" }

  # ============================================================
  # LOCATION 5: kanto-route-24 (Nugget Bridge)
