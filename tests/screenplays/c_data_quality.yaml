# Screenplays are CHEAP regression tests produced by exploratory test agents.
# If a step fails, investigate: is it a real bug (fix the code) or a stale
# assertion (update or delete this file)? The INTENT matters, not the exact
# implementation. Don't contort the CLI to make a stale screenplay pass.
name: "Data Quality Auditor"
persona: "C"
description: "Systematically verify encounter data across all game eras, evolution trigger details, probability bounds, and per-game detail fields"
needs_seed: true
mutates_collection: false

steps:
  # ══════════════════════════════════════════════════════════════════════
  # 1. GENERATION 1 (Red) — Kanto locations, levels, rarity
  # ══════════════════════════════════════════════════════════════════════

  - name: "pikachu red encounters are in Kanto locations"
    command: "pokedex pokemon encounters pikachu --game=red"
    assert:
      exit_code: 0
      has_fields: ["data.0.location", "data.0.rarity", "data.0.min_level"]
      contains: { "data": "Viridian Forest" }

  - name: "pikachu red encounters include Power Plant"
    command: "pokedex pokemon encounters pikachu --game=red"
    assert:
      exit_code: 0
      contains: { "data": "Power Plant" }
      array_len: { "data": { "min": 2 } }

  - name: "geodude red encounters are in Kanto caves"
    command: "pokedex pokemon encounters geodude --game=red"
    assert:
      exit_code: 0
      contains: { "data": "Mt. Moon" }
      array_len: { "data": { "min": 10 } }

  - name: "geodude red has Victory Road encounters"
    command: "pokedex pokemon encounters geodude --game=red"
    assert:
      exit_code: 0
      contains: { "data": "Victory Road" }
      has_fields: ["data.0.game_slug"]

  - name: "gastly red encounters are in Pokemon Tower only"
    command: "pokedex pokemon encounters gastly --game=red"
    assert:
      exit_code: 0
      type_of: { "data": "array" }
      array_len: { "data": { "min": 20 } }

  - name: "snorlax red encounters use Pokeflute method"
    command: "pokedex pokemon encounters snorlax --game=red"
    assert:
      exit_code: 0
      array_len: { "data": { "min": 2, "max": 2 } }
      contains: { "data": "Playing Pok\u00e9flute" }

  # ══════════════════════════════════════════════════════════════════════
  # 2. GENERATION 4 (Diamond) — Sinnoh locations, conditions
  # ══════════════════════════════════════════════════════════════════════

  - name: "shinx diamond encounters are in Sinnoh routes"
    command: "pokedex pokemon encounters shinx --game=diamond"
    assert:
      exit_code: 0
      contains: { "data": "Route 202" }
      array_len: { "data": { "min": 5 } }

  - name: "shinx diamond encounters have HATEOAS actions"
    command: "pokedex pokemon encounters shinx --game=diamond"
    assert:
      exit_code: 0
      has_fields: ["actions", "meta.command"]
      contains: { "actions": "pokedex pokemon show shinx" }

  - name: "starly diamond encounters include conditions"
    command: "pokedex pokemon encounters starly --game=diamond"
    assert:
      exit_code: 0
      contains: { "data": "Not during a swarm" }
      array_len: { "data": { "min": 15 } }

  - name: "machop diamond encounters are in Sinnoh"
    command: "pokedex pokemon encounters machop --game=diamond"
    assert:
      exit_code: 0
      contains: { "data": "Mt. Coronet" }
      has_fields: ["data.0.rarity"]

  # Route 201 rarity sums (known issue E001: sums to 95 not 100)
  - name: "route 201 diamond encounters exist"
    command: "pokedex location encounters 'Route 201' --game=diamond"
    assert:
      exit_code: 0
      type_of: { "data": "array" }
      equals: { "meta.total": 8 }

  # ══════════════════════════════════════════════════════════════════════
  # 3. GENERATION 8 (Sword) — Weather details populated
  # ══════════════════════════════════════════════════════════════════════

  - name: "wooloo sword encounters have weather details"
    command: "pokedex pokemon encounters wooloo --game=sword"
    assert:
      exit_code: 0
      has_fields: ["data.0.details"]
      array_len: { "data": { "min": 10 } }

  - name: "wooloo sword includes Galar Route 1"
    command: "pokedex pokemon encounters wooloo --game=sword"
    assert:
      exit_code: 0
      contains: { "data": "Galar Route 1" }
      array_len: { "data": { "min": 1 } }

  - name: "eevee sword encounters include weather rates"
    command: "pokedex pokemon encounters eevee --game=sword"
    assert:
      exit_code: 0
      has_fields: ["data.0.details"]
      array_len: { "data": { "min": 10 } }

  - name: "eevee sword encounters include gift from LGPE save"
    command: "pokedex pokemon encounters eevee --game=sword"
    assert:
      exit_code: 0
      contains: { "data": "Gift" }
      array_len: { "data": { "min": 1 } }

  # ══════════════════════════════════════════════════════════════════════
  # 4. BRILLIANT DIAMOND — BDSP-specific details
  # ══════════════════════════════════════════════════════════════════════

  - name: "bidoof brilliant-diamond encounters have rate details"
    command: "pokedex pokemon encounters bidoof --game=brilliant-diamond"
    assert:
      exit_code: 0
      has_fields: ["data.0.details"]
      array_len: { "data": { "min": 15 } }

  - name: "bidoof brilliant-diamond includes Sinnoh routes"
    command: "pokedex pokemon encounters bidoof --game=brilliant-diamond"
    assert:
      exit_code: 0
      contains: { "data": "Sinnoh Route 201" }
      array_len: { "data": { "min": 5 } }

  - name: "drifloon brilliant-diamond is a special Friday encounter"
    command: "pokedex pokemon encounters drifloon --game=brilliant-diamond"
    assert:
      exit_code: 0
      array_len: { "data": { "min": 1, "max": 1 } }
      contains: { "data": "Friday" }

  # ══════════════════════════════════════════════════════════════════════
  # 5. LEGENDS ARCEUS — Alpha levels and time-of-day fields
  # ══════════════════════════════════════════════════════════════════════

  - name: "starly legends-arceus encounters have alpha levels"
    command: "pokedex pokemon encounters starly --game=legends-arceus"
    assert:
      exit_code: 0
      has_fields: ["data.0.details"]
      array_len: { "data": { "min": 15 } }

  - name: "starly legends-arceus includes time-of-day booleans"
    command: "pokedex pokemon encounters starly --game=legends-arceus"
    assert:
      exit_code: 0
      contains: { "data": "Horseshoe Plains" }
      has_fields: ["data.0.details"]

  - name: "growlithe legends-arceus shows Hisuian form"
    command: "pokedex pokemon encounters growlithe --game=legends-arceus"
    assert:
      exit_code: 0
      contains: { "data.0.pokemon_name": "Hisuian Growlithe" }
      array_len: { "data": { "min": 2 } }

  - name: "zorua legends-arceus shows Hisuian form with alpha levels"
    command: "pokedex pokemon encounters zorua --game=legends-arceus"
    assert:
      exit_code: 0
      contains: { "data.0.pokemon_name": "Hisuian Zorua" }
      has_fields: ["data.0.details"]

  # ══════════════════════════════════════════════════════════════════════
  # 6. SCARLET — Probability fields and terrain types
  # ══════════════════════════════════════════════════════════════════════

  - name: "lechonk scarlet encounters have probability_overall"
    command: "pokedex pokemon encounters lechonk --game=scarlet"
    assert:
      exit_code: 0
      contains: { "data": "probability_overall" }
      array_len: { "data": { "min": 5 } }

  - name: "lechonk scarlet encounters include Paldea locations"
    command: "pokedex pokemon encounters lechonk --game=scarlet"
    assert:
      exit_code: 0
      contains: { "data": "Poco Path" }
      has_fields: ["data.0.details"]

  - name: "magikarp scarlet encounters have terrain fields"
    command: "pokedex pokemon encounters magikarp --game=scarlet"
    assert:
      exit_code: 0
      contains: { "data": "on_terrain_watersurface" }
      array_len: { "data": { "min": 20 } }

  - name: "fuecoco scarlet is a starter gift"
    command: "pokedex pokemon encounters fuecoco --game=scarlet"
    assert:
      exit_code: 0
      array_len: { "data": { "min": 1, "max": 1 } }
      contains: { "data": "Gift" }

  # ══════════════════════════════════════════════════════════════════════
  # 7. LEGENDS Z-A — Alpha details populated
  # ══════════════════════════════════════════════════════════════════════

  - name: "fletchling legends-za encounters in Wild Zones"
    command: "pokedex pokemon encounters fletchling --game=legends-za"
    assert:
      exit_code: 0
      contains: { "data": "Wild Zone" }
      array_len: { "data": { "min": 2 } }

  - name: "fletchling legends-za has alpha details"
    command: "pokedex pokemon encounters fletchling --game=legends-za"
    assert:
      exit_code: 0
      contains: { "data": "Alpha" }
      has_fields: ["data.0.details"]

  - name: "pikachu legends-za encounters exist with alpha info"
    command: "pokedex pokemon encounters pikachu --game=legends-za"
    assert:
      exit_code: 0
      array_len: { "data": { "min": 2, "max": 2 } }
      contains: { "data": "Alpha" }

  # ══════════════════════════════════════════════════════════════════════
  # 8. EVOLUTION CHAINS — Trade evolutions have trigger_details
  # ══════════════════════════════════════════════════════════════════════

  - name: "gengar evolution shows trade trigger"
    command: "pokedex pokemon evolutions gengar"
    assert:
      exit_code: 0
      has_fields: ["data.children.0.children.0.methods"]
      equals: { "data.children.0.children.0.methods.0.trigger": "trade" }

  - name: "gengar evolution shows Trade trigger_detail"
    command: "pokedex pokemon evolutions gengar"
    assert:
      exit_code: 0
      equals: { "data.children.0.children.0.methods.0.trigger_detail": "Trade" }
      has_fields: ["data.children.0.methods"]

  - name: "alakazam evolution shows trade trigger"
    command: "pokedex pokemon evolutions alakazam"
    assert:
      exit_code: 0
      equals: { "data.children.0.children.0.methods.0.trigger": "trade" }
      contains: { "data": "Trade" }

  - name: "machamp evolution shows trade trigger"
    command: "pokedex pokemon evolutions machamp"
    assert:
      exit_code: 0
      equals: { "data.children.0.children.0.methods.0.trigger": "trade" }
      contains: { "data": "Trade" }

  - name: "slowking evolution shows trade with kings-rock"
    command: "pokedex pokemon evolutions slowking"
    assert:
      exit_code: 0
      contains: { "data": "kings-rock" }
      has_fields: ["data.children"]

  # ══════════════════════════════════════════════════════════════════════
  # 9. APPLIN CHAIN — Dipplin and Hydrapple (fixed V001)
  # ══════════════════════════════════════════════════════════════════════

  - name: "applin evolution shows Dipplin with Syrupy Apple"
    command: "pokedex pokemon evolutions applin"
    assert:
      exit_code: 0
      contains: { "data": "Syrupy Apple" }
      has_fields: ["data.children"]

  - name: "applin evolution shows Hydrapple with Dragon Cheer"
    command: "pokedex pokemon evolutions applin"
    assert:
      exit_code: 0
      contains: { "data": "Dragon Cheer" }
      has_fields: ["data.children"]

  - name: "applin evolution includes Flapple with tart-apple"
    command: "pokedex pokemon evolutions applin"
    assert:
      exit_code: 0
      contains: { "data": "tart-apple" }
      has_fields: ["data.children"]

  - name: "applin evolution includes Appletun with sweet-apple"
    command: "pokedex pokemon evolutions applin"
    assert:
      exit_code: 0
      contains: { "data": "sweet-apple" }
      has_fields: ["data.children"]

  # ══════════════════════════════════════════════════════════════════════
  # 10. MELTAN EVOLUTION (fixed V002)
  # ══════════════════════════════════════════════════════════════════════

  - name: "meltan evolution shows 400 Meltan Candy"
    command: "pokedex pokemon evolutions meltan"
    assert:
      exit_code: 0
      contains: { "data": "400 Meltan Candy" }
      equals: { "data.children.0.species_name": "melmetal" }

  # ══════════════════════════════════════════════════════════════════════
  # 11. ERROR HANDLING — invalid pokemon returns proper error
  # ══════════════════════════════════════════════════════════════════════

  - name: "nonexistent pokemon returns NOT_FOUND with suggestions"
    command: "pokedex pokemon encounters alpha --game=legends-arceus"
    assert:
      exit_code: 1
      equals: { "error.code": "NOT_FOUND" }
      has_fields: ["actions"]

  # ══════════════════════════════════════════════════════════════════════
  # 12. STATS CROSS-CHECK: pokemon show vs pokemon stats
  # ══════════════════════════════════════════════════════════════════════

  - name: "pikachu show stats values"
    command: "pokedex pokemon show pikachu"
    assert:
      exit_code: 0
      equals: { "data.stats.hp": 35, "data.stats.attack": 55, "data.stats.defense": 40, "data.stats.special_attack": 50, "data.stats.special_defense": 50, "data.stats.speed": 90, "data.stats.total": 320 }

  - name: "pikachu stats endpoint matches show exactly"
    command: "pokedex pokemon stats pikachu"
    assert:
      exit_code: 0
      equals: { "data.hp": 35, "data.attack": 55, "data.defense": 40, "data.special_attack": 50, "data.special_defense": 50, "data.speed": 90, "data.total": 320 }

  - name: "charizard show stats values"
    command: "pokedex pokemon show charizard"
    assert:
      exit_code: 0
      equals: { "data.stats.hp": 78, "data.stats.attack": 84, "data.stats.defense": 78, "data.stats.special_attack": 109, "data.stats.special_defense": 85, "data.stats.speed": 100, "data.stats.total": 534 }

  - name: "charizard stats endpoint matches show exactly"
    command: "pokedex pokemon stats charizard"
    assert:
      exit_code: 0
      equals: { "data.hp": 78, "data.attack": 84, "data.defense": 78, "data.special_attack": 109, "data.special_defense": 85, "data.speed": 100, "data.total": 534 }

  # ══════════════════════════════════════════════════════════════════════
  # 13. TYPE MATCHUP SYMMETRY
  # ══════════════════════════════════════════════════════════════════════

  - name: "dragon is super effective against dragon (attacking)"
    command: "pokedex type matchups dragon"
    assert:
      exit_code: 0
      contains: { "data.attacking.super_effective": "Dragon" }

  - name: "dragon is weak to dragon (defending) — symmetry"
    command: "pokedex type matchups dragon"
    assert:
      exit_code: 0
      contains: { "data.defending.super_effective": "Dragon" }

  - name: "fire SE against grass, grass weak to fire — symmetry"
    command: "pokedex type matchups fire"
    assert:
      exit_code: 0
      contains: { "data.attacking.super_effective": "Grass" }
      has_fields: ["data.attacking.not_very_effective"]

  - name: "dragon has no effect on fairy — symmetry"
    command: "pokedex type matchups dragon"
    assert:
      exit_code: 0
      contains: { "data.attacking.no_effect": "Fairy" }

  # ══════════════════════════════════════════════════════════════════════
  # 14. DEX COUNTS
  # ══════════════════════════════════════════════════════════════════════

  - name: "kanto dex has exactly 151 entries"
    command: "pokedex dex show kanto --limit=200"
    assert:
      exit_code: 0
      equals: { "meta.total": 151 }
      array_len: { "data": { "min": 151, "max": 151 } }

  # ══════════════════════════════════════════════════════════════════════
  # 15. MELTAN ENCOUNTERS — no wild encounters expected
  # ══════════════════════════════════════════════════════════════════════

  - name: "meltan has no wild encounters"
    command: "pokedex pokemon encounters meltan"
    assert:
      exit_code: 0
      type_of: { "data": "array" }
      array_len: { "data": { "min": 0, "max": 0 } }
