# Screenplays are CHEAP regression tests produced by exploratory test agents.
# If a step fails, investigate: is it a real bug (fix the code) or a stale
# assertion (update or delete this file)? The INTENT matters, not the exact
# implementation. Don't contort the CLI to make a stale screenplay pass.
name: "Forms & Alpha Specialist"
persona: "G"
description: "Round 13: Mega/Primal/Gmax forms with type and BST validation, totem forms, Vivillon is_default, Minior/Alcremie/Pumpkaboo size forms, regional forms, alpha encounters and collection, Z-A alpha_levels structure"
needs_seed: true
mutates_collection: true

steps:
  # ===== Mega Charizard X vs Y: different types, same BST =====

  - name: "Mega Charizard X is Fire/Dragon"
    command: "pokedex pokemon show charizard-mega-x"
    assert:
      exit_code: 0
      equals: {"data.display_name": "Mega Charizard X", "data.types": ["Fire", "Dragon"]}
      has_fields: ["data.stats", "data.abilities"]

  - name: "Mega Charizard Y is Fire/Flying (different from X)"
    command: "pokedex pokemon show charizard-mega-y"
    assert:
      exit_code: 0
      equals: {"data.display_name": "Mega Charizard Y", "data.types": ["Fire", "Flying"]}
      has_fields: ["data.stats", "data.abilities"]

  - name: "Mega Charizard X has BST 634 (higher than base 534)"
    command: "pokedex pokemon stats charizard-mega-x"
    assert:
      exit_code: 0
      equals: {"data.pokemon_name": "Mega Charizard X", "data.total": 634, "data.attack": 130}
      has_fields: ["data.hp", "data.speed"]

  - name: "Mega Charizard Y has BST 634 with SpAtk 159"
    command: "pokedex pokemon stats charizard-mega-y"
    assert:
      exit_code: 0
      equals: {"data.pokemon_name": "Mega Charizard Y", "data.total": 634, "data.special_attack": 159}
      has_fields: ["data.hp", "data.speed"]

  - name: "Base Charizard has BST 534 (100 less than mega forms)"
    command: "pokedex pokemon stats charizard"
    assert:
      exit_code: 0
      equals: {"data.pokemon_name": "Charizard", "data.total": 534}
      has_fields: ["data.attack", "data.special_attack"]

  # ===== Charizard forms: mega is_battle_only, gmax is_battle_only =====

  - name: "Charizard has 4 forms: base, gmax, mega-x, mega-y"
    command: "pokedex pokemon forms charizard"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 4, "max": 4}}
      equals: {"data.0.is_default": true, "data.0.display_name": "Charizard"}

  - name: "Charizard Gmax is_battle_only=true, not mega"
    command: "pokedex pokemon forms charizard"
    assert:
      exit_code: 0
      equals: {"data.1.is_battle_only": true, "data.1.is_mega": false, "data.1.display_name": "Gigantamax Charizard"}

  - name: "Charizard Mega X is_mega=true and is_battle_only=true"
    command: "pokedex pokemon forms charizard"
    assert:
      exit_code: 0
      equals: {"data.2.is_mega": true, "data.2.is_battle_only": true, "data.2.form_name": "mega-x"}

  - name: "Charizard Mega Y is_mega=true and is_battle_only=true"
    command: "pokedex pokemon forms charizard"
    assert:
      exit_code: 0
      equals: {"data.3.is_mega": true, "data.3.is_battle_only": true, "data.3.form_name": "mega-y"}

  # ===== Primal forms: type changes, BST boost =====

  - name: "Primal Groudon is Ground/Fire (gains Fire type)"
    command: "pokedex pokemon show groudon-primal"
    assert:
      exit_code: 0
      equals: {"data.display_name": "Primal Groudon", "data.types": ["Ground", "Fire"], "data.is_legendary": true}
      has_fields: ["data.stats"]

  - name: "Primal Groudon BST 770 vs base 670"
    command: "pokedex pokemon stats groudon-primal"
    assert:
      exit_code: 0
      equals: {"data.total": 770, "data.attack": 180}
      has_fields: ["data.hp", "data.speed"]

  - name: "Base Groudon BST 670 (100 less than primal)"
    command: "pokedex pokemon stats groudon"
    assert:
      exit_code: 0
      equals: {"data.total": 670, "data.attack": 150}

  - name: "Groudon primal form is_battle_only=true"
    command: "pokedex pokemon forms groudon"
    assert:
      exit_code: 0
      equals: {"data.1.is_battle_only": true, "data.1.form_name": "primal"}
      array_len: {"data": {"min": 2, "max": 2}}

  - name: "Primal Kyogre stays Water-only, BST 770"
    command: "pokedex pokemon show kyogre-primal"
    assert:
      exit_code: 0
      equals: {"data.display_name": "Primal Kyogre", "data.types": ["Water"], "data.stats.total": 770}
      has_fields: ["data.abilities"]

  - name: "Base Kyogre BST 670"
    command: "pokedex pokemon stats kyogre"
    assert:
      exit_code: 0
      equals: {"data.total": 670, "data.pokemon_name": "Kyogre"}

  # ===== Gigantamax: is_battle_only, same stats as base =====

  - name: "Pikachu Gmax is_battle_only=true"
    command: "pokedex pokemon forms pikachu"
    assert:
      exit_code: 0
      contains: {"data": "Gigantamax Pikachu"}
      array_len: {"data": {"min": 2}}

  - name: "Pikachu Gmax has same BST 320 as base (gmax does not boost stats)"
    command: "pokedex pokemon stats pikachu-gmax"
    assert:
      exit_code: 0
      equals: {"data.pokemon_name": "Gigantamax Pikachu", "data.total": 320}
      has_fields: ["data.hp", "data.attack"]

  - name: "Charizard Gmax has same BST 534 as base"
    command: "pokedex pokemon stats charizard-gmax"
    assert:
      exit_code: 0
      equals: {"data.pokemon_name": "Gigantamax Charizard", "data.total": 534}

  # ===== Totem forms in SM/USUM =====

  - name: "Raticate has totem-alola form"
    command: "pokedex pokemon forms raticate"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 3, "max": 3}}
      contains: {"data": "Totem Alolan Raticate"}

  - name: "Totem Alolan Raticate is Dark/Normal"
    command: "pokedex pokemon show raticate-totem-alola"
    assert:
      exit_code: 0
      equals: {"data.display_name": "Totem Alolan Raticate", "data.types": ["Dark", "Normal"]}
      has_fields: ["data.stats"]

  - name: "Mimikyu has 4 forms including totem variants"
    command: "pokedex pokemon forms mimikyu"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 4, "max": 4}}
      equals: {"data.0.is_default": true, "data.0.form_name": "disguised"}

  - name: "Mimikyu busted form is_battle_only=true"
    command: "pokedex pokemon forms mimikyu"
    assert:
      exit_code: 0
      equals: {"data.1.form_name": "busted", "data.1.is_battle_only": true}

  # ===== Regional forms: meowth accessed two ways =====

  - name: "Meowth has 4 forms: base, gmax, alola, galar"
    command: "pokedex pokemon forms meowth"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 4, "max": 4}}
      equals: {"data.0.is_default": true, "data.0.display_name": "Meowth"}

  - name: "Alolan Meowth is Dark type via show command"
    command: "pokedex pokemon show meowth-alola"
    assert:
      exit_code: 0
      equals: {"data.display_name": "Alolan Meowth", "data.types": ["Dark"]}
      has_fields: ["data.stats", "data.abilities"]

  - name: "Galarian Meowth is Steel type"
    command: "pokedex pokemon show meowth-galar"
    assert:
      exit_code: 0
      equals: {"data.display_name": "Galarian Meowth", "data.types": ["Steel"]}
      has_fields: ["data.stats"]

  - name: "Meowth Gmax is_battle_only=true"
    command: "pokedex pokemon forms meowth"
    assert:
      exit_code: 0
      equals: {"data.1.form_name": "gmax", "data.1.is_battle_only": true}

  # ===== Hisuian form types and stats =====

  - name: "Hisuian Growlithe is Fire/Rock"
    command: "pokedex pokemon show growlithe-hisui"
    assert:
      exit_code: 0
      equals: {"data.display_name": "Hisuian Growlithe", "data.types": ["Fire", "Rock"]}
      has_fields: ["data.stats"]

  - name: "Base Growlithe is Fire-only"
    command: "pokedex pokemon show growlithe"
    assert:
      exit_code: 0
      equals: {"data.display_name": "Growlithe", "data.types": ["Fire"]}

  - name: "Hisuian Growlithe stats differ from base (HP=60 vs 55)"
    command: "pokedex pokemon stats growlithe-hisui"
    assert:
      exit_code: 0
      equals: {"data.hp": 60, "data.attack": 75, "data.speed": 55}
      has_fields: ["data.total"]

  - name: "Base Growlithe stats (HP=55, Atk=70, Spd=60)"
    command: "pokedex pokemon stats growlithe"
    assert:
      exit_code: 0
      equals: {"data.hp": 55, "data.attack": 70, "data.speed": 60}

  # ===== Vivillon: meadow is_default, patterns =====

  - name: "Vivillon has 20 pattern forms"
    command: "pokedex pokemon forms vivillon"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 20, "max": 20}}
      contains: {"data": "Meadow Vivillon"}

  - name: "Vivillon meadow is the default form (is_default=true)"
    command: "pokedex pokemon forms vivillon"
    assert:
      exit_code: 0
      equals: {"data.6.is_default": true, "data.6.form_name": "meadow"}

  - name: "Vivillon icy-snow is not default"
    command: "pokedex pokemon forms vivillon"
    assert:
      exit_code: 0
      equals: {"data.0.is_default": false, "data.0.form_name": "icy-snow"}

  - name: "Vivillon polar accessed via show returns correct display name"
    command: "pokedex pokemon show vivillon-polar"
    assert:
      exit_code: 0
      equals: {"data.display_name": "Polar Vivillon", "data.types": ["Bug", "Flying"]}
      has_fields: ["data.stats"]

  # ===== Minior: meteor vs core forms =====

  - name: "Minior has 14 forms (7 meteor + 7 core)"
    command: "pokedex pokemon forms minior"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 14, "max": 14}}
      equals: {"data.0.is_default": true, "data.0.form_name": "red-meteor"}

  - name: "Minior non-default meteor forms are is_battle_only=true"
    command: "pokedex pokemon forms minior"
    assert:
      exit_code: 0
      equals: {"data.1.is_battle_only": true, "data.1.form_name": "orange-meteor"}

  - name: "Minior core forms are not battle-only"
    command: "pokedex pokemon forms minior"
    assert:
      exit_code: 0
      equals: {"data.7.is_battle_only": false, "data.7.form_name": "red"}
      contains: {"data.7.display_name": "Red Core"}

  # ===== Alcremie: many flavor forms =====

  - name: "Alcremie has 64 forms including Gmax"
    command: "pokedex pokemon forms alcremie"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 64, "max": 64}}
      equals: {"data.0.is_default": true}

  - name: "Alcremie default is Vanilla Cream Strawberry Sweet"
    command: "pokedex pokemon forms alcremie"
    assert:
      exit_code: 0
      contains: {"data.0.display_name": "Vanilla Cream"}
      equals: {"data.1.is_battle_only": true}

  # ===== Pumpkaboo/Gourgeist: size forms with stat differences =====

  - name: "Pumpkaboo has 4 size forms"
    command: "pokedex pokemon forms pumpkaboo"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 4, "max": 4}}
      equals: {"data.0.form_name": "average", "data.0.is_default": true}

  - name: "Super Pumpkaboo has higher HP (59) than base Average (49)"
    command: "pokedex pokemon stats pumpkaboo-super"
    assert:
      exit_code: 0
      equals: {"data.pokemon_name": "Super Pumpkaboo", "data.hp": 59, "data.total": 335}

  - name: "Small Pumpkaboo has lower HP (44) than Average (49)"
    command: "pokedex pokemon stats pumpkaboo-small"
    assert:
      exit_code: 0
      equals: {"data.pokemon_name": "Small Pumpkaboo", "data.hp": 44, "data.total": 335}

  - name: "Gourgeist also has 4 size forms"
    command: "pokedex pokemon forms gourgeist"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 4, "max": 4}}
      equals: {"data.0.form_name": "average", "data.0.is_default": true}

  # ===== Deoxys forms with different stats =====

  - name: "Deoxys has 4 forms"
    command: "pokedex pokemon forms deoxys"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 4, "max": 4}}
      equals: {"data.0.is_default": true, "data.0.form_name": "normal"}

  - name: "Deoxys Attack form is not default"
    command: "pokedex pokemon forms deoxys"
    assert:
      exit_code: 0
      equals: {"data.1.is_default": false, "data.1.form_name": "attack"}

  # ===== Rotom forms =====

  - name: "Rotom has 6 forms (base + 5 appliances)"
    command: "pokedex pokemon forms rotom"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 6, "max": 6}}
      equals: {"data.0.types": ["Electric", "Ghost"], "data.0.is_default": true}

  - name: "Rotom Heat form is Electric/Fire"
    command: "pokedex pokemon forms rotom"
    assert:
      exit_code: 0
      equals: {"data.1.form_name": "heat", "data.1.is_default": false}
      contains: {"data.1.display_name": "Heat Rotom"}

  # ===== Castform battle-only forms =====

  - name: "Castform weather forms are battle-only"
    command: "pokedex pokemon forms castform"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 4, "max": 4}}
      equals: {"data.1.is_battle_only": true, "data.0.is_default": true}

  # ===== PLA encounters: alpha_levels field =====

  - name: "Growlithe PLA encounters show Hisuian form with alpha_levels"
    command: "pokedex pokemon encounters growlithe --game=legends-arceus"
    assert:
      exit_code: 0
      equals: {"data.0.pokemon_name": "Hisuian Growlithe"}
      has_fields: ["data.0.details.alpha_levels"]

  - name: "Growlithe PLA alpha_levels is a string range"
    command: "pokedex pokemon encounters growlithe --game=legends-arceus"
    assert:
      exit_code: 0
      type_of: {"data.0.details.alpha_levels": "string"}
      array_len: {"data": {"min": 1}}

  # ===== Z-A encounters: Wild Zone locations and alpha structure =====

  - name: "Pikachu Z-A encounters in Wild Zone locations"
    command: "pokedex pokemon encounters pikachu --game=legends-za"
    assert:
      exit_code: 0
      contains: {"data.0.location": "Wild Zone"}
      equals: {"data.0.game_slug": "legends-za"}

  - name: "Z-A encounter details include alpha_levels or alpha note"
    command: "pokedex pokemon encounters pikachu --game=legends-za"
    assert:
      exit_code: 0
      has_fields: ["data.0.details"]
      contains: {"data": "alpha"}

  - name: "Wild Zone 1 has Z-A encounters"
    command: "pokedex location encounters wild-zone-1 --game=legends-za"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 1}}
      equals: {"data.0.game_slug": "legends-za"}

  - name: "Wild Zone 20 exists (max wild zone)"
    command: "pokedex location encounters wild-zone-20 --game=legends-za"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 1}}

  - name: "Wild Zone 21 does not exist"
    command: "pokedex location encounters wild-zone-21 --game=legends-za"
    assert:
      exit_code: 1
      equals: {"error.code": "NOT_FOUND"}
      has_fields: ["actions"]

  # ===== Alpha collection: add with --alpha flag =====

  - name: "Add alpha Growlithe to PLA collection"
    command: "pokedex collection add --pokemon=growlithe --game=legends-arceus --alpha"
    assert:
      exit_code: 0
      equals: {"data.is_alpha": true, "data.species_name": "growlithe", "data.game": "legends-arceus"}
      has_fields: ["data.id"]

  - name: "Add alpha Snorlax to PLA collection"
    command: "pokedex collection add --pokemon=snorlax --game=legends-arceus --alpha"
    assert:
      exit_code: 0
      equals: {"data.is_alpha": true, "data.species_name": "snorlax"}
      has_fields: ["data.id"]

  - name: "Non-alpha PLA entry has is_alpha=false"
    command: "pokedex collection add --pokemon=eevee --game=legends-arceus"
    assert:
      exit_code: 0
      equals: {"data.is_alpha": false, "data.species_name": "eevee"}
      has_fields: ["data.id", "data.status"]

  - name: "Alpha in non-Legends game gives warning"
    command: "pokedex collection add --pokemon=pikachu --game=red --alpha"
    assert:
      exit_code: 0
      equals: {"data.is_alpha": true}
      contains: {"data.warning": "Alpha"}

  - name: "Alpha in Z-A is valid (no warning field)"
    command: "pokedex collection add --pokemon=pikachu --game=legends-za --alpha"
    assert:
      exit_code: 0
      equals: {"data.is_alpha": true, "data.game": "legends-za"}
      has_fields: ["data.id"]

  - name: "Shiny alpha in Z-A works"
    command: "pokedex collection add --pokemon=eevee --game=legends-za --alpha --shiny"
    assert:
      exit_code: 0
      equals: {"data.is_alpha": true, "data.shiny": true}
      has_fields: ["data.id"]

  # ===== Default form display_name is species name =====

  - name: "Growlithe show uses species name not form-qualified name"
    command: "pokedex pokemon show growlithe"
    assert:
      exit_code: 0
      equals: {"data.display_name": "Growlithe"}
      has_fields: ["data.types"]

  - name: "Deoxys show uses species name (not Normal Deoxys)"
    command: "pokedex pokemon show deoxys"
    assert:
      exit_code: 0
      equals: {"data.display_name": "Deoxys"}
      has_fields: ["data.types", "data.stats"]

  # ===== Error handling =====

  - name: "Nonexistent pokemon returns NOT_FOUND"
    command: "pokedex pokemon encounters nonexistent --game=legends-arceus"
    assert:
      exit_code: 1
      equals: {"error.code": "NOT_FOUND"}
      has_fields: ["actions"]

  - name: "Growlithe not in Z-A returns empty data"
    command: "pokedex pokemon encounters growlithe --game=legends-za"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 0, "max": 0}}
      has_fields: ["actions", "meta"]
