name: "Living Dex Tracker"
persona: "F"
description: >
  Build a living dex in Sword: add 20 pokemon as living_dex, evolve 5
  (add evolved form, mark base as evolved). Verify dex progress --status=living_dex
  only counts living_dex entries. Verify --missing excludes living_dex pokemon.
  Verify traded_away does not inflate dex progress. Transfer some to HOME and
  verify coverage. Test collection list --status=living_dex --sort=dex ordering.
  Round 12: ruthless boundary testing of status interactions, HOME independence,
  duplicate entries, and error recovery.
needs_seed: true
mutates_collection: true

steps:
  # ============================================================
  # PHASE 1: Add 20 pokemon as living_dex in Sword
  # ============================================================
  - name: "Add bulbasaur as living_dex"
    command: "pokedex collection add --pokemon=bulbasaur --game=sword --status=living_dex"
    capture: {"bulbasaur_id": "data.id"}
    assert:
      exit_code: 0
      equals: {"data.species_name": "bulbasaur", "data.status": "living_dex"}
      has_fields: ["data.id", "data.created_at"]

  - name: "Add charmander as living_dex"
    command: "pokedex collection add --pokemon=charmander --game=sword --status=living_dex"
    capture: {"charmander_id": "data.id"}
    assert:
      exit_code: 0
      equals: {"data.species_name": "charmander", "data.status": "living_dex"}

  - name: "Add squirtle as living_dex"
    command: "pokedex collection add --pokemon=squirtle --game=sword --status=living_dex"
    capture: {"squirtle_id": "data.id"}
    assert:
      exit_code: 0
      equals: {"data.species_name": "squirtle", "data.status": "living_dex"}

  - name: "Add caterpie as living_dex"
    command: "pokedex collection add --pokemon=caterpie --game=sword --status=living_dex"
    capture: {"caterpie_id": "data.id"}
    assert:
      exit_code: 0
      equals: {"data.species_name": "caterpie", "data.status": "living_dex"}

  - name: "Add pikachu as living_dex"
    command: "pokedex collection add --pokemon=pikachu --game=sword --status=living_dex"
    capture: {"pikachu_id": "data.id"}
    assert:
      exit_code: 0
      equals: {"data.species_name": "pikachu", "data.status": "living_dex"}

  - name: "Add sandshrew as living_dex"
    command: "pokedex collection add --pokemon=sandshrew --game=sword --status=living_dex"
    capture: {"sandshrew_id": "data.id"}
    assert:
      exit_code: 0
      equals: {"data.species_name": "sandshrew", "data.status": "living_dex"}

  - name: "Add vulpix as living_dex"
    command: "pokedex collection add --pokemon=vulpix --game=sword --status=living_dex"
    capture: {"vulpix_id": "data.id"}
    assert:
      exit_code: 0
      equals: {"data.species_name": "vulpix", "data.status": "living_dex"}

  - name: "Add jigglypuff as living_dex"
    command: "pokedex collection add --pokemon=jigglypuff --game=sword --status=living_dex"
    assert:
      exit_code: 0
      equals: {"data.species_name": "jigglypuff", "data.status": "living_dex"}

  - name: "Add zubat as living_dex"
    command: "pokedex collection add --pokemon=zubat --game=sword --status=living_dex"
    assert:
      exit_code: 0
      equals: {"data.species_name": "zubat", "data.status": "living_dex"}

  - name: "Add oddish as living_dex"
    command: "pokedex collection add --pokemon=oddish --game=sword --status=living_dex"
    assert:
      exit_code: 0
      equals: {"data.species_name": "oddish", "data.status": "living_dex"}

  - name: "Add diglett as living_dex"
    command: "pokedex collection add --pokemon=diglett --game=sword --status=living_dex"
    assert:
      exit_code: 0
      equals: {"data.species_name": "diglett", "data.status": "living_dex"}

  - name: "Add meowth as living_dex"
    command: "pokedex collection add --pokemon=meowth --game=sword --status=living_dex"
    assert:
      exit_code: 0
      equals: {"data.species_name": "meowth", "data.status": "living_dex"}

  - name: "Add growlithe as living_dex"
    command: "pokedex collection add --pokemon=growlithe --game=sword --status=living_dex"
    assert:
      exit_code: 0
      equals: {"data.species_name": "growlithe", "data.status": "living_dex"}

  - name: "Add ponyta as living_dex"
    command: "pokedex collection add --pokemon=ponyta --game=sword --status=living_dex"
    assert:
      exit_code: 0
      equals: {"data.species_name": "ponyta", "data.status": "living_dex"}

  - name: "Add magikarp as living_dex"
    command: "pokedex collection add --pokemon=magikarp --game=sword --status=living_dex"
    assert:
      exit_code: 0
      equals: {"data.species_name": "magikarp", "data.status": "living_dex"}

  - name: "Add eevee as living_dex"
    command: "pokedex collection add --pokemon=eevee --game=sword --status=living_dex"
    capture: {"eevee_id": "data.id"}
    assert:
      exit_code: 0
      equals: {"data.species_name": "eevee", "data.status": "living_dex"}

  - name: "Add snorlax as living_dex"
    command: "pokedex collection add --pokemon=snorlax --game=sword --status=living_dex"
    assert:
      exit_code: 0
      equals: {"data.species_name": "snorlax", "data.status": "living_dex"}

  - name: "Add corviknight as living_dex"
    command: "pokedex collection add --pokemon=corviknight --game=sword --status=living_dex"
    assert:
      exit_code: 0
      equals: {"data.species_name": "corviknight", "data.status": "living_dex"}

  - name: "Add wooloo as living_dex"
    command: "pokedex collection add --pokemon=wooloo --game=sword --status=living_dex"
    capture: {"wooloo_id": "data.id"}
    assert:
      exit_code: 0
      equals: {"data.species_name": "wooloo", "data.status": "living_dex"}

  - name: "Add yamper as living_dex"
    command: "pokedex collection add --pokemon=yamper --game=sword --status=living_dex"
    assert:
      exit_code: 0
      equals: {"data.species_name": "yamper", "data.status": "living_dex"}

  # ============================================================
  # PHASE 2: Evolve 5 pokemon (add evolved form, mark base as evolved)
  # ============================================================
  - name: "Add ivysaur as living_dex (evolved from bulbasaur)"
    command: "pokedex collection add --pokemon=ivysaur --game=sword --status=living_dex"
    assert:
      exit_code: 0
      equals: {"data.species_name": "ivysaur", "data.status": "living_dex"}
      has_fields: ["data.id"]

  - name: "Mark bulbasaur as evolved"
    command: "pokedex collection update $bulbasaur_id --status=evolved"
    assert:
      exit_code: 0
      equals: {"data.status": "evolved", "data.species_name": "bulbasaur"}

  - name: "Add wartortle as living_dex (evolved from squirtle)"
    command: "pokedex collection add --pokemon=wartortle --game=sword --status=living_dex"
    assert:
      exit_code: 0
      equals: {"data.species_name": "wartortle", "data.status": "living_dex"}

  - name: "Mark squirtle as evolved"
    command: "pokedex collection update $squirtle_id --status=evolved"
    assert:
      exit_code: 0
      equals: {"data.status": "evolved", "data.species_name": "squirtle"}

  - name: "Add raichu as living_dex (evolved from pikachu)"
    command: "pokedex collection add --pokemon=raichu --game=sword --status=living_dex"
    assert:
      exit_code: 0
      equals: {"data.species_name": "raichu", "data.status": "living_dex"}

  - name: "Mark pikachu as evolved"
    command: "pokedex collection update $pikachu_id --status=evolved"
    assert:
      exit_code: 0
      equals: {"data.status": "evolved", "data.species_name": "pikachu"}

  - name: "Add sandslash as living_dex (evolved from sandshrew)"
    command: "pokedex collection add --pokemon=sandslash --game=sword --status=living_dex"
    assert:
      exit_code: 0
      equals: {"data.species_name": "sandslash", "data.status": "living_dex"}

  - name: "Mark sandshrew as evolved"
    command: "pokedex collection update $sandshrew_id --status=evolved"
    assert:
      exit_code: 0
      equals: {"data.status": "evolved", "data.species_name": "sandshrew"}

  - name: "Add ninetales as living_dex (evolved from vulpix)"
    command: "pokedex collection add --pokemon=ninetales --game=sword --status=living_dex"
    assert:
      exit_code: 0
      equals: {"data.species_name": "ninetales", "data.status": "living_dex"}

  - name: "Mark vulpix as evolved"
    command: "pokedex collection update $vulpix_id --status=evolved"
    assert:
      exit_code: 0
      equals: {"data.status": "evolved", "data.species_name": "vulpix"}

  # ============================================================
  # PHASE 3: Add traded_away entries to test they don't inflate progress
  # ============================================================
  - name: "Add geodude as traded_away"
    command: "pokedex collection add --pokemon=geodude --game=sword --status=traded_away"
    assert:
      exit_code: 0
      equals: {"data.status": "traded_away", "data.species_name": "geodude"}

  - name: "Add psyduck as traded_away"
    command: "pokedex collection add --pokemon=psyduck --game=sword --status=traded_away"
    assert:
      exit_code: 0
      equals: {"data.status": "traded_away", "data.species_name": "psyduck"}

  # ============================================================
  # PHASE 4: Verify dex progress --status=living_dex only counts living_dex
  # ============================================================
  - name: "Dex progress with living_dex filter excludes evolved and traded_away"
    command: "pokedex dex progress galar --status=living_dex"
    assert:
      exit_code: 0
      has_fields: ["data.caught", "data.total", "data.percentage", "data.entries"]
      type_of: {"data.entries": "array"}

  - name: "Dex progress with living_dex --caught shows only living_dex species"
    command: "pokedex dex progress galar --status=living_dex --caught --limit=50"
    assert:
      exit_code: 0
      has_fields: ["data.caught", "data.entries"]
      array_len: {"data.entries": {"min": 1}}

  # ============================================================
  # PHASE 5: Verify --missing excludes living_dex pokemon
  # ============================================================
  - name: "Missing list with living_dex filter shows uncaught species"
    command: "pokedex dex progress galar --status=living_dex --missing --limit=5"
    assert:
      exit_code: 0
      has_fields: ["data.caught", "data.total", "data.entries"]
      array_len: {"data.entries": {"min": 5, "max": 5}}

  # ============================================================
  # PHASE 6: Verify traded_away does not inflate dex progress
  # ============================================================
  - name: "Add traded_away-only species not in other status to verify exclusion"
    command: "pokedex collection add --pokemon=mankey --game=sword --status=traded_away"
    assert:
      exit_code: 0
      equals: {"data.status": "traded_away"}

  - name: "Dex progress unfiltered should not count traded_away-only species"
    command: "pokedex dex progress national --caught --limit=400"
    assert:
      exit_code: 0
      has_fields: ["data.caught", "data.total"]
      type_of: {"data.entries": "array"}

  # ============================================================
  # PHASE 7: Transfer to HOME, verify coverage
  # ============================================================
  - name: "HOME coverage baseline"
    command: "pokedex home coverage"
    capture: {"home_baseline": "data.caught"}
    assert:
      exit_code: 0
      has_fields: ["data.caught", "data.total", "data.percentage"]

  - name: "Transfer eevee to HOME"
    command: "pokedex collection update $eevee_id --in-home=true"
    assert:
      exit_code: 0
      equals: {"data.in_home": true, "data.species_name": "eevee"}

  - name: "HOME coverage increased after transfer"
    command: "pokedex home coverage"
    assert:
      exit_code: 0
      has_fields: ["data.caught", "data.total", "data.percentage"]

  - name: "HOME status shows transferred pokemon"
    command: "pokedex home status"
    assert:
      exit_code: 0
      has_fields: ["data.total_in_home", "data.unique_species_in_home", "data.by_game_origin"]

  # ============================================================
  # PHASE 8: Transfer wooloo to HOME and change status to transferred
  # ============================================================
  - name: "Transfer wooloo to HOME and mark as transferred"
    command: "pokedex collection update $wooloo_id --status=transferred --in-home=true"
    assert:
      exit_code: 0
      equals: {"data.status": "transferred", "data.in_home": true}

  - name: "Wooloo still in HOME after status change (in_home independent of status)"
    command: "pokedex collection show $wooloo_id"
    assert:
      exit_code: 0
      equals: {"data.in_home": true, "data.status": "transferred"}
      has_fields: ["data.species_name"]

  # ============================================================
  # PHASE 9: Collection list --status=living_dex --sort=dex
  # ============================================================
  - name: "Collection list living_dex sorted by dex number"
    command: "pokedex collection list --status=living_dex --sort=dex --limit=50"
    assert:
      exit_code: 0
      type_of: {"data": "array"}
      has_fields: ["meta.total", "meta.limit"]
      array_len: {"data": {"min": 1}}

  - name: "Collection list living_dex with in-home filter"
    command: "pokedex collection list --status=living_dex --in-home"
    assert:
      exit_code: 0
      type_of: {"data": "array"}
      has_fields: ["meta.total"]

  # ============================================================
  # PHASE 10: Edge cases and error handling
  # ============================================================
  - name: "Adding duplicate species as living_dex succeeds (multiple entries allowed)"
    command: "pokedex collection add --pokemon=eevee --game=sword --status=living_dex"
    assert:
      exit_code: 0
      equals: {"data.species_name": "eevee", "data.status": "living_dex"}
      has_fields: ["data.id"]

  - name: "Invalid status returns error with recovery actions"
    command: "pokedex collection add --pokemon=pikachu --game=sword --status=bogus"
    assert:
      exit_code: 1
      has_fields: ["error.code", "error.message", "actions"]
      contains: {"error.message": "Invalid status"}

  - name: "Invalid dex name returns NOT_FOUND with actions"
    command: "pokedex dex progress nonexistent-dex"
    assert:
      exit_code: 1
      equals: {"error.code": "NOT_FOUND"}
      has_fields: ["actions"]

  - name: "Invalid status on dex progress returns INVALID_PARAMETER"
    command: "pokedex dex progress galar --status=bogus"
    assert:
      exit_code: 1
      equals: {"error.code": "INVALID_PARAMETER"}
      has_fields: ["actions"]

  - name: "Collection show with nonexistent ID returns NOT_FOUND"
    command: "pokedex collection show 99999"
    assert:
      exit_code: 1
      equals: {"error.code": "NOT_FOUND"}
      has_fields: ["actions"]

  - name: "Dry-run add previews without saving"
    command: "pokedex collection add --pokemon=gengar --game=sword --status=living_dex --dry-run"
    assert:
      exit_code: 0
      equals: {"data.dry_run": true}
      has_fields: ["actions"]

  - name: "Collection stats show status breakdown"
    command: "pokedex collection stats --game=sword"
    assert:
      exit_code: 0
      has_fields: ["data.total_entries", "data.unique_species", "data.by_status"]
      type_of: {"data.by_status": "array"}

  - name: "HOME missing list has pagination"
    command: "pokedex home missing --limit=3"
    assert:
      exit_code: 0
      type_of: {"data": "array"}
      array_len: {"data": {"min": 3, "max": 3}}
