# Screenplays are CHEAP regression tests produced by exploratory test agents.
# If a step fails, investigate: is it a real bug (fix the code) or a stale
# assertion (update or delete this file)? The INTENT matters, not the exact
# implementation. Don't contort the CLI to make a stale screenplay pass.
name: "Black Playthrough - Route 1 to Victory Road"
persona: black_playthrough
description: >
  End-to-end Black (Gen 5) playthrough testing the discover-inspect-catch-evolve-verify
  loop across Route 1-3, Wellspring Cave, Route 4, Desert Resort, Route 5-6,
  Chargestone Cave, Route 7-8, Twist Mountain, Route 9, and Victory Road.
  Gen 5 pre-National-Dex should contain only Unova-native species (IDs 494-649),
  but encounter data includes pre-Gen-5 species via fishing/surfing -- noted as
  known issue E002.
needs_seed: true
mutates_collection: true

steps:
  # ============================================================
  # LOCATION 1: unova-route-1
  # ============================================================
  - name: "Route 1 -- discover encounters"
    command: "pokedex location encounters unova-route-1 --game=black"
    assert:
      exit_code: 0
      has_fields: ["data", "actions", "meta"]
      equals: { "meta.total": 28 }

  - name: "Route 1 -- inspect Lillipup"
    command: "pokedex pokemon show lillipup"
    assert:
      exit_code: 0
      equals: { "data.name": "lillipup", "data.generation": 5 }
      has_fields: ["data.types", "data.stats", "data.abilities"]

  - name: "Route 1 -- catch Lillipup"
    command: "pokedex collection add --pokemon=lillipup --game=black --method=catch"
    capture: { "lillipup_id": "data.id" }
    assert:
      exit_code: 0
      equals: { "data.species_name": "lillipup", "data.status": "caught", "data.method": "catch" }
      has_fields: ["data.id", "data.created_at"]

  - name: "Route 1 -- catch Patrat"
    command: "pokedex collection add --pokemon=patrat --game=black --method=catch"
    capture: { "patrat_id": "data.id" }
    assert:
      exit_code: 0
      equals: { "data.species_name": "patrat", "data.status": "caught" }

  - name: "Route 1 -- catch Audino"
    command: "pokedex collection add --pokemon=audino --game=black --method=catch"
    assert:
      exit_code: 0
      equals: { "data.species_name": "audino", "data.status": "caught" }

  - name: "Route 1 -- check Lillipup evolution chain"
    command: "pokedex pokemon evolutions lillipup"
    assert:
      exit_code: 0
      equals: { "data.species_name": "lillipup" }
      contains: { "data.children.0.species_name": "herdier" }

  - name: "Route 1 -- evolve Lillipup to Herdier"
    command: "pokedex collection add --pokemon=herdier --game=black --method=evolve"
    capture: { "herdier_id": "data.id" }
    assert:
      exit_code: 0
      equals: { "data.species_name": "herdier", "data.method": "evolve" }

  - name: "Route 1 -- update Lillipup status to evolved"
    command: "pokedex collection update $lillipup_id --status=evolved"
    assert:
      exit_code: 0
      equals: { "data.status": "evolved", "data.species_name": "lillipup" }

  - name: "Route 1 -- evolve Patrat to Watchog"
    command: "pokedex collection add --pokemon=watchog --game=black --method=evolve"
    assert:
      exit_code: 0
      equals: { "data.species_name": "watchog", "data.method": "evolve" }

  - name: "Route 1 -- update Patrat status to evolved"
    command: "pokedex collection update $patrat_id --status=evolved"
    assert:
      exit_code: 0
      equals: { "data.status": "evolved", "data.species_name": "patrat" }

