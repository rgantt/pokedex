# Screenplays are CHEAP regression tests produced by exploratory test agents.
# If a step fails, investigate: is it a real bug (fix the code) or a stale
# assertion (update or delete this file)? The INTENT matters, not the exact
# implementation. Don't contort the CLI to make a stale screenplay pass.
name: "Variant Collector: Form Variants & HATEOAS Consistency"
persona: "I"
description: "Round 14: Ogerpon mask forms, Terapagos forms, Paldean forms, paradox pokemon, gender-variant pokemon, mega BST +100 validation, form-specific collection workflow, Urshifu gmax dedup, form_name consistency across 10+ pokemon"
needs_seed: true
mutates_collection: true

steps:
  # ===== Ogerpon: 4 mask forms with different types =====

  - name: "Ogerpon has exactly 4 mask forms"
    command: "pokedex pokemon forms ogerpon"
    assert:
      exit_code: 0
      array_len: { "data": { "min": 4, "max": 4 } }
      equals: { "data.0.is_default": true }

  - name: "Ogerpon mask forms have correct secondary types"
    command: "pokedex pokemon forms ogerpon"
    assert:
      exit_code: 0
      equals: { "data.0.types": ["Grass"], "data.1.types": ["Grass", "Water"] }
      contains: { "data.1.name": "wellspring" }

  - name: "Ogerpon Hearthflame is Grass/Fire and Cornerstone is Grass/Rock"
    command: "pokedex pokemon forms ogerpon"
    assert:
      exit_code: 0
      equals: { "data.2.types": ["Grass", "Fire"], "data.3.types": ["Grass", "Rock"] }

  - name: "Ogerpon forms have HATEOAS add_form_to_collection actions"
    command: "pokedex pokemon forms ogerpon"
    assert:
      exit_code: 0
      contains: { "actions": "wellspring-mask" }
      has_fields: ["actions"]

  # ===== Terapagos: Normal, Terastal, Stellar =====

  - name: "Terapagos has 3 forms"
    command: "pokedex pokemon forms terapagos"
    assert:
      exit_code: 0
      array_len: { "data": { "min": 3, "max": 3 } }
      equals: { "data.0.is_default": true, "data.0.types": ["Normal"] }

  - name: "Terapagos Terastal and Stellar are battle-only"
    command: "pokedex pokemon forms terapagos"
    assert:
      exit_code: 0
      equals: { "data.1.is_battle_only": true, "data.2.is_battle_only": true }
      contains: { "data.1.name": "terastal" }

  - name: "Terapagos base has 450 BST and Stellar has 700 BST"
    command: "pokedex pokemon stats terapagos"
    assert:
      exit_code: 0
      equals: { "data.total": 450 }
      has_fields: ["data.hp", "data.speed"]

  - name: "Terapagos Stellar form has 700 BST"
    command: "pokedex pokemon stats terapagos-stellar"
    assert:
      exit_code: 0
      equals: { "data.total": 700 }
      has_fields: ["data.attack", "data.defense"]

  # ===== Paldean Tauros: Combat, Blaze, Aqua breeds =====

  - name: "Tauros has 4 forms including 3 Paldean breeds"
    command: "pokedex pokemon forms tauros"
    assert:
      exit_code: 0
      array_len: { "data": { "min": 4, "max": 4 } }
      equals: { "data.0.types": ["Normal"] }

  - name: "Paldean Tauros Combat Breed is Fighting type"
    command: "pokedex pokemon forms tauros"
    assert:
      exit_code: 0
      equals: { "data.1.form_name": "paldea-combat-breed", "data.1.types": ["Fighting"] }

  - name: "Paldean Tauros Blaze is Fighting/Fire and Aqua is Fighting/Water"
    command: "pokedex pokemon forms tauros"
    assert:
      exit_code: 0
      equals: { "data.2.types": ["Fighting", "Fire"], "data.3.types": ["Fighting", "Water"] }

  - name: "Paldean Wooper is Poison/Ground unlike base Water/Ground"
    command: "pokedex pokemon forms wooper"
    assert:
      exit_code: 0
      array_len: { "data": { "min": 2, "max": 2 } }
      equals: { "data.0.types": ["Water", "Ground"], "data.1.types": ["Poison", "Ground"] }

  # ===== Paradox Pokemon: standalone species, not forms =====

  - name: "Great Tusk is standalone species with 1 form"
    command: "pokedex pokemon forms great-tusk"
    assert:
      exit_code: 0
      array_len: { "data": { "min": 1, "max": 1 } }
      equals: { "data.0.is_default": true }

  - name: "Great Tusk is Ground/Fighting Paradox Pokemon"
    command: "pokedex pokemon show great-tusk"
    assert:
      exit_code: 0
      equals: { "data.types": ["Ground", "Fighting"], "data.genus": "Paradox Pok\u00e9mon" }
      has_fields: ["data.stats"]

  - name: "Iron Valiant is standalone Fairy/Fighting Paradox Pokemon"
    command: "pokedex pokemon show iron-valiant"
    assert:
      exit_code: 0
      equals: { "data.types": ["Fairy", "Fighting"], "data.genus": "Paradox Pok\u00e9mon" }
      has_fields: ["data.abilities"]

  - name: "Iron Valiant has only 1 form (not a form of another species)"
    command: "pokedex pokemon forms iron-valiant"
    assert:
      exit_code: 0
      array_len: { "data": { "min": 1, "max": 1 } }
      equals: { "data.0.name": "iron-valiant" }

  # ===== Gender differences: Meowstic M/F, Indeedee M/F =====

  - name: "Meowstic has male, female, and mega forms"
    command: "pokedex pokemon forms meowstic"
    assert:
      exit_code: 0
      array_len: { "data": { "min": 3, "max": 3 } }
      equals: { "data.0.form_name": "male", "data.1.form_name": "female" }

  - name: "Indeedee Male has different stats from Female (speed 95 vs 85)"
    command: "pokedex pokemon stats indeedee"
    assert:
      exit_code: 0
      equals: { "data.total": 475, "data.speed": 95 }
      has_fields: ["data.hp"]

  - name: "Indeedee Female has speed 85 and spdef 105"
    command: "pokedex pokemon stats indeedee-female"
    assert:
      exit_code: 0
      equals: { "data.total": 475, "data.speed": 85, "data.special_defense": 105 }

  - name: "Indeedee Male has different abilities than Female"
    command: "pokedex pokemon show indeedee"
    assert:
      exit_code: 0
      contains: { "data.abilities": "Inner Focus" }
      has_fields: ["data.types"]

  # ===== Mega evolutions: BST is exactly +100 from base =====

  - name: "Gengar base 500 BST, Mega Gengar 600 BST (+100)"
    command: "pokedex pokemon stats gengar-mega"
    assert:
      exit_code: 0
      equals: { "data.total": 600 }
      has_fields: ["data.hp", "data.speed"]

  - name: "Garchomp base 600 BST, Mega Garchomp 700 BST (+100)"
    command: "pokedex pokemon stats garchomp-mega"
    assert:
      exit_code: 0
      equals: { "data.total": 700 }
      has_fields: ["data.attack"]

  - name: "Lucario base 525 BST, Mega Lucario 625 BST (+100)"
    command: "pokedex pokemon stats lucario-mega"
    assert:
      exit_code: 0
      equals: { "data.total": 625 }
      has_fields: ["data.speed"]

  - name: "Kangaskhan base 490 BST, Mega Kangaskhan 590 BST (+100)"
    command: "pokedex pokemon stats kangaskhan-mega"
    assert:
      exit_code: 0
      equals: { "data.total": 590 }
      has_fields: ["data.attack"]

  - name: "Mewtwo base 680 BST, Mega Mewtwo X 780 BST (+100)"
    command: "pokedex pokemon stats mewtwo-mega-x"
    assert:
      exit_code: 0
      equals: { "data.total": 780 }
      has_fields: ["data.hp"]

  # ===== Form-specific collection workflow =====

  - name: "Add meowth-alola to collection"
    command: "pokedex collection add --pokemon=meowth-alola --game=ultra-sun"
    assert:
      exit_code: 0
      equals: { "data.form_name": "alola", "data.species_name": "meowth" }
      has_fields: ["data.id"]

  - name: "Collection entry pokemon_info links to meowth-alola not meowth"
    command: "pokedex collection list"
    assert:
      exit_code: 0
      contains: { "actions": "meowth-alola" }
      array_len: { "data": { "min": 1 } }

  # ===== Urshifu gmax form_name dedup =====

  - name: "Urshifu has 4 forms including 2 gmax variants"
    command: "pokedex pokemon forms urshifu"
    assert:
      exit_code: 0
      array_len: { "data": { "min": 4, "max": 4 } }
      equals: { "data.0.form_name": "single-strike" }

  - name: "Both Urshifu gmax forms are battle-only"
    command: "pokedex pokemon forms urshifu"
    assert:
      exit_code: 0
      equals: { "data.1.is_battle_only": true, "data.2.is_battle_only": true }
      contains: { "data.1.name": "gmax" }

  - name: "Urshifu Rapid Strike form is Fighting/Water"
    command: "pokedex pokemon forms urshifu"
    assert:
      exit_code: 0
      equals: { "data.3.form_name": "rapid-strike", "data.3.types": ["Fighting", "Water"] }

  # ===== Form name consistency checks =====

  - name: "Deoxys default form has explicit form_name normal"
    command: "pokedex pokemon forms deoxys"
    assert:
      exit_code: 0
      equals: { "data.0.form_name": "normal", "data.0.is_default": true }
      array_len: { "data": { "min": 4, "max": 4 } }

  - name: "Giratina default form has explicit form_name altered"
    command: "pokedex pokemon forms giratina"
    assert:
      exit_code: 0
      equals: { "data.0.form_name": "altered", "data.0.is_default": true }

  - name: "Rotom base form has no form_name field"
    command: "pokedex pokemon forms rotom"
    assert:
      exit_code: 0
      equals: { "data.0.is_default": true, "data.0.name": "rotom" }
      array_len: { "data": { "min": 6, "max": 6 } }

  - name: "Rotom alternate forms have correct form names"
    command: "pokedex pokemon forms rotom"
    assert:
      exit_code: 0
      equals: { "data.1.form_name": "heat", "data.2.form_name": "wash" }
      contains: { "data": "rotom-mow" }

  # ===== Cleanup =====

  - name: "Remove meowth-alola collection entry"
    command: "pokedex collection list"
    assert:
      exit_code: 0
      type_of: { "data": "array" }
      has_fields: ["meta"]
