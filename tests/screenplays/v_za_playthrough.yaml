  - name: "Zone 10 -- encounters exist with correct location"
    command: "pokedex location encounters wild-zone-10 --game=legends-za"
    assert:
      exit_code: 0
      equals: { "meta.total": 11, "data.0.location": "Wild Zone 10", "data.0.area": "wild-zone-10" }
