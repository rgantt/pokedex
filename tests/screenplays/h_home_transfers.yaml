# Screenplays are CHEAP regression tests produced by exploratory test agents.
# If a step fails, investigate: is it a real bug (fix the code) or a stale
# assertion (update or delete this file)? The INTENT matters, not the exact
# implementation. Don't contort the CLI to make a stale screenplay pass.
#
# ISSUES FOUND (Round 13):
#   BUG-R13-H1: (FIXED) game show region was derived from generation, not game.
#     All remakes now show correct regions.
#   BUG-R13-H2: service games (pokemon-go, pokemon-bank, home) have no
#     generation or region fields. This is arguably correct for services.
#   BUG-R13-H3: `home transferable terapagos` crashes with SQL error
#     "misuse of aggregate: MAX()". Terapagos (ID 1024) exists in
#     pokemon show but home transferable fails with exit code 1 and
#     a raw error string (not JSON envelope).
name: "HOME Transfers & Game Compatibility"
persona: "H"
description: >
  Tests game metadata (generation, region, display_name) for all game
  categories, HOME transferable accuracy for various species, home
  missing/status/coverage with collection mutations, service games,
  and collection add warnings (dry-run, --in-home on pre-HOME, --alpha).
needs_seed: true
mutates_collection: true

steps:
  # -- Game list basics --

  - name: "game list returns all games"
    command: "pokedex game list"
    assert:
      exit_code: 0
      has_fields: ["data", "actions", "meta"]
      type_of:
        "data": "array"
      array_len:
        "data": { min: 40 }

  - name: "game list --home-compatible returns fewer games"
    command: "pokedex game list --home-compatible"
    assert:
      exit_code: 0
      type_of:
        "data": "array"
      array_len:
        "data": { min: 10, max: 15 }

  # -- Game show: correct regions for remakes --

  - name: "game show gold is Gen 2 Johto"
    command: "pokedex game show gold"
    assert:
      exit_code: 0
      has_fields: ["data.display_name", "data.region"]
      equals:
        "data.generation": 2
        "data.region": "Johto"

  - name: "game show heartgold is Gen 4 Johto"
    command: "pokedex game show heartgold"
    assert:
      exit_code: 0
      has_fields: ["data.display_name"]
      equals:
        "data.generation": 4
        "data.region": "Johto"

  - name: "game show firered is Gen 3 Kanto"
    command: "pokedex game show firered"
    assert:
      exit_code: 0
      equals:
        "data.generation": 3
        "data.region": "Kanto"

  - name: "game show omega-ruby is Gen 6 Hoenn"
    command: "pokedex game show omega-ruby"
    assert:
      exit_code: 0
      equals:
        "data.generation": 6
        "data.region": "Hoenn"
      has_fields: ["data.display_name"]

  - name: "game show lets-go-pikachu is Gen 7 Kanto"
    command: "pokedex game show lets-go-pikachu"
    assert:
      exit_code: 0
      has_fields: ["data.display_name"]
      equals:
        "data.generation": 7
        "data.region": "Kanto"

  - name: "game show brilliant-diamond is Gen 8 Sinnoh"
    command: "pokedex game show brilliant-diamond"
    assert:
      exit_code: 0
      equals:
        "data.generation": 8
        "data.region": "Sinnoh"
        "data.connects_to_home": true

  - name: "game show legends-arceus is Gen 8 Hisui"
    command: "pokedex game show legends-arceus"
    assert:
      exit_code: 0
      equals:
        "data.generation": 8
        "data.region": "Hisui"
        "data.connects_to_home": true

  - name: "game show legends-za is Gen 9 Kalos"
    command: "pokedex game show legends-za"
    assert:
      exit_code: 0
      has_fields: ["data.display_name"]
      equals:
        "data.generation": 9
        "data.region": "Kalos"
        "data.connects_to_home": true

  # -- HOME-compatible main games --

  - name: "game show sword has correct fields"
    command: "pokedex game show sword"
    assert:
      exit_code: 0
      has_fields: ["data.id", "data.generation", "data.region", "data.display_name"]
      equals:
        "data.connects_to_home": true
        "data.generation": 8
        "data.region": "Galar"

  - name: "game show scarlet is Gen 9 Paldea"
    command: "pokedex game show scarlet"
    assert:
      exit_code: 0
      equals:
        "data.generation": 9
        "data.region": "Paldea"
        "data.connects_to_home": true

  # -- Service games (BUG-R13-H2: no generation/region) --

  - name: "game show pokemon-go has transfer_direction"
    command: "pokedex game show pokemon-go"
    assert:
      exit_code: 0
      has_fields: ["data.display_name"]
      equals:
        "data.transfer_direction": "to_home_only"
        "data.connects_to_home": true
      contains:
        "data.display_name": "GO"

  - name: "game show pokemon-bank is to_home_only"
    command: "pokedex game show pokemon-bank"
    assert:
      exit_code: 0
      has_fields: ["data.display_name"]
      equals:
        "data.transfer_direction": "to_home_only"
        "data.connects_to_home": true

  - name: "game show home has both transfer direction"
    command: "pokedex game show home"
    assert:
      exit_code: 0
      equals:
        "data.connects_to_home": true
        "data.transfer_direction": "both"
      contains:
        "data.display_name": "HOME"

  # -- Pre-HOME games --

  - name: "game show red is pre-HOME Gen 1"
    command: "pokedex game show red"
    assert:
      exit_code: 0
      has_fields: ["data.generation", "data.region"]
      equals:
        "data.connects_to_home": false
        "data.generation": 1

  - name: "game show diamond is pre-HOME Gen 4 Sinnoh"
    command: "pokedex game show diamond"
    assert:
      exit_code: 0
      equals:
        "data.connects_to_home": false
        "data.generation": 4
        "data.region": "Sinnoh"

  # -- Error: nonexistent game --

  - name: "game show nonexistent returns NOT_FOUND"
    command: "pokedex game show nonexistent"
    assert:
      exit_code: 1
      has_fields: ["error.code", "error.message", "actions"]
      equals:
        "error.code": "NOT_FOUND"

  # -- HOME transferable: pikachu (many games) --

  - name: "pikachu transferable to many HOME games"
    command: "pokedex home transferable pikachu"
    assert:
      exit_code: 0
      type_of:
        "data": "array"
      array_len:
        "data": { min: 8 }
      has_fields: ["actions"]

  - name: "pikachu transferable includes legends-za"
    command: "pokedex home transferable pikachu"
    assert:
      exit_code: 0
      contains:
        "data": "legends-za"
      array_len:
        "data": { min: 8 }

  # -- HOME transferable: kleavor (PLA only) --

  - name: "kleavor transferable only to legends-arceus"
    command: "pokedex home transferable kleavor"
    assert:
      exit_code: 0
      array_len:
        "data": { min: 1, max: 1 }
      equals:
        "data.0.name": "legends-arceus"

  # -- HOME transferable: sprigatito (SV only) --

  - name: "sprigatito transferable to scarlet and violet"
    command: "pokedex home transferable sprigatito"
    assert:
      exit_code: 0
      array_len:
        "data": { min: 2, max: 2 }
      equals:
        "data.0.name": "scarlet"

  # -- HOME transferable: terapagos SQL crash (BUG-R13-H3) --

  - name: "terapagos transferable crashes with SQL error (BUG-R13-H3)"
    command: "pokedex home transferable terapagos"
    assert:
      exit_code: 1

  # -- HOME transferable: Gen 1 starters in multiple games --

  - name: "bulbasaur transferable to multiple HOME games"
    command: "pokedex home transferable bulbasaur"
    assert:
      exit_code: 0
      array_len:
        "data": { min: 4 }
      type_of:
        "data": "array"

  # -- HOME transferable: numeric ID --

  - name: "home transferable accepts numeric pokemon ID"
    command: "pokedex home transferable 25"
    assert:
      exit_code: 0
      type_of:
        "data": "array"
      array_len:
        "data": { min: 8 }

  # -- HOME transferable: nonexistent pokemon --

  - name: "home transferable nonexistent returns NOT_FOUND"
    command: "pokedex home transferable nonexistent"
    assert:
      exit_code: 1
      has_fields: ["error.code", "actions"]
      equals:
        "error.code": "NOT_FOUND"

  # -- HOME status: empty collection --

  - name: "home status with empty collection shows zeros"
    command: "pokedex home status"
    assert:
      exit_code: 0
      has_fields: ["data.total_in_home", "data.unique_species_in_home", "data.shiny_in_home"]
      type_of:
        "data.total_in_home": "number"

  # -- Collection add: pikachu to sword with --in-home --

  - name: "add pikachu to sword with in-home flag"
    command: "pokedex collection add --pokemon=pikachu --game=sword --in-home"
    assert:
      exit_code: 0
      equals:
        "data.species_name": "pikachu"
        "data.game": "sword"
        "data.in_home": true
      has_fields: ["data.id"]

  # -- HOME status: reflects added pokemon --

  - name: "home status shows 1 after adding pikachu"
    command: "pokedex home status"
    assert:
      exit_code: 0
      equals:
        "data.total_in_home": 1
        "data.unique_species_in_home": 1
      has_fields: ["data.by_game_origin"]

  # -- HOME coverage: reflects added pokemon --

  - name: "home coverage shows 1 caught"
    command: "pokedex home coverage"
    assert:
      exit_code: 0
      has_fields: ["data.dex_name", "data.total", "data.caught", "data.percentage"]
      equals:
        "data.caught": 1

  # -- More collection adds --

  - name: "add kleavor to legends-arceus with in-home"
    command: "pokedex collection add --pokemon=kleavor --game=legends-arceus --in-home"
    assert:
      exit_code: 0
      equals:
        "data.species_name": "kleavor"
        "data.game": "legends-arceus"
        "data.in_home": true

  - name: "add meowscarada to scarlet with in-home"
    command: "pokedex collection add --pokemon=meowscarada --game=scarlet --in-home"
    assert:
      exit_code: 0
      equals:
        "data.species_name": "meowscarada"
        "data.game": "scarlet"
        "data.in_home": true

  # -- Dry-run warnings --

  - name: "dry-run adding meowscarada to PLA warns no encounter data"
    command: "pokedex collection add --pokemon=meowscarada --game=legends-arceus --dry-run"
    assert:
      exit_code: 0
      has_fields: ["data.warning"]
      equals:
        "data.dry_run": true
      contains:
        "data.warning": "No encounter data"

  - name: "--in-home on pre-HOME game red warns"
    command: "pokedex collection add --pokemon=charmander --game=red --in-home --dry-run"
    assert:
      exit_code: 0
      has_fields: ["data.warning"]
      contains:
        "data.warning": "does not connect"
      equals:
        "data.dry_run": true

  - name: "alpha flag on non-PLA game warns"
    command: "pokedex collection add --pokemon=arceus --game=sword --alpha --dry-run"
    assert:
      exit_code: 0
      has_fields: ["data.warning"]
      contains:
        "data.warning": "Alpha"
      equals:
        "data.is_alpha": true

  # -- Add alpha to PLA --

  - name: "add alpha arceus to PLA succeeds"
    command: "pokedex collection add --pokemon=arceus --game=legends-arceus --alpha --in-home"
    assert:
      exit_code: 0
      equals:
        "data.is_alpha": true
        "data.game": "legends-arceus"
        "data.in_home": true

  # -- Add pikachu to legends-za --

  - name: "add pikachu to legends-za with in-home"
    command: "pokedex collection add --pokemon=pikachu --game=legends-za --in-home"
    assert:
      exit_code: 0
      equals:
        "data.species_name": "pikachu"
        "data.game": "legends-za"
        "data.in_home": true

  # -- HOME status: multiple game origins --

  - name: "home status shows multiple game origins"
    command: "pokedex home status"
    assert:
      exit_code: 0
      type_of:
        "data.by_game_origin": "array"
      array_len:
        "data.by_game_origin": { min: 3 }

  # -- HOME missing: defaults and filters --

  - name: "home missing defaults to national dex"
    command: "pokedex home missing --limit=5"
    assert:
      exit_code: 0
      has_fields: ["data", "meta.total"]
      type_of:
        "data": "array"
      array_len:
        "data": { min: 1, max: 5 }

  - name: "home missing --dex=kanto returns kanto pokemon"
    command: "pokedex home missing --dex=kanto --limit=3"
    assert:
      exit_code: 0
      type_of:
        "data": "array"
      array_len:
        "data": { min: 1, max: 3 }

  - name: "home missing --dex=galar returns galar pokemon"
    command: "pokedex home missing --dex=galar --limit=3"
    assert:
      exit_code: 0
      type_of:
        "data": "array"
      array_len:
        "data": { min: 1, max: 3 }

  - name: "home missing --dex=home fails with NOT_FOUND"
    command: "pokedex home missing --dex=home"
    assert:
      exit_code: 1
      has_fields: ["error.code"]
      equals:
        "error.code": "NOT_FOUND"

  # -- HOME missing: pagination --

  - name: "home missing pagination with offset"
    command: "pokedex home missing --limit=3 --offset=10"
    assert:
      exit_code: 0
      has_fields: ["meta.total", "meta.offset"]
      array_len:
        "data": { min: 1, max: 3 }
      equals:
        "meta.offset": 10

  # -- HOME missing: owned_elsewhere --

  - name: "add bulbasaur to red without in-home"
    command: "pokedex collection add --pokemon=bulbasaur --game=red"
    assert:
      exit_code: 0
      equals:
        "data.species_name": "bulbasaur"
        "data.in_home": false

  - name: "bulbasaur shows owned_elsewhere in home missing"
    command: "pokedex home missing --limit=3"
    assert:
      exit_code: 0
      type_of:
        "data": "array"
      has_fields: ["data.0.owned_elsewhere"]

  # -- Collection list --in-home --

  - name: "collection list --in-home shows only HOME entries"
    command: "pokedex collection list --in-home"
    assert:
      exit_code: 0
      type_of:
        "data": "array"
      array_len:
        "data": { min: 4 }
      has_fields: ["meta.total"]

  # -- Collection stats --

  - name: "collection stats shows aggregate data"
    command: "pokedex collection stats"
    assert:
      exit_code: 0
      has_fields: ["data.total_entries", "data.unique_species", "data.in_home_count"]
      type_of:
        "data.total_entries": "number"

  - name: "collection stats --game=sword shows game-specific data"
    command: "pokedex collection stats --game=sword"
    assert:
      exit_code: 0
      has_fields: ["data.total_entries", "data.unique_species"]
      type_of:
        "data.total_entries": "number"

  # -- Method evolve --

  - name: "--method=evolve records correctly"
    command: "pokedex collection add --pokemon=gardevoir --game=ruby --method=evolve"
    assert:
      exit_code: 0
      equals:
        "data.species_name": "gardevoir"
        "data.method": "evolve"
        "data.in_home": false
