      equals: { "data.species_name": "scatterbug", "data.status": "caught" }

  - name: "Poco Path -- evolve Lechonk to Oinkologne"
    command: "pokedex pokemon evolutions lechonk"
    assert:
      exit_code: 0
      equals: { "data.species_name": "lechonk" }
      has_fields: ["data.children"]
      contains: { "data.children.0.species_name": "oinkologne" }

  - name: "Poco Path -- add Oinkologne"
    command: "pokedex collection add --pokemon=oinkologne --game=scarlet --method=evolve"
