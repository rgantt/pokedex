name: "Living Dex Tracker"
persona: "F"
description: >
  Build a 20-pokemon living dex in Sword with full status lifecycle testing.
  Covers: caught -> living_dex -> evolved -> traded_away -> transferred transitions,
  dex progress accuracy with --status=living_dex filter, --missing behavior,
  traded_away exclusion from dex progress, transferred inclusion, duplicate entry
  handling (same species counted once in progress), regional dex counts,
  collection stats filtering by game, sort orders (dex/id), remove-and-recheck,
  HOME integration (--in-home, coverage, missing with owned_elsewhere).
  Round 14: comprehensive edge-case coverage.
needs_seed: true
mutates_collection: true

steps:
  # ============================================================
  # PHASE 1: Verify regional dex sizes
  # ============================================================
  - name: "Kanto dex has 151 species"
    command: "pokedex dex show kanto --limit=1"
    assert:
      exit_code: 0
      equals: {"meta.total": 151, "data.dex_name": "kanto"}
      has_fields: ["data.entries"]

  - name: "National dex has 1025 species"
    command: "pokedex dex show national --limit=1"
    assert:
      exit_code: 0
      equals: {"meta.total": 1025, "data.dex_name": "national"}

  - name: "Galar dex has 400 species"
    command: "pokedex dex show galar --limit=1"
    assert:
      exit_code: 0
      equals: {"meta.total": 400, "data.dex_name": "galar"}

  - name: "Paldea dex has 400 species"
    command: "pokedex dex show paldea --limit=1"
    assert:
      exit_code: 0
      equals: {"meta.total": 400, "data.dex_name": "paldea"}

  # ============================================================
  # PHASE 2: Build a 20-pokemon living dex in Sword
  # ============================================================
  - name: "Add grookey as caught first"
    command: "pokedex collection add --pokemon=grookey --game=sword --status=caught"
    capture: {"grookey_id": "data.id"}
    assert:
      exit_code: 0
      equals: {"data.species_name": "grookey", "data.status": "caught"}
      has_fields: ["data.id", "data.created_at"]

  - name: "Status lifecycle - update grookey from caught to living_dex"
    command: "pokedex collection update $grookey_id --status=living_dex"
    assert:
      exit_code: 0
      equals: {"data.status": "living_dex", "data.species_name": "grookey"}
      has_fields: ["data.updated_at"]

  - name: "Add thwackey as living_dex"
    command: "pokedex collection add --pokemon=thwackey --game=sword --status=living_dex"
    assert:
      exit_code: 0
      equals: {"data.species_name": "thwackey", "data.status": "living_dex"}

  - name: "Add rillaboom as living_dex"
    command: "pokedex collection add --pokemon=rillaboom --game=sword --status=living_dex"
    assert:
      exit_code: 0
      equals: {"data.species_name": "rillaboom", "data.status": "living_dex"}

  - name: "Add scorbunny as living_dex"
    command: "pokedex collection add --pokemon=scorbunny --game=sword --status=living_dex"
    capture: {"scorbunny_id": "data.id"}
    assert:
      exit_code: 0
      equals: {"data.species_name": "scorbunny", "data.status": "living_dex"}

  - name: "Add raboot as living_dex"
    command: "pokedex collection add --pokemon=raboot --game=sword --status=living_dex"
    assert:
      exit_code: 0
      equals: {"data.species_name": "raboot", "data.status": "living_dex"}

  - name: "Add cinderace as living_dex"
    command: "pokedex collection add --pokemon=cinderace --game=sword --status=living_dex"
    assert:
      exit_code: 0
      equals: {"data.species_name": "cinderace", "data.status": "living_dex"}

  - name: "Add sobble as living_dex"
    command: "pokedex collection add --pokemon=sobble --game=sword --status=living_dex"
    assert:
      exit_code: 0
      equals: {"data.species_name": "sobble", "data.status": "living_dex"}

  - name: "Add drizzile as living_dex"
    command: "pokedex collection add --pokemon=drizzile --game=sword --status=living_dex"
    assert:
      exit_code: 0
      equals: {"data.species_name": "drizzile", "data.status": "living_dex"}

  - name: "Add inteleon as living_dex"
    command: "pokedex collection add --pokemon=inteleon --game=sword --status=living_dex"
    assert:
      exit_code: 0
      equals: {"data.species_name": "inteleon", "data.status": "living_dex"}

  - name: "Add wooloo as living_dex"
    command: "pokedex collection add --pokemon=wooloo --game=sword --status=living_dex"
    capture: {"wooloo_id": "data.id"}
    assert:
      exit_code: 0
      equals: {"data.species_name": "wooloo", "data.status": "living_dex"}

  - name: "Add dubwool as living_dex"
    command: "pokedex collection add --pokemon=dubwool --game=sword --status=living_dex"
    assert:
      exit_code: 0
      equals: {"data.species_name": "dubwool", "data.status": "living_dex"}

  - name: "Add corviknight as living_dex"
    command: "pokedex collection add --pokemon=corviknight --game=sword --status=living_dex"
    assert:
      exit_code: 0
      equals: {"data.species_name": "corviknight", "data.status": "living_dex"}

  - name: "Add yamper as living_dex"
    command: "pokedex collection add --pokemon=yamper --game=sword --status=living_dex"
    assert:
      exit_code: 0
      equals: {"data.species_name": "yamper", "data.status": "living_dex"}

  - name: "Add boltund as living_dex"
    command: "pokedex collection add --pokemon=boltund --game=sword --status=living_dex"
    assert:
      exit_code: 0
      equals: {"data.species_name": "boltund", "data.status": "living_dex"}

  - name: "Add eevee as living_dex"
    command: "pokedex collection add --pokemon=eevee --game=sword --status=living_dex"
    capture: {"eevee_id": "data.id"}
    assert:
      exit_code: 0
      equals: {"data.species_name": "eevee", "data.status": "living_dex"}

  - name: "Add snorlax as living_dex"
    command: "pokedex collection add --pokemon=snorlax --game=sword --status=living_dex"
    assert:
      exit_code: 0
      equals: {"data.species_name": "snorlax", "data.status": "living_dex"}

  - name: "Add pikachu as living_dex"
    command: "pokedex collection add --pokemon=pikachu --game=sword --status=living_dex"
    capture: {"pikachu_id": "data.id"}
    assert:
      exit_code: 0
      equals: {"data.species_name": "pikachu", "data.status": "living_dex"}

  - name: "Add magikarp as living_dex"
    command: "pokedex collection add --pokemon=magikarp --game=sword --status=living_dex"
    capture: {"magikarp_id": "data.id"}
    assert:
      exit_code: 0
      equals: {"data.species_name": "magikarp", "data.status": "living_dex"}

  - name: "Add gyarados as living_dex to complete 20"
    command: "pokedex collection add --pokemon=gyarados --game=sword --status=living_dex"
    assert:
      exit_code: 0
      equals: {"data.species_name": "gyarados", "data.status": "living_dex"}
      has_fields: ["data.id"]

  # ============================================================
  # PHASE 3: Status lifecycle - evolve magikarp
  # ============================================================
  - name: "Update magikarp from living_dex to evolved"
    command: "pokedex collection update $magikarp_id --status=evolved"
    assert:
      exit_code: 0
      equals: {"data.status": "evolved", "data.species_name": "magikarp"}
      has_fields: ["data.updated_at"]

  # ============================================================
  # PHASE 4: Dex progress with --status=living_dex filter
  # ============================================================
  - name: "Dex progress living_dex filter excludes evolved entries"
    command: "pokedex dex progress galar --status=living_dex --caught --limit=50"
    assert:
      exit_code: 0
      has_fields: ["data.caught", "data.total", "data.entries"]
      array_len: {"data.entries": {"min": 1}}

  - name: "Missing with living_dex filter includes evolved-only species"
    command: "pokedex dex progress galar --status=living_dex --missing --limit=5"
    assert:
      exit_code: 0
      equals: {"data.total": 400}
      array_len: {"data.entries": {"min": 5, "max": 5}}

  # ============================================================
  # PHASE 5: traded_away should NOT count in dex progress
  # ============================================================
  - name: "Add ditto as traded_away"
    command: "pokedex collection add --pokemon=ditto --game=sword --status=traded_away"
    capture: {"ditto_ta_id": "data.id"}
    assert:
      exit_code: 0
      equals: {"data.status": "traded_away", "data.species_name": "ditto"}

  - name: "Dex progress does not count traded_away-only species"
    command: "pokedex dex progress galar --limit=500"
    assert:
      exit_code: 0
      has_fields: ["data.caught", "data.total"]
      equals: {"data.total": 400}

  # ============================================================
  # PHASE 6: transferred SHOULD count in dex progress
  # ============================================================
  - name: "Add sizzlipede as transferred"
    command: "pokedex collection add --pokemon=sizzlipede --game=sword --status=transferred"
    capture: {"sizzlipede_id": "data.id"}
    assert:
      exit_code: 0
      equals: {"data.status": "transferred", "data.species_name": "sizzlipede"}

  - name: "Transferred species appears as caught in dex progress"
    command: "pokedex dex progress galar --caught --limit=500"
    assert:
      exit_code: 0
      has_fields: ["data.caught", "data.entries"]
      array_len: {"data.entries": {"min": 1}}

  # ============================================================
  # PHASE 7: Duplicate entries - same species twice, counted once
  # ============================================================
  - name: "Add duplicate eevee in sword"
    command: "pokedex collection add --pokemon=eevee --game=sword --status=caught"
    capture: {"eevee_dup_id": "data.id"}
    assert:
      exit_code: 0
      equals: {"data.species_name": "eevee", "data.status": "caught"}
      has_fields: ["data.id"]

  - name: "Collection list shows both eevee entries"
    command: "pokedex collection list --game=sword --pokemon=eevee"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 2}}
      type_of: {"data": "array"}

  - name: "Dex progress counts eevee only once despite two entries"
    command: "pokedex dex progress galar --caught --limit=500"
    assert:
      exit_code: 0
      has_fields: ["data.caught", "data.entries"]
      type_of: {"data.entries": "array"}

  # ============================================================
  # PHASE 8: Sort orders
  # ============================================================
  - name: "Collection list sorted by dex number"
    command: "pokedex collection list --game=sword --sort=dex --limit=5"
    assert:
      exit_code: 0
      type_of: {"data": "array"}
      array_len: {"data": {"min": 5, "max": 5}}

  - name: "Collection list sorted by id (default most-recent-first)"
    command: "pokedex collection list --game=sword --sort=id --limit=5"
    assert:
      exit_code: 0
      type_of: {"data": "array"}
      array_len: {"data": {"min": 5, "max": 5}}

  - name: "Invalid sort value returns INVALID_PARAMETER"
    command: "pokedex collection list --sort=recent"
    assert:
      exit_code: 1
      equals: {"error.code": "INVALID_PARAMETER"}
      contains: {"error.message": "recent"}

  # ============================================================
  # PHASE 9: Collection stats filtered by game
  # ============================================================
  - name: "Collection stats for sword shows status breakdown"
    command: "pokedex collection stats --game=sword"
    assert:
      exit_code: 0
      has_fields: ["data.total_entries", "data.unique_species", "data.by_status"]
      type_of: {"data.by_status": "array"}

  - name: "Collection stats unfiltered includes all games"
    command: "pokedex collection stats"
    assert:
      exit_code: 0
      has_fields: ["data.total_entries", "data.unique_species", "data.in_home_count"]
      type_of: {"data.by_status": "array"}

  # ============================================================
  # PHASE 10: HOME integration
  # ============================================================
  - name: "Transfer eevee to HOME"
    command: "pokedex collection update $eevee_id --in-home=true"
    assert:
      exit_code: 0
      equals: {"data.in_home": true, "data.species_name": "eevee"}
      has_fields: ["data.updated_at"]

  - name: "Add wooloo with in-home flag via update"
    command: "pokedex collection update $wooloo_id --in-home=true"
    assert:
      exit_code: 0
      equals: {"data.in_home": true, "data.species_name": "wooloo"}

  - name: "HOME coverage reflects in-home pokemon"
    command: "pokedex home coverage"
    assert:
      exit_code: 0
      has_fields: ["data.caught", "data.total", "data.percentage"]
      equals: {"data.dex_name": "national"}

  - name: "HOME status shows total and by-game breakdown"
    command: "pokedex home status"
    assert:
      exit_code: 0
      has_fields: ["data.total_in_home", "data.unique_species_in_home", "data.by_game_origin"]
      type_of: {"data.by_game_origin": "array"}

  - name: "HOME missing excludes in-home species"
    command: "pokedex home missing --limit=5"
    assert:
      exit_code: 0
      type_of: {"data": "array"}
      array_len: {"data": {"min": 5, "max": 5}}
      has_fields: ["meta.total"]

  - name: "HOME missing shows owned_elsewhere for non-home collection entries"
    command: "pokedex home missing --limit=1000"
    assert:
      exit_code: 0
      type_of: {"data": "array"}
      has_fields: ["data.0.owned_elsewhere"]

  - name: "Collection list with in-home filter shows only HOME pokemon"
    command: "pokedex collection list --in-home"
    assert:
      exit_code: 0
      type_of: {"data": "array"}
      array_len: {"data": {"min": 2}}

  # ============================================================
  # PHASE 11: Remove and re-check dex progress
  # ============================================================
  - name: "Capture dex progress before removal"
    command: "pokedex dex progress galar --caught --game=sword --limit=500"
    capture: {"pre_remove_caught": "data.caught"}
    assert:
      exit_code: 0
      has_fields: ["data.caught"]

  - name: "Remove sizzlipede from collection"
    command: "pokedex collection remove $sizzlipede_id"
    assert:
      exit_code: 0
      equals: {"data.removed": true}
      has_fields: ["data.id"]

  - name: "Dex progress decreases after removal"
    command: "pokedex dex progress galar --caught --game=sword --limit=500"
    assert:
      exit_code: 0
      has_fields: ["data.caught", "data.total"]
      type_of: {"data.entries": "array"}

  # ============================================================
  # PHASE 12: More status lifecycle edges
  # ============================================================
  - name: "Update pikachu to traded_away"
    command: "pokedex collection update $pikachu_id --status=traded_away"
    assert:
      exit_code: 0
      equals: {"data.status": "traded_away", "data.species_name": "pikachu"}

  - name: "Update scorbunny to transferred"
    command: "pokedex collection update $scorbunny_id --status=transferred"
    assert:
      exit_code: 0
      equals: {"data.status": "transferred", "data.species_name": "scorbunny"}

  - name: "Dex progress after status changes - traded_away excluded transferred included"
    command: "pokedex dex progress galar --caught --game=sword --limit=500"
    assert:
      exit_code: 0
      has_fields: ["data.caught", "data.entries"]
      type_of: {"data.entries": "array"}

  # ============================================================
  # PHASE 13: Error handling
  # ============================================================
  - name: "Invalid status on add returns error"
    command: "pokedex collection add --pokemon=pikachu --game=sword --status=bogus"
    assert:
      exit_code: 1
      has_fields: ["error.code", "error.message"]
      contains: {"error.message": "Invalid status"}

  - name: "Invalid dex name returns NOT_FOUND"
    command: "pokedex dex progress nonexistent-dex"
    assert:
      exit_code: 1
      equals: {"error.code": "NOT_FOUND"}
      has_fields: ["actions"]

  - name: "Invalid status on dex progress returns INVALID_PARAMETER"
    command: "pokedex dex progress galar --status=bogus"
    assert:
      exit_code: 1
      equals: {"error.code": "INVALID_PARAMETER"}
      has_fields: ["actions"]

  - name: "Collection show nonexistent ID returns NOT_FOUND"
    command: "pokedex collection show 99999"
    assert:
      exit_code: 1
      equals: {"error.code": "NOT_FOUND"}
      has_fields: ["actions"]

  - name: "Dry-run add previews without saving"
    command: "pokedex collection add --pokemon=gengar --game=sword --status=living_dex --dry-run"
    assert:
      exit_code: 0
      equals: {"data.dry_run": true}
      has_fields: ["data.species_name", "actions"]
