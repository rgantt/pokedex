# Screenplays are CHEAP regression tests produced by exploratory test agents.
# If a step fails, investigate: is it a real bug (fix the code) or a stale
# assertion (update or delete this file)? The INTENT matters, not the exact
# implementation. Don't contort the CLI to make a stale screenplay pass.
name: "Forms & Alpha Specialist"
persona: "G"
description: "Round 15: Obscure form edge cases — Silvally/Arceus 18-type forms, Genesect drive forms, Hoopa type change, Kyurem fusions, Necrozma Ultra BST 754, Zacian Crowned, Eternamax BST 1125, Koraidon/Miraidon ride forms, Wormadam-Sandy resolution, Spinda cosmetic-only, Z-A mega forms"
needs_seed: true
mutates_collection: false

steps:
  # ===== Silvally: 18 type forms (one per type) =====

  - name: "Silvally has exactly 18 forms (one per type)"
    command: "pokedex pokemon forms silvally"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 18, "max": 18}}
      equals: {"data.0.form_name": "normal", "data.0.is_default": true}

  - name: "Silvally forms all share display_name pattern 'Type:' and are not battle-only"
    command: "pokedex pokemon forms silvally"
    assert:
      exit_code: 0
      contains: {"data.0.display_name": "Type: Normal"}
      equals: {"data.17.form_name": "fairy", "data.17.types": ["Fairy"]}

  # ===== Arceus: 18 type forms + unknown =====

  - name: "Arceus has 19 forms (18 types + unknown)"
    command: "pokedex pokemon forms arceus"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 19, "max": 19}}
      equals: {"data.0.form_name": "normal", "data.0.is_default": true}

  - name: "Arceus unknown form has ??? type"
    command: "pokedex pokemon forms arceus"
    assert:
      exit_code: 0
      equals: {"data.18.form_name": "unknown", "data.18.types": ["???"]}
      contains: {"data.18.display_name": "Arceus"}

  # ===== Genesect: 5 drive forms, all Bug/Steel =====

  - name: "Genesect has 5 forms and all keep Bug/Steel typing"
    command: "pokedex pokemon forms genesect"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 5, "max": 5}}
      equals: {"data.0.types": ["Bug", "Steel"], "data.1.types": ["Bug", "Steel"]}

  - name: "Genesect drive forms are douse/shock/burn/chill"
    command: "pokedex pokemon forms genesect"
    assert:
      exit_code: 0
      equals: {"data.1.form_name": "douse", "data.2.form_name": "shock", "data.3.form_name": "burn", "data.4.form_name": "chill"}

  # ===== Hoopa: Confined (Psychic/Ghost) vs Unbound (Psychic/Dark) =====

  - name: "Hoopa Confined is Psychic/Ghost default"
    command: "pokedex pokemon forms hoopa"
    assert:
      exit_code: 0
      equals: {"data.0.form_name": "confined", "data.0.is_default": true, "data.0.types": ["Psychic", "Ghost"]}
      array_len: {"data": {"min": 2, "max": 2}}

  - name: "Hoopa Unbound swaps Ghost for Dark"
    command: "pokedex pokemon forms hoopa"
    assert:
      exit_code: 0
      equals: {"data.1.form_name": "unbound", "data.1.types": ["Psychic", "Dark"]}
      contains: {"data.1.display_name": "Unbound"}

  # ===== Kyurem: Base, White, Black — all Dragon/Ice, different stat spreads =====

  - name: "Kyurem has 3 forms all Dragon/Ice"
    command: "pokedex pokemon forms kyurem"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 3, "max": 3}}
      equals: {"data.0.types": ["Dragon", "Ice"], "data.1.types": ["Dragon", "Ice"]}

  - name: "White Kyurem is SpAtk-focused (170 SpAtk, BST 700)"
    command: "pokedex pokemon stats kyurem-white"
    assert:
      exit_code: 0
      equals: {"data.pokemon_name": "White Kyurem", "data.special_attack": 170, "data.total": 700}

  - name: "Black Kyurem is Atk-focused (170 Atk, BST 700)"
    command: "pokedex pokemon stats kyurem-black"
    assert:
      exit_code: 0
      equals: {"data.pokemon_name": "Black Kyurem", "data.attack": 170, "data.total": 700}

  # ===== Necrozma Ultra: BST 754 (highest non-mega/primal) =====

  - name: "Necrozma Ultra has BST 754 with Psychic/Dragon typing"
    command: "pokedex pokemon stats necrozma-ultra"
    assert:
      exit_code: 0
      equals: {"data.pokemon_name": "Ultra Necrozma", "data.total": 754, "data.attack": 167}

  - name: "Necrozma has 4 forms: base, dusk, dawn, ultra"
    command: "pokedex pokemon forms necrozma"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 4, "max": 4}}
      equals: {"data.3.form_name": "ultra", "data.3.types": ["Psychic", "Dragon"]}

  # ===== Zacian: Hero (Fairy) vs Crowned (Fairy/Steel), Crowned is battle-only =====

  - name: "Zacian Hero form is pure Fairy with BST 660"
    command: "pokedex pokemon stats zacian"
    assert:
      exit_code: 0
      equals: {"data.pokemon_name": "Zacian", "data.total": 660}
      has_fields: ["data.attack"]

  - name: "Zacian Crowned adds Steel type, BST 700, and is battle-only"
    command: "pokedex pokemon forms zacian"
    assert:
      exit_code: 0
      equals: {"data.0.types": ["Fairy"], "data.1.form_name": "crowned", "data.1.types": ["Fairy", "Steel"]}
      array_len: {"data": {"min": 2, "max": 2}}

  - name: "Zacian Crowned gains +30 Atk and +10 Speed over Hero"
    command: "pokedex pokemon stats zacian-crowned"
    assert:
      exit_code: 0
      equals: {"data.pokemon_name": "Crowned Zacian", "data.attack": 150, "data.speed": 148, "data.total": 700}

  # ===== Eternatus Eternamax: BST 1125 (highest in game) =====

  - name: "Eternatus base is Poison/Dragon"
    command: "pokedex pokemon forms eternatus"
    assert:
      exit_code: 0
      equals: {"data.0.types": ["Poison", "Dragon"], "data.0.is_default": true}
      array_len: {"data": {"min": 2, "max": 2}}

  - name: "Eternamax Eternatus has BST 1125 with 255 HP and 250 in both defenses"
    command: "pokedex pokemon stats eternatus-eternamax"
    assert:
      exit_code: 0
      equals: {"data.total": 1125, "data.hp": 255, "data.defense": 250, "data.special_defense": 250}

  # ===== Koraidon: 5 ride forms, all Fighting/Dragon =====

  - name: "Koraidon has 5 forms all sharing Fighting/Dragon type"
    command: "pokedex pokemon forms koraidon"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 5, "max": 5}}
      equals: {"data.0.form_name": "apex-build", "data.0.types": ["Fighting", "Dragon"]}

  - name: "Koraidon ride forms are not marked battle-only"
    command: "pokedex pokemon forms koraidon"
    assert:
      exit_code: 0
      equals: {"data.1.form_name": "limited-build", "data.1.is_battle_only": false}
      contains: {"data.4.form_name": "gliding"}

  # ===== Miraidon: 5 ride forms, all Electric/Dragon =====

  - name: "Miraidon has 5 forms all sharing Electric/Dragon type"
    command: "pokedex pokemon forms miraidon"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 5, "max": 5}}
      equals: {"data.0.form_name": "ultimate-mode", "data.0.types": ["Electric", "Dragon"]}

  - name: "Miraidon ride forms include drive-mode and aquatic-mode"
    command: "pokedex pokemon forms miraidon"
    assert:
      exit_code: 0
      equals: {"data.2.form_name": "drive-mode", "data.3.form_name": "aquatic-mode"}
      contains: {"data.4.display_name": "Glide"}

  # ===== Wormadam-Sandy: form-specific resolution =====

  - name: "wormadam-sandy resolves to Bug/Ground Sandy Wormadam"
    command: "pokedex pokemon show wormadam-sandy"
    assert:
      exit_code: 0
      equals: {"data.display_name": "Sandy Wormadam", "data.types": ["Bug", "Ground"]}
      has_fields: ["data.stats"]

  - name: "Wormadam-Sandy stats show BST 424"
    command: "pokedex pokemon stats wormadam-sandy"
    assert:
      exit_code: 0
      equals: {"data.pokemon_name": "Sandy Wormadam", "data.total": 424, "data.defense": 105}

  # ===== Spinda: cosmetic only — 1 form in DB =====

  - name: "Spinda has exactly 1 form (patterns are cosmetic, not DB forms)"
    command: "pokedex pokemon forms spinda"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 1, "max": 1}}
      equals: {"data.0.is_default": true, "data.0.types": ["Normal"]}

  # ===== Z-A Mega Forms: garchomp-mega-z loses Ground, lucario-mega-z keeps Steel =====

  - name: "Garchomp Mega Z loses Ground type, becomes pure Dragon"
    command: "pokedex pokemon show garchomp-mega-z"
    assert:
      exit_code: 0
      equals: {"data.display_name": "Mega Garchomp Z", "data.types": ["Dragon"]}
      has_fields: ["data.stats.total"]

  - name: "Garchomp Mega Z has BST 700 and is marked mega"
    command: "pokedex pokemon forms garchomp"
    assert:
      exit_code: 0
      equals: {"data.2.form_name": "mega-z", "data.2.is_mega": true, "data.2.is_battle_only": true}
      array_len: {"data": {"min": 3, "max": 3}}

  - name: "Lucario Mega Z keeps Fighting/Steel typing"
    command: "pokedex pokemon show lucario-mega-z"
    assert:
      exit_code: 0
      equals: {"data.display_name": "Mega Lucario Z", "data.types": ["Fighting", "Steel"]}
      has_fields: ["data.stats"]

  - name: "Lucario Mega Z has BST 625"
    command: "pokedex pokemon stats lucario-mega-z"
    assert:
      exit_code: 0
      equals: {"data.pokemon_name": "Mega Lucario Z", "data.total": 625, "data.speed": 151}
