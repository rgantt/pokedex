  - name: "Route 3 -- catch Mankey"
    command: "pokedex collection add --pokemon=mankey --game=lets-go-pikachu --method=catch"
    assert:
      exit_code: 0
      equals: { "data.species_name": "mankey", "data.status": "caught" }
      has_fields: ["data.id"]

  - name: "Route 3 -- catch Spearow"
    command: "pokedex collection add --pokemon=spearow --game=lets-go-pikachu --method=catch"
    assert:
      exit_code: 0
      equals: { "data.species_name": "spearow", "data.status": "caught" }

  # ============================================================
