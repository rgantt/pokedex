  # ============================================================
  - name: "Final -- collection stats"
    command: "pokedex collection stats --game=ruby"
    assert:
      exit_code: 0
      has_fields: ["data.total_entries", "data.unique_species", "data.by_status"]
      type_of: { "data.total_entries": "number" }

  - name: "Final -- dex progress"
    command: "pokedex dex progress national"
    assert:
      exit_code: 0
      has_fields: ["data.dex_name", "data.total", "data.caught", "data.percentage"]
      type_of: { "data.percentage": "number" }
