# Screenplays are CHEAP regression tests produced by exploratory test agents.
# If a step fails, investigate: is it a real bug (fix the code) or a stale
# assertion (update or delete this file)? The INTENT matters, not the exact
# implementation. Don't contort the CLI to make a stale screenplay pass.
name: "Red Playthrough - Viridian Forest to Victory Road"
persona: red_playthrough
description: >
  End-to-end Red playthrough testing the discover-inspect-catch-evolve-verify
  loop across viridian-forest, mt-moon, rock-tunnel, pokemon-tower,
  kanto-safari-zone, seafoam-islands, and kanto-victory-road-2. Validates
  Gen 1 encounter data, evolution chains, collection add/update/stats workflow,
  and HATEOAS action navigability. Targets 20+ unique species across 7
  locations including 2 legendaries (Articuno, Moltres).
needs_seed: true
mutates_collection: true

issues_found:
  - severity: MEDIUM
    summary: >
      Location slug "safari-zone" returns NOT_FOUND with suggestion to try
      region prefixes (e.g. "kanto-safari-zone"), but the error message
      contains duplicate "try_without_game" actions in the actions array.
      The same duplicate actions bug appears for other NOT_FOUND location
      errors as well.
  - severity: MEDIUM
    summary: >
      Location slug "victory-road" exists in the database (158 encounters
      in other games) but has no Red data. The correct slug for Gen 1 is
      "kanto-victory-road-2". The error message does not suggest related
      slugs or sub-areas, making discoverability poor for agents.
  - severity: LOW
    summary: >
      Evolved Pokemon added via --method=evolve that have no wild encounter
      data in the target game (e.g. Butterfree, Beedrill in Red) produce a
      warning field in the response: "No encounter data found for X in red.
      The Pokemon may not be obtainable in this game." This is technically
      correct but misleading for evolution-only Pokemon. The warning should
      be suppressed when --method=evolve is used.
  - severity: INFO
    summary: >
      The "location search" subcommand does not exist. When a location slug
      is unknown, the only discovery path is trial-and-error with prefixes.
      A fuzzy location search (analogous to "pokemon search") would improve
      agent navigability.

steps:
  # ============================================================
  # LOCATION 1: viridian-forest
  # ============================================================
  - name: "Viridian Forest -- discover encounters"
    command: "pokedex location encounters viridian-forest --game=red"
    assert:
      exit_code: 0
      has_fields: ["data", "actions", "meta"]
      equals: { "meta.total": 10 }
      array_len: { "data": { "min": 5 } }
  - name: "Viridian Forest -- verify species present"
    command: "pokedex location encounters viridian-forest --game=red"
    assert:
      exit_code: 0
      json_path_any: { "data[*].pokemon_name": ["Caterpie", "Kakuna", "Metapod", "Pikachu", "Weedle"] }
  - name: "Viridian Forest -- inspect Caterpie"
    command: "pokedex pokemon show caterpie"
    assert:
      exit_code: 0
      equals: { "data.name": "caterpie", "data.generation": 1 }
      has_fields: ["data.types", "data.stats", "data.abilities"]
      contains: { "data.types.0": "Bug" }
  - name: "Viridian Forest -- inspect Pikachu"
    command: "pokedex pokemon show pikachu"
    assert:
      exit_code: 0
      equals: { "data.name": "pikachu", "data.generation": 1 }
      contains: { "data.types.0": "Electric" }
  - name: "Viridian Forest -- catch Caterpie"
    command: "pokedex collection add --pokemon=caterpie --game=red --method=catch"
    assert:
      exit_code: 0
      equals: { "data.species_name": "caterpie", "data.status": "caught", "data.method": "catch" }
      has_fields: ["data.id", "data.created_at"]
  - name: "Viridian Forest -- catch Pikachu"
    command: "pokedex collection add --pokemon=pikachu --game=red --method=catch"
    assert:
      exit_code: 0
      equals: { "data.species_name": "pikachu", "data.status": "caught", "data.method": "catch" }
  - name: "Viridian Forest -- catch Weedle"
