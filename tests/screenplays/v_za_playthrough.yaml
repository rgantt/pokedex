    command: "pokedex location encounters wild-zone-11 --game=legends-za"
    assert:
      exit_code: 0
      equals: { "meta.total": 8, "data.0.location": "Wild Zone 11", "data.0.area": "wild-zone-11" }
  - name: "Zone 12 -- encounters exist with correct location"
    command: "pokedex location encounters wild-zone-12 --game=legends-za"
    assert:
      exit_code: 0
      equals: { "meta.total": 11, "data.0.location": "Wild Zone 12", "data.0.area": "wild-zone-12" }
      array_len: { "data": { "min": 9 } }
  - name: "Zone 13 -- encounters exist with correct location"
    command: "pokedex location encounters wild-zone-13 --game=legends-za"
    assert:
      exit_code: 0
      equals: { "meta.total": 8, "data.0.location": "Wild Zone 13", "data.0.area": "wild-zone-13" }
  - name: "Zone 14 -- encounters exist with correct location"
