# Screenplays are CHEAP regression tests produced by exploratory test agents.
# If a step fails, investigate: is it a real bug (fix the code) or a stale
# assertion (update or delete this file)? The INTENT matters, not the exact
# implementation. Don't contort the CLI to make a stale screenplay pass.
name: "HATEOAS Walker"
persona: "A"
description: >
  Navigate the CLI purely via action links starting from discovery.
  Round 14: Action link accuracy and cross-resource navigation focus. Covers:
  - Form-specific add_to_collection from pokemon show (growlithe-hisui)
  - pokemon_info action from collection show preserving form context
  - Full --dry-run chain: add dry-run -> confirm -> show -> update dry-run -> confirm -> remove dry-run -> confirm
  - Cross-resource chain: type pokemon fire -> show charmander -> evolutions -> show charmeleon -> stats
  - Verbatim copy-paste test of action cmd strings
  - home transferable -> add_to_collection action
  - Pagination filter preservation in next/prev actions
  Issues found:
  - home transferable loses form context in show_pokemon and add_to_collection actions
  - collection remove --dry-run missing dry_run field (inconsistent with add/update)
needs_seed: true
mutates_collection: true

steps:
  # ========================================================================
  # Chain 1: Root discovery -> validate structure
  # ========================================================================

  - name: "Root discovery returns command tree"
    command: "pokedex --discover"
    assert:
      exit_code: 0
      has_fields: ["data.resources", "data.entry_points", "actions", "meta.command"]
      type_of: {"data.resources": "array", "data.entry_points": "array"}
      array_len: {"data.resources": {"min": 5}}

  # ========================================================================
  # Chain 2: Cross-resource: type pokemon fire -> show -> evolutions -> show -> stats
  # ========================================================================

  - name: "Type pokemon fire returns charmander first"
    command: "pokedex type pokemon fire --limit=5"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 5, "max": 5}}
      equals: {"data.0.name": "charmander", "meta.total": 81}
      has_fields: ["actions"]

  - name: "Follow show template with charmander from type pokemon fire"
    command: "pokedex pokemon show charmander"
    assert:
      exit_code: 0
      equals: {"data.name": "charmander", "data.types": ["Fire"]}
      has_fields: ["data.stats", "actions"]
      contains: {"actions": "evolutions charmander"}

  - name: "Follow evolutions action from charmander show"
    command: "pokedex pokemon evolutions charmander"
    assert:
      exit_code: 0
      equals: {"data.species_name": "charmander", "data.children.0.species_name": "charmeleon"}
      has_fields: ["data.children.0.children.0.species_name"]
      contains: {"actions": "charmeleon"}

  - name: "Follow show charmeleon action from evolutions"
    command: "pokedex pokemon show charmeleon"
    assert:
      exit_code: 0
      equals: {"data.name": "charmeleon", "data.id": 5}
      has_fields: ["data.evolves_from", "actions"]
      contains: {"actions": "stats charmeleon"}

  - name: "Follow stats action from charmeleon show"
    command: "pokedex pokemon stats charmeleon"
    assert:
      exit_code: 0
      equals: {"data.pokemon_name": "Charmeleon", "data.total": 405}
      has_fields: ["data.hp", "data.speed"]

  # ========================================================================
  # Chain 3: Form-specific action preservation (growlithe-hisui)
  # ========================================================================

  - name: "Show growlithe-hisui preserves form in actions"
    command: "pokedex pokemon show growlithe-hisui"
    assert:
      exit_code: 0
      equals: {"data.display_name": "Hisuian Growlithe", "data.types": ["Fire", "Rock"]}
      contains: {"actions": "growlithe-hisui"}
      has_fields: ["data.stats"]

  - name: "Follow add_to_collection action from growlithe-hisui show (dry-run)"
    command: "pokedex collection add --pokemon=growlithe-hisui --game=legends-arceus --dry-run"
    assert:
      exit_code: 0
      equals: {"data.dry_run": true, "data.form": "hisui"}
      has_fields: ["data.pokemon", "data.game"]
      contains: {"actions": "confirm"}

  - name: "Follow confirm action to add growlithe-hisui"
    command: "pokedex collection add --pokemon=growlithe --game=legends-arceus --form=hisui"
    capture: {"hisui_entry_id": "data.id"}
    assert:
      exit_code: 0
      equals: {"data.display_name": "Hisuian Growlithe", "data.form_name": "hisui"}
      has_fields: ["data.id", "actions"]
      contains: {"actions": "growlithe-hisui"}

  - name: "Follow show action from collection add"
    command: "pokedex collection show $hisui_entry_id"
    assert:
      exit_code: 0
      equals: {"data.display_name": "Hisuian Growlithe", "data.form_name": "hisui"}
      contains: {"actions": "growlithe-hisui"}
      has_fields: ["data.species_name", "data.game"]

  - name: "Follow pokemon_info action from collection show preserves form"
    command: "pokedex pokemon show growlithe-hisui"
    assert:
      exit_code: 0
      equals: {"data.display_name": "Hisuian Growlithe"}
      has_fields: ["data.types", "data.abilities"]

  # ========================================================================
  # Chain 4: Full --dry-run chain: add -> update -> remove
  # ========================================================================

  - name: "Dry-run add bulbasaur to red"
    command: "pokedex collection add --pokemon=bulbasaur --game=red --dry-run"
    assert:
      exit_code: 0
      equals: {"data.dry_run": true, "data.pokemon": "bulbasaur", "data.game": "red"}
      contains: {"actions": "--pokemon=bulbasaur --game=red"}

  - name: "Confirm add bulbasaur to red"
    command: "pokedex collection add --pokemon=bulbasaur --game=red"
    capture: {"bulba_id": "data.id"}
    assert:
      exit_code: 0
      equals: {"data.species_name": "bulbasaur", "data.game": "red", "data.status": "caught"}
      has_fields: ["data.id", "actions"]

  - name: "Follow show action from collection add"
    command: "pokedex collection show $bulba_id"
    assert:
      exit_code: 0
      equals: {"data.species_name": "bulbasaur", "data.status": "caught"}
      has_fields: ["actions"]
      contains: {"actions": "update"}

  - name: "Dry-run update status to evolved"
    command: "pokedex collection update $bulba_id --status=evolved --dry-run"
    assert:
      exit_code: 0
      equals: {"data.dry_run": true, "data.new_status": "evolved"}
      has_fields: ["data.current"]
      contains: {"actions": "confirm"}

  - name: "Confirm update status to evolved"
    command: "pokedex collection update $bulba_id --status=evolved"
    assert:
      exit_code: 0
      equals: {"data.status": "evolved"}
      has_fields: ["data.id", "actions"]

  - name: "Dry-run remove shows confirm action"
    command: "pokedex collection remove $bulba_id --dry-run"
    assert:
      exit_code: 0
      equals: {"data.species_name": "bulbasaur", "data.status": "evolved"}
      contains: {"actions": "confirm"}

  - name: "Confirm remove"
    command: "pokedex collection remove $bulba_id"
    assert:
      exit_code: 0
      equals: {"data.removed": true}
      has_fields: ["actions"]

  # ========================================================================
  # Chain 5: home transferable -> follow add_to_collection
  # ========================================================================

  - name: "Home transferable pikachu lists HOME-compatible games"
    command: "pokedex home transferable pikachu"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 5}}
      has_fields: ["data.0.name", "data.0.connects_to_home"]
      contains: {"actions": "add_to_collection"}

  - name: "Follow add_to_collection action from home transferable"
    command: "pokedex collection add --pokemon=pikachu --game=sword --in-home --dry-run"
    assert:
      exit_code: 0
      equals: {"data.dry_run": true, "data.pokemon": "pikachu", "data.in_home": true}
      has_fields: ["data.game"]

  # ========================================================================
  # Chain 6: Pagination preserves filters
  # ========================================================================

  - name: "Pokemon list with generation+type filters"
    command: "pokedex pokemon list --generation=1 --type-filter=fire --limit=10"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 10, "max": 10}}
      equals: {"meta.total": 12, "data.0.name": "charmander"}

  - name: "Next page preserves both generation and type filters"
    command: "pokedex pokemon list --type-filter=fire --generation=1 --limit=10 --offset=10"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 2, "max": 2}}
      equals: {"meta.total": 12, "meta.offset": 10}

  - name: "Last page has prev_page but no next_page"
    command: "pokedex pokemon list --type-filter=fire --generation=1 --limit=10 --offset=10"
    assert:
      exit_code: 0
      contains: {"actions": "offset=0"}

  - name: "Type pokemon fire pagination preserves type"
    command: "pokedex type pokemon fire --limit=5 --offset=5"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 5, "max": 5}}
      contains: {"actions": "offset=10"}
      equals: {"meta.offset": 5}

  # ========================================================================
  # Chain 7: Verbatim action cmd copy-paste test
  # ========================================================================

  - name: "Pikachu show -> evolutions action is verbatim executable"
    command: "pokedex pokemon evolutions pikachu"
    assert:
      exit_code: 0
      equals: {"data.species_name": "pichu"}
      has_fields: ["data.children.0.species_name"]

  - name: "Pikachu show -> forms action is verbatim executable"
    command: "pokedex pokemon forms pikachu"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 10}}
      has_fields: ["data.0.name"]

  - name: "Pikachu show -> stats action is verbatim executable"
    command: "pokedex pokemon stats pikachu"
    assert:
      exit_code: 0
      equals: {"data.pokemon_name": "Pikachu", "data.total": 320}

  - name: "Pikachu show -> moves action is verbatim executable"
    command: "pokedex pokemon moves pikachu"
    assert:
      exit_code: 0
      has_fields: ["data", "actions"]
      array_len: {"data": {"min": 20}}

  # ========================================================================
  # Chain 8: ISSUE - home transferable loses form context in actions
  # ========================================================================

  - name: "ISSUE: home transferable growlithe-hisui show_pokemon action loses form"
    command: "pokedex home transferable growlithe-hisui"
    assert:
      exit_code: 0
      array_len: {"data": {"min": 1}}
      has_fields: ["actions"]

  # ========================================================================
  # Chain 9: ISSUE - collection remove --dry-run missing dry_run field
  # ========================================================================

  - name: "Add entry for remove dry_run test"
    command: "pokedex collection add --pokemon=pidgey --game=red"
    capture: {"pidgey_id": "data.id"}
    assert:
      exit_code: 0
      equals: {"data.species_name": "pidgey"}
      has_fields: ["data.id"]

  - name: "ISSUE: remove --dry-run data lacks dry_run field unlike add/update"
    command: "pokedex collection remove $pidgey_id --dry-run"
    assert:
      exit_code: 0
      equals: {"data.species_name": "pidgey"}
      contains: {"actions": "confirm"}

  - name: "Cleanup: confirm remove pidgey"
    command: "pokedex collection remove $pidgey_id"
    assert:
      exit_code: 0
      equals: {"data.removed": true}

  # ========================================================================
  # Chain 10: Cleanup growlithe-hisui collection entry
  # ========================================================================

  - name: "Cleanup: remove growlithe-hisui collection entry"
    command: "pokedex collection remove $hisui_entry_id"
    assert:
      exit_code: 0
      equals: {"data.removed": true}
      has_fields: ["actions"]
