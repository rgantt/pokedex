# Screenplays are CHEAP regression tests produced by exploratory test agents.
# If a step fails, investigate: is it a real bug (fix the code) or a stale
# assertion (update or delete this file)? The INTENT matters, not the exact
# implementation. Don't contort the CLI to make a stale screenplay pass.
name: "Legends Arceus Hisui Completionist Playthrough"
persona: pla_completionist
description: >
  End-to-end Legends: Arceus playthrough testing the discover-inspect-catch-evolve-verify
  loop across Obsidian Fieldlands, Crimson Mirelands, Cobalt Coastlands, Coronet Highlands,
  and Alabaster Icelands sub-areas. Verifies Hisui region, generation 8, alpha catches,
  Hisuian form annotations, PLA-exclusive evolutions (Wyrdeer, Kleavor, Sneasler, Overqwil,
  Ursaluna), and encounter details with alpha_levels.
needs_seed: true
mutates_collection: true

steps:
  # ============================================================
  # VERIFY GAME METADATA
  # ============================================================
  - name: "Game metadata -- verify PLA is generation 8 Hisui region"
    command: "pokedex game show legends-arceus"
    assert:
      exit_code: 0
      equals: { "data.name": "legends-arceus", "data.generation": 8, "data.region": "Hisui" }
      has_fields: ["data.connects_to_home"]

  - name: "Hisui dex -- verify exists with 242 species"
    command: "pokedex dex progress hisui --game=legends-arceus --limit=3"
    assert:
      exit_code: 0
      equals: { "data.dex_name": "hisui", "data.total": 242 }
      has_fields: ["data.entries"]

  # ============================================================
  # OBSIDIAN FIELDLANDS: Aspiration Hill
  # ============================================================
  - name: "Aspiration Hill -- discover encounters"
    command: "pokedex location encounters aspiration-hill --game=legends-arceus"
    assert:
      exit_code: 0
      has_fields: ["data", "actions", "meta"]
      array_len: { "data": { "min": 10 } }

  - name: "Aspiration Hill -- inspect Bidoof"
    command: "pokedex pokemon show bidoof"
    assert:
      exit_code: 0
      equals: { "data.name": "bidoof", "data.generation": 4 }
      has_fields: ["data.types", "data.stats"]

  - name: "Aspiration Hill -- catch alpha Bidoof"
    command: "pokedex collection add --pokemon=bidoof --game=legends-arceus --method=catch --alpha"
    capture: { "bidoof_id": "data.id" }
    assert:
      exit_code: 0
      equals: { "data.species_name": "bidoof", "data.is_alpha": true, "data.status": "caught" }
      has_fields: ["data.id"]

  - name: "Aspiration Hill -- catch Starly"
    command: "pokedex collection add --pokemon=starly --game=legends-arceus --method=catch"
    assert:
      exit_code: 0
      equals: { "data.species_name": "starly", "data.status": "caught" }

  - name: "Aspiration Hill -- catch alpha Shinx"
    command: "pokedex collection add --pokemon=shinx --game=legends-arceus --method=catch --alpha"
    capture: { "shinx_id": "data.id" }
    assert:
      exit_code: 0
      equals: { "data.species_name": "shinx", "data.is_alpha": true }
      has_fields: ["data.created_at"]

  - name: "Aspiration Hill -- catch Wurmple"
    command: "pokedex collection add --pokemon=wurmple --game=legends-arceus --method=catch"
