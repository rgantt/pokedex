# Screenplays are CHEAP regression tests produced by exploratory test agents.
# If a step fails, investigate: is it a real bug (fix the code) or a stale
# assertion (update or delete this file)? The INTENT matters, not the exact
# implementation. Don't contort the CLI to make a stale screenplay pass.
name: "Variants: Branching Evolutions, Forms, and Trigger Details"
persona: variants
description: "Test branching evolutions (Cosmog chain with type divergence, Slowpoke 2-way with item triggers, Eevee 8-way), form counts and metadata (Pikachu 17 cosmetics incl. gmax, Shellos 2 regional), Deoxys form-specific stat extremes, and HATEOAS form context fidelity"
needs_seed: true
mutates_collection: false

steps:
  # ===== Cosmog: linear chain then version-exclusive branch =====

  - name: "Cosmog evolution chain starts at cosmog"
    command: "pokedex pokemon evolutions cosmog"
    assert:
      exit_code: 0
      equals: { "data.species_name": "cosmog" }

  - name: "Cosmog has exactly 1 child (Cosmoem)"
    command: "pokedex pokemon evolutions cosmog"
    assert:
      exit_code: 0
      array_len: { "data.children": { "min": 1, "max": 1 } }
      contains: { "data": "cosmoem" }

  - name: "Cosmoem evolves at level 43"
    command: "pokedex pokemon evolutions cosmog"
    assert:
      exit_code: 0
      contains: { "data": "Level 43" }

  - name: "Cosmoem branches into exactly 2 Pokemon"
    command: "pokedex pokemon evolutions cosmog"
    assert:
      exit_code: 0
      array_len: { "data.children.0.children": { "min": 2, "max": 2 } }

  - name: "Cosmoem branch includes Solgaleo"
    command: "pokedex pokemon evolutions cosmog"
    assert:
      exit_code: 0
      contains: { "data": "solgaleo" }

  - name: "Cosmoem branch includes Lunala"
    command: "pokedex pokemon evolutions cosmog"
    assert:
      exit_code: 0
      contains: { "data": "lunala" }

  - name: "Solgaleo and Lunala evolve at level 53"
    command: "pokedex pokemon evolutions cosmog"
    assert:
      exit_code: 0
      contains: { "data": "Level 53" }

  # --- Solgaleo is Psychic/Steel ---

  - name: "Solgaleo is Psychic/Steel type"
    command: "pokedex pokemon show solgaleo"
    assert:
      exit_code: 0
      equals: { "data.types": ["Psychic", "Steel"] }
      has_fields: ["data.display_name", "data.stats"]

  - name: "Solgaleo is legendary"
    command: "pokedex pokemon show solgaleo"
    assert:
      exit_code: 0
      equals: { "data.is_legendary": true, "data.display_name": "Solgaleo" }

  - name: "Solgaleo has BST 680"
    command: "pokedex pokemon show solgaleo"
    assert:
      exit_code: 0
      equals: { "data.stats.total": 680, "data.stats.attack": 137 }

  - name: "Solgaleo ability is Full Metal Body"
    command: "pokedex pokemon show solgaleo"
    assert:
      exit_code: 0
      contains: { "data": "Full Metal Body" }

  # --- Lunala is Psychic/Ghost (different from Solgaleo) ---

  - name: "Lunala is Psychic/Ghost type (differs from Solgaleo)"
    command: "pokedex pokemon show lunala"
    assert:
      exit_code: 0
      equals: { "data.types": ["Psychic", "Ghost"] }

  - name: "Lunala is also legendary with BST 680"
    command: "pokedex pokemon show lunala"
    assert:
      exit_code: 0
      equals: { "data.is_legendary": true, "data.stats.total": 680 }

  - name: "Lunala has mirrored stats vs Solgaleo (SpA 137, Atk 113)"
    command: "pokedex pokemon show lunala"
    assert:
      exit_code: 0
      equals: { "data.stats.special_attack": 137, "data.stats.attack": 113 }

  - name: "Lunala ability is Shadow Shield"
    command: "pokedex pokemon show lunala"
    assert:
      exit_code: 0
      contains: { "data": "Shadow Shield" }

  - name: "Lunala evolves from Cosmoem"
    command: "pokedex pokemon show lunala"
    assert:
      exit_code: 0
      equals: { "data.evolves_from": "Cosmoem" }

  # ===== Pikachu forms: 17 cosmetic forms =====

  - name: "Pikachu has 17 forms (base + 16 variants)"
    command: "pokedex pokemon forms pikachu"
    assert:
      exit_code: 0
      type_of: { "data": "array" }
      array_len: { "data": { "min": 13 } }

  - name: "Pikachu forms include cosplay"
    command: "pokedex pokemon forms pikachu"
    assert:
      exit_code: 0
      contains: { "data": "pikachu-cosplay" }

  - name: "Pikachu forms include rock-star"
    command: "pokedex pokemon forms pikachu"
    assert:
      exit_code: 0
      contains: { "data": "pikachu-rock-star" }

  - name: "Pikachu forms include original-cap"
    command: "pokedex pokemon forms pikachu"
    assert:
      exit_code: 0
      contains: { "data": "pikachu-original-cap" }

  - name: "Pikachu forms include gmax"
    command: "pokedex pokemon forms pikachu"
    assert:
      exit_code: 0
      contains: { "data": "pikachu-gmax" }

  - name: "Pikachu forms include partner-cap"
    command: "pokedex pokemon forms pikachu"
    assert:
      exit_code: 0
      contains: { "data": "pikachu-partner-cap" }

  - name: "Pikachu forms include world-cap"
    command: "pokedex pokemon forms pikachu"
    assert:
      exit_code: 0
      contains: { "data": "pikachu-world-cap" }

  - name: "Pikachu default form is first and has is_default true"
    command: "pokedex pokemon forms pikachu"
    assert:
      exit_code: 0
      equals: { "data.0.is_default": true, "data.0.display_name": "Pikachu" }

  - name: "Pikachu gmax form is marked battle_only"
    command: "pokedex pokemon forms pikachu"
    assert:
      exit_code: 0
      equals: { "data.1.name": "pikachu-gmax", "data.1.is_battle_only": true }

  - name: "All Pikachu forms are Electric type"
    command: "pokedex pokemon forms pikachu"
    assert:
      exit_code: 0
      equals:
        "data.0.types": ["Electric"]
        "data.1.types": ["Electric"]
        "data.2.types": ["Electric"]

  # --- Pikachu-gmax show: display_name and stats ---

  - name: "pikachu-gmax show displays Gigantamax Pikachu"
    command: "pokedex pokemon show pikachu-gmax"
    assert:
      exit_code: 0
      equals: { "data.display_name": "Gigantamax Pikachu" }
      has_fields: ["data.stats", "data.abilities", "data.types"]

  - name: "pikachu-gmax is still Electric type"
    command: "pokedex pokemon show pikachu-gmax"
    assert:
      exit_code: 0
      equals: { "data.types": ["Electric"] }

  - name: "pikachu-gmax stats match base Pikachu (BST 320)"
    command: "pokedex pokemon stats pikachu-gmax"
    assert:
      exit_code: 0
      equals: { "data.pokemon_name": "Gigantamax Pikachu", "data.total": 320, "data.speed": 90 }

  # BUG: pikachu-gmax show uses species id 25 (base Pikachu) not form-specific id
  # The id field doesn't distinguish the form from base Pikachu
  - name: "pikachu-gmax show id is species-level 25 (not form-specific)"
    command: "pokedex pokemon show pikachu-gmax"
    assert:
      exit_code: 0
      equals: { "data.id": 25 }

  # BUG: pikachu-gmax show actions are inconsistent — evolutions/forms link to
  # base 'pikachu' while stats/moves/encounters preserve form suffix
  - name: "pikachu-gmax evolutions action loses form context"
    command: "pokedex pokemon show pikachu-gmax"
    assert:
      exit_code: 0
      contains: { "actions": "pokedex pokemon evolutions pikachu" }

  - name: "pikachu-gmax stats action preserves form context"
    command: "pokedex pokemon show pikachu-gmax"
    assert:
      exit_code: 0
      contains: { "actions": "pokedex pokemon stats pikachu-gmax" }

  # ===== Slowpoke: 2 evolution branches with different triggers =====

  - name: "Slowpoke has exactly 2 evolution branches"
    command: "pokedex pokemon evolutions slowpoke"
    assert:
      exit_code: 0
      equals: { "data.species_name": "slowpoke" }
      array_len: { "data.children": { "min": 2, "max": 2 } }

  - name: "Slowpoke evolves into Slowbro"
    command: "pokedex pokemon evolutions slowpoke"
    assert:
      exit_code: 0
      contains: { "data": "slowbro" }

  - name: "Slowpoke evolves into Slowking"
    command: "pokedex pokemon evolutions slowpoke"
    assert:
      exit_code: 0
      contains: { "data": "slowking" }

  - name: "Slowbro evolution has level 37 trigger"
    command: "pokedex pokemon evolutions slowpoke"
    assert:
      exit_code: 0
      contains: { "data": "Level 37" }

  - name: "Slowking evolution has trade trigger"
    command: "pokedex pokemon evolutions slowpoke"
    assert:
      exit_code: 0
      contains: { "data": "trade" }

  - name: "Slowking trigger_detail mentions kings-rock"
    command: "pokedex pokemon evolutions slowpoke"
    assert:
      exit_code: 0
      contains: { "data": "kings-rock" }

  - name: "Slowbro also has galarica-cuff as alternate method"
    command: "pokedex pokemon evolutions slowpoke"
    assert:
      exit_code: 0
      contains: { "data": "galarica-cuff" }

  - name: "Slowking also has galarica-wreath as alternate method"
    command: "pokedex pokemon evolutions slowpoke"
    assert:
      exit_code: 0
      contains: { "data": "galarica-wreath" }

  - name: "Slowbro has 2 evolution methods (level + use-item)"
    command: "pokedex pokemon evolutions slowpoke"
    assert:
      exit_code: 0
      array_len: { "data.children.0.methods": { "min": 2, "max": 2 } }

  - name: "Slowking has 2 evolution methods (use-item + trade)"
    command: "pokedex pokemon evolutions slowpoke"
    assert:
      exit_code: 0
      array_len: { "data.children.1.methods": { "min": 2, "max": 2 } }

  - name: "Neither Slowbro nor Slowking has further evolutions"
    command: "pokedex pokemon evolutions slowpoke"
    assert:
      exit_code: 0
      array_len:
        "data.children.0.children": { "min": 0, "max": 0 }
        "data.children.1.children": { "min": 0, "max": 0 }

  # ===== Deoxys: form-specific stat extremes =====

  - name: "Deoxys-attack display_name is Attack Deoxys"
    command: "pokedex pokemon show deoxys-attack"
    assert:
      exit_code: 0
      equals: { "data.display_name": "Attack Deoxys" }

  - name: "Deoxys-attack has 180 Attack and 180 Special Attack"
    command: "pokedex pokemon show deoxys-attack"
    assert:
      exit_code: 0
      equals: { "data.stats.attack": 180, "data.stats.special_attack": 180 }

  - name: "Deoxys-attack has glass cannon defenses (20/20)"
    command: "pokedex pokemon show deoxys-attack"
    assert:
      exit_code: 0
      equals: { "data.stats.defense": 20, "data.stats.special_defense": 20 }

  - name: "Deoxys-attack has BST 600"
    command: "pokedex pokemon show deoxys-attack"
    assert:
      exit_code: 0
      equals: { "data.stats.total": 600 }

  - name: "Deoxys-attack is Psychic type and mythical"
    command: "pokedex pokemon show deoxys-attack"
    assert:
      exit_code: 0
      equals: { "data.types": ["Psychic"], "data.is_mythical": true }

  - name: "Deoxys-speed display_name is Speed Deoxys"
    command: "pokedex pokemon show deoxys-speed"
    assert:
      exit_code: 0
      equals: { "data.display_name": "Speed Deoxys" }

  - name: "Deoxys-speed has 180 Speed (not Attack)"
    command: "pokedex pokemon show deoxys-speed"
    assert:
      exit_code: 0
      equals: { "data.stats.speed": 180, "data.stats.attack": 95 }

  - name: "Deoxys-speed has balanced defenses (90/90)"
    command: "pokedex pokemon show deoxys-speed"
    assert:
      exit_code: 0
      equals: { "data.stats.defense": 90, "data.stats.special_defense": 90 }

  - name: "Deoxys-speed also has BST 600"
    command: "pokedex pokemon show deoxys-speed"
    assert:
      exit_code: 0
      equals: { "data.stats.total": 600 }

  - name: "Deoxys attack and speed forms share same species id 386"
    command: "pokedex pokemon show deoxys-attack"
    assert:
      exit_code: 0
      equals: { "data.id": 386 }

  - name: "Deoxys-speed also has species id 386"
    command: "pokedex pokemon show deoxys-speed"
    assert:
      exit_code: 0
      equals: { "data.id": 386 }

  # BUG: Deoxys form stats actions link back to base 'deoxys' (loses form context)
  - name: "Deoxys-attack stats action links to base deoxys show (form context lost)"
    command: "pokedex pokemon stats deoxys-attack"
    assert:
      exit_code: 0
      contains: { "actions": "pokedex pokemon show deoxys" }

  - name: "Deoxys-speed stats action also links to base deoxys show"
    command: "pokedex pokemon stats deoxys-speed"
    assert:
      exit_code: 0
      contains: { "actions": "pokedex pokemon show deoxys" }

  # ===== Shellos: exactly 2 regional forms =====

  - name: "Shellos has exactly 2 forms"
    command: "pokedex pokemon forms shellos"
    assert:
      exit_code: 0
      type_of: { "data": "array" }
      array_len: { "data": { "min": 2, "max": 2 } }

  - name: "Shellos west form is default"
    command: "pokedex pokemon forms shellos"
    assert:
      exit_code: 0
      equals: { "data.0.form_name": "west", "data.0.is_default": true, "data.0.display_name": "West Shellos" }

  - name: "Shellos east form is not default"
    command: "pokedex pokemon forms shellos"
    assert:
      exit_code: 0
      equals: { "data.1.form_name": "east", "data.1.is_default": false, "data.1.display_name": "East Shellos" }

  - name: "Both Shellos forms are Water type"
    command: "pokedex pokemon forms shellos"
    assert:
      exit_code: 0
      equals: { "data.0.types": ["Water"], "data.1.types": ["Water"] }

  - name: "Shellos forms are not mega or battle-only"
    command: "pokedex pokemon forms shellos"
    assert:
      exit_code: 0
      equals:
        "data.0.is_mega": false
        "data.0.is_battle_only": false
        "data.1.is_mega": false
        "data.1.is_battle_only": false

  - name: "Shellos forms have HATEOAS collection actions with form parameter"
    command: "pokedex pokemon forms shellos"
    assert:
      exit_code: 0
      contains:
        "actions": "pokedex collection add --pokemon=shellos --form=west"

  - name: "Shellos east collection action also present"
    command: "pokedex pokemon forms shellos"
    assert:
      exit_code: 0
      contains:
        "actions": "pokedex collection add --pokemon=shellos --form=east"

  # ===== Eevee: 8 evolution branches (retained from original) =====

  - name: "Eevee has exactly 8 evolution branches"
    command: "pokedex pokemon evolutions eevee"
    assert:
      exit_code: 0
      equals: { "data.species_name": "eevee" }
      array_len: { "data.children": { "min": 8, "max": 8 } }

  - name: "Eevee children include all eeveelutions"
    command: "pokedex pokemon evolutions eevee"
    assert:
      exit_code: 0
      contains: { "data": "vaporeon" }

  - name: "Eevee children include Jolteon"
    command: "pokedex pokemon evolutions eevee"
    assert:
      exit_code: 0
      contains: { "data": "jolteon" }

  - name: "Eevee children include Sylveon with Fairy type"
    command: "pokedex pokemon evolutions eevee"
    assert:
      exit_code: 0
      contains: { "data": "sylveon" }

  - name: "Eevee Vaporeon method has water-stone item"
    command: "pokedex pokemon evolutions eevee"
    assert:
      exit_code: 0
      contains: { "data": "water-stone" }

  - name: "Eevee evolution tree has HATEOAS actions"
    command: "pokedex pokemon evolutions eevee"
    assert:
      exit_code: 0
      has_fields: ["actions", "meta.command"]

  # ===== Tyrogue: 3 stat-based branches =====

  - name: "Tyrogue has exactly 3 evolution branches"
    command: "pokedex pokemon evolutions tyrogue"
    assert:
      exit_code: 0
      equals: { "data.species_name": "tyrogue" }
      array_len: { "data.children": { "min": 3, "max": 3 } }

  - name: "Tyrogue Hitmonlee requires Attack > Defense"
    command: "pokedex pokemon evolutions tyrogue"
    assert:
      exit_code: 0
      contains: { "data": "Attack > Defense" }

  - name: "Tyrogue Hitmonchan requires Attack < Defense"
    command: "pokedex pokemon evolutions tyrogue"
    assert:
      exit_code: 0
      contains: { "data": "Attack < Defense" }

  - name: "Tyrogue Hitmontop requires Attack = Defense"
    command: "pokedex pokemon evolutions tyrogue"
    assert:
      exit_code: 0
      contains: { "data": "Attack = Defense" }

  # ===== Wurmple: 2 personality-based branches with nested children =====

  - name: "Wurmple has exactly 2 evolution branches"
    command: "pokedex pokemon evolutions wurmple"
    assert:
      exit_code: 0
      equals: { "data.species_name": "wurmple" }
      array_len: { "data.children": { "min": 2, "max": 2 } }

  - name: "Wurmple has Silcoon and Cascoon branches"
    command: "pokedex pokemon evolutions wurmple"
    assert:
      exit_code: 0
      contains: { "data": "silcoon" }

  - name: "Wurmple Cascoon branch exists"
    command: "pokedex pokemon evolutions wurmple"
    assert:
      exit_code: 0
      contains: { "data": "cascoon" }

  - name: "Wurmple branches mention personality value"
    command: "pokedex pokemon evolutions wurmple"
    assert:
      exit_code: 0
      contains: { "data": "personality" }

  - name: "Silcoon evolves into Beautifly"
    command: "pokedex pokemon evolutions wurmple"
    assert:
      exit_code: 0
      contains: { "data": "beautifly" }

  - name: "Cascoon evolves into Dustox"
    command: "pokedex pokemon evolutions wurmple"
    assert:
      exit_code: 0
      contains: { "data": "dustox" }

  - name: "Wurmple children have nested children (2-stage branching)"
    command: "pokedex pokemon evolutions wurmple"
    assert:
      exit_code: 0
      array_len:
        "data.children.0.children": { "min": 1, "max": 1 }
        "data.children.1.children": { "min": 1, "max": 1 }

  # ===== Applin: 3 evolution branches =====

  - name: "Applin has exactly 3 evolution branches"
    command: "pokedex pokemon evolutions applin"
    assert:
      exit_code: 0
      equals: { "data.species_name": "applin" }
      array_len: { "data.children": { "min": 3, "max": 3 } }

  - name: "Applin evolves into Flapple with tart-apple"
    command: "pokedex pokemon evolutions applin"
    assert:
      exit_code: 0
      contains: { "data": "flapple" }

  - name: "Applin evolves into Appletun with sweet-apple"
    command: "pokedex pokemon evolutions applin"
    assert:
      exit_code: 0
      contains: { "data": "appletun" }

  - name: "Applin evolves into Dipplin"
    command: "pokedex pokemon evolutions applin"
    assert:
      exit_code: 0
      contains: { "data": "dipplin" }

  - name: "Dipplin further evolves into Hydrapple"
    command: "pokedex pokemon evolutions applin"
    assert:
      exit_code: 0
      contains: { "data": "hydrapple" }
