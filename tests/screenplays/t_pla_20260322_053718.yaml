  - name: "Catch Rhydon at Bolderoll Slope"
    command: "pokedex collection add --pokemon=rhydon --game=legends-arceus --method=catch"
    assert:
      exit_code: 0
      equals: { "data.species_name": "rhydon", "data.game": "legends-arceus" }

  - name: "Catch Togetic at Bolderoll Slope"
