  - name: "Dex progress -- caught filter"
    command: "pokedex dex progress original-sinnoh --caught"
    assert:
      exit_code: 0
      has_fields: ["data.caught", "data.entries"]
      type_of: { "data.caught": "number" }

  # ============================================================
  # COLLECTION MANAGEMENT TESTS
  # ============================================================
  - name: "Collection list filtered by game"
    command: "pokedex collection list --game=diamond"
    assert:
      exit_code: 0
      has_fields: ["data", "meta.total"]
      type_of: { "meta.total": "number" }

  - name: "Collection list filtered by evolved status"
    command: "pokedex collection list --status=evolved"
    assert:
      exit_code: 0
      has_fields: ["data", "meta.total"]
      array_len: { "data": { "min": 1 } }

  - name: "Collection show specific entry"
    command: "pokedex collection show 1"
    assert:
      exit_code: 0
      has_fields: ["data.id", "data.species_name", "data.status", "actions"]
      equals: { "data.game": "diamond" }

  - name: "HOME status (nothing transferred)"
    command: "pokedex home status"
    assert:
      exit_code: 0
      equals: { "data.total_in_home": 0 }
      has_fields: ["actions"]

  # ============================================================
  # FINAL VERIFICATION
  # ============================================================
  - name: "Final collection stats"
    command: "pokedex collection stats"
    assert:
      exit_code: 0
      has_fields: ["data.total_entries", "data.unique_species", "data.by_status"]
      type_of: { "data.unique_species": "number" }
