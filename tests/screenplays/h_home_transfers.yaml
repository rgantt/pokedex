# Screenplays are CHEAP regression tests produced by exploratory test agents.
# If a step fails, investigate: is it a real bug (fix the code) or a stale
# assertion (update or delete this file)? The INTENT matters, not the exact
# implementation. Don't contort the CLI to make a stale screenplay pass.
#
# ISSUES FOUND (Round 13):
#   BUG-R13-H1: (FIXED) game show region was derived from generation, not game.
#     All remakes now show correct regions.
#   BUG-R13-H2: service games (pokemon-go, pokemon-bank, home) have no
#     generation or region fields. This is arguably correct for services.
#   BUG-R13-H3: (FIXED) `home transferable terapagos` crashed with SQL error
#     "misuse of aggregate: MAX()". Now returns results without crashing.
#
# ISSUES FOUND (Round 14):
#   BUG-R14-H1: `collection update --dry-run` confirm action drops --in-home
#     (and --shiny, --nickname, etc.) flags. Only --status is included.
#     Lines 451-454 of src/commands/collection.rs only appends status flag
#     to the confirm command, ignoring in_home/shiny/nickname/notes/game/method.
#   BUG-R14-H2: `home transferable terapagos` incorrectly includes legends-za.
#     Terapagos has no pokedex mapping to any HOME game (blueberry pokedex is
#     linked to the-indigo-disk version_group, not scarlet-violet), so the
#     fallback logic triggers: "show all HOME games from species gen onward".
#     This returns ALL Gen 9 HOME games including legends-za, where Terapagos
#     is not available. Same issue affects pecharunt and ogerpon.
name: "HOME Transfers & Game Compatibility"
persona: "H"
description: >
  Tests game metadata (generation, region, display_name) for all game
  categories, HOME transferable accuracy for various species, home
  missing/status/coverage with collection mutations, service games,
  and collection update dry-run confirm actions.
needs_seed: true
mutates_collection: true

steps:
  # -- Remake regions verified --

  - name: "firered is Gen 3 Kanto"
    command: "pokedex game show firered"
    assert:
      exit_code: 0
      equals:
        "data.generation": 3
        "data.region": "Kanto"

  - name: "heartgold is Gen 4 Johto"
    command: "pokedex game show heartgold"
    assert:
      exit_code: 0
      equals:
        "data.generation": 4
        "data.region": "Johto"

  - name: "omega-ruby is Gen 6 Hoenn"
    command: "pokedex game show omega-ruby"
    assert:
      exit_code: 0
      equals:
        "data.generation": 6
        "data.region": "Hoenn"
      has_fields: ["data.display_name"]

  - name: "brilliant-diamond is Gen 8 Sinnoh"
    command: "pokedex game show brilliant-diamond"
    assert:
      exit_code: 0
      equals:
        "data.generation": 8
        "data.region": "Sinnoh"
        "data.connects_to_home": true

  - name: "legends-arceus is Gen 8 Hisui"
    command: "pokedex game show legends-arceus"
    assert:
      exit_code: 0
      equals:
        "data.generation": 8
        "data.region": "Hisui"
        "data.connects_to_home": true

  - name: "legends-za is Gen 9 Kalos"
    command: "pokedex game show legends-za"
    assert:
      exit_code: 0
      equals:
        "data.generation": 9
        "data.region": "Kalos"
        "data.connects_to_home": true

  # -- game list --home-compatible --

  - name: "home-compatible games all have connects_to_home"
    command: "pokedex game list --home-compatible"
    assert:
      exit_code: 0
      type_of:
        "data": "array"
      array_len:
        "data": { min: 10, max: 15 }

  # -- HOME transferable: no crashes for various species --

  - name: "pikachu transferable to many HOME games"
    command: "pokedex home transferable pikachu"
    assert:
      exit_code: 0
      type_of:
        "data": "array"
      array_len:
        "data": { min: 8 }

  - name: "mew transferable shows some games"
    command: "pokedex home transferable mew"
    assert:
      exit_code: 0
      type_of:
        "data": "array"
      array_len:
        "data": { min: 1 }

  - name: "terapagos transferable no crash (BUG-R13-H3 fixed)"
    command: "pokedex home transferable terapagos"
    assert:
      exit_code: 0
      type_of:
        "data": "array"
      array_len:
        "data": { min: 1 }

  - name: "kleavor transferable only legends-arceus"
    command: "pokedex home transferable kleavor"
    assert:
      exit_code: 0
      array_len:
        "data": { min: 1, max: 1 }
      equals:
        "data.0.name": "legends-arceus"

  - name: "eternatus transferable to sword and shield"
    command: "pokedex home transferable eternatus"
    assert:
      exit_code: 0
      array_len:
        "data": { min: 2, max: 2 }
      equals:
        "data.0.name": "sword"

  - name: "ditto transferable no crash"
    command: "pokedex home transferable ditto"
    assert:
      exit_code: 0
      type_of:
        "data": "array"
      array_len:
        "data": { min: 4 }

  - name: "arceus transferable includes legends-arceus"
    command: "pokedex home transferable arceus"
    assert:
      exit_code: 0
      type_of:
        "data": "array"
      array_len:
        "data": { min: 1 }

  # -- HOME missing --dex=kanto: only Kanto pokemon --

  - name: "home missing kanto has 151 total"
    command: "pokedex home missing --dex=kanto --limit=3"
    assert:
      exit_code: 0
      equals:
        "meta.total": 151
      array_len:
        "data": { min: 1, max: 3 }

  - name: "home missing kanto last entry is mew"
    command: "pokedex home missing --dex=kanto --limit=1 --offset=150"
    assert:
      exit_code: 0
      equals:
        "data.0.name": "mew"
        "data.0.pokedex_number": 151

  # -- HOME status with empty collection --

  - name: "home status empty shows zeros"
    command: "pokedex home status"
    assert:
      exit_code: 0
      has_fields: ["data.total_in_home", "data.unique_species_in_home"]
      equals:
        "data.total_in_home": 0
        "data.shiny_in_home": 0

  # -- owned_elsewhere: add pokemon not in home --

  - name: "add bulbasaur to red without in-home"
    command: "pokedex collection add --pokemon=bulbasaur --game=red"
    assert:
      exit_code: 0
      equals:
        "data.in_home": false
        "data.species_name": "bulbasaur"

  - name: "bulbasaur shows owned_elsewhere in home missing"
    command: "pokedex home missing --dex=kanto --limit=1"
    assert:
      exit_code: 0
      has_fields: ["data.0.owned_elsewhere"]
      equals:
        "data.0.name": "bulbasaur"
        "data.0.owned_elsewhere": true

  # -- in_home on update: transfer to HOME increases coverage --

  - name: "add pikachu to sword without in-home"
    command: "pokedex collection add --pokemon=pikachu --game=sword"
    assert:
      exit_code: 0
      equals:
        "data.in_home": false
      has_fields: ["data.id"]

  - name: "home coverage is 0 before transfer"
    command: "pokedex home coverage"
    assert:
      exit_code: 0
      equals:
        "data.caught": 0
      has_fields: ["data.total", "data.percentage"]

  - name: "update pikachu with in-home=true"
    command: "pokedex collection update 2 --in-home=true"
    assert:
      exit_code: 0
      equals:
        "data.in_home": true
      has_fields: ["data.id"]

  - name: "home coverage increases to 1 after transfer"
    command: "pokedex home coverage"
    assert:
      exit_code: 0
      equals:
        "data.caught": 1
      has_fields: ["data.percentage"]

  # -- collection update --dry-run (BUG-R14-H1) --

  - name: "collection update dry-run shows preview"
    command: "pokedex collection update 1 --status=living_dex --dry-run"
    assert:
      exit_code: 0
      equals:
        "data.dry_run": true
      has_fields: ["data.current", "data.new_status"]

  - name: "collection update dry-run has confirm action"
    command: "pokedex collection update 1 --status=living_dex --dry-run"
    assert:
      exit_code: 0
      has_fields: ["actions"]
      contains:
        "actions.0.cmd": "collection update"
        "actions.0.rel": "confirm"

  - name: "collection update dry-run in-home confirm drops flag (BUG-R14-H1)"
    command: "pokedex collection update 1 --in-home=true --dry-run"
    assert:
      exit_code: 0
      equals:
        "data.dry_run": true
        "data.new_in_home": true

  # -- Service games have transfer_direction --

  - name: "pokemon-go is to_home_only"
    command: "pokedex game show pokemon-go"
    assert:
      exit_code: 0
      equals:
        "data.transfer_direction": "to_home_only"
        "data.connects_to_home": true
      contains:
        "data.display_name": "GO"

  - name: "home game has both transfer direction"
    command: "pokedex game show home"
    assert:
      exit_code: 0
      equals:
        "data.connects_to_home": true
        "data.transfer_direction": "both"
