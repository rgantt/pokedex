# Screenplays are CHEAP regression tests produced by exploratory test agents.
# If a step fails, investigate: is it a real bug (fix the code) or a stale
# assertion (update or delete this file)? The INTENT matters, not the exact
# implementation. Don't contort the CLI to make a stale screenplay pass.
name: "Let's Go Pikachu Kanto Completionist Playthrough"
persona: k_lgp_playthrough
description: >
  End-to-end Let's Go Pikachu playthrough following Kanto route progression:
  Route 1 -> Viridian Forest -> Route 3 -> Mt. Moon -> Route 24-25 ->
  Route 5-6 -> Route 9-10 -> Rock Tunnel -> Pokemon Tower -> Safari Zone ->
  Seafoam Islands -> Victory Road. Targets 30+ species via the
  discover-inspect-catch-evolve-verify loop. Verifies LGPE shows Kanto
  region (not Alola), compares encounter data with Red for same locations,
  and tests Alolan form trades and Meltan/Melmetal GO-transfer exclusives.
  Seafoam Islands meta.total=51 vs data length=50 at default limit is
  documented in known_issues.md E003 (pagination, not a bug).
needs_seed: true
mutates_collection: true

steps:
  # ============================================================
  # LOCATION 1: kanto-route-1
  # ============================================================
  - name: "Route 1 -- discover encounters in LGP"
    command: "pokedex location encounters kanto-route-1 --game=lets-go-pikachu"
    assert:
      exit_code: 0
      has_fields: ["data", "actions", "meta"]
      array_len: { "data": { "min": 10, "max": 12 } }

  - name: "Route 1 -- compare with Red (different species set)"
    command: "pokedex location encounters kanto-route-1 --game=red"
    assert:
      exit_code: 0
      has_fields: ["data", "meta"]
      array_len: { "data": { "min": 1 } }

  - name: "Route 1 -- catch Rattata"
    command: "pokedex collection add --pokemon=rattata --game=lets-go-pikachu --method=catch"
    capture: { "rattata_id": "data.id" }
    assert:
      exit_code: 0
      equals: { "data.species_name": "rattata", "data.method": "catch" }
      has_fields: ["data.id", "data.created_at"]

  - name: "Route 1 -- catch Pidgey"
    command: "pokedex collection add --pokemon=pidgey --game=lets-go-pikachu --method=catch"
    capture: { "pidgey_id": "data.id" }
    assert:
      exit_code: 0
      equals: { "data.species_name": "pidgey", "data.status": "caught" }

  - name: "Route 1 -- catch Oddish"
    command: "pokedex collection add --pokemon=oddish --game=lets-go-pikachu --method=catch"
    assert:
      exit_code: 0
      equals: { "data.species_name": "oddish", "data.status": "caught" }
      has_fields: ["data.id"]

  # ============================================================
  # LOCATION 2: viridian-forest
  # ============================================================
  - name: "Viridian Forest -- discover encounters"
    command: "pokedex location encounters viridian-forest --game=lets-go-pikachu"
    assert:
      exit_code: 0
      has_fields: ["data", "actions", "meta"]
      equals: { "meta.total": 9 }
      array_len: { "data": { "min": 9, "max": 9 } }

  - name: "Viridian Forest -- compare with Red (classic encounter set)"
    command: "pokedex location encounters viridian-forest --game=red"
    assert:
      exit_code: 0
      equals: { "meta.total": 10 }
      array_len: { "data": { "min": 10, "max": 10 } }

  - name: "Viridian Forest -- inspect Caterpie"
    command: "pokedex pokemon show caterpie"
    assert:
      exit_code: 0
      equals: { "data.name": "caterpie", "data.generation": 1 }
      has_fields: ["data.types", "data.stats"]

  - name: "Viridian Forest -- catch Caterpie"
    command: "pokedex collection add --pokemon=caterpie --game=lets-go-pikachu --method=catch"
    capture: { "caterpie_id": "data.id" }
    assert:
      exit_code: 0
      equals: { "data.species_name": "caterpie", "data.status": "caught", "data.method": "catch" }
      has_fields: ["data.id", "data.created_at"]

  - name: "Viridian Forest -- check Caterpie evolution chain"
    command: "pokedex pokemon evolutions caterpie"
    assert:
      exit_code: 0
      equals: { "data.species_name": "caterpie" }
      has_fields: ["data.children"]
      contains: { "data.children.0.species_name": "metapod" }

  - name: "Viridian Forest -- evolve Caterpie to Metapod"
    command: "pokedex collection add --pokemon=metapod --game=lets-go-pikachu --method=evolve"
    capture: { "metapod_id": "data.id" }
    assert:
      exit_code: 0
      equals: { "data.species_name": "metapod", "data.method": "evolve" }

  - name: "Viridian Forest -- update Caterpie status to evolved"
    command: "pokedex collection update $caterpie_id --status=evolved"
    assert:
      exit_code: 0
      equals: { "data.status": "evolved", "data.species_name": "caterpie" }

  - name: "Viridian Forest -- evolve Metapod to Butterfree"
    command: "pokedex collection add --pokemon=butterfree --game=lets-go-pikachu --method=evolve"
    capture: { "butterfree_id": "data.id" }
    assert:
      exit_code: 0
      equals: { "data.species_name": "butterfree", "data.method": "evolve" }

  - name: "Viridian Forest -- update Metapod status to evolved"
    command: "pokedex collection update $metapod_id --status=evolved"
    assert:
      exit_code: 0
      equals: { "data.status": "evolved", "data.species_name": "metapod" }

  - name: "Viridian Forest -- catch Pikachu (the starter companion)"
    command: "pokedex collection add --pokemon=pikachu --game=lets-go-pikachu --method=catch"
    assert:
      exit_code: 0
      equals: { "data.species_name": "pikachu", "data.status": "caught" }
      has_fields: ["data.id"]

  - name: "Viridian Forest -- catch Weedle"
    command: "pokedex collection add --pokemon=weedle --game=lets-go-pikachu --method=catch"
    assert:
      exit_code: 0
      equals: { "data.species_name": "weedle", "data.status": "caught" }

  - name: "Viridian Forest -- verify stats after early areas"
    command: "pokedex collection stats --game=lets-go-pikachu"
    assert:
      exit_code: 0
      has_fields: ["data.total_entries", "data.unique_species"]
      type_of: { "data.total_entries": "number", "data.unique_species": "number" }

  # ============================================================
  # LOCATION 3: kanto-route-3
  # ============================================================
  - name: "Route 3 -- discover encounters"
    command: "pokedex location encounters kanto-route-3 --game=lets-go-pikachu"
    assert:
      exit_code: 0
      has_fields: ["data", "meta"]
      equals: { "meta.total": 12 }
