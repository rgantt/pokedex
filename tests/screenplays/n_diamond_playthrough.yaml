# Screenplays are CHEAP regression tests produced by exploratory test agents.
# If a step fails, investigate: is it a real bug (fix the code) or a stale
# assertion (update or delete this file)? The INTENT matters, not the exact
# implementation. Don't contort the CLI to make a stale screenplay pass.
name: "N - Diamond/Pearl Sinnoh Completionist"
persona: n_diamond_playthrough
description: >
  Diamond playthrough testing discover-inspect-catch-evolve-verify loop across
  sinnoh-route-201 through sinnoh-route-217, oreburgh-mine, eterna-forest,
  iron-island, and sinnoh-victory-road. Tests 45+ species collection, evolution
  workflows, dex progress, error handling, and HATEOAS navigation.
needs_seed: true
mutates_collection: true

steps:
  # ============================================================
  # LOCATION 1: sinnoh-route-201
  # ============================================================
  - name: "Route 201 -- discover encounters (sinnoh prefix)"
    command: "pokedex location encounters sinnoh-route-201 --game=diamond"
    assert:
      exit_code: 0
      has_fields: ["data", "actions", "meta.total"]
      equals: { "meta.total": 8 }

  - name: "Route 201 -- route-201 slug fails for Diamond (different location)"
    command: "pokedex location encounters route-201 --game=diamond"
    assert:
      exit_code: 1
      equals: { "error.code": "NOT_FOUND" }
      has_fields: ["actions"]

  - name: "Route 201 -- inspect Bidoof"
    command: "pokedex pokemon show bidoof"
    assert:
      exit_code: 0
      equals: { "data.name": "bidoof", "data.generation": 4 }
      has_fields: ["data.types", "data.stats", "data.abilities"]

  - name: "Route 201 -- inspect Starly"
    command: "pokedex pokemon show starly"
    assert:
      exit_code: 0
      equals: { "data.name": "starly", "data.generation": 4 }
      has_fields: ["data.types", "data.egg_groups"]

  - name: "Route 201 -- catch Bidoof"
    command: "pokedex collection add --pokemon=bidoof --game=diamond --method=catch"
    capture: { "bidoof_id": "data.id" }
    assert:
      exit_code: 0
      equals: { "data.species_name": "bidoof", "data.status": "caught", "data.method": "catch" }
      has_fields: ["data.id", "data.created_at"]

  - name: "Route 201 -- catch Starly"
    command: "pokedex collection add --pokemon=starly --game=diamond --method=catch"
    capture: { "starly_id": "data.id" }
    assert:
      exit_code: 0
      equals: { "data.species_name": "starly", "data.status": "caught", "data.game": "diamond" }

