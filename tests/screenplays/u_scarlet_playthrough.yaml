  - name: "Forms -- Paldean Tauros is Fighting type"
    command: "pokedex pokemon show tauros-paldea-combat-breed"
    assert:
      exit_code: 0
      contains: { "data.display_name": "Paldean", "data.types": "Fighting" }

  # ============================================================
  # FINAL VERIFICATION
  # ============================================================
  - name: "Final -- collection stats"
    command: "pokedex collection stats --game=scarlet"
    assert:
      exit_code: 0
      has_fields: ["data.total_entries", "data.unique_species", "data.by_status"]
      type_of: { "data.total_entries": "number", "data.unique_species": "number" }

  - name: "Final -- dex progress over 40 species"
    command: "pokedex collection stats --game=scarlet"
    assert:
      exit_code: 0
      has_fields: ["data.unique_species", "data.shiny_count"]

  - name: "HATEOAS -- encounter actions present"
    command: "pokedex location encounters poco-path --game=scarlet"
    assert:
      exit_code: 0
      has_fields: ["actions"]
      contains: { "actions.0.cmd": "pokedex pokemon show" }

  - name: "HATEOAS -- collection stats navigable"
    command: "pokedex collection stats --game=scarlet"
    assert:
      exit_code: 0
      has_fields: ["actions"]
      array_len: { "actions": { "min": 3 } }
