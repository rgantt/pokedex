      has_fields: ["data.id"]

  # ============================================================
  # LOCATION 14: victory-road (no Gold encounters expected)
  # ============================================================
  - name: "Victory Road -- no Gold encounters (expected NOT_FOUND)"
    command: "pokedex location encounters victory-road --game=gold"
    assert:
      exit_code: 1
      equals: { "error.code": "NOT_FOUND" }
      contains: { "error.message": "victory-road" }

  # ============================================================
  # DEX PROGRESS CHECK
  # ============================================================
  - name: "Johto dex progress -- verify partial completion"
    command: "pokedex dex progress original-johto --game=gold"
    assert:
      exit_code: 0
      has_fields: ["data.dex_name", "data.total", "data.caught", "data.percentage"]
      equals: { "data.dex_name": "original-johto" }
      type_of: { "data.percentage": "number" }

  # ============================================================
  # FINAL VERIFICATION
  # ============================================================
  - name: "Final stats -- verify Gold playthrough 40+ species"
    command: "pokedex collection stats --game=gold"
    assert:
      exit_code: 0
      has_fields: ["data.total_entries", "data.unique_species", "data.by_status"]
      type_of: { "data.total_entries": "number", "data.unique_species": "number" }
  - name: "Final collection list -- verify Gold entries exist"
    command: "pokedex collection list --game=gold --limit=50"
    assert:
      exit_code: 0
      has_fields: ["data", "meta"]
      array_len: { "data": { "min": 40 } }
