      equals: { "data.species_name": "melmetal", "data.method": "evolve" }

  - name: "Meltan -- update status to evolved"
    command: "pokedex collection update $meltan_id --status=evolved"
    assert:
      exit_code: 0
      equals: { "data.status": "evolved", "data.species_name": "meltan" }

  # ============================================================
  # LGPE FEATURE: Alolan form encounter resolution
  # Known issue F001: geodude-alola resolves to base species encounters
  # ============================================================
  - name: "Alolan encounters -- geodude-alola resolves to base species (known F001)"
    command: "pokedex pokemon encounters geodude-alola --game=lets-go-pikachu"
    assert:
      exit_code: 0
      # F001: returns base Geodude encounters, not Alolan-specific
      array_len: { "data": { "min": 1 } }

  # ============================================================
  # RATTATA EVOLUTION: Raticate from Route 1
  # ============================================================
  - name: "Evolve Rattata to Raticate"
    command: "pokedex collection add --pokemon=raticate --game=lets-go-pikachu --method=evolve"
    assert:
      exit_code: 0
      equals: { "data.species_name": "raticate", "data.method": "evolve" }

  - name: "Update Rattata status to evolved"
    command: "pokedex collection update $rattata_id --status=evolved"
    assert:
      exit_code: 0
      equals: { "data.status": "evolved", "data.species_name": "rattata" }

  # ============================================================
  # PIDGEY EVOLUTION CHAIN
  # ============================================================
  - name: "Evolve Pidgey to Pidgeotto"
    command: "pokedex collection add --pokemon=pidgeotto --game=lets-go-pikachu --method=evolve"
    assert:
      exit_code: 0
      equals: { "data.species_name": "pidgeotto", "data.method": "evolve" }

  - name: "Update Pidgey status to evolved"
    command: "pokedex collection update $pidgey_id --status=evolved"
    assert:
      exit_code: 0
      equals: { "data.status": "evolved", "data.species_name": "pidgey" }

  # ============================================================
  # FINAL VERIFICATION
  # ============================================================
  - name: "Final stats -- verify 30+ species caught across playthrough"
    command: "pokedex collection stats --game=lets-go-pikachu"
    assert:
      exit_code: 0
      has_fields: ["data.total_entries", "data.unique_species", "data.by_status"]
      type_of: { "data.total_entries": "number", "data.unique_species": "number" }

  - name: "Final stats -- collection list for LGP shows all entries"
    command: "pokedex collection list --game=lets-go-pikachu"
    assert:
      exit_code: 0
      has_fields: ["data", "actions", "meta"]
      array_len: { "data": { "min": 35 } }

  - name: "Final -- Kanto dex progress reflects catches"
    command: "pokedex dex progress kanto"
    assert:
      exit_code: 0
      equals: { "data.dex_name": "kanto", "data.total": 151 }
      type_of: { "data.percentage": "number" }

  - name: "Final -- Rattata encounters confirm Kanto locations in LGP"
    command: "pokedex pokemon encounters rattata --game=lets-go-pikachu"
    assert:
      exit_code: 0
      array_len: { "data": { "min": 5 } }
      contains: { "data.0.game": "Pikachu" }
